name: Firebase Hosting Deploy

# main'e her push'ta Firebase Hosting'e deploy eder.
# Gerekli secret: FIREBASE_TOKEN  (firebase login:ci çıktısı)
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting
        uses: w9jds/firebase-action@v13.23.1
        with:
          args: deploy --only hosting --project tikita-2026
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
