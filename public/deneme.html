<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Tikita · Deneme (Emir)</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  :root{
    --bg:#f4f2ee; --surf:#ffffff; --surf2:#faf8f4; --line:#ece7df;
    --txt:#1b1e25; --mut:#7c818c; --mut2:#a9adb6;
    --gold:#d97b12; --gold-l:#f4a63a; --cyan:#0e8fce; --violet:#7c46e6; --green:#16a34a; --red:#e0483c;
    --hud1:#3a1414; --hud2:#7c2d12; --hud3:#b45309;
  }
  html,body{background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;overscroll-behavior-y:none}
  #root{max-width:520px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:92px}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .card{background:var(--surf);border:1px solid var(--line);border-radius:20px;box-shadow:0 6px 22px rgba(28,30,45,.05)}
  .lbl{font-size:12px;font-weight:800;letter-spacing:1.1px;color:var(--mut);text-transform:uppercase}
  .fade{animation:fade .45s cubic-bezier(.2,.7,.2,1) both}
  .rise{animation:rise .5s cubic-bezier(.2,.7,.2,1) both}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  @keyframes barfill{from{width:0}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes sheetup{from{transform:translateY(101%)}to{transform:none}}
  @keyframes bdin{from{opacity:0}to{opacity:1}}
  @keyframes pop{0%{transform:scale(.55);opacity:0}62%{transform:scale(1.07)}100%{transform:scale(1);opacity:1}}
  @keyframes conf{to{transform:translateY(140px) rotate(400deg);opacity:0}}
  ::-webkit-scrollbar{display:none}
  .leaflet-container{background:#e8eef2;font-family:inherit}
  .kmark{display:flex;align-items:center;justify-content:center;border-radius:50% 50% 50% 4px;
    transform:rotate(45deg);box-shadow:0 3px 10px rgba(0,0,0,.3);border:2px solid #fff}
  .kmark span{transform:rotate(-45deg);font-size:14px}
</style>
</head>
<body>
<div id="root"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const cfg={apiKey:"AIzaSyDLf4LIJikzWGVgN_k_d6SuGlgiBWBxt5k",authDomain:"tikita-2026.firebaseapp.com",projectId:"tikita-2026",storageBucket:"tikita-2026.firebasestorage.app",messagingSenderId:"518493033310",appId:"1:518493033310:web:a687bc4409974277d0f5cf"};
const db=getFirestore(initializeApp(cfg));
const {useState,useEffect,useMemo,useRef}=React; const h=React.createElement;

/* ————— YAZMA katmanı — izole (demo_) · gerçek defter korunur ————— */
const OV="demo_";  // deneme yazımları ayrı koleksiyonlarda durur
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);
async function save(coll,obj){ const id=obj.id||uid(); const {id:_,...dd}=obj; await setDoc(doc(db,OV+coll,id),dd,{merge:true}); return id; }
async function remove(coll,id){ await deleteDoc(doc(db,OV+coll,id)); }
// bir tahsilatın üretici(önce)/pazarlamacı(sonra) bölüşümü — birebir ana uygulama
const payBol=(x,d,onceki)=>{ const K=num(x.adet)*num(x.alisFiyat); const o=num(onceki);
  const uOnce=Math.min(o,K), uSonra=Math.min(o+d,K); const u=Math.max(0,uSonra-uOnce); return {u, p:Math.max(0,d-u)}; };

/* ————— iş mantığı birebir korunuyor ————— */
const num=v=>{const n=parseFloat(v);return isNaN(n)?0:n;};
const tl=n=>Math.round(num(n)).toLocaleString("tr-TR")+" ₺";
const KOMUTAN=[[0,"Acemi Er","🌱"],[50,"Onbaşı","🎖️"],[150,"Çavuş","🏅"],[400,"Teğmen","⭐"],[900,"Yüzbaşı","🔥"],[2000,"Binbaşı","⚔️"],[4500,"Paşa","🏰"],[9000,"Serdar-ı Ekrem","👑"]];
const ASKER_TIER=[[0,1],[50,2],[100,3],[250,5],[1000,9]];
const SILAH_TIER=[[0,1],[500,2],[1000,3],[2500,5],[5000,9]];
const katOf=(t,v)=>{let r=t[0];for(const x of t)if(v>=x[0])r=x;return r;};
const gunFark=t=>{const d=new Date(t).getTime();return d?Math.floor((Date.now()-d)/864e5):999;};
const oncelik={borc:0,konsinye:1,ihmal:2,saglam:3};
function kaleDurum(k){
  if(k.borc>0.5) return {key:"borc",label:"Tahsilat",renk:"var(--gold)",hex:"#d97b12",ik:"🧾",aksiyon:tl(k.borc)+" tahsil et",cta:"🧾 Tahsil et"};
  if(k.gunGecti>=14&&k.gunGecti<900) return {key:"ihmal",label:"İhmal",renk:"var(--cyan)",hex:"#0e8fce",ik:"⚔️",aksiyon:k.gunGecti+" gündür uğranmadı",cta:"⚔️ Ziyaret et"};
  return {key:"saglam",label:"Sağlam",renk:"var(--green)",hex:"#16a34a",ik:"🛡️",aksiyon:"ilişki güçlü — yeni akın",cta:"⚔️ Akına git"};
}

function useColl(name){ const [rows,setRows]=useState(null);
  useEffect(()=>onSnapshot(collection(db,name),s=>setRows(s.docs.map(d=>({id:d.id,...d.data()}))),e=>{console.error(name,e);setRows([]);}),[]);
  return rows; }

function hesap(hareketler,musteriler,kullanicilar,urunler){
  const emir=(kullanicilar||[]).find(u=>(u.ad||"").trim().toLocaleLowerCase("tr")==="emir")||{id:"mr14ih8vc39wug",ad:"Emir",simge:"🎖️"};
  const musById={}; (musteriler||[]).forEach(m=>musById[m.id]=m);
  const kk=x=>x.musteriId?("m:"+x.musteriId):("y:"+((x.yer||"?").toLocaleLowerCase("tr")));
  const kM={};
  (hareketler||[]).forEach(x=>{ if((x.tip!=="satis"&&x.tip!=="konsinye")||x.gerilla) return;
    const k=kM[kk(x)]||(kM[kk(x)]={key:kk(x),musteriId:x.musteriId||"",ad:x.yer||"",bolge:x.bolge||"",lat:x.lat||"",lng:x.lng||"",satisAdet:0,ciro:0,konsAdet:0,konsList:{}});
    if(x.tip==="satis"){k.satisAdet+=num(x.adet);k.ciro+=num(x.adet)*num(x.satisFiyat);} else k.konsAdet+=num(x.adet);
    if(!k.ad&&x.yer)k.ad=x.yer; if(!k.bolge&&x.bolge)k.bolge=x.bolge; });
  const acikK={},borcK={},sonK={},ovTah={},ovCoz={},ovCozList={},marjK={},tahByK={};
  (hareketler||[]).forEach(x=>{ if(x.gerilla) return; const k=kk(x); const t=new Date(x.tarih).getTime()||0;
    if(["satis","konsinye","iade","tahsilat","stant","diplomasi"].includes(x.tip)) sonK[k]=Math.max(sonK[k]||0,t);
    // deneme (overlay) yazımları: gerçek kayda dokunmadan borç/konsinyeyi düzelt
    if(x._ov){ if(x.tip==="tahsilat") ovTah[k]=(ovTah[k]||0)+num(x.tutar);
      if((x.tip==="satis"&&x.kaynak==="konsinye")||x.tip==="iade"){ const ad=x.urunAd||"?";
        ovCoz[k]=(ovCoz[k]||0)+num(x.adet); (ovCozList[k]||(ovCozList[k]={}))[ad]=(ovCozList[k][ad]||0)+num(x.adet); } }
    if(x.tip==="tahsilat") (tahByK[k]||(tahByK[k]=[])).push(x);
    if(x.tip==="konsinye"&&num(x.kalan)>0){ acikK[k]=(acikK[k]||0)+num(x.kalan);
      if(kM[k]){const ad=x.urunAd||"?"; kM[k].konsList[ad]=(kM[k].konsList[ad]||0)+num(x.kalan);} }
    else if(x.tip==="satis"){const bek=num(x.adet)*num(x.satisFiyat);const th=x.tahsil==null?bek:num(x.tahsil);const b=Math.max(0,bek-th);if(b>0)borcK[k]=(borcK[k]||0)+b;
      marjK[k]=(marjK[k]||0)+(num(x.satisFiyat)-num(x.alisFiyat))*num(x.adet);} });
  let kaleler=Object.values(kM).map(k=>{ const m=k.musteriId&&musById[k.musteriId];
    if(m){k.ad=m.ad||k.ad;k.bolge=m.bolge||k.bolge;if(!k.lat&&m.lat){k.lat=m.lat;k.lng=m.lng;}}
    const silah=Math.floor(k.ciro/250);
    k.guc=Math.round(k.satisAdet*katOf(ASKER_TIER,k.satisAdet)[1]+k.konsAdet+silah*katOf(SILAH_TIER,k.ciro)[1]);
    k.seviye=(()=>{const t=[0,25,80,200,500,1200];let lv=1;for(let i=1;i<t.length;i++)if(k.guc>=t[i])lv=i+1;return lv;})();
    k.acikKons=Math.max(0,(acikK[k.key]||0)-(ovCoz[k.key]||0));
    k.borc=Math.max(0,(borcK[k.key]||0)-(ovTah[k.key]||0)); k.son=sonK[k.key]||0; k.gunGecti=k.son?gunFark(k.son):999;
    const coz=ovCozList[k.key]||{};
    k.konsKalem=Object.entries(k.konsList).map(([ad,adet])=>({ad,adet:Math.max(0,adet-(coz[ad]||0))})).filter(c=>c.adet>0).sort((a,b)=>b.adet-a.adet);
    // pazarlamacı hakedişi: tahsil edilen paradan düşen marj payı (önce üretici)
    k.marjTop=Math.max(0,marjK[k.key]||0); const orn=k.ciro>0?Math.min(1,k.marjTop/k.ciro):0;
    k.hakedisAlinan=(tahByK[k.key]||[]).reduce((s,x)=>s+(x.pazPay!=null?num(x.pazPay):num(x.tutar)*orn),0);
    k.hakedisBekleyen=Math.max(0,k.marjTop-k.hakedisAlinan);
    k.durum=kaleDurum(k); return k; }).filter(k=>k.ad).sort((a,b)=>b.guc-a.guc);
  const toplamGuc=kaleler.reduce((s,k)=>s+k.guc,0);
  const komutan=katOf(KOMUTAN,toplamGuc); const sonraki=KOMUTAN.find(x=>x[0]>toplamGuc)||null;
  const gerillaGanimet=(hareketler||[]).filter(x=>x.gerilla&&x.tip==="satis").reduce((s,x)=>s+num(x.adet)*num(x.satisFiyat),0);
  const satisGun=new Set((hareketler||[]).filter(x=>x.tip==="satis").map(x=>{const d=new Date(x.tarih);return d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate();}));
  let streak=0;{const g=new Date();const key=d=>d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate();if(!satisGun.has(key(g)))g.setDate(g.getDate()-1);while(satisGun.has(key(g))){streak++;g.setDate(g.getDate()-1);}}
  const haf=Date.now()-7*864e5;
  const hs=(hareketler||[]).filter(x=>x.tip==="satis"&&new Date(x.tarih).getTime()>=haf);
  const hafCiro=hs.reduce((s,x)=>s+num(x.adet)*num(x.satisFiyat),0);
  const hafKar=hs.reduce((s,x)=>s+num(x.adet)*(num(x.satisFiyat)-num(x.alisFiyat)),0);
  const gorevler=kaleler.filter(k=>k.durum.key!=="saglam").sort((a,b)=>oncelik[a.durum.key]-oncelik[b.durum.key]||b.guc-a.guc);
  // cephane — ürünler kaynak gibi
  const eid=emir.id;
  const cephane=(urunler||[]).map(u=>({id:u.id,ad:u.ad||"?",stokta:num(u.stokta),canta:num((u.pazStokK||{})[eid]),fiyat:num(u.satisFiyat),pazFiyat:num(u.pazFiyat)}))
    .filter(u=>u.ad!=="?").sort((a,b)=>(b.canta-a.canta)||(b.stokta-a.stokta));
  const cantaTop=cephane.reduce((s,u)=>s+u.canta,0);
  return {emir,kaleler,toplamGuc,komutan,sonraki,gerillaGanimet,streak,hafCiro,hafKar,gorevler,cephane,cantaTop,
    konsToplam:Object.values(acikK).reduce((s,v)=>s+v,0),
    borcTop:kaleler.reduce((s,k)=>s+k.borc,0)};
}

/* ————— ortak UI ————— */
function Toast({msg}){ if(!msg)return null;
  return h("div",{className:"fade",style:{position:"fixed",left:"50%",bottom:108,transform:"translateX(-50%)",zIndex:60,
    background:"#1b1e25",color:"#fff",padding:"12px 18px",borderRadius:14,fontSize:13.5,fontWeight:600,
    boxShadow:"0 12px 40px rgba(0,0,0,.28)",maxWidth:"88%",textAlign:"center"}},msg); }
function HudChip({ik,val,sub,renk}){ return h("div",{style:{display:"flex",alignItems:"center",gap:7,background:"rgba(255,255,255,.14)",padding:"7px 11px",borderRadius:12}},
  h("span",{style:{fontSize:15}},ik),
  h("div",{style:{lineHeight:1.1}},h("div",{style:{fontSize:13.5,fontWeight:800,color:renk||"#fff"}},val),
    sub&&h("div",{style:{fontSize:9.5,color:"rgba(255,255,255,.65)",fontWeight:700,letterSpacing:.3}},sub))); }
function Hud({d,onBell}){ const {emir,komutan,sonraki,toplamGuc,kaleler,gerillaGanimet,streak,gorevler}=d;
  const taban=komutan[0],tavan=sonraki?sonraki[0]:komutan[0];
  const oran=tavan>taban?Math.max(4,Math.min(100,Math.round((toplamGuc-taban)/(tavan-taban)*100))):100;
  return h("div",{className:"fade",style:{background:"linear-gradient(150deg,var(--hud1) 0%,var(--hud2) 52%,var(--hud3) 135%)",
    padding:"calc(env(safe-area-inset-top,0px) + 18px) 20px 20px",borderRadius:"0 0 26px 26px",
    boxShadow:"0 10px 30px rgba(124,45,18,.35)",position:"relative",overflow:"hidden"}},
    h("div",{style:{position:"absolute",top:-38,right:-28,fontSize:150,opacity:.08,transform:"rotate(-12deg)"}},"⚔️"),
    h("div",{style:{display:"flex",alignItems:"center",gap:13,position:"relative"}},
      h("div",{style:{width:54,height:54,borderRadius:"50%",background:"rgba(255,255,255,.16)",border:"2px solid rgba(255,255,255,.35)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:29,flexShrink:0}},emir.simge||"🎖️"),
      h("div",{style:{flex:1,minWidth:0}},
        h("div",{style:{fontSize:10.5,fontWeight:700,letterSpacing:1,color:"rgba(255,255,255,.7)"}},"KOMUTAN · "+(emir.ad||"—").toUpperCase()),
        h("div",{style:{fontSize:22,fontWeight:800,color:"#fff",lineHeight:1.1,marginTop:1}},komutan[2]+" "+komutan[1])),
      h("button",{onClick:onBell,style:{position:"relative",width:40,height:40,borderRadius:12,background:"rgba(0,0,0,.2)",border:"1px solid rgba(255,255,255,.16)",fontSize:17}},"🔔",
        gorevler.length>0&&h("span",{style:{position:"absolute",top:-5,right:-5,minWidth:18,height:18,borderRadius:9,background:"var(--gold-l)",color:"#3a1414",fontSize:10.5,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",animation:"pulse 1.6s infinite"}},gorevler.length))),
    h("div",{style:{marginTop:14}},
      h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:10.5,color:"rgba(255,255,255,.8)",fontWeight:600,marginBottom:5}},
        h("span",null,"💪 "+toplamGuc.toLocaleString("tr-TR")+" güç"),
        sonraki?h("span",null,(sonraki[0]-toplamGuc).toLocaleString("tr-TR")+" → "+sonraki[2]+" "+sonraki[1]):h("span",null,"👑 en üst rütbe")),
      h("div",{style:{height:8,borderRadius:99,background:"rgba(0,0,0,.26)",overflow:"hidden"}},
        h("div",{style:{height:"100%",width:oran+"%",borderRadius:99,background:"linear-gradient(90deg,#ffd479,#f5a623)",boxShadow:"0 0 10px rgba(245,166,35,.55)",animation:"barfill 1s cubic-bezier(.2,.7,.2,1)"}}))),
    h("div",{style:{display:"flex",gap:9,marginTop:14}},
      h(HudChip,{ik:"🏰",val:kaleler.length,sub:"KALE"}),
      h(HudChip,{ik:"🔥",val:streak+" gün",sub:"SERİ",renk:streak>0?"#ffd479":"#fff"}),
      h(HudChip,{ik:"⚡",val:tl(gerillaGanimet),sub:"GANİMET"}))); }

/* ————— HOME (Üs) ————— */
function Home({d,say,openKale,openSheet,stype}){
  const primary=d.gorevler[0]; const digerler=d.gorevler.slice(1,4);
  return h("div",null,
    h(Hud,{d,onBell:()=>say("🔔 "+d.gorevler.length+" görevin var")}),
    h("div",{style:{padding:"22px 16px 0"}},
      h("div",{className:"lbl",style:{marginBottom:11,paddingLeft:2}},"Bugünkü görevin"),
      primary
        ? h("div",{className:"rise card",style:{padding:20,position:"relative",overflow:"hidden"}},
            h("div",{style:{position:"absolute",top:-24,right:-8,fontSize:96,opacity:.05}},primary.durum.ik),
            h("div",{style:{display:"flex",alignItems:"center",gap:12}},
              h("div",{style:{width:48,height:48,borderRadius:14,background:primary.durum.hex+"1a",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}},primary.durum.ik),
              h("div",{style:{minWidth:0}},
                h("div",{style:{fontSize:11,fontWeight:800,color:primary.durum.renk,letterSpacing:.5,textTransform:"uppercase"}},primary.durum.label),
                h("div",{style:{fontSize:19,fontWeight:800,lineHeight:1.15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},primary.ad))),
            h("div",{style:{fontSize:14,color:"var(--mut)",margin:"11px 0 18px"}},h("b",{style:{color:"var(--txt)"}},primary.durum.aksiyon)),
            h("button",{onClick:()=>openSheet(stype(primary),primary),style:{width:"100%",padding:16,borderRadius:16,background:"linear-gradient(90deg,#f4a63a,#d97b12)",color:"#2a1408",fontSize:16.5,fontWeight:800,boxShadow:"0 8px 20px rgba(217,123,18,.28)"}},primary.durum.cta+" →"),
            h("button",{onClick:()=>openKale(primary),style:{width:"100%",padding:"11px 0 2px",fontSize:12.5,fontWeight:700,color:"var(--mut)"}},"kale detayına git →"))
        : h("div",{className:"rise card",style:{padding:"26px 20px",textAlign:"center"}},
            h("div",{style:{fontSize:40,marginBottom:8}},"🏆"),
            h("div",{style:{fontSize:17,fontWeight:800}},"Tüm hesaplar temiz!"),
            h("div",{style:{fontSize:14,color:"var(--mut)",marginTop:4}},"Yeni bir kale fethetmeye ne dersin?"))),
    digerler.length>0&&h("div",{style:{padding:"20px 16px 0"}},
      h("div",{className:"lbl",style:{marginBottom:10,paddingLeft:2,color:"var(--mut2)"}},"Sıradaki"),
      h("div",{style:{display:"grid",gap:8}},digerler.map((g,i)=>h(KaleSatir,{key:i,k:g,onClick:()=>openKale(g)})))),
    h("div",{style:{padding:"22px 16px 0"}},
      h("div",{className:"lbl",style:{marginBottom:10,paddingLeft:2,color:"var(--mut2)"}},"Bu hafta"),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:9}},
        [["💰",tl(d.hafCiro),"ciro","var(--green)"],["🫰",tl(d.hafKar),"hakediş","var(--gold)"],["🏬",d.konsToplam,"açık kons.","var(--violet)"]]
          .map((s,i)=>h("div",{key:i,className:"card",style:{padding:"14px 8px",textAlign:"center",boxShadow:"none"}},
            h("div",{style:{fontSize:17,marginBottom:4}},s[0]),
            h("div",{style:{fontSize:15,fontWeight:800,color:s[3],lineHeight:1.1}},s[1]),
            h("div",{style:{fontSize:10.5,color:"var(--mut)",marginTop:3,fontWeight:600}},s[2]))))));
}

/* ————— Kale satırı (liste) ————— */
function KaleSatir({k,onClick}){ const D=k.durum;
  const konsTxt=(k.konsKalem||[]).map(c=>c.ad+" "+c.adet).join(" · ");
  const loc=k.bolge?("📍 "+k.bolge):"";
  const alt=[loc, konsTxt?("🏬 "+konsTxt):""].filter(Boolean).join("   ") || "—";
  return h("button",{onClick,className:"card",style:{display:"flex",alignItems:"center",gap:12,padding:"13px 14px",textAlign:"left",width:"100%",boxShadow:"0 3px 12px rgba(28,30,45,.04)"}},
    h("div",{style:{width:42,height:42,borderRadius:12,background:D.hex+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}},D.ik),
    h("div",{style:{flex:1,minWidth:0}},
      h("div",{style:{fontSize:15,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},k.ad),
      h("div",{style:{fontSize:12.5,color:konsTxt?"var(--violet)":"var(--mut)",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:konsTxt?600:400}},alt)),
    h("span",{style:{fontSize:20,color:"var(--mut2)",flexShrink:0,fontWeight:400}},"›"));
}

/* ————— KALELER listesi ————— */
function Kaleler({d,openKale,say}){
  const [f,setF]=useState("all");

/* ————— HARİTA ————— */
function Harita({d,openKale,say}){
  const ref=useRef(null); const mapRef=useRef(null);
  const [f,setF]=useState("all");
  const konumlu=d.kaleler.filter(k=>k.lat&&k.lng);
  const eslesF=(k,ff)=>ff==="all"?true:ff==="konsinye"?k.acikKons>0:k.durum.key===ff;
  const gorunen=konumlu.filter(k=>eslesF(k,f));
  useEffect(()=>{ if(!window.L||!ref.current) return;
    const L=window.L; const map=L.map(ref.current,{zoomControl:false,attributionControl:false});
    mapRef.current=map; L.control.zoom({position:"bottomright"}).addTo(map);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",{maxZoom:19,subdomains:"abcd"}).addTo(map);
    return ()=>{ map.remove(); mapRef.current=null; }; },[]);
  useEffect(()=>{ const map=mapRef.current; if(!map||!window.L) return; const L=window.L;
    map.eachLayer(l=>{ if(l instanceof L.Marker) map.removeLayer(l); });
    const pts=[];
    gorunen.forEach(k=>{ const ic=L.divIcon({className:"",html:'<div class="kmark" style="width:30px;height:30px;background:'+k.durum.hex+'"><span>'+k.durum.ik+'</span></div>',iconSize:[30,30],iconAnchor:[15,28]});
      const mk=L.marker([+k.lat,+k.lng],{icon:ic}).addTo(map); mk.on("click",()=>openKale(k)); pts.push([+k.lat,+k.lng]); });
    if(pts.length) map.fitBounds(pts,{padding:[50,50],maxZoom:15}); else map.setView([41.02,29.05],12);
  },[f,d.kaleler.length]);
  const filtreler=[["all","Tümü",konumlu.length],["borc","🧾",konumlu.filter(k=>k.durum.key==="borc").length],["konsinye","🏬",konumlu.filter(k=>k.acikKons>0).length],["ihmal","⚔️",konumlu.filter(k=>k.durum.key==="ihmal").length],["saglam","🛡️",konumlu.filter(k=>k.durum.key==="saglam").length]];
  return h("div",{style:{position:"relative",height:"calc(100vh - 92px)"}},
    h("div",{ref,style:{position:"absolute",inset:0}}),
    h("div",{style:{position:"absolute",top:"calc(env(safe-area-inset-top,0px) + 12px)",left:12,right:12,zIndex:500,display:"flex",gap:7,overflowX:"auto"}},
      filtreler.map(([k,ad,n])=>h("button",{key:k,onClick:()=>setF(k),style:{flexShrink:0,padding:"9px 13px",borderRadius:99,fontSize:12.5,fontWeight:700,
        background:f===k?"#1b1e25":"rgba(255,255,255,.95)",color:f===k?"#fff":"var(--txt)",boxShadow:"0 3px 12px rgba(0,0,0,.15)",backdropFilter:"blur(6px)"}},ad+" "+n))),
    d.kaleler.length>konumlu.length&&h("div",{style:{position:"absolute",bottom:16,left:12,zIndex:500,background:"rgba(255,255,255,.95)",padding:"8px 12px",borderRadius:12,fontSize:11.5,color:"var(--mut)",fontWeight:600,boxShadow:"0 3px 12px rgba(0,0,0,.15)"}},"📍 "+(d.kaleler.length-konumlu.length)+" kalenin konumu yok"));
}

// bir deneme (overlay) kaydını insanca özetle
function ovOzet(x){
  if(x.tip==="tahsilat") return {ik:"🧾",t:"Tahsilat",v:tl(x.tutar)};
  if(x.tip==="iade") return {ik:"↩️",t:"İade",v:num(x.adet)+" × "+(x.urunAd||"?")};
  if(x.tip==="satis"&&x.kaynak==="konsinye") return {ik:"🏬",t:"Konsinye satış",v:num(x.adet)+" × "+(x.urunAd||"?")};
  if(x.tip==="satis"&&x.gerilla) return {ik:"⚡",t:"Gerilla satış",v:num(x.adet)+" × "+(x.urunAd||"?")};
  if(x.tip==="satis") return {ik:"💰",t:"Satış",v:num(x.adet)+" × "+(x.urunAd||"?")};
  if(x.tip==="diplomasi") return {ik:"⚔️",t:"Ziyaret",v:x.not?("“"+String(x.not).slice(0,24)+"”"):""};
  return {ik:"•",t:x.tip||"kayıt",v:""};
}
function OvSatir({x,geriAl}){ const o=ovOzet(x);
  return h("div",{style:{display:"flex",alignItems:"center",gap:11,padding:"10px 0",borderTop:"1px solid var(--line)"}},
    h("span",{style:{fontSize:18}},o.ik),
    h("div",{style:{flex:1,minWidth:0}},
      h("div",{style:{fontSize:13.5,fontWeight:700}},o.t),
      h("div",{style:{fontSize:11.5,color:"var(--mut)",marginTop:1}},(x.yer||"—")+(o.v?(" · "+o.v):""))),
    h("button",{onClick:()=>geriAl(x),style:{padding:"7px 11px",borderRadius:10,fontSize:12,fontWeight:800,
      background:"#fff",border:"1px solid var(--line)",color:"var(--red)",flexShrink:0}},"↩️ Geri al"));
}

        h("div",{style:{minWidth:0}},
          h("div",{style:{fontSize:18,fontWeight:800,lineHeight:1.15}},baslik),
          alt&&h("div",{style:{fontSize:12.5,color:"var(--mut)",marginTop:2}},alt))),
      children,
      h("button",{onClick:disabled?null:onCta,disabled,style:{width:"100%",padding:16,borderRadius:16,marginTop:20,
        background:disabled?"var(--line)":"linear-gradient(90deg,"+hex+","+hex+"cc)",color:disabled?"var(--mut2)":"#fff",
        fontSize:16.5,fontWeight:800,boxShadow:disabled?"none":"0 8px 20px "+hex+"44"}},cta)));
}
function ActionSheet({type,k,d,onClose,onFire}){
  const konsList=(k&&k.konsKalem)||[];
  const [tut,setTut]=useState(type==="tahsilat"?Math.round(k?k.borc:0):0);
  const [urun,setUrun]=useState((d.cephane.find(u=>u.canta>0)||d.cephane[0]||{ad:"",fiyat:0}));
  const [adet,setAdet]=useState(1);
  const [fiyat,setFiyat]=useState(num((d.cephane.find(u=>u.canta>0)||d.cephane[0]||{}).fiyat)||0);
  const [kmod,setKmod]=useState("birak"); const [kkalem,setKkalem]=useState(konsList[0]||{ad:"",adet:0});
  const [not,setNot]=useState("");
  const [bekle,setBekle]=useState(false);
  const fire=(mesaj,xp,ekstra)=>{ setBekle(true); onFire({type,k,mesaj,xp,...(ekstra||{})}); };

  if(type==="tahsilat"){ const borc=k?k.borc:0;
    return h(Sheet,{ik:"🧾",hex:"#d97b12",baslik:"Tahsilat · "+(k?k.ad:""),alt:"Bu kalenin borcu "+tl(borc),
      onClose,cta:bekle?"⏳ İşleniyor…":"🧾 "+tl(tut)+" tahsil et",disabled:tut<=0||bekle,
      onCta:()=>fire(tl(tut)+" tahsilat işlendi · "+(k?k.ad:""),XP.tahsilat,{tut})},
      h("div",{className:"lbl",style:{marginBottom:8}},"Alınan tutar"),
      h("input",{type:"number",inputMode:"numeric",value:tut||"",onChange:e=>setTut(num(e.target.value)),style:inp}),
      h("div",{style:{display:"flex",gap:8,marginTop:12,flexWrap:"wrap"}},
        h(Chip,{on:tut===Math.round(borc),onClick:()=>setTut(Math.round(borc))},"Tümü · "+tl(borc)),
        borc>1&&h(Chip,{on:tut===Math.round(borc/2),onClick:()=>setTut(Math.round(borc/2))},"Yarısı"),
        h(Chip,{on:false,onClick:()=>setTut(0)},"Temizle")));
  }
  if(type==="satis"){
    const secUrun=u=>{setUrun(u);setFiyat(num(u.fiyat));};
    const toplam=adet*fiyat;
    return h(Sheet,{ik:"💰",hex:"#16a34a",baslik:"Satış · "+(k?k.ad:"Gerilla"),alt:"çantandan sat, borç oluşsun",
      onClose,cta:bekle?"⏳ İşleniyor…":"💰 "+tl(toplam)+" satış işle",disabled:!urun.ad||adet<=0||bekle,
      onCta:()=>fire(adet+" × "+urun.ad+" satıldı ("+tl(toplam)+")",XP.satis,{urun,adet,fiyat})},
      h("div",{className:"lbl",style:{marginBottom:8}},"Ürün"),
      h("div",{style:{display:"flex",gap:8,overflowX:"auto",paddingBottom:4,marginBottom:14}},
        d.cephane.slice(0,8).map((u,i)=>h(Chip,{key:i,on:urun.ad===u.ad,onClick:()=>secUrun(u)},(u.canta>0?"🎒 ":"")+u.ad))),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}},
        h("div",null,h("div",{className:"lbl",style:{marginBottom:8}},"Adet"),
          h("input",{type:"number",inputMode:"numeric",value:adet||"",onChange:e=>setAdet(num(e.target.value)),style:inp})),
        h("div",null,h("div",{className:"lbl",style:{marginBottom:8}},"Birim ₺"),
          h("input",{type:"number",inputMode:"numeric",value:fiyat||"",onChange:e=>setFiyat(num(e.target.value)),style:inp}))),
      h("div",{style:{textAlign:"center",marginTop:14,fontSize:14,color:"var(--mut)"}},"Toplam ",h("b",{style:{color:"var(--green)",fontSize:17}},tl(toplam))));
  }
  if(type==="konsinye"){
    const modlar=[["birak","🏬 Bırak"],["satis","💰 Satış"],["iade","↩️ İade"]];
    const cta=kmod==="birak"?"🏬 Konsinye bırak":kmod==="satis"?"💰 Konsinye satışı":"↩️ Konsinye iade";
    const gecerli=kmod==="birak"?(!!urun.ad&&adet>0):(!!kkalem.ad&&adet>0);
    const onOk=()=>{ if(kmod==="birak") fire(adet+" × "+urun.ad+" konsinye bırakıldı · "+(k?k.ad:""),XP.konsinye,{kmod:"birak",urun,adet});
      else fire(adet+" konsinye "+(kmod==="satis"?"satıldı":"iade edildi")+" · "+(k?k.ad:""),XP.konsinye,{kmod,kkalem,adet}); };
    return h(Sheet,{ik:"🏬",hex:"#7c46e6",baslik:"Konsinye · "+(k?k.ad:""),alt:(k?k.acikKons:0)+" adet açık konsinye",
      onClose,cta:bekle?"⏳ İşleniyor…":cta,disabled:!gecerli||bekle,onCta:onOk},
      h("div",{style:{display:"flex",gap:8,marginBottom:16}},
        modlar.map(([m,lbl])=>h(Chip,{key:m,on:kmod===m,onClick:()=>setKmod(m)},lbl))),
      kmod==="birak"
        ? h("div",{style:{marginBottom:14}},
            h("div",{className:"lbl",style:{marginBottom:8}},"Ürün (çantandan bırak)"),
            h("div",{style:{display:"flex",gap:8,overflowX:"auto",paddingBottom:4}},
              d.cephane.slice(0,10).map((u,i)=>h(Chip,{key:i,on:urun.ad===u.ad,onClick:()=>setUrun(u)},(u.canta>0?"🎒 ":"")+u.ad))))
        : (konsList.length>0
            ? h("div",{style:{marginBottom:14}},
                h("div",{className:"lbl",style:{marginBottom:8}},kmod==="satis"?"Ürün (buradan satılan)":"Ürün (geri alınan)"),
                h("div",{style:{display:"flex",gap:8,overflowX:"auto",paddingBottom:4}},
                  konsList.map((c,i)=>h(Chip,{key:i,on:kkalem.ad===c.ad,onClick:()=>{setKkalem(c);setAdet(c.adet);}},c.ad+" ("+c.adet+")"))))
            : h("div",{style:{marginBottom:14,padding:"12px 14px",borderRadius:12,background:"var(--surf2)",fontSize:13,color:"var(--mut)"}},"Bu kalede açık konsinye yok — önce '🏬 Bırak' ile konsinye bırak.")),
      h("div",{className:"lbl",style:{marginBottom:8}},"Adet"),
      h("input",{type:"number",inputMode:"numeric",value:adet||"",onChange:e=>setAdet(num(e.target.value)),style:inp}));
  }
  // ziyaret
  return h(Sheet,{ik:"⚔️",hex:"#0e8fce",baslik:"Ziyaret · "+(k?k.ad:""),alt:"uğradığını kaydet, ilişkiyi taze tut",
    onClose,cta:bekle?"⏳ İşleniyor…":"⚔️ Ziyareti kaydet",disabled:bekle,onCta:()=>fire("Ziyaret kaydedildi · "+(k?k.ad:""),XP.ziyaret,{not})},
    h("div",{className:"lbl",style:{marginBottom:8}},"Not (isteğe bağlı)"),
    h("textarea",{value:not,onChange:e=>setNot(e.target.value),placeholder:"örn. yeni sipariş konuştuk…",
      style:{...inp,minHeight:80,fontSize:15,fontWeight:600,resize:"none"}}));
}
function Reward({xp,mesaj,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,1750);return ()=>clearTimeout(t);},[]);
  const renk=["#f4a63a","#d97b12","#16a34a","#7c46e6","#0e8fce","#ffd479"];
  return h("div",{style:{position:"fixed",inset:0,zIndex:80,display:"flex",alignItems:"center",justifyContent:"center",
      background:"rgba(20,15,10,.5)",animation:"bdin .2s ease",overflow:"hidden"}},
    Array.from({length:16}).map((_,i)=>h("span",{key:i,style:{position:"absolute",top:"38%",left:(8+i*5.6)+"%",
      width:9,height:14,borderRadius:2,background:renk[i%6],opacity:.95,
      transform:"translateY(-40px)",animation:"conf "+(1+(i%5)*.18)+"s cubic-bezier(.2,.7,.3,1) "+(i%4*.05)+"s forwards"}})),
    h("div",{style:{textAlign:"center",animation:"pop .5s cubic-bezier(.2,.8,.2,1) both",position:"relative"}},
      h("div",{style:{fontSize:66,filter:"drop-shadow(0 8px 18px rgba(0,0,0,.35))"}},"🎖️"),
      h("div",{style:{marginTop:6,display:"inline-block",padding:"7px 18px",borderRadius:99,
        background:"linear-gradient(90deg,#ffd479,#f5a623)",color:"#3a1414",fontSize:22,fontWeight:800,
        boxShadow:"0 8px 24px rgba(245,166,35,.5)"}},"+"+xp+" XP"),
      h("div",{style:{marginTop:14,color:"#fff",fontSize:14.5,fontWeight:700,maxWidth:280,margin:"14px auto 0",lineHeight:1.35}},mesaj)));
}

function App(){
  const canliHar=useColl("pazarlama_hareket"), musteriler=useColl("musteri"), kullanicilar=useColl("kullanici"), urunler=useColl("stok_urun");
  const ovHar=useColl("demo_pazarlama_hareket");   // deneme (overlay) yazımları
  const [view,setView]=useState("us"); const [kale,setKale]=useState(null); const [toastMsg,setToastMsg]=useState("");
  const [sheet,setSheet]=useState(null); const [reward,setReward]=useState(null);
  const say=m=>{ setToastMsg(m); clearTimeout(window.__t); window.__t=setTimeout(()=>setToastMsg(""),2200); };
  const yuk=[canliHar,musteriler,kullanicilar,urunler].some(x=>x===null);
  const ov=(ovHar||[]).map(x=>({...x,_ov:true}));
  const hareketler=useMemo(()=>[...(canliHar||[]),...ov],[canliHar,ovHar]);
  const d=useMemo(()=>yuk?null:hesap(hareketler,musteriler,kullanicilar,urunler),[hareketler,musteriler,kullanicilar,urunler,yuk]);
  const emirId=(d&&d.emir&&d.emir.id)||"mr14ih8vc39wug";
  const openKale=k=>{ setKale(k); window.scrollTo(0,0); };
  const go=v=>{ setKale(null); setView(v); window.scrollTo(0,0); };
  const stype=k=>k?({borc:"tahsilat",konsinye:"konsinye",ihmal:"ziyaret",saglam:"satis"}[k.durum.key]||"satis"):"satis";
  const openSheet=(type,k)=>setSheet({type,k});
  const kkOf=x=>x.musteriId?("m:"+x.musteriId):("y:"+((x.yer||"?").toLocaleLowerCase("tr")));
  // deneme işlemini izole (demo_) kaydet — gerçek defter korunur
  async function performWrite(p){
    const k=p.k, key=k?k.key:null, now=new Date().toISOString();
    const kul={kullaniciId:emirId,kullaniciAd:(d&&d.emir&&d.emir.ad)||"Emir"};
    const yerB=k?{yer:k.ad,bolge:k.bolge||"",musteriId:k.musteriId||""}:{};
    if(p.type==="tahsilat"){
      const acik=hareketler.filter(x=>x.tip==="satis"&&!x.gerilla&&kkOf(x)===key)
        .map(x=>{const bek=num(x.adet)*num(x.satisFiyat);const onceki=x.tahsil==null?bek:num(x.tahsil);return {x,bek,onceki,borc:Math.max(0,bek-onceki)};})
        .filter(o=>o.borc>0).sort((a,b)=>new Date(a.x.tarih)-new Date(b.x.tarih));
      let kalan=Math.min(num(p.tut),k?k.borc:num(p.tut)),uP=0,pP=0,uyg=0;   // kalenin güncel borcunu aşma
      for(const o of acik){ if(kalan<=0)break; const dd=Math.min(o.borc,kalan); const b=payBol(o.x,dd,o.onceki); uP+=b.u;pP+=b.p; kalan-=dd; uyg+=dd; }
      if(uyg<=0) return {iptal:"Bu kalede açık borç yok."};
      await save("pazarlama_hareket",{...kul,tip:"tahsilat",tutar:uyg,ureticiPay:uP,pazPay:pP,...yerB,tarih:now});
    } else if(p.type==="satis"){
      const u=p.urun||{}; const gerilla=!k;
      await save("pazarlama_hareket",{...kul,tip:"satis",...(gerilla?{gerilla:true,kaynak:"gerilla"}:{}),urunId:u.id||"",urunAd:u.ad||"?",
        adet:num(p.adet),alisFiyat:num(u.pazFiyat),satisFiyat:num(p.fiyat),tahsil:gerilla?num(p.adet)*num(p.fiyat):0,
        yer:gerilla?"⚡ Seyyar":k.ad,bolge:k?(k.bolge||""):"",musteriId:k?(k.musteriId||""):"",tarih:now});
    } else if(p.type==="konsinye"){
      if(p.kmod==="birak"){ const u=p.urun||{};
        await save("pazarlama_hareket",{...kul,tip:"konsinye",urunId:u.id||"",urunAd:u.ad||"?",adet:num(p.adet),kalan:num(p.adet),
          alisFiyat:num(u.pazFiyat),satisFiyat:num(u.fiyat),...yerB,tarih:now});
      } else {
        const ad=(p.kkalem&&p.kkalem.ad)||"?";
        const rec=hareketler.filter(x=>x.tip==="konsinye"&&kkOf(x)===key&&(x.urunAd||"?")===ad).sort((a,b)=>new Date(a.tarih)-new Date(b.tarih))[0]||{};
        if(p.kmod==="satis") await save("pazarlama_hareket",{...kul,tip:"satis",kaynak:"konsinye",urunId:rec.urunId||"",urunAd:ad,
          adet:num(p.adet),alisFiyat:num(rec.alisFiyat),satisFiyat:num(rec.satisFiyat),tahsil:0,...yerB,tarih:now});
        else await save("pazarlama_hareket",{...kul,tip:"iade",urunId:rec.urunId||"",urunAd:ad,adet:num(p.adet),kaynak:"konsinye",...yerB,tarih:now});
      }
    } else { // ziyaret
      await save("pazarlama_hareket",{...kul,tip:"diplomasi",not:p.not||"",...yerB,tarih:now});
    }
    return {};
  }
  const fire=async(p)=>{ try{ const r=await performWrite(p); if(r&&r.iptal){ setSheet(null); say("⚠ "+r.iptal); return; } }
    catch(e){ console.error(e); setSheet(null); say("⚠ Kaydedilemedi — tekrar dene"); return; }
    setSheet(null); setReward({mesaj:p.mesaj,xp:p.xp}); };
  async function temizleDeneme(){ if(!ov.length) return; if(!confirm("🧪 "+ov.length+" deneme kaydı silinsin mi? (gerçek defter etkilenmez)")) return;
    for(const x of ov){ try{ await remove("pazarlama_hareket",x.id); }catch(e){} } say("🧹 Deneme kayıtları temizlendi"); }
  const geriAlKayit=async(x)=>{ const o=ovOzet(x); if(!confirm("↩️ Geri alınsın mı?\n"+o.t+(o.v?(" · "+o.v):"")+"\n"+(x.yer||""))) return;
    try{ await remove("pazarlama_hareket",x.id); say("↩️ Geri alındı · "+o.t); }catch(e){ console.error(e); say("⚠ Geri alınamadı — tekrar dene"); } };

  if(yuk) return h("div",{style:{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}},
    h("div",{style:{width:44,height:44,borderRadius:"50%",border:"3px solid var(--line)",borderTopColor:"var(--gold)",animation:"spin .8s linear infinite"}}),
    h("div",{style:{color:"var(--mut)",fontSize:14,fontWeight:600}},"Karargâh hazırlanıyor…"));

  // güncel kale nesnesini tazele (canlı veri değişince)
  const kaleGuncel=kale?(d.kaleler.find(x=>x.key===kale.key)||kale):null;
  const kaleOv=kaleGuncel?ov.filter(x=>kkOf(x)===kaleGuncel.key).sort((a,b)=>new Date(b.tarih)-new Date(a.tarih)):[];
  const kaleHar=kaleGuncel?hareketler.filter(x=>kkOf(x)===kaleGuncel.key&&["satis","konsinye","iade","tahsilat","stant","diplomasi"].includes(x.tip)).sort((a,b)=>new Date(b.tarih)-new Date(a.tarih)):[];
  let ekran;
  if(kaleGuncel) ekran=h(KaleDetay,{k:kaleGuncel,back:()=>setKale(null),say,openSheet,ovList:kaleOv,geriAl:geriAlKayit,kaleHar});
  else if(view==="us") ekran=h(Home,{d,say,openKale,openSheet,stype});
  else if(view==="kaleler") ekran=h(Kaleler,{d,openKale,say});
  else if(view==="harita") ekran=h(Harita,{d,openKale,say});
  else if(view==="cephane") ekran=h(Cephane,{d,say,openSheet});
  else ekran=h(Rapor,{d,say,ovList:ov.slice().sort((a,b)=>new Date(b.tarih)-new Date(a.tarih)),temizle:temizleDeneme,geriAl:geriAlKayit});

  return h("div",null, ekran,
    h(Nav,{aktif:kaleGuncel?"kaleler":view,go}),
    h(Toast,{msg:toastMsg}),
    !kaleGuncel&&view!=="harita"&&h("div",{style:{textAlign:"center",padding:"20px 0 6px",color:"var(--mut2)",fontSize:11}},"🧪 Deneme tasarımı · Emir · canlı veri"),
    sheet&&h(ActionSheet,{type:sheet.type,k:sheet.k,d,onClose:()=>setSheet(null),onFire:fire}),
    reward&&h(Reward,{xp:reward.xp,mesaj:reward.mesaj,onDone:()=>{const m=reward.mesaj;setReward(null);say("✅ "+m);}}));
}
ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
