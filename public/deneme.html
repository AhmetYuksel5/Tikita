// Google Places (New) metin araması — anahtar yoksa null → Nominatim/Overpass'a düşülür (ana uygulama ile birebir)
async function placesText(t,merkez){ const key=GKEY; if(!key) return null;
  try{
    const r=await fetch("https://places.googleapis.com/v1/places:searchText",{method:"POST",
      headers:{"Content-Type":"application/json","X-Goog-Api-Key":key,
        "X-Goog-FieldMask":"places.displayName,places.location,places.formattedAddress,places.addressComponents"},
      body:JSON.stringify({textQuery:t,languageCode:"tr",regionCode:"TR",pageSize:10,
        locationBias:{circle:{center:{latitude:(merkez&&merkez.lat)||41.0082,longitude:(merkez&&merkez.lng)||28.9784},radius:30000}}})});
    if(!r.ok) return null;
    const j=await r.json();
    return (j.places||[]).map(p=>{ const comp=p.addressComponents||[]; const f=t2=>{ const c=comp.find(x=>(x.types||[]).includes(t2)); return c?(c.longText||c.shortText||""):""; };
      return { ad:(p.displayName&&p.displayName.text)||"", lat:p.location&&p.location.latitude, lng:p.location&&p.location.longitude,
        tam:p.formattedAddress||"", bolge:f("administrative_area_level_2")||f("sublocality_level_1")||f("sublocality")||"" }; })
      .filter(x=>x.ad&&x.lat!=null);
  }catch(e){ return null; }
}
// Overpass/OSM isimle mekan arama (anahtarsız yedek)
async function overpassAdAra(t,merkez){
  try{
    const esc=t.replace(/[.*+?^${}()|[\]\\"]/g,"\\$&");
    const la=(merkez&&merkez.lat)||41.0082, lo=(merkez&&merkez.lng)||28.9784;
    const q='[out:json][timeout:15];nwr["name"~"'+esc+'",i](around:25000,'+la+','+lo+');out center 15;';
    const r=await fetch("https://overpass-api.de/api/interpreter",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:"data="+encodeURIComponent(q)});
    if(!r.ok) return null;
    const j=await r.json(); const gor=new Set(), out=[];
    (j.elements||[]).forEach(el=>{ const tg=el.tags||{}; const ad=tg.name; if(!ad) return;
      const la2=el.lat!=null?el.lat:(el.center&&el.center.lat), lo2=el.lon!=null?el.lon:(el.center&&el.center.lon);
      if(la2==null||lo2==null) return;
      const key=el.type+"/"+el.id; if(gor.has(key)) return; gor.add(key);
      const adres=[tg["addr:street"],tg["addr:housenumber"],tg["addr:suburb"]||tg["addr:district"],tg["addr:city"]].filter(Boolean).join(" ");
      out.push({ad,lat:la2,lng:lo2,tam:adres||("OSM · "+(tg.shop||tg.amenity||"")),bolge:tg["addr:district"]||tg["addr:suburb"]||""}); });
    return out;
  }catch(e){ return null; }
}

// dönem raporu hesabı (detaylı rapor + PDF için)
function donemAralik(kod){ const g=new Date(); g.setHours(0,0,0,0);
  if(kod==="bugun") return [g.getTime(),"Bugün"];
  if(kod==="hafta"){ const d2=new Date(g); d2.setDate(d2.getDate()-((d2.getDay()+6)%7)); return [d2.getTime(),"Bu hafta"]; }
  if(kod==="ay") return [new Date(g.getFullYear(),g.getMonth(),1).getTime(),"Bu ay"];
  return [Date.now()-30*864e5,"Son 30 gün"]; }
function raporHesap(hareketler,kod){ const [b0,ad]=donemAralik(kod);
  const inR=x=>new Date(x.tarih).getTime()>=b0;
  const sat=(hareketler||[]).filter(x=>x.tip==="satis"&&!x.gerilla&&inR(x));
  const ger=(hareketler||[]).filter(x=>x.tip==="satis"&&x.gerilla&&inR(x));
  const tah=(hareketler||[]).filter(x=>x.tip==="tahsilat"&&inR(x));
  const byYer={}; sat.forEach(x=>{const y=x.yer||"—";const o=byYer[y]||(byYer[y]={adet:0,ciro:0,uret:0,marj:0});
    o.adet+=num(x.adet);o.ciro+=num(x.adet)*num(x.satisFiyat);o.uret+=num(x.adet)*num(x.alisFiyat);o.marj+=num(x.adet)*(num(x.satisFiyat)-num(x.alisFiyat));});
  const satList=Object.entries(byYer).map(([yer,o])=>({yer,...o})).sort((a,b)=>b.ciro-a.ciro);
  const tahByYer={}; tah.forEach(x=>{const y=x.yer||"—";tahByYer[y]=(tahByYer[y]||0)+num(x.tutar);});
  const tahList=Object.entries(tahByYer).map(([yer,t])=>({yer,t})).sort((a,b)=>b.t-a.t);
  // gerilla peşin paranın bölüşümü: önce üretici maliyeti, kalan marj pazarlamacının
  let gerU=0,gerP=0; ger.forEach(x=>{ const th=num(x.tahsil)||num(x.adet)*num(x.satisFiyat); const K=num(x.adet)*num(x.alisFiyat);
    gerU+=Math.min(th,K); gerP+=Math.max(0,th-K); });
  const T={ciro:satList.reduce((s,x)=>s+x.ciro,0),adet:satList.reduce((s,x)=>s+x.adet,0),
    uret:satList.reduce((s,x)=>s+x.uret,0),marj:satList.reduce((s,x)=>s+x.marj,0),
    tahsil:tahList.reduce((s,x)=>s+x.t,0),
    uPay:tah.reduce((s,x)=>s+num(x.ureticiPay),0)+gerU,
    pPay:tah.reduce((s,x)=>s+num(x.pazPay),0)+gerP,
    gerCiro:ger.reduce((s,x)=>s+(num(x.tahsil)||num(x.adet)*num(x.satisFiyat)),0)};
  return {ad,satList,tahList,T}; }

/* ————— YAZMA katmanı — CANLI · asıl deftere yazar (ana uygulama ile aynı) ————— */

const KOMUTAN=[[0,"Acemi Er","🌱"],[50,"Onbaşı","🎖️"],[150,"Çavuş","🏅"],[400,"Teğmen","⭐"],[900,"Yüzbaşı","🔥"],[2000,"Binbaşı","⚔️"],[4500,"Paşa","🏰"],[9000,"Serdar-ı Ekrem","👑"]];

const SILAH_TIER=[[0,1],[500,2],[1000,3],[2500,5],[5000,9]];

const gunFark=t=>{const d=new Date(t).getTime();return d?Math.floor((Date.now()-d)/864e5):999;};

}

// takım lider tablosu — her pazarlamacının toplam gücü (kale bazında, HUD ile aynı formül)
function liderHesap(hareketler,kullanicilar){
  const kk=x=>x.musteriId?("m:"+x.musteriId):("y:"+((x.yer||"?").toLocaleLowerCase("tr")));
  const U={};
  (hareketler||[]).forEach(x=>{ if((x.tip!=="satis"&&x.tip!=="konsinye")||x.gerilla) return;
    const uid=x.kullaniciId||"?"; const u=U[uid]||(U[uid]={km:{}}); const key=kk(x);
    const k=u.km[key]||(u.km[key]={s:0,c:0,ko:0});
    if(x.tip==="satis"){k.s+=num(x.adet);k.c+=num(x.adet)*num(x.satisFiyat);} else k.ko+=num(x.adet); });
  const kad={}; (kullanicilar||[]).forEach(u=>kad[u.id]={ad:u.ad||"?",simge:u.simge||"🎖️"});
  return Object.entries(U).map(([uid,u])=>{ let guc=0,ciro=0;
    Object.values(u.km).forEach(k=>{ const silah=Math.floor(k.c/250);
      guc+=Math.round(k.s*katOf(ASKER_TIER,k.s)[1]+k.ko+silah*katOf(SILAH_TIER,k.c)[1]); ciro+=k.c; });
    const ka=kad[uid]||{}; return {uid,ad:ka.ad||"?",simge:ka.simge||"🎖️",guc,ciro,komutan:katOf(KOMUTAN,guc)}; })
    .filter(x=>x.guc>0).sort((a,b)=>b.guc-a.guc); }

// günün eğlenceli + işlevsel sorusu — pazarlamacının kendi verisinden üretilir
function gunlukSoru(kaleler){
  if(!kaleler||kaleler.length<2) return null;
  const gun=new Date().getDate();
  const byCiro=[...kaleler].sort((a,b)=>b.ciro-a.ciro);
  const byGuc=[...kaleler].sort((a,b)=>b.guc-a.guc);
  const byKons=[...kaleler].filter(k=>k.acikKons>0).sort((a,b)=>b.acikKons-a.acikKons);
  const byIhmal=[...kaleler].filter(k=>k.gunGecti<900&&k.gunGecti>0).sort((a,b)=>b.gunGecti-a.gunGecti);
  const yap=(arr,correct,q)=>{ if(!correct) return null;
    const others=arr.filter(k=>k.key!==correct.key).slice(0,3); if(!others.length) return null;
    const opts=[{t:correct.ad,ok:true},...others.map(k=>({t:k.ad,ok:false}))];
    const rot=gun%opts.length; return {q,opts:opts.slice(rot).concat(opts.slice(0,rot))}; };
  const types=[
    ()=>yap(byCiro,byCiro[0],"💰 En çok ciro yaptığın kale hangisi?"),
    ()=>yap(byGuc,byGuc[0],"💪 En güçlü kalen hangisi?"),
    ()=>byKons.length?yap(byKons,byKons[0],"🏬 En çok açık konsinye hangi kalede duruyor?"):null,
    ()=>byIhmal.length?yap(byIhmal,byIhmal[0],"⚔️ En uzun süredir uğramadığın kale hangisi?"):null];
  for(let i=0;i<types.length;i++){ const s=types[(gun+i)%types.length](); if(s&&s.opts.length>=2) return s; }
  return null;
}

let VERI_HATA=false; const hataDinle=new Set();
function hataBildir(){ if(!VERI_HATA){ VERI_HATA=true; hataDinle.forEach(f=>f()); } }
function useVeriHata(){ const [,f]=useState(0); useEffect(()=>{ const g=()=>f(x=>x+1); hataDinle.add(g); return ()=>hataDinle.delete(g); },[]); return VERI_HATA; }
function useColl(name){ const [rows,setRows]=useState(null);
  useEffect(()=>{ const t=setTimeout(()=>setRows(r=>{ if(r===null){ hataBildir(); return []; } return r; }),9000);   // sonsuz bekleme yok
    const un=onSnapshot(collection(db,name),s=>{clearTimeout(t);setRows(s.docs.map(d=>({id:d.id,...d.data()})));},
      e=>{console.error(name,e);clearTimeout(t);hataBildir();setRows(r=>r===null?[]:r);});
    return ()=>{clearTimeout(t);un();}; },[]);
  return rows; }

function hesap(hareketler,musteriler,kullanicilar,urunler,cantaOv){
  const emir=(kullanicilar||[]).find(u=>(u.ad||"").trim().toLocaleLowerCase("tr")==="emir")||{id:"mr14ih8vc39wug",ad:"Emir",simge:"🎖️"};
  const musById={}; (musteriler||[]).forEach(m=>musById[m.id]=m);
  const kk=x=>x.musteriId?("m:"+x.musteriId):("y:"+((x.yer||"?").toLocaleLowerCase("tr")));
  const kM={};
  (hareketler||[]).forEach(x=>{ if((x.tip!=="satis"&&x.tip!=="konsinye")||x.gerilla) return;
    const k=kM[kk(x)]||(kM[kk(x)]={key:kk(x),musteriId:x.musteriId||"",ad:x.yer||"",bolge:x.bolge||"",lat:x.lat||"",lng:x.lng||"",satisAdet:0,ciro:0,konsAdet:0,konsList:{}});
    if(x.tip==="satis"){k.satisAdet+=num(x.adet);k.ciro+=num(x.adet)*num(x.satisFiyat);} else k.konsAdet+=num(x.adet);
    if(!k.ad&&x.yer)k.ad=x.yer; if(!k.bolge&&x.bolge)k.bolge=x.bolge; });
  const acikK={},borcK={},sonK={},ovTah={},ovCoz={},ovCozList={},marjK={},tahByK={};
  (hareketler||[]).forEach(x=>{ if(x.gerilla) return; const k=kk(x); const t=new Date(x.tarih).getTime()||0;
    if(["satis","konsinye","iade","tahsilat","stant","diplomasi"].includes(x.tip)) sonK[k]=Math.max(sonK[k]||0,t);
    // deneme (overlay) yazımları: gerçek kayda dokunmadan borç/konsinyeyi düzelt
    if(x._ov){ if(x.tip==="tahsilat") ovTah[k]=(ovTah[k]||0)+num(x.tutar);
      if((x.tip==="satis"&&x.kaynak==="konsinye")||x.tip==="iade"){ const ad=x.urunAd||"?";
        ovCoz[k]=(ovCoz[k]||0)+num(x.adet); (ovCozList[k]||(ovCozList[k]={}))[ad]=(ovCozList[k][ad]||0)+num(x.adet); } }
    if(x.tip==="tahsilat") (tahByK[k]||(tahByK[k]=[])).push(x);
    if(x.tip==="konsinye"&&num(x.kalan)>0){ acikK[k]=(acikK[k]||0)+num(x.kalan);
      if(kM[k]){const ad=x.urunAd||"?"; kM[k].konsList[ad]=(kM[k].konsList[ad]||0)+num(x.kalan);} }
    else if(x.tip==="satis"){const bek=num(x.adet)*num(x.satisFiyat);const th=x.tahsil==null?bek:num(x.tahsil);const b=Math.max(0,bek-th);if(b>0)borcK[k]=(borcK[k]||0)+b;
      marjK[k]=(marjK[k]||0)+(num(x.satisFiyat)-num(x.alisFiyat))*num(x.adet);} });
  let kaleler=Object.values(kM).map(k=>{ const m=k.musteriId&&musById[k.musteriId];
    if(m){k.ad=m.ad||k.ad;k.bolge=m.bolge||k.bolge;if(!k.lat&&m.lat){k.lat=m.lat;k.lng=m.lng;}
      k.telefon=(m.telefon||"").trim(); k.not=m.not||""; k.arsiv=!!m.arsiv;}
    const silah=Math.floor(k.ciro/250);
    k.guc=Math.round(k.satisAdet*katOf(ASKER_TIER,k.satisAdet)[1]+k.konsAdet+silah*katOf(SILAH_TIER,k.ciro)[1]);
    k.seviye=(()=>{const t=[0,25,80,200,500,1200];let lv=1;for(let i=1;i<t.length;i++)if(k.guc>=t[i])lv=i+1;return lv;})();
    k.acikKons=Math.max(0,(acikK[k.key]||0)-(ovCoz[k.key]||0));
    k.borc=Math.max(0,(borcK[k.key]||0)-(ovTah[k.key]||0)); k.son=sonK[k.key]||0; k.gunGecti=k.son?gunFark(k.son):999;
    const coz=ovCozList[k.key]||{};
    k.konsKalem=Object.entries(k.konsList).map(([ad,adet])=>({ad,adet:Math.max(0,adet-(coz[ad]||0))})).filter(c=>c.adet>0).sort((a,b)=>b.adet-a.adet);
    // pazarlamacı hakedişi: tahsil edilen paradan düşen marj payı (önce üretici)
    k.marjTop=Math.max(0,marjK[k.key]||0); const orn=k.ciro>0?Math.min(1,k.marjTop/k.ciro):0;
    k.hakedisAlinan=(tahByK[k.key]||[]).reduce((s,x)=>s+(x.pazPay!=null?num(x.pazPay):num(x.tutar)*orn),0);
    k.hakedisBekleyen=Math.max(0,k.marjTop-k.hakedisAlinan);
    k.durum=kaleDurum(k); return k; }).filter(k=>k.ad&&!k.arsiv).sort((a,b)=>b.guc-a.guc);
  const toplamGuc=kaleler.reduce((s,k)=>s+k.guc,0);
  const komutan=katOf(KOMUTAN,toplamGuc); const sonraki=KOMUTAN.find(x=>x[0]>toplamGuc)||null;
  const gerillaGanimet=(hareketler||[]).filter(x=>x.gerilla&&x.tip==="satis").reduce((s,x)=>s+num(x.adet)*num(x.satisFiyat),0);
  const satisGun=new Set((hareketler||[]).filter(x=>x.tip==="satis").map(x=>{const d=new Date(x.tarih);return d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate();}));
  let streak=0;{const g=new Date();const key=d=>d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate();if(!satisGun.has(key(g)))g.setDate(g.getDate()-1);while(satisGun.has(key(g))){streak++;g.setDate(g.getDate()-1);}}
  const haf=Date.now()-7*864e5;
  const hs=(hareketler||[]).filter(x=>x.tip==="satis"&&new Date(x.tarih).getTime()>=haf);
  const hafCiro=hs.reduce((s,x)=>s+num(x.adet)*num(x.satisFiyat),0);
  const hafKar=hs.reduce((s,x)=>s+num(x.adet)*(num(x.satisFiyat)-num(x.alisFiyat)),0);
  const hafSatAd=hs.reduce((s,x)=>s+num(x.adet),0);
  const hafKons=(hareketler||[]).filter(x=>x.tip==="konsinye"&&!x.gerilla&&new Date(x.tarih).getTime()>=haf).reduce((s,x)=>s+num(x.adet),0);
  const gorevHaf=[
    {ad:"Bu hafta 20 satış",deg:hafSatAd,hedef:20,renk:"var(--green)"},
    {ad:"Bu hafta 5.000 ₺ ciro",deg:Math.round(hafCiro),hedef:5000,renk:"var(--gold)",birim:"tl"},
    {ad:"15 konsinye bırak",deg:hafKons,hedef:15,renk:"var(--violet)"}];
  const gorevler=kaleler.filter(k=>k.durum.key!=="saglam").sort((a,b)=>oncelik[a.durum.key]-oncelik[b.durum.key]||b.guc-a.guc);
  // cephane — ürünler kaynak gibi
  const eid=emir.id;
  const cephane=(urunler||[]).map(u=>({id:u.id,ad:u.ad||"?",stokta:num(u.stokta),canta:num((u.pazStokK||{})[eid]),fiyat:num(u.satisFiyat),pazFiyat:num(u.pazFiyat),tanitim:u.tanitim||""}))
    .filter(u=>u.ad!=="?").sort((a,b)=>(b.canta-a.canta)||(b.stokta-a.stokta));
  const cantaTop=cephane.reduce((s,u)=>s+u.canta,0);
  // rozetler (kazanılan başarımlar)
  const rozetler=[]; const rz=(ok,ik,ad)=>{ if(ok) rozetler.push({ik,ad}); };
  rz(kaleler.length>=1,"🏰","İlk kale"); rz(kaleler.length>=5,"⚔️","Fatih · 5 kale"); rz(kaleler.length>=15,"👑","İmparator · 15 kale");
  rz(streak>=3,"🔥","3 gün seri"); rz(streak>=7,"⚡","7 gün seri");
  rz(toplamGuc>=900,"🎖️","Yüzbaşı gücü"); rz(toplamGuc>=2000,"⚔️","Binbaşı gücü");
  rz(hafCiro>=5000,"💰","Haftalık ciro"); rz(gerillaGanimet>=1000,"🥷","Gerilla ustası");
  // takım lider tablosu
  const lider=liderHesap(hareketler,kullanicilar);
  const emirSira=lider.findIndex(x=>x.uid===emir.id);
  // dashboard genel toplamları + bugün
  const toplamCiro=kaleler.reduce((s,k)=>s+k.ciro,0);
  const hakedisTop=kaleler.reduce((s,k)=>s+k.hakedisAlinan,0);
  const vurkac=gerillaGanimet>0&&gerillaGanimet>toplamCiro*0.5;   // gelirin çoğu seyyar — kale kur uyarısı
  const bg=(()=>{const t=new Date();t.setHours(0,0,0,0);return t.getTime();})();
  const bgSat=(hareketler||[]).filter(x=>x.tip==="satis"&&!x.gerilla&&new Date(x.tarih).getTime()>=bg);
  const bugunSat=bgSat.reduce((s,x)=>s+num(x.adet),0);
  const bugunCiro=bgSat.reduce((s,x)=>s+num(x.adet)*num(x.satisFiyat),0);
  const bugunTah=(hareketler||[]).filter(x=>x.tip==="tahsilat"&&new Date(x.tarih).getTime()>=bg).reduce((s,x)=>s+num(x.tutar),0);
  // 🔭 adaylar / gözcüler — müşteri kaydı var ama henüz kale değil (hiç akın yapılmamış)
  const kaleKeySet=new Set(kaleler.map(k=>k.key));
  const adaylar=(musteriler||[]).filter(m=>!m.arsiv&&(m.ad||"").trim()&&!kaleKeySet.has("m:"+m.id))
    .map(m=>({id:m.id,ad:m.ad,bolge:m.bolge||"",telefon:(m.telefon||"").trim(),lat:m.lat||"",lng:m.lng||"",kesif:!!m.kesif,
      gozcu:!!((m.telefon||"").trim())&&!!(m.lat&&m.lng)}))
    .sort((a,b)=>(b.gozcu-a.gozcu)||(b.kesif-a.kesif));
  return {emir,kaleler,adaylar,toplamGuc,komutan,sonraki,gerillaGanimet,streak,satisGun,hafCiro,hafKar,gorevler,cephane,cantaTop,
    gorevHaf,rozetler,lider,emirSira,toplamCiro,hakedisTop,bugunSat,bugunCiro,bugunTah,vurkac,
    konsToplam:Object.values(acikK).reduce((s,v)=>s+v,0),
    borcTop:kaleler.reduce((s,k)=>s+k.borc,0)};
}

function SeriTakvimSheet({streak,satisGun,onClose}){
  const bugun=new Date();

  const key=d2=>d2.getFullYear()+"-"+d2.getMonth()+"-"+d2.getDate();
  const bugunKey=key(bugun);
  const hucre=[]; for(let i=0;i<ilkGun;i++) hucre.push(null); for(let g=1;g<=gunSay;g++) hucre.push(g);
  const okS={width:34,height:34,borderRadius:10,background:"var(--surf2)",border:"1px solid var(--line)",fontSize:16,fontWeight:800};

    h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:12}},
      h("button",{onClick:()=>setAy(a=>new Date(a.getFullYear(),a.getMonth()-1,1)),style:okS},"‹"),
      h("div",{style:{flex:1,textAlign:"center",fontSize:15,fontWeight:800,textTransform:"capitalize"}},yilAy),
      h("button",{onClick:()=>setAy(a=>new Date(a.getFullYear(),a.getMonth()+1,1)),style:okS},"›")),
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6,marginBottom:6}},
      ["PZT","SAL","ÇAR","PER","CUM","CMT","PAZ"].map(g2=>h("div",{key:g2,style:{textAlign:"center",fontSize:10,fontWeight:800,color:"var(--mut2)",padding:"4px 0"}},g2))),
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6}},
      hucre.map((g,i)=>{ if(g===null) return h("div",{key:"b"+i});
        const d2=new Date(ay.getFullYear(),ay.getMonth(),g); const k2=key(d2);
        const sat=satisGun.has(k2); const bugunMu=k2===bugunKey; const gelecek=d2.getTime()>Date.now();
        return h("div",{key:i,style:{aspectRatio:"1",borderRadius:12,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1,
            background:bugunMu?(sat?"var(--green)":"#1b1e25"):(sat?"var(--surf2)":"transparent"),
            border:(sat&&!bugunMu)?"1px solid var(--line)":"none",
            color:bugunMu?"#fff":(gelecek?"var(--mut2)":"var(--txt)")}},
          sat?h("span",{style:{fontSize:9,lineHeight:1,fontWeight:800,color:bugunMu?"#fff":"var(--green)"}},"✓"):h("span",{style:{height:9}}),
          h("span",{style:{fontSize:13.5,fontWeight:(sat||bugunMu)?800:600}},g)); })),
    h("div",{style:{display:"flex",gap:16,justifyContent:"center",marginTop:14,fontSize:11,fontWeight:700,color:"var(--mut)"}},
      h("span",null,"✓ satış yapılan gün"),

}

// bu kaleden hakediş dökümü — ürün / gün geçişli
function HakedisPanel({k,kaleHar,onClose}){
  const [mod,setMod]=useState("urun");
  const sat=(kaleHar||[]).filter(x=>x.tip==="satis");
  const um={}; sat.forEach(x=>{const a=x.urunAd||"?";const m=(num(x.satisFiyat)-num(x.alisFiyat))*num(x.adet);
    (um[a]||(um[a]={adet:0,marj:0}));um[a].adet+=num(x.adet);um[a].marj+=m;});
  const urunList=Object.entries(um).map(([ad,o])=>({ad,...o})).sort((a,b)=>b.marj-a.marj);
  const gm={}; sat.forEach(x=>{const t=new Date(x.tarih); if(isNaN(+t))return; const key=t.getFullYear()+"-"+String(t.getMonth()+1).padStart(2,"0")+"-"+String(t.getDate()).padStart(2,"0");
    const m=(num(x.satisFiyat)-num(x.alisFiyat))*num(x.adet); (gm[key]||(gm[key]={adet:0,marj:0,t:+t}));gm[key].adet+=num(x.adet);gm[key].marj+=m;});
  const gunList=Object.entries(gm).map(([g,o])=>({g,...o})).sort((a,b)=>b.t-a.t);
  const fmtGun=g=>{const[y,mo,d2]=g.split("-");return d2+"."+mo+"."+y.slice(2);};
  const satir=(baslik,alt,deger)=>h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderTop:"1px solid var(--line)"}},
    h("span",{style:{fontSize:14}},baslik+"  ",h("span",{style:{color:"var(--mut)",fontSize:12}},alt)),
    h("span",{style:{fontWeight:800,color:"var(--gold)"}},tl(deger)));
  return h(Sheet,{ik:"🫰",hex:"#d97b12",baslik:k.ad+" · hakediş",alt:"pazarlamacı kazancı",onClose,cta:"Kapat",onCta:onClose},
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}},
      h(Stat,{ik:"✅",v:tl(k.hakedisAlinan),l:"Kazandığın (tahsil edilen)",renk:"var(--green)"}),
      h(Stat,{ik:"⏳",v:tl(k.hakedisBekleyen),l:"Bekleyen (tahsil edilince)",renk:k.hakedisBekleyen>0.5?"var(--gold)":"var(--mut)"})),
    h("div",{style:{display:"flex",gap:8,marginBottom:6}},
      h(Chip,{on:mod==="urun",onClick:()=>setMod("urun")},"📦 Ürüne göre"),
      h(Chip,{on:mod==="gun",onClick:()=>setMod("gun")},"📅 Güne göre")),
    (mod==="urun"?urunList:gunList).length
      ? (mod==="urun"?urunList.map((u,i)=>satir(u.ad,u.adet+" adet",u.marj)):gunList.map((g,i)=>satir(fmtGun(g.g),g.adet+" adet",g.marj)))
      : h("div",{style:{padding:"12px 0",color:"var(--mut)",fontSize:13}},"Henüz satış yok."));
}

/* ————— HARİTA ————— */
function Harita({d,openKale,say,adaylar,openAday,onYeniKale,onYeniKaleAt,digerKaleler,hedefDuraklar}){
  const ref=useRef(null); const mapRef=useRef(null);
  const [f,setF]=useState("all");
  const konumlu=d.kaleler.filter(k=>k.lat&&k.lng);
  const adayKonum=(adaylar||[]).filter(a=>a.lat&&a.lng);
  const eslesF=(k,ff)=>ff==="all"?true:ff==="konsinye"?k.acikKons>0:k.durum.key===ff;
  const gorunen=konumlu.filter(k=>eslesF(k,f));
  useEffect(()=>{ if(!window.L||!ref.current) return;
    const L=window.L; const map=L.map(ref.current,{zoomControl:false,attributionControl:false});
    mapRef.current=map; L.control.zoom({position:"bottomright"}).addTo(map);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",{maxZoom:19,subdomains:"abcd"}).addTo(map);
    // uzun bas → o noktadan yeni kale (koordinat dolu gelir)
    map.on("contextmenu",e=>{ if(onYeniKaleAt) onYeniKaleAt(e.latlng.lat,e.latlng.lng); });
    return ()=>{ map.remove(); mapRef.current=null; }; },[]);
  useEffect(()=>{ const map=mapRef.current; if(!map||!window.L) return; const L=window.L;
    map.eachLayer(l=>{ if(l instanceof L.Marker) map.removeLayer(l); });
    const pts=[];
    if(f!=="aday") gorunen.forEach(k=>{ const ic=L.divIcon({className:"",html:'<div class="kmark" style="width:30px;height:30px;background:'+k.durum.hex+'"><span>'+k.durum.ik+'</span></div>',iconSize:[30,30],iconAnchor:[15,28]});
      const mk=L.marker([+k.lat,+k.lng],{icon:ic}).addTo(map); mk.on("click",()=>openKale(k)); pts.push([+k.lat,+k.lng]); });
    if(f==="all"||f==="aday") adayKonum.forEach(a=>{ const ic=L.divIcon({className:"",html:'<div class="kmark" style="width:26px;height:26px;background:#64748b;opacity:.92"><span>'+(a.kesif?"🧭":"🔭")+'</span></div>',iconSize:[26,26],iconAnchor:[13,24]});
      const mk=L.marker([+a.lat,+a.lng],{icon:ic}).addTo(map); mk.on("click",()=>openAday&&openAday(a)); pts.push([+a.lat,+a.lng]); });
    if(f==="all"){
      (hedefDuraklar||[]).forEach(g2=>{ const ic=L.divIcon({className:"",html:'<div class="kmark" style="width:26px;height:26px;background:#dc2626"><span>🚩</span></div>',iconSize:[26,26],iconAnchor:[13,24]});
        const mk=L.marker([+g2.lat,+g2.lng],{icon:ic}).addTo(map); mk.on("click",()=>say("🚩 "+g2.gorevAd+(g2.ad?(" · "+g2.ad):"")+" — komutandan görev")); pts.push([+g2.lat,+g2.lng]); });
      (digerKaleler||[]).forEach(dk=>{ const ic=L.divIcon({className:"",html:'<div class="kmark" style="width:24px;height:24px;background:#475569;opacity:.85"><span>🏚️</span></div>',iconSize:[24,24],iconAnchor:[12,22]});
        const mk=L.marker([+dk.lat,+dk.lng],{icon:ic}).addTo(map); mk.on("click",()=>say("🏚️ "+dk.ad+" — başka komutanın kalesi")); });
    }
    if(pts.length) map.fitBounds(pts,{padding:[50,50],maxZoom:15}); else map.setView([41.02,29.05],12);
  },[f,d.kaleler.length,adayKonum.length,(hedefDuraklar||[]).length,(digerKaleler||[]).length]);
  const filtreler=[["all","Tümü",konumlu.length+adayKonum.length],["borc","🧾",konumlu.filter(k=>k.durum.key==="borc").length],["konsinye","🏬",konumlu.filter(k=>k.acikKons>0).length],["ihmal","⚔️",konumlu.filter(k=>k.durum.key==="ihmal").length],["saglam","🛡️",konumlu.filter(k=>k.durum.key==="saglam").length],["aday","🔭",adayKonum.length]];
  return h("div",{style:{position:"relative",height:"calc(100vh - 92px)"}},
    h("div",{ref,style:{position:"absolute",inset:0}}),
    h("div",{style:{position:"absolute",top:"calc(env(safe-area-inset-top,0px) + 12px)",left:12,right:12,zIndex:500,display:"flex",gap:7,overflowX:"auto"}},
      filtreler.map(([k,ad,n])=>h("button",{key:k,onClick:()=>setF(k),style:{flexShrink:0,padding:"9px 13px",borderRadius:99,fontSize:12.5,fontWeight:700,
        background:f===k?"#1b1e25":"rgba(255,255,255,.95)",color:f===k?"#fff":"var(--txt)",boxShadow:"0 3px 12px rgba(0,0,0,.15)",backdropFilter:"blur(6px)"}},ad+" "+n))),
    d.kaleler.length>konumlu.length&&h("div",{style:{position:"absolute",bottom:16,left:12,zIndex:500,background:"rgba(255,255,255,.95)",padding:"8px 12px",borderRadius:12,fontSize:11.5,color:"var(--mut)",fontWeight:600,boxShadow:"0 3px 12px rgba(0,0,0,.15)"}},"📍 "+(d.kaleler.length-konumlu.length)+" kalenin konumu yok"),
    // ➕ haritadan yeni kale — uzun basarak noktadan da eklenebilir
    h("button",{onClick:onYeniKale,style:{position:"absolute",bottom:16,left:"50%",transform:"translateX(-50%)",zIndex:500,
      padding:"13px 22px",borderRadius:99,background:"linear-gradient(90deg,#22c55e,#16a34a)",color:"#fff",fontSize:14,fontWeight:800,
      boxShadow:"0 10px 26px rgba(22,163,74,.4)",whiteSpace:"nowrap"}},"➕ Yeni kale"),
    h("div",{style:{position:"absolute",bottom:66,left:"50%",transform:"translateX(-50%)",zIndex:500,background:"rgba(255,255,255,.92)",
      padding:"5px 11px",borderRadius:99,fontSize:10.5,color:"var(--mut)",fontWeight:700,boxShadow:"0 3px 10px rgba(0,0,0,.12)",whiteSpace:"nowrap"}},"💡 haritaya uzun bas → o noktaya kale"));
}

// bir deneme (overlay) kaydını insanca özetle
function ovOzet(x){
  if(x.tip==="tahsilat") return {ik:"🧾",t:"Tahsilat",v:tl(x.tutar)};
  if(x.tip==="konsinye") return {ik:"🏬",t:"Konsinye bırakıldı",v:num(x.adet)+" × "+(x.urunAd||"?")};
  if(x.tip==="iade") return {ik:"↩️",t:"İade",v:num(x.adet)+" × "+(x.urunAd||"?")};
  if(x.tip==="satis"&&x.kaynak==="konsinye") return {ik:"🏬",t:"Konsinye satış",v:num(x.adet)+" × "+(x.urunAd||"?")};
  if(x.tip==="satis"&&x.gerilla) return {ik:"⚡",t:"Gerilla satış",v:num(x.adet)+" × "+(x.urunAd||"?")};
  if(x.tip==="satis") return {ik:"💰",t:"Satış",v:num(x.adet)+" × "+(x.urunAd||"?")};
  if(x.tip==="diplomasi") return {ik:"⚔️",t:"Ziyaret",v:x.not?("“"+String(x.not).slice(0,24)+"”"):""};
  if(x.tip==="stant") return {ik:"🎪",t:"Stant",v:x.mod==="satis"?tl(x.fiyat):"hediye"};
  if(x.tip==="tabla") return {ik:"🧹",t:"Tabla toplama",v:tl(x.tutar)};
  return {ik:"•",t:x.tip||"kayıt",v:""};
}
function OvSatir({x,geriAl}){ const o=ovOzet(x);
  const t2=new Date(x.tarih);
  const saat=isNaN(+t2)?"":t2.toLocaleDateString("tr-TR",{day:"2-digit",month:"short"})+" "+t2.toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"});
  return h("div",{style:{display:"flex",alignItems:"center",gap:11,padding:"10px 0",borderTop:"1px solid var(--line)"}},
    h("span",{style:{fontSize:18}},o.ik),

function donemRapor(recs){ let satAd=0,ciro=0,tah=0,konsAd=0,hak=0,ganimet=0,iade=0;
  (recs||[]).forEach(x=>{
    if(x.tip==="satis"){
      if(x.gerilla){ const th=num(x.tahsil)||num(x.adet)*num(x.satisFiyat); const K=num(x.adet)*num(x.alisFiyat);
        ganimet+=th; hak+=Math.max(0,th-K); }   // peşin: önce üretici maliyeti, kalan marj hakediş
      else {satAd+=num(x.adet);ciro+=num(x.adet)*num(x.satisFiyat);} }
    else if(x.tip==="tahsilat"){ tah+=num(x.tutar); hak+=(x.pazPay!=null?num(x.pazPay):0); }
    else if(x.tip==="tabla"){ hak+=num(x.tutar); }   // tabla ücreti de kazançtır
    else if(x.tip==="konsinye"){ konsAd+=num(x.adet); }
    else if(x.tip==="iade"){ iade+=num(x.adet); } });
  return {satAd,ciro,tah,konsAd,hak,ganimet,iade,bos:!(satAd||tah||konsAd||ganimet||iade||hak)}; }
// komuta raporunu WhatsApp metnine çevir
function raporMetni(v,recs){ v=v||{};

    else if(x.tip==="satis"&&x.gerilla) det.push("• ⚡ "+num(x.adet)+"× "+(x.urunAd||"?")+" — "+tl(num(x.tahsil)||num(x.adet)*num(x.satisFiyat)));

/* ————— GERİLLA SATIŞ — ana uygulamadan uyarlandı (tek tek + 📦 toptan tek para) ————— */
function GerillaSheet({d,onClose,onFire}){
  const [mod,setMod]=useState("tek");
  const [bolge,setBolge]=useState(""); const [lat,setLat]=useState(""); const [lng,setLng]=useState(""); const [kyuk,setKyuk]=useState(false);
  const [sayi,setSayi]=useState({}); const [fiyat,setFiyat]=useState({});   // tek tek: adet + satır fiyatı
  const [tAdet,setTAdet]=useState({}); const [para,setPara]=useState("");   // toptan: adetler + tek toplam para
  const [bekle,setBekle]=useState(false);
  const urunler=d.cephane.slice(0,14);
  const fOf=u=>{const v=fiyat[u.id]; return (v!==undefined&&v!=="")?num(v):num(u.fiyat);};
  const satirlar=urunler.map(u=>({urun:u,adet:Math.max(0,Math.floor(num(sayi[u.id]))),fiyat:fOf(u)})).filter(x=>x.adet>0);
  const tekParca=satirlar.reduce((s,x)=>s+x.adet,0);
  const tekToplam=satirlar.reduce((s,x)=>s+x.adet*x.fiyat,0);
  const items=urunler.map(u=>({urun:u,adet:Math.max(0,Math.floor(num(tAdet[u.id])))})).filter(x=>x.adet>0);
  const maliyet=items.reduce((s,x)=>s+x.adet*num(x.urun.pazFiyat),0);   // üretici payı = ALIŞ
  const parca=items.reduce((s,x)=>s+x.adet,0);
  const paraN=num(para);
  const konumOk=!!bolge.trim()||(lat&&lng);
  function konumAl(){ if(!navigator.geolocation) return alert("Cihaz konum desteklemiyor."); setKyuk(true);
    navigator.geolocation.getCurrentPosition(async p=>{ const la=p.coords.latitude.toFixed(6),lo=p.coords.longitude.toFixed(6);
      setLat(la); setLng(lo); let nm="";
      try{ const r=await fetch("https://nominatim.openstreetmap.org/reverse?format=jsonv2&accept-language=tr&lat="+la+"&lon="+lo); const j=await r.json(); nm=j.name||(j.display_name||"").split(",")[0]||""; }catch(e){}
      setBolge(nm||("Konum "+la+","+lo)); setKyuk(false);
    },e=>{ setKyuk(false); alert("Konum alınamadı: "+e.message); },{enableHighAccuracy:true,timeout:10000,maximumAge:0}); }
  const step=(u,dd)=>setSayi(s=>({...s,[u.id]:Math.max(0,Math.floor(num(s[u.id]))+dd)}));
  const gecerli = mod==="tek" ? (tekParca>0&&konumOk&&tekToplam>0)
                              : (parca>0&&konumOk&&paraN>0&&paraN>=maliyet);
  const cta = bekle?"⏳ İşleniyor…"
    : mod==="tek" ? ("⚡ "+tekParca+" parça · "+tl(tekToplam)+" sat")
    : ("📦 "+parca+" parça · "+tl(paraN)+" toptan sat");
  const onCta=()=>{ setBekle(true);
    if(mod==="tek") onFire({type:"gerilla",toptan:false,satirlar,bolge:bolge.trim(),lat,lng,
      mesaj:"⚡ "+tekParca+" parça seyyar satıldı ("+tl(tekToplam)+")",xp:XP.satis});
    else onFire({type:"gerilla",toptan:true,items,para:paraN,bolge:bolge.trim(),lat,lng,
      mesaj:"📦 Toptan: "+parca+" parça · "+tl(paraN)+(maliyet>0?(" · marjın "+tl(paraN-maliyet)):""),xp:XP.satis}); };
  return h(Sheet,{ik:"⚡",hex:"#b45309",baslik:"Gerilla satış",alt:"seyyar · anında peşin — kalıcı kale kurmaz",onClose,cta,disabled:!gecerli||bekle,onCta},
    h("div",{className:"lbl",style:{marginBottom:8}},"📍 Bölge — nerede satıyorsun?"),
    h("div",{style:{display:"flex",gap:8,marginBottom:6}},
      h("input",{value:bolge,onChange:e=>setBolge(e.target.value),placeholder:"örn. Kadıköy sahili",style:{...inp,flex:1,fontSize:15,fontWeight:600}}),
      h("button",{onClick:konumAl,disabled:kyuk,style:{flexShrink:0,padding:"0 14px",borderRadius:13,background:"var(--surf2)",border:"1px solid var(--line)",fontSize:13,fontWeight:800,color:"var(--cyan)"}},kyuk?"⏳":"📍 İğne")),
    (lat&&lng)?h("div",{style:{fontSize:11,color:"var(--cyan)",fontWeight:700,marginBottom:4}},"📍 konum alındı"):null,
    h("div",{style:{display:"flex",gap:8,margin:"10px 0 14px"}},
      h(Chip,{on:mod==="tek",onClick:()=>setMod("tek")},"⚡ Tek tek"),
      h(Chip,{on:mod==="toptan",onClick:()=>setMod("toptan")},"📦 Toptan — tek para")),
    mod==="tek"
      ? h("div",null,
          h("div",{style:{fontSize:11.5,color:"var(--mut)",marginBottom:4}},"Fiyatı kutudan istediğin an değiştir — aynı ürünü farklı fiyata satabilirsin."),
          urunler.map((u,i)=>{ const n=Math.max(0,Math.floor(num(sayi[u.id])));
            return h("div",{key:u.id,style:{display:"flex",alignItems:"center",gap:8,padding:"9px 0",borderTop:i?"1px solid var(--line)":"none"}},
              h("div",{style:{flex:1,minWidth:0}},
                h("div",{style:{fontSize:13.5,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},u.ad),
                h("div",{style:{fontSize:11,color:"var(--mut)"}},"🎒 "+u.canta+(n>0?(" · satıyorsun "+n):""))),
              h("input",{type:"number",inputMode:"numeric",placeholder:u.fiyat>0?String(u.fiyat):"₺",
                value:fiyat[u.id]!==undefined?fiyat[u.id]:(u.fiyat>0?u.fiyat:""),
                onChange:e=>setFiyat(s=>({...s,[u.id]:e.target.value})),
                style:{...inp,width:64,padding:"9px 6px",textAlign:"center",fontSize:14}}),
              h("button",{onClick:()=>step(u,-1),disabled:n<1,style:{width:34,height:34,borderRadius:10,border:"1px solid var(--line)",background:"#fff",color:"var(--gold)",fontSize:19,fontWeight:800,opacity:n<1?.35:1}},"−"),
              h("div",{style:{minWidth:20,textAlign:"center",fontWeight:800,fontSize:15,color:"var(--gold)"}},n),
              h("button",{onClick:()=>step(u,+1),style:{width:34,height:34,borderRadius:10,border:"none",background:"var(--gold)",color:"#fff",fontSize:19,fontWeight:800}},"+")); }),
          tekToplam>0?h("div",{style:{textAlign:"center",marginTop:12,fontSize:14,color:"var(--mut)"}},"Toplam ",h("b",{style:{color:"var(--green)",fontSize:17}},tl(tekToplam))):null)
      : h("div",null,
          h("div",{style:{fontSize:11.5,color:"var(--mut)",marginBottom:4}},"Hangi üründen kaç tane gittiğini gir, aldığın TOPLAM parayı yaz. Tek kural: para alış toplamının (üreticiden veriliş) altında olamaz."),
          urunler.map((u,i)=>h("div",{key:u.id,style:{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderTop:i?"1px solid var(--line)":"none"}},
            h("div",{style:{flex:1,minWidth:0}},
              h("div",{style:{fontSize:13.5,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},u.ad),
              h("div",{style:{fontSize:11,color:"var(--mut)"}},"🎒 "+u.canta+" · alış "+tl(u.pazFiyat))),
            h("input",{type:"number",inputMode:"numeric",placeholder:"0",value:tAdet[u.id]||"",
              onChange:e=>setTAdet(s=>({...s,[u.id]:e.target.value})),
              style:{...inp,width:70,textAlign:"center",padding:"9px 6px"}}))),
          h("div",{className:"lbl",style:{margin:"14px 0 8px"}},"Alınan TOPLAM para ₺"),
          h("input",{type:"number",inputMode:"numeric",value:para,onChange:e=>setPara(e.target.value),style:inp}),
          parca>0?h("div",{style:{marginTop:10,padding:"10px 12px",borderRadius:12,background:"var(--surf2)",fontSize:12.5,lineHeight:1.6}},
            h("div",null,"📦 "+parca+" parça · 🏭 alış toplamı: ",h("b",null,tl(maliyet))),
            paraN>0?h("div",{style:{color:paraN>=maliyet?"var(--green)":"var(--red)",fontWeight:800}},
              paraN>=maliyet?("🫰 Hakedişin: "+tl(paraN-maliyet)):("⚠ Alış toplamının altında — en az "+tl(maliyet))):null):null));
}
/* ————— YENİ KALE (müşteri) ekle — konumlu (ana uygulamadaki KonumSec sistemi) ————— */
function YeniKaleSheet({onClose,onKaydet,bekle,ilk,kayit,onArsiv}){
  const duzen=!!(kayit&&kayit.id);
  const [ad,setAd]=useState(duzen?(kayit.ad||""):"");
  const [bolge,setBolge]=useState(duzen?(kayit.bolge||""):"");
  const [tel,setTel]=useState(duzen?(kayit.telefon||""):"");
  const [not,setNot]=useState(duzen?(kayit.not||""):"");
  const [lat,setLat]=useState(duzen?(kayit.lat||""):"");
  const [lng,setLng]=useState(duzen?(kayit.lng||""):"");
  const [sonuc,setSonuc]=useState([]); const [ara,setAra]=useState(false); const [bos,setBos]=useState(false);
  const [merkez,setMerkez]=useState({lat:41.0082,lng:28.9784});   // varsayılan İstanbul
  const touched=useRef(false);
  const mapDiv=useRef(null), mapObj=useRef(null), mkRef=useRef(null);

  useEffect(()=>{ if(!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(p=>setMerkez({lat:p.coords.latitude,lng:p.coords.longitude}),()=>{},{enableHighAccuracy:true,timeout:8000,maximumAge:300000}); },[]);
  // haritadan gelen başlangıç noktası (uzun basma) — koordinat + ad/bölge otomatik dolar

  async function tersCoz(la,lo){ let nm="",bl="";
    try{ const r=await fetch("https://nominatim.openstreetmap.org/reverse?format=jsonv2&addressdetails=1&accept-language=tr&lat="+la+"&lon="+lo);
      const j=await r.json(); nm=j.name||(j.display_name||"").split(",")[0]||""; bl=ilceOf(j.address); }catch(e){}
    return {nm,bl}; }
  async function konumdan(la,lo,adKoru){ la=(+la).toFixed(6); lo=(+lo).toFixed(6);
    setLat(la); setLng(lo); setMerkez({lat:+la,lng:+lo});
    const r=await tersCoz(la,lo);
    if(r.nm) setAd(p=>(adKoru||p.trim())?p:r.nm);
    if(r.bl) setBolge(p=>p.trim()?p:r.bl); }
  function gps(){ if(!navigator.geolocation) return alert("Cihaz konum desteklemiyor.");
    navigator.geolocation.getCurrentPosition(p=>konumdan(p.coords.latitude,p.coords.longitude,false),
      e=>alert("Konum alınamadı: "+e.message),{enableHighAccuracy:true,timeout:10000,maximumAge:0}); }
  // arama: Google Places (anahtar varsa) → Nominatim → Overpass
  async function aramaYap(t){ t=(t||"").trim(); if(t.length<2) return; setAra(true); setBos(false);
    try{
      const gj=await placesText(t,merkez);
      if(gj&&gj.length){ gj.sort((a,b)=>Math.hypot(+a.lat-merkez.lat,+a.lng-merkez.lng)-Math.hypot(+b.lat-merkez.lat,+b.lng-merkez.lng)); setSonuc(gj); return; }
      const d2=0.6, vb=(merkez.lng-d2)+","+(merkez.lat+d2)+","+(merkez.lng+d2)+","+(merkez.lat-d2);
      let r=await fetch("https://nominatim.openstreetmap.org/search?format=jsonv2&addressdetails=1&limit=8&countrycodes=tr&accept-language=tr&viewbox="+vb+"&bounded=1&q="+encodeURIComponent(t));
      let j=await r.json();
      if(!j.length){ r=await fetch("https://nominatim.openstreetmap.org/search?format=jsonv2&addressdetails=1&limit=8&countrycodes=tr&accept-language=tr&q="+encodeURIComponent(t)); j=await r.json(); }
      if(!j.length){ const oj=await overpassAdAra(t,merkez);
        if(oj&&oj.length){ oj.sort((a,b)=>Math.hypot(+a.lat-merkez.lat,+a.lng-merkez.lng)-Math.hypot(+b.lat-merkez.lat,+b.lng-merkez.lng)); setSonuc(oj); return; } }
      setSonuc(j.map(x=>({ad:(x.display_name||"").split(",")[0],lat:x.lat,lng:x.lon,tam:x.display_name,bolge:ilceOf(x.address)})));
      if(!j.length) setBos(true);
    }catch(e){ setBos(true); } finally{ setAra(false); } }

    setLat((+r.lat).toFixed(6)); setLng((+r.lng).toFixed(6)); setMerkez({lat:+r.lat,lng:+r.lng});

  useEffect(()=>{ if(!window.L||!mapDiv.current||mapObj.current) return;

    const mk=L.marker(c,{draggable:true,icon:pin}).addTo(map);
    mkRef.current=mk; mapObj.current=map;
    map.on("click",e=>{ mk.setLatLng(e.latlng); konumdan(e.latlng.lat,e.latlng.lng,true); });

    setTimeout(()=>{ try{ map.invalidateSize(); }catch(e){} },250);

  return h(Sheet,{ik:duzen?"✏️":"🏰",hex:"#16a34a",baslik:duzen?("Düzenle · "+(kayit.ad||"")):"Yeni kale (müşteri)",

    onCta:()=>onKaydet({id:duzen?kayit.id:null,ad:ad.trim(),bolge:bolge.trim(),telefon:tel.trim(),not:not.trim(),lat,lng})},

// dosyadan sıkıştırılmış JPEG dataURL üret (Firestore'a sığsın diye küçültülür)
function dosyaOku(file,maxW){ return new Promise((res,rej)=>{ const r=new FileReader();
  r.onload=()=>{ const img=new Image(); img.onload=()=>{ const sc=Math.min(1,maxW/Math.max(img.width,img.height));
      const c=document.createElement("canvas"); c.width=Math.round(img.width*sc); c.height=Math.round(img.height*sc);
      c.getContext("2d").drawImage(img,0,0,c.width,c.height); res(c.toDataURL("image/jpeg",.72)); };
    img.onerror=rej; img.src=r.result; }; r.onerror=rej; r.readAsDataURL(file); }); }
function metniSar(ctx,text,maxW){ const words=String(text).split(/\s+/); const lines=[]; let cur="";
  for(const w of words){ const t=cur?cur+" "+w:w; if(ctx.measureText(t).width>maxW&&cur){ lines.push(cur); cur=w; } else cur=t; }
  if(cur) lines.push(cur); return lines; }
// paylaşım görseli: foto + ad + fiyat + tanıtım → 1080×1350 satış kartı
function urunKartCiz(u,tanitim,fotoData){ return new Promise(res=>{
  const W=1080,H2=1350; const c=document.createElement("canvas"); c.width=W; c.height=H2; const x=c.getContext("2d");
  x.fillStyle="#f4f2ee"; x.fillRect(0,0,W,H2);
  const px=60,py=60,ps=960,r=36;
  const rr=()=>{ x.beginPath(); x.moveTo(px+r,py); x.arcTo(px+ps,py,px+ps,py+ps,r); x.arcTo(px+ps,py+ps,px,py+ps,r); x.arcTo(px,py+ps,px,py,r); x.arcTo(px,py,px+ps,py,r); x.closePath(); };
  const devam=()=>{
    x.textAlign="center";
    x.fillStyle="#1b1e25"; x.font="800 60px system-ui,sans-serif"; x.fillText(u.ad||"",W/2,1116);
    x.fillStyle="#d97b12"; x.font="800 84px system-ui,sans-serif";
    x.fillText(Math.round(num(u.fiyat)).toLocaleString("tr-TR")+" ₺",W/2,1212);
    if(tanitim){ x.fillStyle="#7c818c"; x.font="600 34px system-ui,sans-serif";
      metniSar(x,tanitim,940).slice(0,2).forEach((l,i)=>x.fillText(l,W/2,1268+i*44)); }
    x.fillStyle="#a9adb6"; x.font="700 26px system-ui,sans-serif"; x.fillText("Tikita",W/2,H2-22);
    res(c); };
  if(fotoData){ const img=new Image();
    img.onload=()=>{ x.save(); rr(); x.clip();
      const sc=Math.max(ps/img.width,ps/img.height); const dw=img.width*sc,dh=img.height*sc;
      x.drawImage(img,px+(ps-dw)/2,py+(ps-dh)/2,dw,dh); x.restore(); devam(); };
    img.onerror=()=>{ x.save(); rr(); x.fillStyle="#fff"; x.fill(); x.restore(); devam(); };
    img.src=fotoData; }
  else { x.save(); rr(); x.fillStyle="#ffffff"; x.fill(); x.restore();
    x.font="300px system-ui"; x.textAlign="center"; x.fillText("📦",W/2,py+ps/2+100); devam(); }
}); }

      onArsiv:kaleArsivle,onClose:()=>setYeniKale(false),onKaydet:yeniKaleKaydet}),
    urunSec&&h(UrunSheet,{u:(d.cephane.find(c=>c.id===urunSec.id)||urunSec),
      recs:hareketler.filter(x=>["satis","konsinye","iade"].includes(x.tip)&&(x.urunId===urunSec.id||(x.urunAd&&x.urunAd===urunSec.ad))),
      kaleler:d.kaleler,say,
      kisiler:(()=>{ const tm={}; (tumMus||[]).forEach(m=>{const t=(m.telefon||"").trim(); if(t) tm[m.id]=t;});
        const out=[],seen=new Set();
        d.kaleler.forEach(k=>{ const t=k.musteriId&&tm[k.musteriId]; if(t&&!seen.has(t)){ seen.add(t); out.push({ad:k.ad,tel:t}); } });
        (tumMus||[]).forEach(m=>{ const t=(m.telefon||"").trim(); if(t&&!seen.has(t)){ seen.add(t); out.push({ad:m.ad||t,tel:t}); } });
        return out; })(),
      fotolar:(urunFoto||[]).filter(f=>f.urunId===urunSec.id).sort((a,b)=>new Date(b.tarih)-new Date(a.tarih)),
      onFiyat:v=>urunEkKaydet(urunSec.id,{satisFiyat:v},"💰 Satış fiyatı güncellendi: "+tl(v)),
      onTanitim:t=>urunEkKaydet(urunSec.id,{tanitim:t},"📝 Tanıtım kaydedildi"),
      onFotoEkle:f=>fotoEkle(urunSec.id,f),
      onFotoSil:fotoSil,
      onClose:()=>setUrunSec(null)}),
    adaySec&&h(AdaySheet,{a:adaySec,onClose:()=>setAdaySec(null),
      onAkin:()=>{const a=adaySec;setAdaySec(null);openSheet("satis",synthK(a));},
      onKons:()=>{const a=adaySec;setAdaySec(null);openSheet("konsinye",synthK(a));},
      onGizle:async()=>{const a=adaySec;if(!confirm("🙈 "+a.ad+" aday listesinden gizlensin mi?"))return;
        try{await save("kesif_red",{id:a.id,ad:a.ad});}catch(e){} setAdaySec(null); say("🙈 Gizlendi · "+a.ad);}}),
    seferSheet&&h(SeferRaporSheet,{mod:seferSheet.mod,veri:seferSheet.veri,recs:seferSheet.recs,bekle:sbekle,onClose:()=>setSeferSheet(null),onOnay:seferOnay}),
    cantaSheet&&h(CantaSheet,{d,bekle:sbekle,onClose:()=>setCantaSheet(false),onConfirm:cantaEkle}),
    brifAcik&&h(Briefing,{d,hedefler:emirHedef,soru,say,onClose:()=>setBrifAcik(false)}),
    bilgi&&h(Sheet,{ik:bilgi.ik,hex:bilgi.hex||"#d97b12",baslik:bilgi.baslik,alt:bilgi.alt,onClose:()=>setBilgi(null),cta:"Kapat",onCta:()=>setBilgi(null)},
      (bilgi.govde||[]).map((g,i)=>typeof g==="string"?h("div",{key:i,style:{fontSize:14.5,lineHeight:1.5,color:"var(--txt)",padding:"4px 0",borderTop:i?"1px solid var(--line)":"none"}},g):g)),
    reward&&h(Reward,{xp:reward.xp,mesaj:reward.mesaj,onDone:()=>{const m=reward.mesaj;setReward(null);say("✅ "+m);}}));
}
ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
