  if(!r.ok) throw new Error("Overpass "+r.status);

function haversineKm(aLat,aLng,bLat,bLng){ const R=6371, dLa=(bLat-aLat)*Math.PI/180, dLo=(bLng-aLng)*Math.PI/180,
  la1=aLat*Math.PI/180, la2=bLat*Math.PI/180;
  const s=Math.sin(dLa/2)**2 + Math.cos(la1)*Math.cos(la2)*Math.sin(dLo/2)**2;
  return 2*R*Math.asin(Math.min(1,Math.sqrt(s))); }
function pointInPoly(pt,poly){ const x=pt[1],y=pt[0]; let ic=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const xi=poly[i][1], yi=poly[i][0], xj=poly[j][1], yj=poly[j][0];
    if(((yi>y)!==(yj>y)) && (x < (xj-xi)*(y-yi)/(yj-yi)+xi)) ic=!ic; }
  return ic; }

function planEffBas(plan,now){
  const m={}, byMak={};
  (plan||[]).forEach(p=>{ (byMak[p.makineId||"?"]=byMak[p.makineId||"?"]||[]).push(p); });
  Object.values(byMak).forEach(arr=>{
    arr.sort((a,b)=>new Date(a.baslangic)-new Date(b.baslangic));
    let sonBas=-Infinity;
    arr.forEach(p=>{ if(p.basladi){ const gs=new Date(p.gercekBaslangic||p.baslangic).getTime(); if(gs>sonBas) sonBas=gs; } });
    let cursor=-Infinity;
    arr.forEach(p=>{ const ps=new Date(p.baslangic).getTime(), dur=num(p.sureDk)*60000;
      const geride=!p.basladi && ps<sonBas;
      let s;
      if(p.basladi){ s=new Date(p.gercekBaslangic||p.baslangic).getTime(); }
      else if(geride) s=ps;
      else { s=Math.max(ps,cursor); if(ps<now) s=Math.max(now,cursor); }
      if(!geride) cursor=Math.max(cursor,s+dur);
      if(p.id) m[p.id]={s,geride};
    });
  });
  return m;
}

// makine zaman çizelgesi — efektif konum + boş/kayıp/gecikme (index.html makineTimeline ile birebir)
function makineTimeline(makineId,plan,baslaMs,bitMs,now){
  now=now||Date.now();
  const all=(plan||[]).filter(p=>p.makineId===makineId).map(p=>({p,ps:new Date(p.baslangic).getTime(),dk:num(p.sureDk)})).sort((a,b)=>a.ps-b.ps);
  let sonBaslamaMs=-Infinity;
  all.forEach(({p,ps})=>{ if(p.basladi){ const gs=p.gercekBaslangic?new Date(p.gercekBaslangic).getTime():ps; if(gs>sonBaslamaMs) sonBaslamaMs=gs; } });
  let cursor=-Infinity;
  const eff=all.map(({p,ps,dk})=>{ const geride=!p.basladi&&ps<sonBaslamaMs; let s;
    if(p.basladi){ s=ps; } else if(geride){ s=ps; } else { s=Math.max(ps,cursor); if(ps<now) s=Math.max(now,cursor); }
    const e=s+dk*60000; if(!geride) cursor=Math.max(cursor,e); return {p,s,e,kaymis:s!==ps,geride}; });
  const js=eff.filter(x=>x.e>baslaMs&&x.s<bitMs).sort((a,b)=>a.s-b.s);
  let printMs=0; js.forEach(x=>{ printMs+=Math.min(bitMs,x.e)-Math.max(baslaMs,x.s); });
  const bos=[]; let cur=baslaMs;
  js.forEach(x=>{ const s=Math.max(baslaMs,x.s); if(s>cur) bos.push({start:cur,end:s}); cur=Math.max(cur,Math.min(bitMs,x.e)); });
  if(cur<bitMs) bos.push({start:cur,end:bitMs});
  let kayipMs=0; bos.forEach(b=>{ const pe=Math.min(b.end,now||0); if(pe>b.start) kayipMs+=pe-b.start; });
  let gecikmeMs=0,gecikmeSayi=0; js.forEach(x=>{ const base=x.p.planSureDk!=null?num(x.p.planSureDk):num(x.p.sureDk); const g=(num(x.p.sureDk)-base)*60000; if(g>0){ gecikmeMs+=g; gecikmeSayi++; } });
  const bosMs=(bitMs-baslaMs)-printMs;
  return {js,eff,bos,printMs,bosMs,kayipMs,bosGelecekMs:bosMs-kayipMs,gecikmeMs,gecikmeSayi};
}

function plParcaKatki(p,u){ const parcalar=(u&&u.parcalar)||[]; const cov=plParcalari(p,parcalar); const ad=Math.max(0,num(p.adet||1)); const m={}; cov.forEach(pt=>{ m[pt]=ad*gerekenP(u,pt); }); return m; }
function hesapA(plan,makineler,urunler,hareketler,kullanicilar,musteriler,canliRows,filamentler){
  const adN=s2=>String(s2||"").toLocaleLowerCase("tr").trim();
  const now=Date.now();
  const g0=(()=>{const t=new Date();t.setHours(0,0,0,0);return t.getTime();})();
  const haf=now-7*864e5;
  const T=x=>new Date(x.tarih).getTime()||0;
  const har=hareketler||[];
  // — bugün / hafta (tüm ekip) —
  const bugun={ciro:0,adet:0,tah:0,ger:0};
  const hafta={ciro:0,adet:0,tah:0,uPay:0,pPay:0,ger:0,kons:0};
  har.forEach(x=>{ const t=T(x);
    if(x.tip==="satis"){ const c=num(x.adet)*num(x.satisFiyat);
      if(t>=g0){ if(x.gerilla) bugun.ger+=num(x.tahsil)||c; else {bugun.ciro+=c;bugun.adet+=num(x.adet);} }
      if(t>=haf){ if(x.gerilla){hafta.ger+=num(x.tahsil)||c;} else {hafta.ciro+=c;hafta.adet+=num(x.adet);} } }
    else if(x.tip==="tahsilat"){ if(t>=g0) bugun.tah+=num(x.tutar);
      if(t>=haf){ hafta.tah+=num(x.tutar); hafta.uPay+=num(x.ureticiPay); hafta.pPay+=num(x.pazPay); } }
    else if(x.tip==="konsinye"&&t>=haf&&!x.gerilla) hafta.kons+=num(x.adet); });
  // — üretim: makine durumları —
  const makDurum=(makineler||[]).map(mk=>{

  const alacakTop=ekip.reduce((s,e)=>s+e.alacak,0);
  // — stok —
  const sahadaU={}; har.forEach(x=>{ if(x.tip==="konsinye"&&num(x.kalan)>0){ const id=x.urunId||("a:"+(x.urunAd||"?")); sahadaU[id]=(sahadaU[id]||0)+num(x.kalan); } });
  // otomatik maliyet + 🖨️ basımda (plan'dan) + bu hafta planlanan üretim
  const filById={}; (filamentler||[]).forEach(f=>filById[f.id]=f);
  const urunFiyat={}; (urunler||[]).forEach(u=>urunFiyat[u.id]=num(u.satisFiyat));
  const urunById={}; (urunler||[]).forEach(u=>urunById[u.id]=u);
  const malMap={}, basMap={}, basParca={}, bldMap={}, bldParca={}, baskiByU={}; const hafSon=now+7*864e5; let planAdet=0,planDeger=0;
  (plan||[]).forEach(p=>{ if(p.urunId) (baskiByU[p.urunId]||(baskiByU[p.urunId]=[])).push(p); if(!num(p.adet)) return;
    const u=p.urunId?urunById[p.urunId]:null; const parcali=u&&(u.parcalar||[]).length;
    if(p.urunId){ const fl=filById[p.filamentId]; const kg=fl?num(fl.kgFiyat):0;
      const birim=(num(p.sureDk)/60*SAAT_MALIYET+num(p.gram)/1000*kg)/num(p.adet);
      const o=malMap[p.urunId]||(malMap[p.urunId]={t:0,a:0}); o.t+=birim*num(p.adet); o.a+=num(p.adet); }
    if(p.basladi){ const bs=new Date(p.gercekBaslangic||p.baslangic).getTime(); const bit=bs+num(p.sureDk)*60000;
      if(bit>now&&p.urunId){ // hâlâ basıyor
        if(parcali){ basParca[p.urunId]=basParca[p.urunId]||{}; const kk=plParcaKatki(p,u); for(const pt in kk) basParca[p.urunId][pt]=num(basParca[p.urunId][pt])+kk[pt]; }
        else basMap[p.urunId]=(basMap[p.urunId]||0)+num(p.adet); }
      else if(bit<=now&&p.urunId){ // basımı bitti → montaj havuzu
        bldMap[p.urunId]=(bldMap[p.urunId]||0)+num(p.adet);
        if(parcali){ bldParca[p.urunId]=bldParca[p.urunId]||{}; const kk=plParcaKatki(p,u); for(const pt in kk) bldParca[p.urunId][pt]=num(bldParca[p.urunId][pt])+kk[pt]; } } }
    else { const bs=new Date(p.baslangic).getTime(); if(bs<hafSon){ planAdet+=num(p.adet); planDeger+=num(p.adet)*(urunFiyat[p.urunId]||0); } } });
  // parça-stoğu / montaj yardımcıları (index.html ile birebir)
  const parcaAvailF=(u,p)=> Math.max(0, num((bldParca[u.id]||{})[p]) + num((u.parcaElle||{})[p]) - num((u.parcaTuket||{})[p]));
  const parcaTakimF=(u,p)=> Math.floor(parcaAvailF(u,p)/gerekenP(u,p));
  const montajBazF=(u)=> (u.parcalar||[]).length ? Math.min.apply(null,u.parcalar.map(p=>parcaTakimF(u,p))) : (num(bldMap[u.id]) - num(u.montajBitti) - num(u.zayiat));
  const montajdaF=(u)=> (u.parcalar||[]).length ? Math.max(0, montajBazF(u)+Math.max(0,num(u.montajElle))) : Math.max(0, montajBazF(u)+num(u.montajElle));
  const basimEqF=(u)=>{ const parts=u.parcalar||[]; if(parts.length&&basParca[u.id]){ const pe=parts.reduce((sm,pt)=>sm+num((basParca[u.id]||{})[pt])/gerekenP(u,pt),0)/parts.length; return Math.round(pe); } return num(basMap[u.id]); };
  const wk0=(()=>{const t=new Date();t.setHours(0,0,0,0);const gn=(t.getDay()+6)%7;return t.getTime()-gn*864e5;})(), wk1=wk0+7*864e5;
  // teslim projeksiyonu — bekleyen baskılar sırayla bitip montajlanınca her tarihte EN FAZLA kaç adet hazır
  const projF=(u)=>{ const bk=baskiByU[u.id]||[]; const bekleyen=bk.filter(p=>{ const s=new Date(p.baslangic).getTime(), e=s+num(p.sureDk)*60000; return !(p.basladi&&e<=now); });
    if(!bekleyen.length) return null; const parcalar=u.parcalar||[]; const simdiki=num(u.stokta)+montajdaF(u);
    const uclar=bekleyen.map(p=>{ const s=new Date(p.baslangic).getTime(); const bas=p.basladi?s:Math.max(s,now); return {p,e:bas+num(p.sureDk)*60000}; }).sort((a,b)=>a.e-b.e);
    const avail={}; if(parcalar.length) parcalar.forEach(pt=>avail[pt]=parcaAvailF(u,pt)); let tekliRun=0; const noktalar=[]; let i=0;
    const gunBasi=ms=>{const d=new Date(ms);d.setHours(0,0,0,0);return d.getTime();};
    while(i<uclar.length){ const gun=gunBasi(uclar[i].e); let j=i;
      while(j<uclar.length&&gunBasi(uclar[j].e)===gun){ const p=uclar[j].p, ad=num(p.adet||1);
        if(parcalar.length){ const kk=plParcaKatki(p,u); for(const pt in kk) avail[pt]+=kk[pt]; } else tekliRun+=ad; j++; }
      const adet=parcalar.length?num(u.stokta)+Math.max(0,Math.min.apply(null,parcalar.map(pt=>Math.floor(avail[pt]/gerekenP(u,pt))))):num(u.stokta)+montajdaF(u)+tekliRun;
      noktalar.push({tarih:uclar[j-1].e,adet}); i=j; }
    const kilometreler=[]; noktalar.forEach(m=>{ const o=kilometreler[kilometreler.length-1]; if(!o||m.adet>o.adet) kilometreler.push(m); });
    const son=kilometreler[kilometreler.length-1]; return {kilometreler,enfazla:son.adet,tarih:son.tarih,simdiki,bekleyen:bekleyen.length,basimda:basimEqF(u)>0,artis:Math.max(0,son.adet-simdiki)}; };
  // otomatik maliyet — parça-duyarlı (index.html urunDetay ile birebir)
  const birimDetayF=(p)=>{ const fl=filById[p.filamentId]; if(!(num(p.sureDk)>0&&num(p.gram)>0&&fl&&num(fl.kgFiyat)>0)) return null;
    const adet=Math.max(1,num(p.adet||1)); const gram=num(p.gram)/adet, dk=num(p.sureDk)/adet;
    return {gram,dk,maliyet:(dk/60)*SAAT_MALIYET+(gram/1000)*num(fl.kgFiyat)}; };
  const urunDetayF=(u)=>{ const prints=baskiByU[u.id]||[]; const parts=u.parcalar||[];
    const ort=arr=>{ let tG=0,tD=0,tM=0,tA=0; arr.forEach(p=>{ const d=birimDetayF(p); if(!d) return; const a=Math.max(1,num(p.adet||1)); tG+=d.gram*a; tD+=d.dk*a; tM+=d.maliyet*a; tA+=a; }); return tA>0?{gram:tG/tA,dk:tD/tA,maliyet:tM/tA}:null; };
    if(parts.length){ const tot={gram:0,dk:0,maliyet:0};
      for(const part of parts){ let tG=0,tD=0,tM=0,tW=0;
        prints.forEach(p=>{ const cov=plParcalari(p,parts); if(!cov.includes(part)) return; const d=birimDetayF(p); if(!d) return;
          const pay=cov.reduce((s,q)=>s+gerekenP(u,q),0)||1; const pieces=Math.max(1,num(p.adet||1))*gerekenP(u,part);
          tG+=(d.gram/pay)*pieces; tD+=(d.dk/pay)*pieces; tM+=(d.maliyet/pay)*pieces; tW+=pieces; });
        if(tW===0) return null; const g=gerekenP(u,part); tot.gram+=(tG/tW)*g; tot.dk+=(tD/tW)*g; tot.maliyet+=(tM/tW)*g; }
      return tot; }
    return ort(prints); };
  const stok=(urunler||[]).filter(u=>(u.ad||"").trim()).map(u=>{
    const canta=Object.values(u.pazStokK||{}).reduce((s,v)=>s+num(v),0);
    const parts=u.parcalar||[];
    const prints=(baskiByU[u.id]||[]).filter(p=>num(p.adet)>0);
    const pcost=p=>{ const fl=filById[p.filamentId]; const kg=fl?num(fl.kgFiyat):0; const mak=num(p.sureDk)/60*SAAT_MALIYET, fila=num(p.gram)/1000*kg; return {mak,fila,tutar:mak+fila,fl:fl?fl.ad:""}; };
    // eksik(0) ve medyandan aşırı sapan (0.2×–5× dışı) değerleri ele — en az 3 örnekte
    const medEle=(arr,key)=>{ if(arr.length<3) return arr; const bs=arr.map(key).slice().sort((a,b)=>a-b); const med=bs[Math.floor(bs.length/2)]||0; if(med<=0) return arr; const k=arr.filter(x=>key(x)>=med*0.2&&key(x)<=med*5); return k.length?k:arr; };
    let maliyet=0, maliyetKaynak="yok", maliyetDetay=null;
    if(num(u.maliyet)>0){ maliyet=num(u.maliyet); maliyetKaynak="elle"; }
    else if(parts.length){
      // ✅ ÜRÜN MALİYETİ = gerekli her parçanın üretim maliyetleri toplamı (Σ parça-birim-maliyeti × gereken adet)
      const parcaRows=parts.map(part=>{ const ger=gerekenP(u,part);
        const conts=[]; prints.forEach(p=>{ const cov=plParcalari(p,parts); if(!cov.includes(part)) return;
          const c=pcost(p); const totPieces=num(p.adet)*cov.reduce((s,q)=>s+gerekenP(u,q),0);   // bu baskının ürettiği toplam parça (kapsanan parçalar)
          if(totPieces<=0||c.tutar<=0) return; conts.push({pieceCost:c.tutar/totPieces,pieces:num(p.adet)*ger,tarih:p.baslangic,ad:p.ad||"baskı",c}); });

      const gecerli=det.filter(d=>d.tutar>0); const hesap=medEle(gecerli,d=>d.birim); const dinc=new Set(hesap);
      det.forEach(d=>{ if(d.tutar<=0){ d.hesaba=false; d.neden="eksik bilgi"; } else if(!dinc.has(d)){ d.hesaba=false; d.neden="absürt · atlandı"; } else { d.hesaba=true; d.neden=""; } });
      const tt=hesap.reduce((s,d)=>s+d.tutar,0), ta=hesap.reduce((s,d)=>s+d.adet,0);

    const bhB=(baskiByU[u.id]||[]).filter(p=>{ const s=new Date(p.baslangic).getTime(); return s>=wk0&&s<wk1; });
    let buHafta=null;
    if(parts.length){ const pp={}; parts.forEach(p=>pp[p]=0); bhB.forEach(p=>{ const kk=plParcaKatki(p,u); for(const pt in kk) pp[pt]=num(pp[pt])+kk[pt]; });

  }).sort((a,b)=>(a.ad||"").localeCompare(b.ad||"","tr"));

        h("div",{style:{fontSize:11.5,color:renk,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},

      h("span",{style:{padding:"2px 7px",borderRadius:7,background:"#0e8fce14",color:"var(--cyan)"}},"📡 CANLI"),
      h("span",{style:{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:"var(--mut)",fontWeight:700}},
        m.canli.durum==="basiyor"?("%"+m.canli.pct+" · "+dkYaz(m.canli.kalanDk)+" kaldı"+(m.canli.dosya?(" · "+m.canli.dosya):"")):
        m.canli.durum==="bitti"?"baskı bitti — tabla bekliyor":

/* ————— BASKIYI KAYDET — canlı baskıdan otomatik doldur (adet/başlama/bitiş/gram) ————— */
function BaskiKaydetSheet({m,urunler,onKaydet,bekle}){
  const cl=m.canli||{};
  const now=Date.now();
  const pct=Math.max(0,Math.min(100,num(cl.pct))); const kalanDk=Math.max(0,num(cl.kalanDk));
  const total=(pct>0&&pct<100)?Math.round(kalanDk*100/(100-pct)):kalanDk;   // canlı yüzdeden toplam süre tahmini
  const elapsed=Math.max(0,total-kalanDk);
  const basMs0=now-elapsed*60000, bitMs0=now+kalanDk*60000;
  const raw=(cl.dosya||"").replace(/\.gcode\.3mf$/i,"").replace(/\.3mf$/i,"").trim();
  const mm=raw.match(/^(.*?)[\s_\-]*([0-9]+)\s*$/);   // "ürün sayı" → ad + adet
  const ad0=(mm?mm[1]:raw).trim(), adet0=mm?num(mm[2]):1;
  const urun0=(urunler||[]).find(u=>(u.ad||"").toLowerCase()===ad0.toLowerCase());
  const gram0=(urun0&&num(urun0.gram)>0)?String(num(urun0.gram)*(adet0||1)):"";
  const toLoc=ms=>{const d2=new Date(ms-new Date().getTimezoneOffset()*60000);return d2.toISOString().slice(0,16);};
  const [ad,setAd]=useState(ad0||"Baskı");
  const [adet,setAdet]=useState(String(adet0||1));
  const [bas,setBas]=useState(toLoc(basMs0));
  const [bit,setBit]=useState(toLoc(bitMs0));
  const [gram,setGram]=useState(gram0);
  const urun=(urunler||[]).find(u=>(u.ad||"").toLowerCase()===ad.trim().toLowerCase());
  const kaydet=()=>{ const bMs=new Date(bas).getTime(), eMs=new Date(bit).getTime();
    const sureDk=Math.max(1,Math.round((eMs-bMs)/60000));
    onKaydet({makineId:m.mk.id, ad:ad.trim()||"Baskı", adet:num(adet)||1, urunId:urun?urun.id:"",
      baslangic:new Date(bMs).toISOString(), sureDk, planSureDk:sureDk, gram:num(gram),
      basladi:true, gercekBaslangic:new Date(bMs).toISOString()}); };
  return h(Sheet,{ik:"📋",hex:"#0e8fce",baslik:"Baskıyı kaydet",alt:(m.mk.ad||"Makine")+" · canlıdan otomatik dolduruldu",
    onClose:()=>onKaydet(null),cta:bekle?"⏳…":"📋 İşlere kaydet",disabled:bekle,onCta:kaydet},
    cl.dosya?h("div",{style:{fontSize:11.5,color:"var(--mut)",marginBottom:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},"📄 "+cl.dosya+" · %"+pct):null,
    h("div",{className:"lbl",style:{marginBottom:8}},"Ürün"),
    h("input",{value:ad,onChange:e=>setAd(e.target.value),style:{...inp,marginBottom:4}}),
    h("div",{style:{fontSize:11,fontWeight:700,marginBottom:14,color:urun?"var(--green)":"var(--mut)"}},urun?("✓ ürünle eşleşti: "+urun.ad):"serbest kayıt (ürünle eşleşmedi)"),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}},
      h("div",null,h("div",{className:"lbl",style:{marginBottom:8}},"Adet"),
        h("input",{type:"number",inputMode:"numeric",value:adet,onChange:e=>setAdet(e.target.value),style:inp})),
      h("div",null,h("div",{className:"lbl",style:{marginBottom:8}},"⚖️ Gram (toplam)"),
        h("input",{type:"number",inputMode:"numeric",value:gram,onChange:e=>setGram(e.target.value),placeholder:"—",style:inp}))),
    h("div",{className:"lbl",style:{marginBottom:8}},"🚀 Başladı"),
    h("input",{type:"datetime-local",value:bas,onChange:e=>setBas(e.target.value),style:{...inp,marginBottom:14}}),
    h("div",{className:"lbl",style:{marginBottom:8}},"🏁 Bitecek"),
    h("input",{type:"datetime-local",value:bit,onChange:e=>setBit(e.target.value),style:{...inp,marginBottom:6}}),
    h("div",{style:{fontSize:11.5,color:"var(--mut)",lineHeight:1.5}},"Başlama, canlı yüzdeye göre tahmini; bitiş, kalan süreden. Gerekirse düzelt."));
}

    }).filter(x=>x.ee>g0&&x.es<g1);

// ➕ İŞ EKLE — eski panelin IsModal kayıt şemasıyla birebir uyumlu yazar
function IsEkleSheet({makineler,urunler,plan,filamentler,onKaydet,bekle,kayit,pre}){
  const duzen=!!(kayit&&kayit.id);
  const makList=(makineler||[]).filter(mk=>(mk.ad||"").trim());
  const [makineId,setMakineId]=useState(duzen?(kayit.makineId||""):((pre&&pre.makineId)||(makList[0]&&makList[0].id)||""));
  const urunListe=(urunler||[]).filter(u=>(u.ad||"").trim()).slice().sort((a,b)=>(a.ad||"").localeCompare(b.ad||"","tr"));
  const [urunId,setUrunId]=useState(duzen?(kayit.urunId||""):"");

  const [ad,setAd]=useState(duzen?(kayit.ad||""):"");

  // önceki baskılar (tekrar için) — ad+adet+süreye göre tekilleştir
  const oncekiler=(()=>{ const seen=new Set(), out=[];
    (plan||[]).slice().sort((a,b)=>new Date(b.baslangic)-new Date(a.baslangic)).forEach(p=>{ if(!p.ad) return;
      const k=(p.ad||"")+"|"+num(p.adet)+"|"+num(p.sureDk); if(seen.has(k)) return; seen.add(k); if(out.length<10) out.push(p); }); return out; })();
  const toLoc=ms=>{const d2=new Date(ms); d2.setMinutes(d2.getMinutes()-d2.getTimezoneOffset()); return d2.toISOString().slice(0,16);};
  // varsayılan başlangıç: seçili makinenin kuyruk sonu (efektif) — 5 dk'ya yuvarlanır
  const kuyrukSonu=mid=>{ const now=Date.now(); const eff=planEffBas(plan,now); let son=now;
    (plan||[]).forEach(p2=>{ if(p2.makineId!==mid) return; const e=eff[p2.id]; if(!e||e.geride) return;
      const bit=e.s+num(p2.sureDk)*60000; if(bit>son) son=bit; });
    return Math.ceil(son/300000)*300000; };

  const makSec=id=>{ setMakineId(id); setBas(toLoc(kuyrukSonu(id))); };

    setParcaSec((p.parcaAdlar||[]).slice()); setAdet(num(p.adet)||1); setSure(String(num(p.sureDk)||"")); setGram(p.gram?String(p.gram):""); setFilamentId(p.filamentId||""); setAms(p.ams!==false); setNott(p.not||""); };
  const seciliUrun=urunListe.find(u=>u.id===urunId);
  const parcalar=(seciliUrun&&seciliUrun.parcalar)||[];
  const parcaToggle=pt=>setParcaSec(s=>s.includes(pt)?s.filter(x=>x!==pt):[...s,pt]);

  // ⚠️ geçmişe girilen saat, aynı makinede başlamış (biten/basan) bir baskıyla çakışıyor mu?
  const cakismaIs=(()=>{ if(!bas||!(num(sure)>0)||!makineId) return null; const s=new Date(bas).getTime(), e=s+num(sure)*60000;
    return (plan||[]).find(p=>{ if(duzen&&p.id===kayit.id) return false; if(p.makineId!==makineId||!p.basladi) return false;
      const ps=new Date(p.gercekBaslangic||p.baslangic).getTime(), pe=ps+num(p.sureDk)*60000; return s<pe&&e>ps; }); })();
  const onCta=()=>{ let pAdlar=[],pAd="";

    onKaydet({ ...(duzen?{id:kayit.id,_eski:{makineId:kayit.makineId,baslangic:kayit.baslangic,sureDk:num(kayit.sureDk)}}:{}),
      makineId, ad:isAd, adet:num(adet), urunId:serbest?"":(urunId||""), parcaAd:pAd, parcaAdlar:pAdlar,

  return h(Sheet,{ik:duzen?"✏️":"➕",hex:"#0e8fce",baslik:duzen?("Düzenle · "+(kayit.ad||"iş")):"İş planla",alt:"Gantt'a işlenir — eski panelle ortak plan",

    disabled:!gecerli||bekle,onCta},
    h("div",{className:"lbl",style:{marginBottom:8}},"🖨️ Makine"),

    (!duzen&&oncekiler.length)?h("div",{style:{marginBottom:14}},

      h("div",{style:{display:"flex",gap:8,overflowX:"auto",paddingBottom:4}},
        oncekiler.map((p,i)=>h("button",{key:i,onClick:()=>tekrarla(p),style:{flexShrink:0,padding:"8px 12px",borderRadius:11,background:"var(--surf2)",border:"1px solid var(--line)",fontSize:12.5,fontWeight:700,textAlign:"left"}},
          (num(p.adet)>1?(p.adet+"× "):"")+(p.ad||"iş"),h("span",{style:{color:"var(--mut2)",fontWeight:600}}," · "+dkYaz(num(p.sureDk))))))):null,
    h("div",{className:"lbl",style:{marginBottom:8}},"📦 Ne basılacak? — ürün seç"),
    h("select",{value:serbest?"__serbest":(urunId||""),onChange:e=>{ const v=e.target.value;
        if(v==="__serbest"){ setSerbest(true); setUrunId(""); }
        else if(v===""){ setSerbest(false); setUrunId(""); }
        else { setSerbest(false); setUrunId(v); setParcaSec([]); } },
      style:{...inp,fontSize:15,fontWeight:700,marginBottom:serbest?8:6}},
      h("option",{value:""},(urunListe.length?"— ürün seç —":"— önce Stok'tan ürün ekle —")),

    h("div",{className:"lbl",style:{marginBottom:8}},"📦 Atölye stoğu — elle düzeltme loglanır"),
    h("input",{type:"number",inputMode:"numeric",value:stokta,onChange:e=>setStokta(e.target.value),style:{...inp,marginBottom:14}}),
    h("div",{className:"lbl",style:{marginBottom:8}},"⚖️ Parça başı gram (baskı kaydında adet×gram otomatik dolar)"),
    h("input",{type:"number",inputMode:"numeric",value:gram,onChange:e=>setGram(e.target.value),placeholder:"örn. 45",style:{...inp,marginBottom:14}}),
    h("div",{className:"lbl",style:{marginBottom:8}},"🧮 Maliyet ₺ — elle (boş = baskılardan otomatik)"),
    h("input",{type:"number",inputMode:"numeric",value:maliyet,onChange:e=>setMaliyet(e.target.value),placeholder:"otomatik hesaplanır",style:{...inp,marginBottom:6}}),
    h("div",{style:{fontSize:11,color:"var(--mut)",marginBottom:14}},"Dış müdahale: hatalı baskı maliyetini geçersiz kılar. Yeni bir baskı yapılınca elle değer silinir, maliyet baskılardan tekrar otomatik hesaplanır."),

// sağa kaydır → 🗑 Sil çıkar
function SwipeSil({onSil,children}){
  const [dx,setDx]=useState(0); const [drag,setDrag]=useState(false); const st=useRef(0); const sw=useRef(false);
  const TS=e=>{ st.current=e.touches[0].clientX-dx; setDrag(true); };
  const TM=e=>{ let d=e.touches[0].clientX-st.current; setDx(Math.max(0,Math.min(88,d))); };
  const TE=()=>{ setDrag(false); if(Math.abs(dx)>8) sw.current=true; setDx(dx>44?80:0); };
  return h("div",{style:{position:"relative",overflow:"hidden",borderRadius:16}},
    h("button",{onClick:()=>{ sw.current=false; setDx(0); onSil(); },style:{position:"absolute",left:0,top:0,bottom:0,width:80,background:"#e0483c",color:"#fff",fontSize:13.5,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}},"🗑 Sil"),
    h("div",{onTouchStart:TS,onTouchMove:TM,onTouchEnd:TE,onClickCapture:e=>{ if(sw.current){ e.preventDefault(); e.stopPropagation(); sw.current=false; } },
      style:{position:"relative",transform:"translateX("+dx+"px)",transition:drag?"none":"transform .22s"}},children));
}

/* ————— HEDEF/GÖREV HARİTASI — poligon çiz → tara → rota/görev ata ————— */
function HedefHarita({kullanicilar,gkey,onKaydet,odak}){

  const [yuk,setYuk]=useState(false);
  const [ad,setAd]=useState(""); const [kime,setKime]=useState("");
  useEffect(()=>{ if(!window.L||!ref.current||mapRef.current) return; const L=window.L;
    const map=L.map(ref.current,{scrollWheelZoom:true,attributionControl:false}).setView([41.02,29.03],12);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",{maxZoom:19,subdomains:"abcd"}).addTo(map);
    cizLg.current=L.layerGroup().addTo(map); sonucLg.current=L.layerGroup().addTo(map); odakLg.current=L.layerGroup().addTo(map);
    map.on("click",e=>setKose(k=>[...k,[+e.latlng.lat.toFixed(6),+e.latlng.lng.toFixed(6)]]));
    mapRef.current=map; setTimeout(()=>{ try{map.invalidateSize();}catch(x){} },200);
  },[]);
  // 📍 pazarlamacının paylaştığı anlık konum → haritayı oraya uçur + iğnele
  useEffect(()=>{ const L=window.L, map=mapRef.current, lg=odakLg.current; if(!L||!map||!lg||!odak||odak.lat==null||odak.lng==null) return;
    lg.clearLayers(); const c=[+odak.lat,+odak.lng];
    const ik=L.divIcon({className:"",iconSize:[34,34],iconAnchor:[17,17],html:"<div style='width:34px;height:34px;border-radius:50%;background:#0e8fce33;display:flex;align-items:center;justify-content:center'><div style='width:14px;height:14px;border-radius:50%;background:#0e8fce;border:2px solid #fff;box-shadow:0 0 0 2px #0e8fce55'></div></div>"});
    L.marker(c,{icon:ik,interactive:false}).addTo(lg).bindTooltip("📍 "+((odak.ad||"Pazarlamacı"))+" · anlık konum",{direction:"top",permanent:false});
    try{ map.setView(c,15); }catch(x){} setTimeout(()=>{ try{map.invalidateSize();}catch(x){} },150);
  },[odak]);
  useEffect(()=>{ const L=window.L, lg=cizLg.current; if(!L||!lg) return; lg.clearLayers();
    kose.forEach(p=>L.circleMarker(p,{radius:5,color:"#b45309",fillColor:"#b45309",fillOpacity:1,weight:2}).addTo(lg));
    if(kose.length>=3) L.polygon(kose,{color:"#b45309",weight:2,fillColor:"#f59e0b",fillOpacity:0.14}).addTo(lg);
    else if(kose.length===2) L.polyline(kose,{color:"#b45309",weight:2,dashArray:"5,5"}).addTo(lg);
  },[kose]);
  useEffect(()=>{ const L=window.L, lg=sonucLg.current; if(!L||!lg) return; lg.clearLayers();

      const mk=L.circleMarker([+r.lat,+r.lng],{radius:on?8:6,color:on?"#16a34a":"#0369a1",fillColor:on?"#16a34a":"#fff",fillOpacity:on?1:.95,weight:2}).addTo(lg);
      mk.bindTooltip("<b>"+r.ad+"</b>"+(r.puanG!=null?(" · ⭐"+r.puanG):""),{direction:"top"});
      mk.on("click",()=>setSecili(s=>({...s,[r.ad]:!s[r.ad]}))); });
  },[sonuc,secili]);
  const merkez=()=>{ if(!kose.length) return null; return {lat:kose.reduce((s,p)=>s+p[0],0)/kose.length, lng:kose.reduce((s,p)=>s+p[1],0)/kose.length}; };

  async function gorevVer(){ const list=rotaSirala(secList()); if(!list.length) return alert("Görev için en az bir mekan seç."); if(!ad.trim()) return alert("Görev adı gir.");
    const m=merkez();
    await onKaydet({ ad:ad.trim(), poly:kose.map(p=>({lat:p[0],lng:p[1]})), lat:String(m.lat), lng:String(m.lng), r:yaricapKm(),
      duraklar:list.map(r=>({ad:r.ad,lat:String(r.lat),lng:String(r.lng),tel:r.tel||"",puanG:r.puanG!=null?r.puanG:null,kat:r.kat||""})), kullaniciId:kime });
    setKose([]); setSonuc([]); setSecili({}); setAd(""); }

  // —— ÜRETİM aşama/montaj komutları — index.html ile birebir alan yazımı (atomik increment) ——
  async function uretimMontaj(s,n,hedef){ const u=s.raw; n=Math.floor(num(n)); if(n<1) return;
    try{ const parcalar=u.parcalar||[];
      if(parcalar.length){ if(s.montajda<n) return say("⚠ Montajda "+s.montajda+" takım hazır");
        const elle=Math.max(0,num(u.montajElle)), elleDus=Math.min(elle,n), kalan=n-elleDus;
        const tk={...(u.parcaTuket||{})}; if(kalan>0) parcalar.forEach(p=>tk[p]=num(tk[p])+kalan*gerekenP(u,p));
        const ek=hedef==="stokta"?{stokta:increment(n)}:{zayiat:increment(n)};
        const patch={id:u.id,parcaTuket:tk,...ek}; if(elleDus) patch.montajElle=increment(-elleDus);
        await save("stok_urun",patch);
      } else { if(s.montajda<n) return say("⚠ Montajda "+s.montajda+" hazır");
        const ek=hedef==="stokta"?{montajBitti:increment(n),stokta:increment(n)}:{zayiat:increment(n)};
        await save("stok_urun",{id:u.id,...ek}); }
      if(hedef==="stokta") await stokLogla(u,+n,"uretim");
      say(hedef==="stokta"?("📥 "+n+" adet stoğa eklendi"):("⚠ "+n+" zayiat")); }
    catch(e){ console.error(e); say("⚠ İşlem başarısız"); } }
  async function uretimStoktan(s,n,hedef){ const u=s.raw; n=Math.floor(num(n)); if(n<1) return; if(num(u.stokta)<n) return say("⚠ Stokta "+num(u.stokta)+" var");
    try{ const ek=hedef==="satildi"?{satildi:increment(n)}:{konsinye:increment(n)};
      await save("stok_urun",{id:u.id,stokta:increment(-n),...ek}); await stokLogla(u,-n,hedef==="satildi"?"satis":"konsinye");
      say(hedef==="satildi"?("💰 "+n+" satıldı"):("🏬 "+n+" konsinyeye ayrıldı")); }
    catch(e){ console.error(e); say("⚠ İşlem başarısız"); } }
  async function uretimKonstan(s,n,hedef){ const u=s.raw; n=Math.floor(num(n)); if(n<1) return; if(num(u.konsStok)<n) return say("⚠ Konsinyede "+num(u.konsStok)+" var");
    try{ const ek=hedef==="stokta"?{stokta:increment(n)}:{satildi:increment(n)};
      await save("stok_urun",{id:u.id,konsinye:increment(-n),...ek}); if(hedef==="stokta") await stokLogla(u,+n,"iade");
      say(hedef==="stokta"?("↩ "+n+" stoğa iade"):("💰 "+n+" konsinyeden satıldı")); }
    catch(e){ console.error(e); say("⚠ İşlem başarısız"); } }
  async function uretimSatIade(s,n){ const u=s.raw; n=Math.floor(num(n)); if(n<1) return; if(num(u.satildi)<n) return say("⚠ Satılan "+num(u.satildi)+" var");
    try{ await save("stok_urun",{id:u.id,satildi:increment(-n),stokta:increment(n)}); await stokLogla(u,+n,"iade"); say("↩ "+n+" stoğa iade"); }
    catch(e){ console.error(e); say("⚠ İşlem başarısız"); } }
  async function uretimMontajAyarla(s,hedef){ const u=s.raw; const t=Math.max(0,Math.round(num(hedef))); const delta=t-s.montajda; if(!delta) return;
    try{ const parcalar=u.parcalar||[];
      if(delta>0){ await save("stok_urun",{id:u.id,montajElle:Math.max(0,num(u.montajElle))+delta}); }
      else if(parcalar.length){ const elle=Math.max(0,num(u.montajElle)); const elleDus=Math.min(elle,-delta); const kalan=(-delta)-elleDus;
        const tk={...(u.parcaTuket||{})}; if(kalan>0) parcalar.forEach(p=>tk[p]=num(tk[p])+kalan*gerekenP(u,p));
        await save("stok_urun",{id:u.id,parcaTuket:tk,montajElle:elle-elleDus}); }
      else { const elle=num(u.montajElle); const elleDus=Math.min(Math.max(0,elle),-delta); const kalan=(-delta)-elleDus;
        await save("stok_urun",{id:u.id,montajElle:elle-elleDus,montajBitti:num(u.montajBitti)+kalan}); }
      say("🔧 Montaj güncellendi"); }
    catch(e){ console.error(e); say("⚠ İşlem başarısız"); } }
  async function uretimStokAyarla(s,hedef){ const u=s.raw; const yeni=Math.max(0,Math.round(num(hedef))), fark=yeni-num(u.stokta);
    try{ await save("stok_urun",{id:u.id,stokta:yeni}); if(fark) await stokLogla(u,fark,"elle"); say("📥 Stok güncellendi"); }
    catch(e){ console.error(e); say("⚠ İşlem başarısız"); } }
  async function uretimParcaAyarla(s,p,hedef){ const u=s.raw; const pb=(s.parcaBilgi||[]).find(x=>x.p===p)||{basildi:0};
    const otomatik=num(pb.basildi)-num((u.parcaTuket||{})[p]); const pe={...(u.parcaElle||{})}; pe[p]=Math.round(num(hedef))-otomatik;
    try{ await save("stok_urun",{id:u.id,parcaElle:pe}); say("🧩 "+p+" güncellendi"); }
    catch(e){ console.error(e); say("⚠ İşlem başarısız"); } }

      say("💾 "+changes.length+" fiyat güncellendi · pazarlamacılara bildirildi");
    }catch(e){ console.error(e); say("⚠ Kaydedilemedi — tekrar dene"); } }
  async function stokAksiyon(p2){ if(p2===null){ setModal(null); return; } if(isBekle) return; setIsBekle(true);
    const {u,tip}=p2; const n=Math.max(1,Math.round(num(p2.adet)));
    try{ if(tip==="uret"){ await save("stok_urun",{id:u.id,stokta:num(u.stokta)+n}); await stokLogla(u,+n,"uretim"); }
      else if(tip==="sat"){ await save("stok_urun",{id:u.id,stokta:num(u.stokta)-n,satildi:num(u.satildi)+n}); await stokLogla(u,-n,"satis"); }
      else if(tip==="kons"){ await save("stok_urun",{id:u.id,stokta:num(u.stokta)-n,konsinye:num(u.konsStok)+n}); await stokLogla(u,-n,"konsinye"); }
      setModal(null); say("✅ İşlendi · "+(u.ad||"iş")); }
    catch(e){ console.error(e); say("⚠ İşlenemedi"); } finally{ setIsBekle(false); } }
  async function isBaslat(x){ if(!confirm("▶️ "+(x.p.ad||"iş")+" ŞİMDİ başlatılsın mı?\n"+x.mkAd)) return;
    try{ await save("plan",{id:x.p.id,basladi:true,gercekBaslangic:new Date().toISOString()}); setModal(null); say("▶️ Başladı · "+(x.p.ad||"iş")); }
    catch(e){ console.error(e); say("⚠ Başlatılamadı"); } }
  async function tablaTopla(p){ if(!p||!p.id) return; if(!confirm("🧹 "+(p.ad||"baskı")+" tablası toplandı olarak işaretlensin mi?")) return;
    try{ await save("plan",{id:p.id,tablaAlindi:true}); say("🧹 Tabla toplandı · "+(p.ad||"iş")); }
    catch(e){ console.error(e); say("⚠ İşlenemedi"); } }
  const [silinen,setSilinen]=useState(null); const silT=useRef(null);
  async function isSil(x){
    const msj=(x.p.basladi&&x.durum==="basiyor")
      ?("⚠ \""+(x.p.ad||"iş")+"\" ŞU AN BASILIYOR.\nİptal edilip plandan silinsin mi?")
      :("🗑 "+(x.p.ad||"iş")+" plandan silinsin mi?");
    if(!confirm(msj)) return;
    try{ const yedek={...x.p}; await remove("plan",x.p.id); setModal(null);
      setSilinen({p:yedek}); clearTimeout(silT.current); silT.current=setTimeout(()=>setSilinen(null),8000);   // 8 sn geri alınabilir
    }catch(e){ console.error(e); say("⚠ Silinemedi"); } }
  async function silGeriAl(){ if(!silinen) return;
    try{ await save("plan",{...silinen.p}); clearTimeout(silT.current); setSilinen(null); say("↩️ Geri alındı · "+(silinen.p.ad||"iş")); }
    catch(e){ console.error(e); say("⚠ Geri alınamadı"); } }
  // geri tuşu: modal → sekme → çıkış onayı
  const backRef=useRef({}); backRef.current={modal,view};
  useEffect(()=>{ history.pushState({tk:1},"");
    const onPop=()=>{ const s=backRef.current; let handled=true;
      if(s.modal) setModal(null);
      else if(s.view!=="us") setView("us");
      else handled=false;
      if(handled) history.pushState({tk:1},"");
      else { if(confirm("Komuta merkezinden çıkılsın mı?")) history.back(); else history.pushState({tk:1},""); } };
    window.addEventListener("popstate",onPop);
    return ()=>window.removeEventListener("popstate",onPop);
  },[]);
  if(yuk) return h("div",{style:{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}},
    h("div",{style:{width:44,height:44,borderRadius:"50%",border:"3px solid var(--line)",borderTopColor:"var(--cyan)",animation:"spin .8s linear infinite"}}),
    h("div",{style:{color:"var(--mut)",fontSize:14,fontWeight:600}},"Komuta merkezi hazırlanıyor…"));
  let ekran;
  if(view==="us") ekran=h(Us,{d,ac:setModal,hareketler,go,talepler,onTalep:(t)=>setModal({tip:"talep",t}),onMesaj:()=>setModal({tip:"mesaj"}),onTalepSil:talepSil});
  else if(view==="uretim") ekran=h(Uretim,{d,plan,makineler,ac:setModal,onTabla:tablaTopla});
  else if(view==="stok") ekran=h(Stok,{d,ac:setModal});
  else if(view==="ekip") ekran=h(Ekip,{d,ac:setModal});
  else ekran=h(RaporA,{d,hareketler,ekip:d.ekip,musteriler,kullanicilar,gkey,hedefler,onGorevKaydet:gorevKaydet,onGorevSil:gorevSil,odak:hedefOdak,onHakedisKaydet:hakedisKaydet});
  return h("div",null,
    veriHata?h("div",{style:{margin:"8px 12px 0",padding:"9px 13px",borderRadius:12,background:"#fff7ed",border:"1px solid #fdba74",fontSize:12,fontWeight:700,color:"#9a3412"}},
      "⚠️ Sunucu veri kotası dolu — kayıtlı önbellek gösteriliyor. Yarın otomatik düzelir."):null,
    ekran,
    h(Nav,{aktif:view,go}),
    silinen?h("div",{className:"fade",style:{position:"fixed",left:"50%",bottom:108,transform:"translateX(-50%)",zIndex:61,
      background:"#1b1e25",color:"#fff",padding:"11px 14px",borderRadius:14,fontSize:13,fontWeight:600,
      boxShadow:"0 12px 40px rgba(0,0,0,.28)",display:"flex",alignItems:"center",gap:12,maxWidth:"90%"}},
      h("span",{style:{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},"🗑 \""+(silinen.p.ad||"iş")+"\" silindi"),
      h("button",{onClick:silGeriAl,style:{flexShrink:0,padding:"7px 12px",borderRadius:10,background:"var(--cyan)",color:"#fff",fontSize:12.5,fontWeight:800}},"↩️ Geri al")):null,
    h(Toast,{msg:toastMsg}),
    modal&&modal.tip==="makine"&&h(MakineSheet,{m:modal.m,onClose:()=>setModal(null),
      onKaydet:()=>setModal({tip:"baskiKaydet",m:modal.m})}),
    modal&&modal.tip==="baskiKaydet"&&h(BaskiKaydetSheet,{m:modal.m,urunler,bekle:isBekle,onKaydet:baskiKaydet}),
    modal&&modal.tip==="is"&&h(IsSheet,{x:modal.x,onClose:()=>setModal(null),onBaslat:()=>isBaslat(modal.x),onSil:()=>isSil(modal.x),
      onDuzen:()=>setModal({tip:"isEkle",kayit:modal.x.p})}),
    modal&&modal.tip==="isEkle"&&h(IsEkleSheet,{makineler,urunler,plan,filamentler,bekle:isBekle,onKaydet:isKaydet,kayit:modal.kayit||null,pre:modal.pre||null}),
    modal&&modal.tip==="makineYonet"&&h(MakineYonetimSheet,{makineler,onClose:()=>setModal(null),onAc:setModal}),
    modal&&modal.tip==="makineDuzen"&&h(MakineDuzenSheet,{mk:modal.mk,bekle:isBekle,onKaydet:makineKaydet,onSil:makineSil}),
    modal&&modal.tip==="filamentYonet"&&h(FilamentYonetimSheet,{filamentler,onClose:()=>setModal(null),onAc:setModal}),
    modal&&modal.tip==="filamentDuzen"&&h(FilamentDuzenSheet,{fl:modal.fl,bekle:isBekle,onKaydet:filamentKaydet,onSil:filamentSil}),
    modal&&modal.tip==="ayar"&&h(AyarSheet,{ayar,bekle:isBekle,onKaydet:ayarKaydet}),
    modal&&modal.tip==="talep"&&h(TalepCevapSheet,{talep:modal.t,bekle:isBekle,onKaydet:talepCevap,onRota:talepRota}),
    modal&&modal.tip==="mesaj"&&h(KomutaMesajSheet,{ekip:d.ekip,bekle:isBekle,onKaydet:talepYaz}),
    modal&&modal.tip==="urunDuzen"&&h(UrunDuzenSheet,{u:modal.u,bekle:isBekle,onKaydet:urunKaydet}),
    modal&&modal.tip==="kullanici"&&h(KullaniciSheet,{u:modal.u,bekle:isBekle,onKaydet:kullaniciKaydet}),
    modal&&modal.tip==="ekip"&&h(EkipSheet,{e:modal.e,onClose:()=>setModal(null),onDuzen:()=>setModal({tip:"kullanici",u:modal.e.u})}),
    modal&&modal.tip==="stok"&&(()=>{ const s=(d.stok.find(x=>x.id===modal.u.id)||modal.u);
      return h(StokSheet,{u:s,kullanicilar,hareketler,onClose:()=>setModal(null),onDuzen:()=>setModal({tip:"urunDuzen",u:s}),
        onGecmis:(uu)=>setModal({tip:"stokGec",u:uu}),onKomut:stage=>setModal({tip:"stokKomut",cfg:uretimAksiyonlariCfg(s,stage),uid:s.id}),onParca:(p,v)=>uretimParcaAyarla(s,p,v),onMaliyet:(uu)=>setModal({tip:"maliyetGec",u:uu,uid:s.id})}); })(),
    modal&&modal.tip==="maliyetGec"&&h(MaliyetGecmisSheet,{u:modal.u,onClose:()=>setModal(modal.uid?{tip:"stok",u:{id:modal.uid}}:null)}),
    modal&&modal.tip==="stokKomut"&&h(StokKomutSheet,{cfg:modal.cfg,onClose:()=>setModal(modal.uid?{tip:"stok",u:{id:modal.uid}}:null)}),
    modal&&modal.tip==="stokAks"&&h(StokAksiyonSheet,{u:modal.u,tip:modal.aks,bekle:isBekle,onKaydet:stokAksiyon}),
    modal&&modal.tip==="stokGec"&&h(StokGecmisSheet,{u:modal.u,stokHareket,onClose:()=>setModal(null)}),
    modal&&modal.tip==="liste"&&h(DetayListSheet,{...modal.cfg,onClose:()=>setModal(null)}),
    h("button",{onClick:()=>{ if(confirm("Eski yönetim paneline / hesap değiştirmeye geç?")) location.href="index.html?giris=1"; },
      style:{display:"block",width:"100%",textAlign:"center",padding:"20px 0 6px",color:"var(--mut2)",fontSize:11}},
      "🧪 DENEME · asıl yönetim paneli eski sayfadadır · "+SURUM+" · asıl panele dön"));
}
ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
