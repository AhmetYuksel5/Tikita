// — eski panel ile ORTAK plan yardımcıları (birebir) —
async function planOtele(makineId,plan,oldStartMs,deltaMs,editedId){ if(!deltaMs) return;
  const ds=(plan||[]).filter(p=>p.makineId===makineId&&p.id!==editedId&&new Date(p.baslangic).getTime()>oldStartMs);
  for(const p of ds){ await save("plan",{id:p.id,baslangic:new Date(new Date(p.baslangic).getTime()+deltaMs).toISOString()}); } }
async function planKaydir(makineId,plan,edited){
  const arr=(plan||[]).filter(p=>p.makineId===makineId&&p.id!==edited.id)
    .map(p=>({id:p.id,s:new Date(p.baslangic).getTime(),dk:num(p.sureDk)}));
  arr.push({id:edited.id,s:edited.s,dk:edited.dk});
  arr.sort((a,b)=>a.s-b.s);
  let prevEnd=null;
  for(const j of arr){ let s2=j.s;
    if(prevEnd!=null&&s2<prevEnd) s2=prevEnd;
    if(s2!==j.s) await save("plan",{id:j.id,baslangic:new Date(s2).toISOString()});
    prevEnd=s2+j.dk*60000; } }

function yeniSalt(){ const a=new Uint8Array(8); crypto.getRandomValues(a); return Array.from(a).map(b=>b.toString(16).padStart(2,"0")).join(""); }
async function pinHashle(pin,salt){ const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode((salt||"")+":"+pin));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join(""); }
async function yeniKullaniciPin(pin){ const salt=yeniSalt(); return {pinSalt:salt,pinHash:await pinHashle(pin,salt)}; }

const tl=n=>Math.round(num(n)).toLocaleString("tr-TR")+" ₺";

const ASKER_TIER=[[0,1],[50,2],[100,3],[250,5],[1000,9]];
const SILAH_TIER=[[0,1],[500,2],[1000,3],[2500,5],[5000,9]];
const katOf=(t,v)=>{let r=t[0];for(const x of t)if(v>=x[0])r=x;return r;};
const fmtS=t=>{const d2=new Date(t);return isNaN(+d2)?"":d2.toLocaleDateString("tr-TR",{day:"2-digit",month:"short"})+" "+d2.toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"});};
const dkYaz=dk=>{ dk=Math.max(0,Math.round(dk)); const s2=Math.floor(dk/60),m2=dk%60; return s2>0?(s2+"s "+m2+"dk"):(m2+"dk"); };

// planların EFEKTİF başlangıcı — eski panel ile ORTAK kural (birebir):
// geciken başlamamış iş "şimdi"ye kayar; üzerinden başka iş başlatılmışsa (geride) sayılmaz
function planEffBas(plan,now){
  const m={}, byMak={};
  (plan||[]).forEach(p=>{ (byMak[p.makineId||"?"]=byMak[p.makineId||"?"]||[]).push(p); });
  Object.values(byMak).forEach(arr=>{
    arr.sort((a,b)=>new Date(a.baslangic)-new Date(b.baslangic));
    let sonBas=-Infinity;
    arr.forEach(p=>{ if(p.basladi){ const gs=new Date(p.gercekBaslangic||p.baslangic).getTime(); if(gs>sonBas) sonBas=gs; } });
    let cursor=-Infinity;
    arr.forEach(p=>{ const ps=new Date(p.baslangic).getTime(), dur=num(p.sureDk)*60000;
      const geride=!p.basladi && ps<sonBas;
      let s;
      if(p.basladi){ s=new Date(p.gercekBaslangic||p.baslangic).getTime(); }
      else if(geride) s=ps;
      else { s=Math.max(ps,cursor); if(ps<now) s=Math.max(now,cursor); }
      if(!geride) cursor=Math.max(cursor,s+dur);
      if(p.id) m[p.id]={s,geride};
    });
  });
  return m;
}

let VERI_HATA=false; const hataDinle=new Set();
function hataBildir(){ if(!VERI_HATA){ VERI_HATA=true; hataDinle.forEach(f=>f()); } }
function useVeriHata(){ const [,f]=useState(0); useEffect(()=>{ const g=()=>f(x=>x+1); hataDinle.add(g); return ()=>hataDinle.delete(g); },[]); return VERI_HATA; }
function useColl(name){ const [rows,setRows]=useState(null);
  useEffect(()=>{ const t=setTimeout(()=>setRows(r=>{ if(r===null){ hataBildir(); return []; } return r; }),9000);
    const un=onSnapshot(collection(db,name),s=>{clearTimeout(t);setRows(s.docs.map(d=>({id:d.id,...d.data()})));},
      e=>{console.error(name,e);clearTimeout(t);hataBildir();setRows(r=>r===null?[]:r);});
    return ()=>{clearTimeout(t);un();}; },[]);
  return rows; }

/* ————— komuta hesabı ————— */
function hesapA(plan,makineler,urunler,hareketler,kullanicilar,musteriler){
  const now=Date.now();
  const g0=(()=>{const t=new Date();t.setHours(0,0,0,0);return t.getTime();})();
  const haf=now-7*864e5;
  const T=x=>new Date(x.tarih).getTime()||0;
  const har=hareketler||[];
  // — bugün / hafta (tüm ekip) —
  const bugun={ciro:0,adet:0,tah:0,ger:0};
  const hafta={ciro:0,adet:0,tah:0,uPay:0,pPay:0,ger:0,kons:0};
  har.forEach(x=>{ const t=T(x);
    if(x.tip==="satis"){ const c=num(x.adet)*num(x.satisFiyat);
      if(t>=g0){ if(x.gerilla) bugun.ger+=num(x.tahsil)||c; else {bugun.ciro+=c;bugun.adet+=num(x.adet);} }
      if(t>=haf){ if(x.gerilla){hafta.ger+=num(x.tahsil)||c;} else {hafta.ciro+=c;hafta.adet+=num(x.adet);} } }
    else if(x.tip==="tahsilat"){ if(t>=g0) bugun.tah+=num(x.tutar);
      if(t>=haf){ hafta.tah+=num(x.tutar); hafta.uPay+=num(x.ureticiPay); hafta.pPay+=num(x.pazPay); } }
    else if(x.tip==="konsinye"&&t>=haf&&!x.gerilla) hafta.kons+=num(x.adet); });
  // — üretim: makine durumları —
  const makDurum=(makineler||[]).map(mk=>{
    const jobs=(plan||[]).filter(p=>p.makineId===mk.id);
    const basl=jobs.filter(p=>p.basladi).sort((a,b)=>new Date(b.gercekBaslangic||b.baslangic)-new Date(a.gercekBaslangic||a.baslangic));
    const son=basl[0]||null;
    const kuyruk=jobs.filter(p=>!p.basladi).sort((a,b)=>new Date(a.baslangic)-new Date(b.baslangic));
    let durum="bos",pct=0,kalanDk=0;
    if(son){ const bs=new Date(son.gercekBaslangic||son.baslangic).getTime(); const sure=num(son.sureDk)*60000;
      if(bs+sure>now){ durum="basiyor"; pct=Math.min(99,Math.round((now-bs)/sure*100)); kalanDk=(bs+sure-now)/60000; }
      else if(!son.tablaAlindi) durum="tabla";
    }
    return {mk,son,kuyruk,durum,pct,kalanDk};
  });
  const aktifBaski=makDurum.filter(m=>m.durum==="basiyor").length;
  const tablaBek=makDurum.filter(m=>m.durum==="tabla").length;
  // — ekip (pazarlamacılar) —
  const musById={}; (musteriler||[]).forEach(m=>musById[m.id]=m);
  const kk=x=>x.musteriId?("m:"+x.musteriId):("y:"+((x.yer||"?").toLocaleLowerCase("tr")));
  const ekip=(kullanicilar||[]).filter(u=>u.rol!=="admin"&&!u.demo&&(u.ad||"").trim()).map(u=>{
    const mine=har.filter(x=>(x.kullaniciId||"")===u.id);
    let bugunC=0,hafC=0,hafPay=0,alacak=0,sonT=0;
    const km={};
    mine.forEach(x=>{ const t=T(x); if(t>sonT&&["satis","tahsilat","konsinye","iade","stant","diplomasi"].includes(x.tip)) sonT=t;
      if(x.tip==="satis"){ const c=num(x.adet)*num(x.satisFiyat);
        if(t>=g0) bugunC+=(x.gerilla?(num(x.tahsil)||c):c);
        if(t>=haf){ hafC+=(x.gerilla?(num(x.tahsil)||c):c); hafPay+=num(x.adet)*(num(x.satisFiyat)-num(x.alisFiyat)); }
        if(!x.gerilla){ const bek=c; const th=x.tahsil==null?bek:num(x.tahsil); alacak+=Math.max(0,bek-th);
          const k=km[kk(x)]||(km[kk(x)]={s:0,c:0,ko:0,ad:(x.musteriId&&musById[x.musteriId]&&musById[x.musteriId].ad)||x.yer||"?"});
          k.s+=num(x.adet); k.c+=c; } }
      else if(x.tip==="konsinye"&&!x.gerilla){ const k=km[kk(x)]||(km[kk(x)]={s:0,c:0,ko:0,ad:(x.musteriId&&musById[x.musteriId]&&musById[x.musteriId].ad)||x.yer||"?"}); k.ko+=num(x.adet); } });
    let guc=0; Object.values(km).forEach(k=>{ const silah=Math.floor(k.c/250);
      guc+=Math.round(k.s*katOf(ASKER_TIER,k.s)[1]+k.ko+silah*katOf(SILAH_TIER,k.c)[1]); });
    const kaleler=Object.values(km).map(k=>({ad:k.ad,ciro:k.c,satis:k.s})).sort((a,b)=>b.ciro-a.ciro);
    return {u,bugunC,hafC,hafPay,alacak,guc,rutbe:katOf(KOMUTAN,guc),kaleSay:kaleler.length,kaleler,sonT,mine};
  }).sort((a,b)=>b.guc-a.guc);
  const alacakTop=ekip.reduce((s,e)=>s+e.alacak,0);
  // — stok —
  const sahadaU={}; har.forEach(x=>{ if(x.tip==="konsinye"&&num(x.kalan)>0){ const id=x.urunId||("a:"+(x.urunAd||"?")); sahadaU[id]=(sahadaU[id]||0)+num(x.kalan); } });
  const stok=(urunler||[]).filter(u=>(u.ad||"").trim()).map(u=>{
    const canta=Object.values(u.pazStokK||{}).reduce((s,v)=>s+num(v),0);
    return {id:u.id,ad:u.ad,stokta:num(u.stokta),canta,sahada:num(sahadaU[u.id])+num(sahadaU["a:"+u.ad]),fiyat:num(u.satisFiyat),alis:num(u.pazFiyat),pazStokK:u.pazStokK||{}};
  }).sort((a,b)=>(b.canta+b.sahada)-(a.canta+a.sahada));
  const dusuk=stok.filter(u=>u.stokta<=3).sort((a,b)=>a.stokta-b.stokta);
  return {bugun,hafta,makDurum,aktifBaski,tablaBek,ekip,alacakTop,stok,dusuk};
}

/* ————— MAKİNE kartı ————— */
function MakineKart({m,onClick}){
  const renk=m.durum==="basiyor"?"var(--cyan)":m.durum==="tabla"?"var(--gold)":"var(--mut2)";

/* ————— GANTT — üretim takvimi (yeni konsept) ————— */
const G_PX=46;   // saat başına piksel
function ganttRenk(durum){
  if(durum==="bitti")   return {bg:"#16a34a16",bd:"1px solid #16a34a55",tx:"#166534"};
  if(durum==="basiyor") return {bg:"linear-gradient(90deg,#38bdf8,#0e8fce)",bd:"1px solid #0e8fce",tx:"#fff"};
  if(durum==="geride")  return {bg:"#e0483c10",bd:"1.5px dashed #e0483c88",tx:"#b91c1c"};
  if(durum==="gecikti") return {bg:"#fff7ed",bd:"1px solid #fdba74",tx:"#9a3412"};
  return {bg:"var(--surf2)",bd:"1px solid var(--line)",tx:"var(--txt)"};
}
function Gantt({plan,makineler,ac}){
  const [ofs,setOfs]=useState(0);   // 0 = bugün
  const now=Date.now();
  const eff=useMemo(()=>planEffBas(plan,now),[plan]);
  const g0=(()=>{const t=new Date();t.setHours(0,0,0,0);return t.getTime()+ofs*864e5;})();
  const g1=g0+864e5;
  const gunAd=new Date(g0).toLocaleDateString("tr-TR",{weekday:"long",day:"numeric",month:"long"});
  const W=24*G_PX;
  const makList=(makineler||[]).filter(mk=>(mk.ad||"").trim());
  const satirlar=makList.map(mk=>{
    const jobs=(plan||[]).filter(p=>p.makineId===mk.id).map(p=>{
      const e=eff[p.id]||{s:new Date(p.baslangic).getTime(),geride:false};
      const es=e.s, ee=es+num(p.sureDk)*60000;
      let durum;
      if(e.geride) durum="geride";
      else if(p.basladi&&ee<=now) durum="bitti";
      else if(p.basladi) durum="basiyor";
      else durum=(new Date(p.baslangic).getTime()<now)?"gecikti":"sirada";
      return {p,es,ee,durum,mkAd:mk.ad||"?"};
    }).filter(x=>x.ee>g0&&x.es<g1).sort((a,b)=>a.es-b.es);
    return {mk,jobs};
  });
  const bosGun=satirlar.every(r=>!r.jobs.length);
  const saatler=[0,4,8,12,16,20,24];
  return h("div",{className:"card",style:{padding:"14px 0 10px",overflow:"hidden"}},
    // gün gezgini
    h("div",{style:{display:"flex",alignItems:"center",gap:8,padding:"0 14px 12px"}},
      h("button",{onClick:()=>setOfs(o=>o-1),style:{width:34,height:34,borderRadius:10,background:"var(--surf2)",border:"1px solid var(--line)",fontSize:16,fontWeight:800}},"‹"),
      h("button",{onClick:()=>setOfs(0),style:{flex:1,textAlign:"center",fontSize:14,fontWeight:800,padding:"7px 0",borderRadius:10,
        background:ofs===0?"#0e8fce14":"transparent",color:ofs===0?"var(--cyan)":"var(--txt)"}},(ofs===0?"📅 Bugün · ":"")+gunAd),
      h("button",{onClick:()=>setOfs(o=>o+1),style:{width:34,height:34,borderRadius:10,background:"var(--surf2)",border:"1px solid var(--line)",fontSize:16,fontWeight:800}},"›"),
      h("button",{onClick:()=>ac({tip:"isEkle"}),title:"İş ekle",style:{width:34,height:34,borderRadius:10,background:"var(--cyan)",color:"#fff",fontSize:18,fontWeight:800,boxShadow:"0 4px 12px rgba(14,143,206,.35)"}},"+")),
    // gövde: sol makine adları + sağ kaydırmalı zaman rayları
    h("div",{style:{display:"flex"}},
      h("div",{style:{width:86,flexShrink:0,borderRight:"1px solid var(--line)"}},
        h("div",{style:{height:24}}),
        satirlar.map((r,i)=>h("div",{key:i,style:{height:52,display:"flex",alignItems:"center",padding:"0 8px"}},
          h("div",{style:{fontSize:11.5,fontWeight:800,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},"🖨️ "+(r.mk.ad||"?"))))),
      h("div",{style:{flex:1,overflowX:"auto"}},
        h("div",{style:{width:W,position:"relative"}},
          // saat cetveli
          h("div",{style:{height:24,position:"relative",borderBottom:"1px solid var(--line)"}},
            saatler.map(s2=>h("span",{key:s2,style:{position:"absolute",left:s2*G_PX+3,top:4,fontSize:9.5,fontWeight:700,color:"var(--mut2)"}},String(s2).padStart(2,"0")))),
          // dikey saat çizgileri
          saatler.slice(1,-1).map(s2=>h("div",{key:"g"+s2,style:{position:"absolute",top:24,bottom:0,left:s2*G_PX,width:1,background:"var(--line)",opacity:.6}})),
          // ŞİMDİ çizgisi
          (ofs===0&&now>g0&&now<g1)?h("div",{style:{position:"absolute",top:0,bottom:0,left:(now-g0)/3600e3*G_PX,width:2,background:"var(--red)",zIndex:5}},
            h("span",{style:{position:"absolute",top:1,left:-4,fontSize:9,color:"var(--red)"}},"▼")):null,
          // makine rayları
          satirlar.map((r,i)=>h("div",{key:i,style:{height:52,position:"relative",borderBottom:i<satirlar.length-1?"1px solid var(--line)":"none"}},
            r.jobs.map((x,j)=>{
              const L=Math.max(0,(Math.max(x.es,g0)-g0)/3600e3*G_PX);
              const Wd=Math.max(34,(Math.min(x.ee,g1)-Math.max(x.es,g0))/3600e3*G_PX-2);
              const c=ganttRenk(x.durum);
              const pct=x.durum==="basiyor"?Math.min(100,Math.round((now-x.es)/(x.ee-x.es)*100)):0;
              return h("button",{key:j,onClick:()=>ac({tip:"is",x}),
                style:{position:"absolute",left:L,top:8,height:36,width:Wd,borderRadius:10,background:c.bg,border:c.bd,
                  overflow:"hidden",textAlign:"left",padding:"3px 7px",zIndex:2}},
                x.durum==="basiyor"?h("div",{style:{position:"absolute",inset:0,width:pct+"%",background:"rgba(255,255,255,.22)"}}):null,
                h("div",{style:{fontSize:10.5,fontWeight:800,color:c.tx,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",position:"relative"}},x.p.ad||"iş"),
                h("div",{style:{fontSize:9,color:c.tx,opacity:.75,position:"relative"}},dkYaz(num(x.p.sureDk))+(num(x.p.adet)>1?(" · "+x.p.adet+" ad."):""))); })))))),
    bosGun?h("div",{style:{padding:"14px 16px 4px",textAlign:"center",fontSize:12.5,color:"var(--mut)"}},"Bu günde planlı iş yok."):null,
    // durum lejantı
    h("div",{style:{display:"flex",gap:10,flexWrap:"wrap",padding:"12px 14px 2px",fontSize:10.5,fontWeight:700,color:"var(--mut)"}},
      [["#0e8fce","basıyor"],["#16a34a","bitti"],["#a9adb6","sırada"],["#fdba74","gecikti → şimdiye kayar"],["#e0483c","geride (üzerinden geçildi)"]].map(([cc,ad],i)=>
        h("span",{key:i,style:{display:"inline-flex",alignItems:"center",gap:5}},
          h("span",{style:{width:10,height:10,borderRadius:3,background:cc,display:"inline-block"}}),ad))));
}

// ➕ İŞ EKLE — eski panelin IsModal kayıt şemasıyla birebir uyumlu yazar
function IsEkleSheet({makineler,urunler,plan,onKaydet,bekle,kayit}){
  const duzen=!!(kayit&&kayit.id);
  const makList=(makineler||[]).filter(mk=>(mk.ad||"").trim());
  const [makineId,setMakineId]=useState(duzen?(kayit.makineId||""):((makList[0]&&makList[0].id)||""));
  const urunListe=(urunler||[]).filter(u=>(u.ad||"").trim()).slice().sort((a,b)=>(a.ad||"").localeCompare(b.ad||"","tr"));
  const [urunId,setUrunId]=useState(duzen?(kayit.urunId||""):"");
  const [serbest,setSerbest]=useState(duzen?!kayit.urunId:false);
  const [ad,setAd]=useState(duzen?(kayit.ad||""):"");
  const [parcaSec,setParcaSec]=useState(duzen?((kayit.parcaAdlar||[]).slice()):[]);   // boş ya da tümü = takım
  const [adet,setAdet]=useState(duzen?(num(kayit.adet)||1):1);
  const [sure,setSure]=useState(duzen?String(num(kayit.sureDk)||""):"");
  const [gram,setGram]=useState(duzen?(kayit.gram?String(kayit.gram):""):"");
  const toLoc=ms=>{const d2=new Date(ms); d2.setMinutes(d2.getMinutes()-d2.getTimezoneOffset()); return d2.toISOString().slice(0,16);};
  // varsayılan başlangıç: seçili makinenin kuyruk sonu (efektif) — 5 dk'ya yuvarlanır
  const kuyrukSonu=mid=>{ const now=Date.now(); const eff=planEffBas(plan,now); let son=now;
    (plan||[]).forEach(p2=>{ if(p2.makineId!==mid) return; const e=eff[p2.id]; if(!e||e.geride) return;
      const bit=e.s+num(p2.sureDk)*60000; if(bit>son) son=bit; });
    return Math.ceil(son/300000)*300000; };
  const [bas,setBas]=useState(()=>duzen?toLoc(new Date(kayit.baslangic).getTime()):toLoc(kuyrukSonu((makList[0]&&makList[0].id)||"")));

    h("div",{style:{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:14}},
      h("div",{style:{fontSize:24,fontWeight:800}},"📦 Stok"),
      h("div",{style:{fontSize:13,color:"var(--mut)",fontWeight:600}},d.stok.length+" ürün")),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
      d.stok.map((u,i)=>h("button",{key:i,onClick:()=>ac({tip:"stok",u}),className:"card",style:{padding:"14px 13px",textAlign:"left",position:"relative",overflow:"hidden"}},
        u.stokta<=3?h("span",{style:{position:"absolute",top:10,right:10,fontSize:10,fontWeight:800,color:"var(--red)",background:"#e0483c14",padding:"2px 7px",borderRadius:7}},"⚠️ az"):null,
        h("div",{style:{fontSize:24,marginBottom:6}},"📦"),
        h("div",{style:{fontSize:14,fontWeight:800,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},u.ad),
        h("div",{style:{fontSize:11,color:"var(--mut)",marginTop:6,lineHeight:1.6}},
          "🏭 "+u.stokta+" · 🎒 "+u.canta+" · 🏬 "+u.sahada,h("br"),
          h("span",{style:{color:"var(--green)",fontWeight:700}},tl(u.fiyat)),
          h("span",{style:{color:"var(--mut2)"}}," / alış "+tl(u.alis)))))));
}
function Ekip({d,ac}){
  return h("div",{style:{padding:"calc(env(safe-area-inset-top,0px) + 16px) 16px 0"}},
    h("div",{style:{fontSize:24,fontWeight:800,marginBottom:14}},"🎖️ Ekip"),
    h("button",{onClick:()=>ac({tip:"kullanici",u:null}),style:{width:"100%",padding:12,borderRadius:14,marginBottom:12,
      background:"var(--surf)",border:"1.5px dashed var(--cyan)",color:"var(--cyan)",fontSize:14,fontWeight:800}},"➕ Yeni kullanıcı ekle"),
    h("div",{style:{display:"grid",gap:8}},
      d.ekip.map((e,i)=>h(EkipSatir,{key:i,e,onClick:()=>ac({tip:"ekip",e})}))));
}
function RaporA({d,hareketler,ekip}){
  const [kod,setKod]=useState("hafta");
  const [kisi,setKisi]=useState("");
  const [det,setDet]=useState(null);
  const donemler=[["bugun","Bugün"],["hafta","Bu hafta"],["ay","Bu ay"],["30","30 gün"]];
  const b0=(()=>{const g=new Date();g.setHours(0,0,0,0);
    if(kod==="bugun") return g.getTime();
    if(kod==="hafta"){const d2=new Date(g);d2.setDate(d2.getDate()-((d2.getDay()+6)%7));return d2.getTime();}
    if(kod==="ay") return new Date(g.getFullYear(),g.getMonth(),1).getTime();
    return Date.now()-30*864e5;})();
  const R=(hareketler||[]).filter(x=>new Date(x.tarih).getTime()>=b0&&(!kisi||(x.kullaniciId||"")===kisi));
  let ciro=0,adet=0,tah=0,uPay=0,pPay=0,ger=0,marj=0;
  R.forEach(x=>{ if(x.tip==="satis"){ const c=num(x.adet)*num(x.satisFiyat);
      if(x.gerilla) ger+=num(x.tahsil)||c; else {ciro+=c;adet+=num(x.adet);}
      marj+=num(x.adet)*(num(x.satisFiyat)-num(x.alisFiyat)); }
    else if(x.tip==="tahsilat"){ tah+=num(x.tutar); uPay+=num(x.ureticiPay); pPay+=num(x.pazPay); } });
  const kisiT={}; R.forEach(x=>{ if(x.tip!=="satis")return; const id=x.kullaniciId||"?";
    const o=kisiT[id]||(kisiT[id]={ad:x.kullaniciAd||"?",c:0}); o.c+=num(x.adet)*num(x.satisFiyat); });
  const kisiler=Object.values(kisiT).sort((a,b)=>b.c-a.c);
  const paylas=()=>{ const t="📊 Tikita Komuta — "+new Date().toLocaleDateString("tr-TR")+"\n"
    +"Dönem: "+(donemler.find(x=>x[0]===kod)||["",""])[1]+(kisi?(" · "+((ekip.find(e=>e.u.id===kisi)||{u:{}}).u.ad||"")):"")+"\n"
    +"💰 Kale ciro: "+tl(ciro)+" ("+adet+" ad.) · ⚡ gerilla: "+tl(ger)+"\n"
    +"🧾 Tahsilat: "+tl(tah)+" · 🏭 üretici: "+tl(uPay)+" · 🫰 paz: "+tl(pPay)+"\n"
    +"📈 Toplam marj: "+tl(marj);
    window.open("https://wa.me/?text="+encodeURIComponent(t),"_blank"); };
  return h("div",{style:{padding:"calc(env(safe-area-inset-top,0px) + 16px) 16px 0"}},
    h("div",{style:{fontSize:24,fontWeight:800,marginBottom:14}},"📊 Rapor"),
    h("div",{style:{display:"flex",gap:8,overflowX:"auto",paddingBottom:10}},
      donemler.map(([k2,lbl])=>h(Chip,{key:k2,on:kod===k2,onClick:()=>setKod(k2)},lbl))),
    h("div",{style:{display:"flex",gap:8,overflowX:"auto",paddingBottom:12}},
      h(Chip,{on:!kisi,onClick:()=>setKisi("")},"Tüm ekip"),
      (ekip||[]).map(e=>h(Chip,{key:e.u.id,on:kisi===e.u.id,onClick:()=>setKisi(e.u.id)},(e.u.simge||"")+" "+e.u.ad))),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}},
      h(Stat,{ik:"💰",v:tl(ciro),l:adet+" adet kale satışı ›",renk:"var(--green)",
        onClick:()=>setDet({ik:"💰",hex:"#16a34a",baslik:"Kale satışları",
          rows:R.filter(x=>x.tip==="satis"&&!x.gerilla).sort((a,b)=>new Date(b.tarih)-new Date(a.tarih))
            .map(x=>({t:num(x.adet)+" × "+(x.urunAd||"?"),alt:(x.kullaniciAd||"?")+" · "+(x.yer||"—")+" · "+fmtS(x.tarih),v:tl(num(x.adet)*num(x.satisFiyat)),renk:"var(--green)"}))})}),
      h(Stat,{ik:"⚡",v:tl(ger),l:"gerilla (peşin) ›",renk:"var(--cyan)",
        onClick:()=>setDet({ik:"⚡",hex:"#0e8fce",baslik:"Gerilla satışları",
          rows:R.filter(x=>x.tip==="satis"&&x.gerilla).sort((a,b)=>new Date(b.tarih)-new Date(a.tarih))
            .map(x=>({t:num(x.adet)+" × "+(x.urunAd||"?")+(x.toptan?" 📦":""),alt:(x.kullaniciAd||"?")+" · "+(x.yer||"—")+" · "+fmtS(x.tarih),v:tl(num(x.tahsil)||num(x.adet)*num(x.satisFiyat)),renk:"var(--cyan)"}))})}),
      h(Stat,{ik:"🧾",v:tl(tah),l:"tahsil edilen ›",renk:"var(--gold)",
        onClick:()=>setDet({ik:"🧾",hex:"#d97b12",baslik:"Tahsilatlar",
          rows:R.filter(x=>x.tip==="tahsilat").sort((a,b)=>new Date(b.tarih)-new Date(a.tarih))
            .map(x=>({t:tl(x.tutar)+" tahsilat",alt:(x.kullaniciAd||"?")+" · "+(x.yer||"—")+" · "+fmtS(x.tarih),v:"🏭 "+tl(x.ureticiPay)+" · 🫰 "+tl(x.pazPay),renk:"var(--gold)"}))})}),
      h(Stat,{ik:"🏭",v:tl(uPay),l:"üreticiye giden ›",renk:"var(--txt)",
        onClick:()=>setDet({ik:"🏭",hex:"#1e3a5f",baslik:"Üretici payları",
          rows:R.filter(x=>x.tip==="tahsilat"&&num(x.ureticiPay)>0).sort((a,b)=>new Date(b.tarih)-new Date(a.tarih))
            .map(x=>({t:tl(x.tutar)+" tahsilat",alt:(x.kullaniciAd||"?")+" · "+(x.yer||"—")+" · "+fmtS(x.tarih),v:"→ "+tl(x.ureticiPay),renk:"var(--txt)"}))})}),
      h(Stat,{ik:"🫰",v:tl(pPay),l:"pazarlamacılara giden ›",renk:"var(--gold)",
        onClick:()=>setDet({ik:"🫰",hex:"#d97b12",baslik:"Pazarlamacı payları",
          rows:R.filter(x=>x.tip==="tahsilat"&&num(x.pazPay)>0).sort((a,b)=>new Date(b.tarih)-new Date(a.tarih))
            .map(x=>({t:tl(x.tutar)+" tahsilat",alt:(x.kullaniciAd||"?")+" · "+(x.yer||"—")+" · "+fmtS(x.tarih),v:"→ "+tl(x.pazPay),renk:"var(--gold)"}))})}),
      h(Stat,{ik:"📈",v:tl(marj),l:"toplam marj (satış−alış) ›",renk:"var(--violet)",
        onClick:()=>setDet({ik:"📈",hex:"#7c46e6",baslik:"Marj — satış satış",
          rows:R.filter(x=>x.tip==="satis").sort((a,b)=>new Date(b.tarih)-new Date(a.tarih))
            .map(x=>({t:num(x.adet)+" × "+(x.urunAd||"?")+(x.gerilla?" ⚡":""),alt:tl(num(x.adet)*num(x.satisFiyat))+" satış − "+tl(num(x.adet)*num(x.alisFiyat))+" alış · "+(x.kullaniciAd||"?"),v:"+"+tl(num(x.adet)*(num(x.satisFiyat)-num(x.alisFiyat))),renk:"var(--violet)"}))})})),
    det?h(DetayListSheet,{...det,onClose:()=>setDet(null)}):null,
    kisiler.length>1?h("div",{className:"card",style:{padding:"12px 16px",marginBottom:12,boxShadow:"none"}},
      h("div",{className:"lbl",style:{marginBottom:6}},"Kişi bazında ciro"),
      kisiler.map((k,i)=>h("div",{key:i,style:{display:"flex",justifyContent:"space-between",padding:"7px 0",borderTop:i?"1px solid var(--line)":"none",fontSize:13.5}},
        h("span",null,k.ad),h("span",{style:{fontWeight:800,color:"var(--green)"}},tl(k.c))))):null,
    h("button",{onClick:paylas,style:{width:"100%",padding:14,borderRadius:16,background:"#16a34a",fontSize:14.5,fontWeight:800,color:"#fff",boxShadow:"0 8px 20px rgba(22,163,74,.25)"}},"📲 WhatsApp'tan paylaş"));
}

/* ————— NAV + APP ————— */
function Nav({aktif,go}){ const items=[["us","🏭","Komuta"],["uretim","🖨️","Üretim"],["stok","📦","Stok"],["ekip","🎖️","Ekip"],["rapor","📊","Rapor"]];
  return h("div",{style:{position:"fixed",bottom:0,left:0,right:0,zIndex:40}},
    h("div",{style:{maxWidth:520,margin:"0 auto",background:"rgba(255,255,255,.9)",backdropFilter:"blur(14px)",borderTop:"1px solid var(--line)",
      display:"grid",gridTemplateColumns:"repeat(5,1fr)",padding:"7px 6px calc(env(safe-area-inset-bottom,0px) + 7px)"}},
      items.map(([k,ik,ad])=>{const on=aktif===k;
        return h("button",{key:k,onClick:()=>go(k),style:{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"5px 0",color:on?"var(--cyan)":"var(--mut2)"}},
          h("span",{style:{fontSize:21,opacity:on?1:.7,transform:on?"scale(1.08)":"none",transition:"transform .2s"}},ik),
          h("span",{style:{fontSize:10.5,fontWeight:on?800:600}},ad),
          h("span",{style:{width:5,height:5,borderRadius:5,background:on?"var(--cyan)":"transparent",marginTop:1}}))})));
}
function App(){
  const plan=useColl("plan"), makineler=useColl("makineler"), urunler=useColl("stok_urun"),
        hareketler=useColl("pazarlama_hareket"), kullanicilar=useColl("kullanici"), musteriler=useColl("musteri");
  const [view,setView]=useState(()=>{ try{ return sessionStorage.getItem("tk_adm_view")||"us"; }catch(e){ return "us"; } });
  useEffect(()=>{ try{ sessionStorage.setItem("tk_adm_view",view); }catch(e){} },[view]);
  const [modal,setModal]=useState(null); const [toastMsg,setToastMsg]=useState("");
  const say=m=>{ setToastMsg(m); clearTimeout(window.__t); window.__t=setTimeout(()=>setToastMsg(""),2200); };
  const veriHata=useVeriHata();
  const yuk=[plan,makineler,urunler,hareketler,kullanicilar,musteriler].some(x=>x===null);
  const d=useMemo(()=>yuk?null:hesapA(plan,makineler,urunler,hareketler,kullanicilar,musteriler),[plan,makineler,urunler,hareketler,kullanicilar,musteriler,yuk]);
  const go=v=>{ setModal(null); setView(v); window.scrollTo(0,0); };
  const [isBekle,setIsBekle]=useState(false);
  async function isKaydet(p2){ if(p2===null){ setModal(null); return; } if(isBekle) return; setIsBekle(true);
    try{ const eski=p2._eski; const {_eski,...kayit}=p2;
      const id=await save("plan",kayit);
      if(eski){ // eski panel kuralı: aynı makinede süre/başlangıç değişti → sonrakileri delta kadar ötele; makine değişti → çakışmasız diz
        const sMs=new Date(kayit.baslangic).getTime();
        if(eski.makineId===kayit.makineId){
          const eskiBas=new Date(eski.baslangic).getTime();
          const delta=(sMs+num(kayit.sureDk)*60000)-(eskiBas+num(eski.sureDk)*60000);
          await planOtele(kayit.makineId,plan,eskiBas,delta,id);
        } else await planKaydir(kayit.makineId,plan,{id,s:sMs,dk:num(kayit.sureDk)});
      }
      setModal(null); say((eski?"💾 Kaydedildi":"➕ İş planlandı")+" · "+kayit.ad); }
    catch(e){ console.error(e); say("⚠ Planlanamadı — tekrar dene"); } finally{ setIsBekle(false); } }
  async function urunKaydet(p2){ if(p2===null){ setModal(null); return; } if(isBekle) return; setIsBekle(true);
    try{ const id=await save("stok_urun",{...(p2.id?{id:p2.id}:{}),ad:p2.ad,satisFiyat:p2.satisFiyat,pazFiyat:p2.pazFiyat,stokta:p2.stokta,parcalar:p2.parcalar});
      const delta=p2.stokta-(p2._eskiStok||0);
      if(delta) await stokLogla({id,ad:p2.ad},delta,"elle");   // elle düzeltme logu — eski panel uyumu
      setModal(null); say((p2.id?"💾 Güncellendi":"➕ Ürün eklendi")+" · "+p2.ad); }
    catch(e){ console.error(e); say("⚠ Kaydedilemedi"); } finally{ setIsBekle(false); } }
  async function kullaniciKaydet(p2){ if(p2===null){ setModal(null); return; } if(isBekle) return; setIsBekle(true);
    try{ const ekPin=p2.pin?await yeniKullaniciPin(p2.pin):{};
      await save("kullanici",{...(p2.id?{id:p2.id}:{}),ad:p2.ad,rol:p2.rol,simge:p2.simge,renkH:adRenk(p2.ad).H,...ekPin});
      setModal(null); say((p2.id?"💾 Güncellendi":"➕ Kullanıcı eklendi")+" · "+p2.ad); }
    catch(e){ console.error(e); say("⚠ Kaydedilemedi"); } finally{ setIsBekle(false); } }
  async function isBaslat(x){ if(!confirm("▶️ "+(x.p.ad||"iş")+" ŞİMDİ başlatılsın mı?\n"+x.mkAd)) return;
    try{ await save("plan",{id:x.p.id,basladi:true,gercekBaslangic:new Date().toISOString()}); setModal(null); say("▶️ Başladı · "+(x.p.ad||"iş")); }
    catch(e){ console.error(e); say("⚠ Başlatılamadı"); } }
  const [silinen,setSilinen]=useState(null); const silT=useRef(null);
  async function isSil(x){
    const msj=(x.p.basladi&&x.durum==="basiyor")
      ?("⚠ \""+(x.p.ad||"iş")+"\" ŞU AN BASILIYOR.\nİptal edilip plandan silinsin mi?")
      :("🗑 "+(x.p.ad||"iş")+" plandan silinsin mi?");
    if(!confirm(msj)) return;
    try{ const yedek={...x.p}; await remove("plan",x.p.id); setModal(null);
      setSilinen({p:yedek}); clearTimeout(silT.current); silT.current=setTimeout(()=>setSilinen(null),8000);   // 8 sn geri alınabilir
    }catch(e){ console.error(e); say("⚠ Silinemedi"); } }
  async function silGeriAl(){ if(!silinen) return;
    try{ await save("plan",{...silinen.p}); clearTimeout(silT.current); setSilinen(null); say("↩️ Geri alındı · "+(silinen.p.ad||"iş")); }
    catch(e){ console.error(e); say("⚠ Geri alınamadı"); } }
  // geri tuşu: modal → sekme → çıkış onayı
  const backRef=useRef({}); backRef.current={modal,view};
  useEffect(()=>{ history.pushState({tk:1},"");
    const onPop=()=>{ const s=backRef.current; let handled=true;
      if(s.modal) setModal(null);
      else if(s.view!=="us") setView("us");
      else handled=false;
      if(handled) history.pushState({tk:1},"");
      else { if(confirm("Komuta merkezinden çıkılsın mı?")) history.back(); else history.pushState({tk:1},""); } };
    window.addEventListener("popstate",onPop);
    return ()=>window.removeEventListener("popstate",onPop);
  },[]);
  if(yuk) return h("div",{style:{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}},
    h("div",{style:{width:44,height:44,borderRadius:"50%",border:"3px solid var(--line)",borderTopColor:"var(--cyan)",animation:"spin .8s linear infinite"}}),
    h("div",{style:{color:"var(--mut)",fontSize:14,fontWeight:600}},"Komuta merkezi hazırlanıyor…"));
  let ekran;
  if(view==="us") ekran=h(Us,{d,ac:setModal,hareketler,go});
  else if(view==="uretim") ekran=h(Uretim,{d,plan,makineler,ac:setModal});
  else if(view==="stok") ekran=h(Stok,{d,ac:setModal});
  else if(view==="ekip") ekran=h(Ekip,{d,ac:setModal});
  else ekran=h(RaporA,{d,hareketler,ekip:d.ekip});
  return h("div",null,
    veriHata?h("div",{style:{margin:"8px 12px 0",padding:"9px 13px",borderRadius:12,background:"#fff7ed",border:"1px solid #fdba74",fontSize:12,fontWeight:700,color:"#9a3412"}},
      "⚠️ Sunucu veri kotası dolu — kayıtlı önbellek gösteriliyor. Yarın otomatik düzelir."):null,
    ekran,
    h(Nav,{aktif:view,go}),
    silinen?h("div",{className:"fade",style:{position:"fixed",left:"50%",bottom:108,transform:"translateX(-50%)",zIndex:61,
      background:"#1b1e25",color:"#fff",padding:"11px 14px",borderRadius:14,fontSize:13,fontWeight:600,
      boxShadow:"0 12px 40px rgba(0,0,0,.28)",display:"flex",alignItems:"center",gap:12,maxWidth:"90%"}},
      h("span",{style:{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},"🗑 \""+(silinen.p.ad||"iş")+"\" silindi"),
      h("button",{onClick:silGeriAl,style:{flexShrink:0,padding:"7px 12px",borderRadius:10,background:"var(--cyan)",color:"#fff",fontSize:12.5,fontWeight:800}},"↩️ Geri al")):null,
    h(Toast,{msg:toastMsg}),
    modal&&modal.tip==="makine"&&h(MakineSheet,{m:modal.m,onClose:()=>setModal(null)}),
    modal&&modal.tip==="is"&&h(IsSheet,{x:modal.x,onClose:()=>setModal(null),onBaslat:()=>isBaslat(modal.x),onSil:()=>isSil(modal.x),
      onDuzen:()=>setModal({tip:"isEkle",kayit:modal.x.p})}),
    modal&&modal.tip==="isEkle"&&h(IsEkleSheet,{makineler,urunler,plan,bekle:isBekle,onKaydet:isKaydet,kayit:modal.kayit||null}),
    modal&&modal.tip==="urunDuzen"&&h(UrunDuzenSheet,{u:modal.u,bekle:isBekle,onKaydet:urunKaydet}),
    modal&&modal.tip==="kullanici"&&h(KullaniciSheet,{u:modal.u,bekle:isBekle,onKaydet:kullaniciKaydet}),
    modal&&modal.tip==="ekip"&&h(EkipSheet,{e:modal.e,onClose:()=>setModal(null),onDuzen:()=>setModal({tip:"kullanici",u:modal.e.u})}),
    modal&&modal.tip==="stok"&&h(StokSheet,{u:modal.u,kullanicilar,hareketler,onClose:()=>setModal(null),onDuzen:()=>setModal({tip:"urunDuzen",u:modal.u})}),
    modal&&modal.tip==="liste"&&h(DetayListSheet,{...modal.cfg,onClose:()=>setModal(null)}),
    h("button",{onClick:()=>{ if(confirm("Eski yönetim paneline / hesap değiştirmeye geç?")) location.href="index.html?giris=1"; },
      style:{display:"block",width:"100%",textAlign:"center",padding:"20px 0 6px",color:"var(--mut2)",fontSize:11}},
      "🧪 DENEME · asıl yönetim paneli eski sayfadadır · "+SURUM+" · asıl panele dön"));
}
ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
