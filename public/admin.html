async function planOtele(makineId,plan,oldStartMs,deltaMs,editedId){ if(!deltaMs) return;
  const ds=(plan||[]).filter(p=>p.makineId===makineId&&p.id!==editedId&&new Date(p.baslangic).getTime()>oldStartMs);
  for(const p of ds){ await save("plan",{id:p.id,baslangic:new Date(new Date(p.baslangic).getTime()+deltaMs).toISOString()}); } }
async function planKaydir(makineId,plan,edited){
  const arr=(plan||[]).filter(p=>p.makineId===makineId&&p.id!==edited.id)
    .map(p=>({id:p.id,s:new Date(p.baslangic).getTime(),dk:num(p.sureDk)}));
  arr.push({id:edited.id,s:edited.s,dk:edited.dk});
  arr.sort((a,b)=>a.s-b.s);
  let prevEnd=null;
  for(const j of arr){ let s2=j.s;
    if(prevEnd!=null&&s2<prevEnd) s2=prevEnd;
    if(s2!==j.s) await save("plan",{id:j.id,baslangic:new Date(s2).toISOString()});
    prevEnd=s2+j.dk*60000; } }

const ZINCIR_RE=/(^|[^a-zçğıöşü])(bim|migros|a\s?-?101|şok|sok\s?market|carrefour(sa)?|file\b|macro\s?center|metro\s?(market|gross)|tespo|hakmar|onur\s?market|happy\s?center|ekomini|beğendik|kipa|tansaş|real\b|seç\s?market|dia\b|snowy|mopaş|pehlivanoğlu|çağrı\s?market|birmar|marketpaşa|ekomax|hopi)([^a-zçğıöşü]|$)/i;

async function kesifGoogle(merkezler, katlar, metre, key){
  const includedTypes=Array.from(new Set(katlar.flatMap(c=>c.gt||[])));
  const gor=new Set(), out=[];
  for(const m of merkezler){
    const body={ includedTypes, maxResultCount:20, rankPreference:"DISTANCE",
      locationRestriction:{ circle:{ center:{latitude:+m.lat,longitude:+m.lng}, radius:Math.min(50000,metre) } } };
    const r=await fetch("https://places.googleapis.com/v1/places:searchNearby",{method:"POST",
      headers:{"Content-Type":"application/json","X-Goog-Api-Key":key,
        "X-Goog-FieldMask":"places.id,places.displayName,places.location,places.types,places.rating,places.userRatingCount,places.nationalPhoneNumber"},
      body:JSON.stringify(body)});
    if(!r.ok){ let e=""; try{ e=(await r.json()).error.message; }catch(x){} throw new Error("Google "+r.status+(e?(" — "+e):"")); }
    const j=await r.json();
    (j.places||[]).forEach(p=>{ const ad=p.displayName&&p.displayName.text; if(!ad||!p.location) return;
      if(gor.has(p.id)) return; gor.add(p.id);
      const tel=(p.nationalPhoneNumber||"").replace(/[^0-9+]/g,"").replace(/^\+?90/,"0");
      out.push({ad, lat:p.location.latitude, lng:p.location.longitude, kat:kesifKatFromGTypes(p.types),
        tel, puanG:(p.rating!=null?p.rating:null), yorum:(p.userRatingCount!=null?num(p.userRatingCount):0)}); });
  }
  return out;
}
const kesifKatBul=t=>{ const s=t.shop||"", a=t.amenity||"";
  if(/^(convenience|supermarket|grocery|general)$/.test(s)) return "market";
  if(/^(alcohol|beverages)$/.test(s)) return "tekel";
  if(a==="cafe") return "kafe";
  if(s==="stationery") return "kirtasiye";
  if(/^(toys|gift)$/.test(s)) return "hediyelik";
  return "diger"; };
async function kesifOverpass(merkezler, katlar, metre){
  const govde=katlar.map(c=>merkezler.map(m=>"nwr"+c.q+"(around:"+metre+","+(+m.lat)+","+(+m.lng)+");").join("")).join("");
  const q="[out:json][timeout:25];("+govde+");out center 300;";
  const r=await fetch("https://overpass-api.de/api/interpreter",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:"data="+encodeURIComponent(q)});
  if(!r.ok) throw new Error("Overpass "+r.status);
  const j=await r.json(); const gor=new Set(), out=[];
  const telNorm=t=>{ let s=(t||"").replace(/[^0-9+]/g,""); if(!s) return ""; s=s.replace(/^\+?90/,"0"); if(s[0]!=="0"&&s.length===10) s="0"+s; return s; };
  (j.elements||[]).forEach(el=>{ const t=el.tags||{}; const ad=t.name; if(!ad) return;
    const la=el.lat!=null?el.lat:(el.center&&el.center.lat), lo=el.lon!=null?el.lon:(el.center&&el.center.lon);
    if(la==null||lo==null) return;
    const key=el.type+"/"+el.id; if(gor.has(key)) return; gor.add(key);
    const tel=telNorm(t.phone||t["contact:phone"]||t["contact:mobile"]||t.mobile||"");
    out.push({ad, lat:la, lng:lo, kat:kesifKatBul(t), tel}); });
  return out;
}
function haversineKm(aLat,aLng,bLat,bLng){ const R=6371, dLa=(bLat-aLat)*Math.PI/180, dLo=(bLng-aLng)*Math.PI/180,
  la1=aLat*Math.PI/180, la2=bLat*Math.PI/180;
  const s=Math.sin(dLa/2)**2 + Math.cos(la1)*Math.cos(la2)*Math.sin(dLo/2)**2;
  return 2*R*Math.asin(Math.min(1,Math.sqrt(s))); }
function pointInPoly(pt,poly){ const x=pt[1],y=pt[0]; let ic=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const xi=poly[i][1], yi=poly[i][0], xj=poly[j][1], yj=poly[j][0];
    if(((yi>y)!==(yj>y)) && (x < (xj-xi)*(y-yi)/(yj-yi)+xi)) ic=!ic; }
  return ic; }

// planların EFEKTİF başlangıcı — eski panel ile ORTAK kural (birebir):
// geciken başlamamış iş "şimdi"ye kayar; üzerinden başka iş başlatılmışsa (geride) sayılmaz
function planEffBas(plan,now){
  const m={}, byMak={};
  (plan||[]).forEach(p=>{ (byMak[p.makineId||"?"]=byMak[p.makineId||"?"]||[]).push(p); });
  Object.values(byMak).forEach(arr=>{
    arr.sort((a,b)=>new Date(a.baslangic)-new Date(b.baslangic));
    let sonBas=-Infinity;
    arr.forEach(p=>{ if(p.basladi){ const gs=new Date(p.gercekBaslangic||p.baslangic).getTime(); if(gs>sonBas) sonBas=gs; } });
    let cursor=-Infinity;
    arr.forEach(p=>{ const ps=new Date(p.baslangic).getTime(), dur=num(p.sureDk)*60000;
      const geride=!p.basladi && ps<sonBas;
      let s;
      if(p.basladi){ s=new Date(p.gercekBaslangic||p.baslangic).getTime(); }
      else if(geride) s=ps;
      else { s=Math.max(ps,cursor); if(ps<now) s=Math.max(now,cursor); }
      if(!geride) cursor=Math.max(cursor,s+dur);
      if(p.id) m[p.id]={s,geride};
    });
  });
  return m;
}

let VERI_HATA=false; const hataDinle=new Set();

function useVeriHata(){ const [,f]=useState(0); useEffect(()=>{ const g=()=>f(x=>x+1); hataDinle.add(g); return ()=>hataDinle.delete(g); },[]); return VERI_HATA; }
function useColl(name){ const [rows,setRows]=useState(null);

/* ————— komuta hesabı ————— */
const SAAT_MALIYET=12;   // ₺/saat makine maliyeti (eski panel ile aynı)
function hesapA(plan,makineler,urunler,hareketler,kullanicilar,musteriler,canliRows,filamentler){
  const adN=s2=>String(s2||"").toLocaleLowerCase("tr").trim();
  const now=Date.now();
  const g0=(()=>{const t=new Date();t.setHours(0,0,0,0);return t.getTime();})();
  const haf=now-7*864e5;
  const T=x=>new Date(x.tarih).getTime()||0;
  const har=hareketler||[];
  // — bugün / hafta (tüm ekip) —
  const bugun={ciro:0,adet:0,tah:0,ger:0};
  const hafta={ciro:0,adet:0,tah:0,uPay:0,pPay:0,ger:0,kons:0};
  har.forEach(x=>{ const t=T(x);
    if(x.tip==="satis"){ const c=num(x.adet)*num(x.satisFiyat);
      if(t>=g0){ if(x.gerilla) bugun.ger+=num(x.tahsil)||c; else {bugun.ciro+=c;bugun.adet+=num(x.adet);} }
      if(t>=haf){ if(x.gerilla){hafta.ger+=num(x.tahsil)||c;} else {hafta.ciro+=c;hafta.adet+=num(x.adet);} } }
    else if(x.tip==="tahsilat"){ if(t>=g0) bugun.tah+=num(x.tutar);
      if(t>=haf){ hafta.tah+=num(x.tutar); hafta.uPay+=num(x.ureticiPay); hafta.pPay+=num(x.pazPay); } }
    else if(x.tip==="konsinye"&&t>=haf&&!x.gerilla) hafta.kons+=num(x.adet); });
  // — üretim: makine durumları —
  const makDurum=(makineler||[]).map(mk=>{
    const jobs=(plan||[]).filter(p=>p.makineId===mk.id);
    const basl=jobs.filter(p=>p.basladi).sort((a,b)=>new Date(b.gercekBaslangic||b.baslangic)-new Date(a.gercekBaslangic||a.baslangic));
    const son=basl[0]||null;
    const kuyruk=jobs.filter(p=>!p.basladi).sort((a,b)=>new Date(a.baslangic)-new Date(b.baslangic));
    let durum="bos",pct=0,kalanDk=0;
    if(son){ const bs=new Date(son.gercekBaslangic||son.baslangic).getTime(); const sure=num(son.sureDk)*60000;
      if(bs+sure>now){ durum="basiyor"; pct=Math.min(99,Math.round((now-bs)/sure*100)); kalanDk=(bs+sure-now)/60000; }
      else if(!son.tablaAlindi) durum="tabla";
    }
    return {mk,son,kuyruk,durum,pct,kalanDk};
  });
  // 📡 köprüden gelen GERÇEK yazıcı durumu (bridge/bambu_kopru.py) — ada göre eşleşir
  { const canliMap={}; (canliRows||[]).forEach(r=>{ const taze=(now-new Date(r.guncelleme).getTime())<90000;
      canliMap[adN(r.makineAd)]={...r,taze}; });
    makDurum.forEach(m=>{ m.canli=canliMap[adN(m.mk.ad)]||null; }); }
  const aktifBaski=makDurum.filter(m=>m.durum==="basiyor").length;
  const tablaBek=makDurum.filter(m=>m.durum==="tabla").length;
  // — ekip (pazarlamacılar) —
  const musById={}; (musteriler||[]).forEach(m=>musById[m.id]=m);
  const kk=x=>x.musteriId?("m:"+x.musteriId):("y:"+((x.yer||"?").toLocaleLowerCase("tr")));
  const ekip=(kullanicilar||[]).filter(u=>u.rol!=="admin"&&!u.demo&&(u.ad||"").trim()).map(u=>{
    const mine=har.filter(x=>(x.kullaniciId||"")===u.id);
    let bugunC=0,hafC=0,hafPay=0,alacak=0,sonT=0;
    const km={};
    mine.forEach(x=>{ const t=T(x); if(t>sonT&&["satis","tahsilat","konsinye","iade","stant","diplomasi"].includes(x.tip)) sonT=t;
      if(x.tip==="satis"){ const c=num(x.adet)*num(x.satisFiyat);
        if(t>=g0) bugunC+=(x.gerilla?(num(x.tahsil)||c):c);
        if(t>=haf){ hafC+=(x.gerilla?(num(x.tahsil)||c):c); hafPay+=num(x.adet)*(num(x.satisFiyat)-num(x.alisFiyat)); }
        if(!x.gerilla){ const bek=c; const th=x.tahsil==null?bek:num(x.tahsil); alacak+=Math.max(0,bek-th);
          const k=km[kk(x)]||(km[kk(x)]={s:0,c:0,ko:0,ad:(x.musteriId&&musById[x.musteriId]&&musById[x.musteriId].ad)||x.yer||"?"});
          k.s+=num(x.adet); k.c+=c; } }
      else if(x.tip==="konsinye"&&!x.gerilla){ const k=km[kk(x)]||(km[kk(x)]={s:0,c:0,ko:0,ad:(x.musteriId&&musById[x.musteriId]&&musById[x.musteriId].ad)||x.yer||"?"}); k.ko+=num(x.adet); } });
    let guc=0; Object.values(km).forEach(k=>{ const silah=Math.floor(k.c/250);
      guc+=Math.round(k.s*katOf(ASKER_TIER,k.s)[1]+k.ko+silah*katOf(SILAH_TIER,k.c)[1]); });
    const kaleler=Object.values(km).map(k=>({ad:k.ad,ciro:k.c,satis:k.s})).sort((a,b)=>b.ciro-a.ciro);
    return {u,bugunC,hafC,hafPay,alacak,guc,rutbe:katOf(KOMUTAN,guc),kaleSay:kaleler.length,kaleler,sonT,mine};
  }).sort((a,b)=>b.guc-a.guc);
  const alacakTop=ekip.reduce((s,e)=>s+e.alacak,0);
  // — stok —
  const sahadaU={}; har.forEach(x=>{ if(x.tip==="konsinye"&&num(x.kalan)>0){ const id=x.urunId||("a:"+(x.urunAd||"?")); sahadaU[id]=(sahadaU[id]||0)+num(x.kalan); } });
  // otomatik maliyet + 🖨️ basımda (plan'dan) + bu hafta planlanan üretim
  const filById={}; (filamentler||[]).forEach(f=>filById[f.id]=f);
  const urunFiyat={}; (urunler||[]).forEach(u=>urunFiyat[u.id]=num(u.satisFiyat));
  const malMap={}, basMap={}; const hafSon=now+7*864e5; let planAdet=0,planDeger=0;
  (plan||[]).forEach(p=>{ if(!num(p.adet)) return;
    if(p.urunId){ const fl=filById[p.filamentId]; const kg=fl?num(fl.kgFiyat):0;
      const birim=(num(p.sureDk)/60*SAAT_MALIYET+num(p.gram)/1000*kg)/num(p.adet);
      const o=malMap[p.urunId]||(malMap[p.urunId]={t:0,a:0}); o.t+=birim*num(p.adet); o.a+=num(p.adet); }
    if(p.basladi){ const bs=new Date(p.gercekBaslangic||p.baslangic).getTime(); if(bs+num(p.sureDk)*60000>now&&p.urunId) basMap[p.urunId]=(basMap[p.urunId]||0)+num(p.adet); }
    else { const bs=new Date(p.baslangic).getTime(); if(bs<hafSon){ planAdet+=num(p.adet); planDeger+=num(p.adet)*(urunFiyat[p.urunId]||0); } } });
  const stok=(urunler||[]).filter(u=>(u.ad||"").trim()).map(u=>{
    const canta=Object.values(u.pazStokK||{}).reduce((s,v)=>s+num(v),0);
    const mo=malMap[u.id]; const maliyet=num(u.maliyet)>0?num(u.maliyet):(mo&&mo.a?mo.t/mo.a:0);
    return {id:u.id,ad:u.ad,stokta:num(u.stokta),canta,sahada:num(sahadaU[u.id])+num(sahadaU["a:"+u.ad]),fiyat:num(u.satisFiyat),alis:num(u.pazFiyat),
      maliyet,maliyetElle:num(u.maliyet)>0,basimda:num(basMap[u.id]),satildi:num(u.satildi),hediye:num(u.hediye),konsStok:num(u.konsinye),gram:num(u.gram),parcalar:u.parcalar||[],pazStokK:u.pazStokK||{},raw:u};
  }).sort((a,b)=>(a.ad||"").localeCompare(b.ad||"","tr"));
  const dusuk=stok.filter(u=>u.stokta<=3).sort((a,b)=>a.stokta-b.stokta);
  const stokDeger=stok.reduce((s,u)=>s+u.stokta*u.fiyat,0);
  return {bugun,hafta,makDurum,aktifBaski,tablaBek,ekip,alacakTop,stok,dusuk,stokDeger,planAdet,planDeger};
}

/* ————— BASKIYI KAYDET — canlı baskıdan otomatik doldur (adet/başlama/bitiş/gram) ————— */
function BaskiKaydetSheet({m,urunler,onKaydet,bekle}){
  const cl=m.canli||{};
  const now=Date.now();
  const pct=Math.max(0,Math.min(100,num(cl.pct))); const kalanDk=Math.max(0,num(cl.kalanDk));
  const total=(pct>0&&pct<100)?Math.round(kalanDk*100/(100-pct)):kalanDk;   // canlı yüzdeden toplam süre tahmini
  const elapsed=Math.max(0,total-kalanDk);
  const basMs0=now-elapsed*60000, bitMs0=now+kalanDk*60000;
  const raw=(cl.dosya||"").replace(/\.gcode\.3mf$/i,"").replace(/\.3mf$/i,"").trim();
  const mm=raw.match(/^(.*?)[\s_\-]*([0-9]+)\s*$/);   // "ürün sayı" → ad + adet
  const ad0=(mm?mm[1]:raw).trim(), adet0=mm?num(mm[2]):1;
  const urun0=(urunler||[]).find(u=>(u.ad||"").toLowerCase()===ad0.toLowerCase());
  const gram0=(urun0&&num(urun0.gram)>0)?String(num(urun0.gram)*(adet0||1)):"";
  const toLoc=ms=>{const d2=new Date(ms-new Date().getTimezoneOffset()*60000);return d2.toISOString().slice(0,16);};
  const [ad,setAd]=useState(ad0||"Baskı");
  const [adet,setAdet]=useState(String(adet0||1));
  const [bas,setBas]=useState(toLoc(basMs0));
  const [bit,setBit]=useState(toLoc(bitMs0));
  const [gram,setGram]=useState(gram0);
  const urun=(urunler||[]).find(u=>(u.ad||"").toLowerCase()===ad.trim().toLowerCase());
  const kaydet=()=>{ const bMs=new Date(bas).getTime(), eMs=new Date(bit).getTime();
    const sureDk=Math.max(1,Math.round((eMs-bMs)/60000));
    onKaydet({makineId:m.mk.id, ad:ad.trim()||"Baskı", adet:num(adet)||1, urunId:urun?urun.id:"",
      baslangic:new Date(bMs).toISOString(), sureDk, planSureDk:sureDk, gram:num(gram),
      basladi:true, gercekBaslangic:new Date(bMs).toISOString()}); };
  return h(Sheet,{ik:"📋",hex:"#0e8fce",baslik:"Baskıyı kaydet",alt:(m.mk.ad||"Makine")+" · canlıdan otomatik dolduruldu",
    onClose:()=>onKaydet(null),cta:bekle?"⏳…":"📋 İşlere kaydet",disabled:bekle,onCta:kaydet},
    cl.dosya?h("div",{style:{fontSize:11.5,color:"var(--mut)",marginBottom:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},"📄 "+cl.dosya+" · %"+pct):null,
    h("div",{className:"lbl",style:{marginBottom:8}},"Ürün"),
    h("input",{value:ad,onChange:e=>setAd(e.target.value),style:{...inp,marginBottom:4}}),
    h("div",{style:{fontSize:11,fontWeight:700,marginBottom:14,color:urun?"var(--green)":"var(--mut)"}},urun?("✓ ürünle eşleşti: "+urun.ad):"serbest kayıt (ürünle eşleşmedi)"),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}},
      h("div",null,h("div",{className:"lbl",style:{marginBottom:8}},"Adet"),
        h("input",{type:"number",inputMode:"numeric",value:adet,onChange:e=>setAdet(e.target.value),style:inp})),
      h("div",null,h("div",{className:"lbl",style:{marginBottom:8}},"⚖️ Gram (toplam)"),
        h("input",{type:"number",inputMode:"numeric",value:gram,onChange:e=>setGram(e.target.value),placeholder:"—",style:inp}))),
    h("div",{className:"lbl",style:{marginBottom:8}},"🚀 Başladı"),
    h("input",{type:"datetime-local",value:bas,onChange:e=>setBas(e.target.value),style:{...inp,marginBottom:14}}),
    h("div",{className:"lbl",style:{marginBottom:8}},"🏁 Bitecek"),
    h("input",{type:"datetime-local",value:bit,onChange:e=>setBit(e.target.value),style:{...inp,marginBottom:6}}),
    h("div",{style:{fontSize:11.5,color:"var(--mut)",lineHeight:1.5}},"Başlama, canlı yüzdeye göre tahmini; bitiş, kalan süreden. Gerekirse düzelt."));
}

// ➕ İŞ EKLE — eski panelin IsModal kayıt şemasıyla birebir uyumlu yazar
function IsEkleSheet({makineler,urunler,plan,filamentler,onKaydet,bekle,kayit,pre}){
  const duzen=!!(kayit&&kayit.id);
  const makList=(makineler||[]).filter(mk=>(mk.ad||"").trim());
  const [makineId,setMakineId]=useState(duzen?(kayit.makineId||""):((pre&&pre.makineId)||(makList[0]&&makList[0].id)||""));
  const urunListe=(urunler||[]).filter(u=>(u.ad||"").trim()).slice().sort((a,b)=>(a.ad||"").localeCompare(b.ad||"","tr"));
  const [urunId,setUrunId]=useState(duzen?(kayit.urunId||""):"");
  const [serbest,setSerbest]=useState(duzen?!kayit.urunId:false);
  const [ad,setAd]=useState(duzen?(kayit.ad||""):"");
  const [parcaSec,setParcaSec]=useState(duzen?((kayit.parcaAdlar||[]).slice()):[]);   // boş ya da tümü = takım
  const [adet,setAdet]=useState(duzen?(num(kayit.adet)||1):1);
  const [sure,setSure]=useState(duzen?String(num(kayit.sureDk)||""):"");
  const [gram,setGram]=useState(duzen?(kayit.gram?String(kayit.gram):""):"");
  const [filamentId,setFilamentId]=useState(duzen?(kayit.filamentId||""):"");
  const [ams,setAms]=useState(duzen?(kayit.ams!==false):true);
  const [nott,setNott]=useState(duzen?(kayit.not||""):"");
  const filSec=(filamentler||[]).find(f=>f.id===filamentId)||null;
  const maliyet=num(sure)/60*12+num(gram)/1000*(filSec?num(filSec.kgFiyat):0);   // 12 ₺/saat makine
  // önceki baskılar (tekrar için) — ad+adet+süreye göre tekilleştir
  const oncekiler=(()=>{ const seen=new Set(), out=[];
    (plan||[]).slice().sort((a,b)=>new Date(b.baslangic)-new Date(a.baslangic)).forEach(p=>{ if(!p.ad) return;
      const k=(p.ad||"")+"|"+num(p.adet)+"|"+num(p.sureDk); if(seen.has(k)) return; seen.add(k); if(out.length<10) out.push(p); }); return out; })();
  const toLoc=ms=>{const d2=new Date(ms); d2.setMinutes(d2.getMinutes()-d2.getTimezoneOffset()); return d2.toISOString().slice(0,16);};
  // varsayılan başlangıç: seçili makinenin kuyruk sonu (efektif) — 5 dk'ya yuvarlanır
  const kuyrukSonu=mid=>{ const now=Date.now(); const eff=planEffBas(plan,now); let son=now;
    (plan||[]).forEach(p2=>{ if(p2.makineId!==mid) return; const e=eff[p2.id]; if(!e||e.geride) return;
      const bit=e.s+num(p2.sureDk)*60000; if(bit>son) son=bit; });
    return Math.ceil(son/300000)*300000; };
  const [bas,setBas]=useState(()=>duzen?toLoc(new Date(kayit.baslangic).getTime()):toLoc((pre&&pre.baslangic)?new Date(pre.baslangic).getTime():kuyrukSonu((pre&&pre.makineId)||(makList[0]&&makList[0].id)||"")));
  const makSec=id=>{ setMakineId(id); setBas(toLoc(kuyrukSonu(id))); };
  const tekrarla=p=>{ const u=urunListe.find(x=>x.id===p.urunId); if(u){ setSerbest(false); setUrunId(u.id); } else { setSerbest(true); setAd(p.ad||""); setUrunId(""); }
    setParcaSec((p.parcaAdlar||[]).slice()); setAdet(num(p.adet)||1); setSure(String(num(p.sureDk)||"")); setGram(p.gram?String(p.gram):""); setFilamentId(p.filamentId||""); setAms(p.ams!==false); setNott(p.not||""); };
  const seciliUrun=urunListe.find(u=>u.id===urunId);
  const parcalar=(seciliUrun&&seciliUrun.parcalar)||[];
  const parcaToggle=pt=>setParcaSec(s=>s.includes(pt)?s.filter(x=>x!==pt):[...s,pt]);
  const isAd=serbest?ad.trim():((seciliUrun&&seciliUrun.ad)||"");
  const gecerli=!!makineId&&!!isAd&&num(sure)>0&&num(adet)>0&&bas;
  const onCta=()=>{ let pAdlar=[],pAd="";
    if(!serbest&&parcalar.length){ const arr=parcaSec.filter(x=>parcalar.includes(x));
      if(arr.length&&arr.length<parcalar.length){ pAdlar=arr; pAd=arr.length===1?arr[0]:""; } }
    onKaydet({ ...(duzen?{id:kayit.id,_eski:{makineId:kayit.makineId,baslangic:kayit.baslangic,sureDk:num(kayit.sureDk)}}:{}),
      makineId, ad:isAd, adet:num(adet), urunId:serbest?"":(urunId||""), parcaAd:pAd, parcaAdlar:pAdlar,
      baslangic:new Date(bas).toISOString(), sureDk:num(sure), planSureDk:num(sure), gram:num(gram),
      filamentId, ams, not:nott,
      basladi:duzen?!!kayit.basladi:false, gercekBaslangic:duzen?(kayit.gercekBaslangic||null):null }); };
  return h(Sheet,{ik:duzen?"✏️":"➕",hex:"#0e8fce",baslik:duzen?("Düzenle · "+(kayit.ad||"iş")):"İş planla",alt:"Gantt'a işlenir — eski panelle ortak plan",
    onClose:()=>onKaydet(null),cta:bekle?"⏳…":((duzen?"💾 Kaydet":"➕ Planla")+" · "+(bas?new Date(bas).toLocaleString("tr-TR",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}):"")),
    disabled:!gecerli||bekle,onCta},
    h("div",{className:"lbl",style:{marginBottom:8}},"🖨️ Makine"),
    h("div",{style:{display:"flex",gap:8,overflowX:"auto",paddingBottom:4,marginBottom:14}},
      makList.map(mk=>h(Chip,{key:mk.id,on:makineId===mk.id,onClick:()=>makSec(mk.id)},"🖨️ "+mk.ad))),
    (!duzen&&oncekiler.length)?h("div",{style:{marginBottom:14}},
      h("div",{className:"lbl",style:{marginBottom:8}},"🔁 Önceki baskıdan seç"),
      h("div",{style:{display:"flex",gap:8,overflowX:"auto",paddingBottom:4}},
        oncekiler.map((p,i)=>h("button",{key:i,onClick:()=>tekrarla(p),style:{flexShrink:0,padding:"8px 12px",borderRadius:11,background:"var(--surf2)",border:"1px solid var(--line)",fontSize:12.5,fontWeight:700,textAlign:"left"}},
          (num(p.adet)>1?(p.adet+"× "):"")+(p.ad||"iş"),h("span",{style:{color:"var(--mut2)",fontWeight:600}}," · "+dkYaz(num(p.sureDk))))))):null,
    h("div",{className:"lbl",style:{marginBottom:8}},"📦 Ne basılacak?"),
    h("div",{style:{display:"flex",gap:8,overflowX:"auto",paddingBottom:4,marginBottom:6}},
      urunListe.slice(0,20).map(u=>h(Chip,{key:u.id,on:!serbest&&urunId===u.id,onClick:()=>{setSerbest(false);setUrunId(u.id);setParcaSec([]);}},u.ad)),
      h(Chip,{on:serbest,onClick:()=>{setSerbest(true);setUrunId("");}},"✍️ Serbest")),
    serbest?h("input",{value:ad,onChange:e=>setAd(e.target.value),placeholder:"iş adı — örn. Özel sipariş",
      style:{...inp,fontSize:15,fontWeight:600,marginBottom:14}}):null,
    (!serbest&&parcalar.length)?h("div",{style:{marginBottom:14}},
      h("div",{style:{fontSize:11,color:"var(--mut)",margin:"4px 0 6px"}},"🧩 Bu tablada basılacak parçalar — hiçbiri/hepsi = takım"),
      h("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},
        parcalar.map(pt=>h(Chip,{key:pt,on:parcaSec.includes(pt),onClick:()=>parcaToggle(pt)},pt)))):null,
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:10}},
      h("div",null,h("div",{className:"lbl",style:{marginBottom:8}},"⏱ Süre (dk)"),
        h("input",{type:"number",inputMode:"numeric",value:sure,onChange:e=>setSure(e.target.value),style:inp})),
      h("div",null,h("div",{className:"lbl",style:{marginBottom:8}},"🔢 Adet"),
        h("input",{type:"number",inputMode:"numeric",value:adet||"",onChange:e=>setAdet(num(e.target.value)),style:inp}))),
    h("div",{style:{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}},
      [30,60,90,120,180,240].map(dk=>h(Chip,{key:dk,on:num(sure)===dk,onClick:()=>setSure(String(dk))},dkYaz(dk)))),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:10}},
      h("div",null,h("div",{className:"lbl",style:{marginBottom:8}},"⚖️ Gram (ops.)"),
        h("input",{type:"number",inputMode:"numeric",value:gram,onChange:e=>setGram(e.target.value),style:inp})),
      h("div",null,h("div",{className:"lbl",style:{marginBottom:8}},"📅 Başlangıç"),
        h("input",{type:"datetime-local",value:bas,onChange:e=>setBas(e.target.value),style:{...inp,padding:"12px 8px",fontSize:13}}))),
    h("button",{onClick:()=>setBas(toLoc(kuyrukSonu(makineId))),style:{width:"100%",padding:11,borderRadius:12,background:"var(--surf2)",border:"1px dashed var(--cyan)",color:"var(--cyan)",fontSize:12.5,fontWeight:800,marginBottom:14}},"⏱ Kuyruk sonuna yerleştir"),
    (filamentler&&filamentler.length)?h("div",{style:{marginBottom:12}},
      h("div",{className:"lbl",style:{marginBottom:8}},"🧵 Filament (ops.)"),
      h("div",{style:{display:"flex",gap:8,overflowX:"auto",paddingBottom:4}},
        h(Chip,{on:!filamentId,onClick:()=>setFilamentId("")},"—"),
        filamentler.map(fl=>h(Chip,{key:fl.id,on:filamentId===fl.id,onClick:()=>setFilamentId(fl.id)},"🧵 "+fl.ad)))):null,
    h("div",{style:{display:"flex",gap:8,marginBottom:12}},
      h(Chip,{on:ams,onClick:()=>setAms(true)},"🎨 AMS'li"),
      h(Chip,{on:!ams,onClick:()=>setAms(false)},"⚪ Tek renk")),
    h("input",{value:nott,onChange:e=>setNott(e.target.value),placeholder:"📝 Not (ops.)",style:{...inp,fontSize:14,fontWeight:600,marginBottom:12}}),
    num(sure)>0?h("div",{style:{fontSize:12,color:"var(--mut)",padding:"9px 12px",borderRadius:11,background:"var(--surf2)"}},
      "💵 Maliyet ~"+tl(maliyet)+(num(adet)>0?(" · birim ~"+tl(maliyet/num(adet))):"")+" (makine 12₺/sa"+(filSec?" + filament":"")+")"):null);
}

// sağa kaydır → 🗑 Sil çıkar
function SwipeSil({onSil,children}){
  const [dx,setDx]=useState(0); const [drag,setDrag]=useState(false); const st=useRef(0); const sw=useRef(false);
  const TS=e=>{ st.current=e.touches[0].clientX-dx; setDrag(true); };
  const TM=e=>{ let d=e.touches[0].clientX-st.current; setDx(Math.max(0,Math.min(88,d))); };
  const TE=()=>{ setDrag(false); if(Math.abs(dx)>8) sw.current=true; setDx(dx>44?80:0); };
  return h("div",{style:{position:"relative",overflow:"hidden",borderRadius:16}},
    h("button",{onClick:()=>{ sw.current=false; setDx(0); onSil(); },style:{position:"absolute",left:0,top:0,bottom:0,width:80,background:"#e0483c",color:"#fff",fontSize:13.5,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}},"🗑 Sil"),
    h("div",{onTouchStart:TS,onTouchMove:TM,onTouchEnd:TE,onClickCapture:e=>{ if(sw.current){ e.preventDefault(); e.stopPropagation(); sw.current=false; } },
      style:{position:"relative",transform:"translateX("+dx+"px)",transition:drag?"none":"transform .22s"}},children));
}
function Us({d,ac,hareketler,go,talepler,onTalep,onMesaj,onTalepSil}){
  const P="20px 16px 0";

  // her pazarlamacının SON hareketi (nerede/ne yaptı) + son adımları
  const sonHar={}, harByK={};

    const t=new Date(x.tarih).getTime()||0; if(!sonHar[id]||t>sonHar[id].t) sonHar[id]={t,x};
    (harByK[id]||(harByK[id]=[])).push(x); });
  Object.values(harByK).forEach(a=>a.sort((p,q)=>new Date(q.tarih)-new Date(p.tarih)));
  const harMetni=x=>x.tip==="satis"?((num(x.adet)||"")+"× "+(x.urunAd||"satış")+(x.gerilla?" ⚡":"")):x.tip==="tahsilat"?("tahsilat "+tl(x.tutar)):x.tip==="konsinye"?((num(x.adet)||"")+"× "+(x.urunAd||"?")+" konsinye"):x.tip==="iade"?((num(x.adet)||"")+"× "+(x.urunAd||"?")+" iade"):x.tip==="hediye"?((num(x.adet)||"")+"× "+(x.urunAd||"?")+" hediye"):x.tip==="stant"?"stant bırakıldı":x.tip==="diplomasi"?"ziyaret":x.tip;
  const harTutar=x=>x.tip==="tahsilat"?tl(x.tutar):x.tip==="satis"?tl(num(x.tahsil)||num(x.adet)*num(x.satisFiyat)):(num(x.adet)?(num(x.adet)+" ad"):"");
  const acikTalep=(talepler||[]).filter(t=>t.durum!=="kapandi").sort((a,b)=>new Date(b.tarih)-new Date(a.tarih));
  const enSonUretim=(()=>{ let b=null; d.makDurum.forEach(m=>{ if(m.son){ const t=new Date(m.son.gercekBaslangic||m.son.baslangic).getTime()||0; if(!b||t>b.t) b={t,m}; } }); return b; })();
  return h("div",null,
    h(Hud,{d,onBaski:()=>go("uretim"),onTabla:()=>go("uretim"),onCiro:()=>go("rapor")}),
    // 💬 TALEPLER — pazarlamacılardan gelen (öncelik, en üstte)
    acikTalep.length?h("div",{style:{padding:P}},
      h(SecBaslik,{no:"!",txt:"💬 PAZARLAMACI TALEPLERİ",ek:acikTalep.length+" açık"}),
      h("div",{style:{display:"grid",gap:8}},
        acikTalep.slice(0,8).map((t,i)=>h(SwipeSil,{key:i,onSil:()=>onTalepSil(t)},h("button",{onClick:()=>onTalep(t),className:"card",style:{display:"flex",gap:10,padding:"12px 14px",textAlign:"left",width:"100%",boxShadow:"none",border:"1px solid #fdba74",background:"#fffbf5"}},
          h("span",{style:{fontSize:20,flexShrink:0}},t.simge||"💬"),

    modal&&modal.tip==="is"&&h(IsSheet,{x:modal.x,onClose:()=>setModal(null),onBaslat:()=>isBaslat(modal.x),onSil:()=>isSil(modal.x),

    modal&&modal.tip==="isEkle"&&h(IsEkleSheet,{makineler,urunler,plan,filamentler,bekle:isBekle,onKaydet:isKaydet,kayit:modal.kayit||null,pre:modal.pre||null}),
    modal&&modal.tip==="makineYonet"&&h(MakineYonetimSheet,{makineler,onClose:()=>setModal(null),onAc:setModal}),
    modal&&modal.tip==="makineDuzen"&&h(MakineDuzenSheet,{mk:modal.mk,bekle:isBekle,onKaydet:makineKaydet,onSil:makineSil}),
    modal&&modal.tip==="filamentYonet"&&h(FilamentYonetimSheet,{filamentler,onClose:()=>setModal(null),onAc:setModal}),
    modal&&modal.tip==="filamentDuzen"&&h(FilamentDuzenSheet,{fl:modal.fl,bekle:isBekle,onKaydet:filamentKaydet,onSil:filamentSil}),
    modal&&modal.tip==="ayar"&&h(AyarSheet,{ayar,bekle:isBekle,onKaydet:ayarKaydet}),
    modal&&modal.tip==="talep"&&h(TalepCevapSheet,{talep:modal.t,bekle:isBekle,onKaydet:talepCevap,onRota:talepRota}),
    modal&&modal.tip==="mesaj"&&h(KomutaMesajSheet,{ekip:d.ekip,bekle:isBekle,onKaydet:talepYaz}),
    modal&&modal.tip==="urunDuzen"&&h(UrunDuzenSheet,{u:modal.u,bekle:isBekle,onKaydet:urunKaydet}),
    modal&&modal.tip==="kullanici"&&h(KullaniciSheet,{u:modal.u,bekle:isBekle,onKaydet:kullaniciKaydet}),
    modal&&modal.tip==="ekip"&&h(EkipSheet,{e:modal.e,onClose:()=>setModal(null),onDuzen:()=>setModal({tip:"kullanici",u:modal.e.u})}),
    modal&&modal.tip==="stok"&&h(StokSheet,{u:modal.u,kullanicilar,hareketler,onClose:()=>setModal(null),onDuzen:()=>setModal({tip:"urunDuzen",u:modal.u}),
      onAksiyon:(u,tip)=>setModal({tip:"stokAks",u,aks:tip}),onGecmis:(u)=>setModal({tip:"stokGec",u})}),
    modal&&modal.tip==="stokAks"&&h(StokAksiyonSheet,{u:modal.u,tip:modal.aks,bekle:isBekle,onKaydet:stokAksiyon}),
    modal&&modal.tip==="stokGec"&&h(StokGecmisSheet,{u:modal.u,stokHareket,onClose:()=>setModal(null)}),
    modal&&modal.tip==="liste"&&h(DetayListSheet,{...modal.cfg,onClose:()=>setModal(null)}),
    h("button",{onClick:()=>{ if(confirm("Eski yönetim paneline / hesap değiştirmeye geç?")) location.href="index.html?giris=1"; },
      style:{display:"block",width:"100%",textAlign:"center",padding:"20px 0 6px",color:"var(--mut2)",fontSize:11}},
      "🧪 DENEME · asıl yönetim paneli eski sayfadadır · "+SURUM+" · asıl panele dön"));
}
ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
