/* ---------- yardımcılar ---------- */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,8);
async function save(coll, obj){ const id=obj.id||uid(); const {id:_,...d}=obj; await setDoc(doc(db,coll,id),d,{merge:true}); return id; }
async function remove(coll,id){ await deleteDoc(doc(db,coll,id)); }
function useColl(name){
  const [rows,setRows]=useState([]);
  useEffect(()=>onSnapshot(collection(db,name),s=>setRows(s.docs.map(d=>({id:d.id,...d.data()}))),e=>console.error(name,e)),[name]);
  return rows;
}
const num = v => { const n=parseFloat(v); return isNaN(n)?0:n; };
const pad = n => String(n).padStart(2,"0");
const fmtSaat = d => { const t=new Date(d); return pad(t.getHours())+":"+pad(t.getMinutes()); };
const fmtTarih = d => { const t=new Date(d); return pad(t.getDate())+"."+pad(t.getMonth()+1); };
const fmtTarihSaat = d => fmtTarih(d)+" "+fmtSaat(d);
const GUNLER = ["PAZAR","PAZARTESİ","SALI","ÇARŞAMBA","PERŞEMBE","CUMA","CUMARTESİ"];
const AYLAR = ["OCAK","ŞUBAT","MART","NİSAN","MAYIS","HAZİRAN","TEMMUZ","AĞUSTOS","EYLÜL","EKİM","KASIM","ARALIK"];
function fmtSureSaat(dk){ dk=Math.max(0,Math.round(num(dk))); return Math.floor(dk/60)+" sa "+pad(dk%60)+" dk"; }
function toInput(d){ const t=new Date(d); return t.getFullYear()+"-"+pad(t.getMonth()+1)+"-"+pad(t.getDate())+"T"+pad(t.getHours())+":"+pad(t.getMinutes()); }
function gunBasi(d){ const t=new Date(d); t.setHours(0,0,0,0); return t; }

/* ---------- ortak kabuklar ---------- */
function Field({ label, children }){ return h("label",{style:{display:"block",marginBottom:12}}, h("span",{style:S.label},label), children); }
function Modal({ baslik, onKapat, children, alt }){

      alt && h("div",{style:{padding:"12px 16px",borderTop:"1px solid "+C.line,display:"flex",gap:8}},alt)));
}
function Lejant({ renk, ad }){

/* ============================================================
   İŞ (plan kaydı) modalı
   ============================================================ */
function IsModal({ kayit, makineler, onKapat }){
  const yeni = !kayit.id;
  const [f,setF] = useState(()=>({
    makineId: kayit.makineId || (makineler[0]&&makineler[0].id) || "",
    ad:       kayit.ad       || "",
    adet:     kayit.adet     || 1,
    baslangic:toInput(kayit.baslangic || Date.now()),
    sureDk:   kayit.sureDk   || "",
    ams:      kayit.ams != null ? kayit.ams : true,
    not:      kayit.not      || "",
  }));
  const set=(k,v)=>setF(s=>({...s,[k]:v}));
  async function kaydet(){
    if(!f.makineId) return alert("Makine seç.");
    if(!f.ad.trim()) return alert("İş/ürün adı gir.");
    if(!f.sureDk)   return alert("Süre gir (dk).");
    await save("plan",{ id:kayit.id, makineId:f.makineId, ad:f.ad.trim(), adet:num(f.adet),
      baslangic:new Date(f.baslangic).toISOString(), sureDk:num(f.sureDk), ams:!!f.ams, not:f.not });
    onKapat();
  }
  const bitis = new Date(f.baslangic).getTime() + num(f.sureDk)*60000;
  return h(Modal,{ baslik: yeni?"Baskı Planla":"İşi Düzenle", onKapat,
    alt: h(React.Fragment,null,
      h("button",{style:{...S.btn("p"),flex:1},onClick:kaydet}, yeni?"Planla":"Kaydet"),
      !yeni && h("button",{style:{...S.btn(),color:C.kirmiziB,borderColor:C.kirmiziB},onClick:()=>{ if(confirm("Silinsin mi?")){ remove("plan",f.id); onKapat(); } }},"Sil"),
      h("button",{style:S.btn(),onClick:onKapat},"Vazgeç")) },
    h(Field,{label:"Makine"},
      h("select",{style:S.input,value:f.makineId,onChange:e=>set("makineId",e.target.value)},
        makineler.map(m=>h("option",{key:m.id,value:m.id},m.ad)))),
    h("div",{style:{display:"grid",gridTemplateColumns:"2fr 1fr",gap:12}},
      h(Field,{label:"İş / ürün adı"}, h("input",{style:S.input,value:f.ad,onChange:e=>set("ad",e.target.value),placeholder:"Sudoku / SD"})),
      h(Field,{label:"Adet"}, h("input",{type:"number",min:1,style:S.input,value:f.adet,onChange:e=>set("adet",e.target.value)}))),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}},
      h(Field,{label:"Başlangıç"}, h("input",{type:"datetime-local",style:S.input,value:f.baslangic,onChange:e=>set("baslangic",e.target.value)})),
      h(Field,{label:"Süre (dk)"}, h("input",{type:"number",min:0,style:S.input,value:f.sureDk,onChange:e=>set("sureDk",e.target.value)}))),
    h("div",{style:{fontSize:12,color:C.mut,marginTop:-4,marginBottom:12}}, f.sureDk?("Bitiş: "+fmtTarihSaat(bitis)+" · "+fmtSureSaat(f.sureDk)):""),
    h("label",{style:{display:"flex",alignItems:"center",gap:8,fontWeight:600,marginBottom:8}},
      h("input",{type:"checkbox",checked:!!f.ams,onChange:e=>set("ams",e.target.checked)}), "AMS'li iş (renkli)"),
    h(Field,{label:"Not"}, h("input",{style:S.input,value:f.not,onChange:e=>set("not",e.target.value)})));
}

/* ============================================================

   ============================================================ */
function MakineModal({ kayit, onKapat }){
  const yeni=!kayit.id;
  const [f,setF]=useState({...kayit});
  const set=(k,v)=>setF(s=>({...s,[k]:v}));
  async function kaydet(){ if(!f.ad.trim()) return alert("Ad gir."); await save("makineler",f); onKapat(); }
  return h(Modal,{ baslik: yeni?"Yeni Makine":"Makine Düzenle", onKapat,
    alt: h(React.Fragment,null,
      h("button",{style:{...S.btn("p"),flex:1},onClick:kaydet},"Kaydet"),
      !yeni && h("button",{style:{...S.btn(),color:C.kirmiziB,borderColor:C.kirmiziB},onClick:()=>{ if(confirm(f.ad+" silinsin mi?")){ remove("makineler",f.id); onKapat(); } }},"Sil"),
      h("button",{style:S.btn(),onClick:onKapat},"Vazgeç")) },
    h(Field,{label:"Makine adı"}, h("input",{style:S.input,value:f.ad||"",onChange:e=>set("ad",e.target.value),placeholder:"Şevki"})),
    h(Field,{label:"Tür"}, h("input",{style:S.input,value:f.tur||"",onChange:e=>set("tur",e.target.value),placeholder:"Bambu A1"})));
}

function MakineYonetim({ makineler, onKapat }){
  const [edit,setEdit]=useState(null);
  return h(Modal,{ baslik:"Makineler", onKapat,
    alt: h("button",{style:{...S.btn("p"),flex:1},onClick:()=>setEdit({ad:"",tur:""})},"+ Makine") },

    : h("div",{style:{display:"grid",gap:8}},

          h("div",{key:m.id,style:{...S.card,padding:"10px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
            h("div",null, h("div",{style:{fontWeight:700}},m.ad), m.tur&&h("div",{style:{fontSize:12,color:C.mut}},m.tur)),
            h("button",{style:S.ibtn,onClick:()=>setEdit(m)},"Düzenle")))));
}

/* ============================================================
   GANTT — zaman çizelgesi hesapları
   ============================================================ */
function makineTimeline(makineId, plan, baslaMs, bitMs){
  const js = plan.filter(p=>p.makineId===makineId)
    .map(p=>({ p, s:new Date(p.baslangic).getTime(), e:new Date(p.baslangic).getTime()+num(p.sureDk)*60000 }))
    .filter(x=>x.e>baslaMs && x.s<bitMs)
    .sort((a,b)=>a.s-b.s);
  let printMs=0;
  js.forEach(x=>{ printMs += Math.min(bitMs,x.e)-Math.max(baslaMs,x.s); });
  const bos=[]; let cur=baslaMs;
  js.forEach(x=>{ const s=Math.max(baslaMs,x.s); if(s>cur) bos.push({start:cur,end:s}); cur=Math.max(cur,Math.min(bitMs,x.e)); });
  if(cur<bitMs) bos.push({start:cur,end:bitMs});
  return { js, bos, printMs, bosMs:(bitMs-baslaMs)-printMs };
}

        h("div",{style:{fontSize:22,fontWeight:800,color:C.navyHdr}},"🧊 HAFTALIK MAKİNE ÇALIŞMA PLANI"),
        h("div",{style:{fontSize:13,color:C.mut,fontWeight:600}},"Gantt Takvimi")),
      h("div",{style:{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}},

        h("button",{style:S.ibtn,onClick:()=>setBas(gunBasi(Date.now()).getTime())},"Bugün"),

              padding:"8px 14px",borderTop:i?"1px solid "+C.line:"none",fontSize:13}},
              h("b",null,mk.ad),
              h("span",{style:{color:C.mut}},fmtSureSaat(tl.printMs/60000)),
              h("span",{style:{color:C.mut}},fmtSureSaat(tl.bosMs/60000)),
              h("div",{style:{display:"flex",alignItems:"center",gap:6}},
                h("div",{style:{flex:1,height:8,background:"#eef2f7",borderRadius:9,overflow:"hidden"}},
                  h("div",{style:{height:"100%",width:dol+"%",background:dol>=70?C.yesilB:dol>=40?C.sari:C.kirmiziB}})),
                h("span",{style:{fontWeight:700,fontSize:12}},"%"+dol)));
          }))),
      // genel özet
      h("div",{style:S.card},
        h("div",{style:S.hdr},"GENEL ÖZET"),
        h("div",{style:{padding:16,display:"grid",gap:12}},
          h("div",{style:{...S.card,padding:14,textAlign:"center"}},
            h("div",{style:{fontSize:12,color:C.mut,fontWeight:700}},"TOPLAM KAPASİTE"),
            h("div",{style:{fontSize:11,color:C.mut}},mlist.length+" makine × 24 saat × "+gunSayisi+" gün"),
            h("div",{style:{fontSize:24,fontWeight:800,color:C.navyHdr,marginTop:4}},Math.round(kapasiteMs/3600000)+" SAAT")),
          h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}},
            h("div",{style:{...S.card,padding:14,textAlign:"center"}},
              h("div",{style:{fontSize:11,color:C.mut,fontWeight:700}},"BASKI SÜRESİ"),
              h("div",{style:{fontSize:18,fontWeight:800,marginTop:4}},fmtSureSaat(toplamPrint/60000)),
              h("div",{style:{fontWeight:800,color:C.yesilB}},"(%"+yuzde(toplamPrint)+")")),
            h("div",{style:{...S.card,padding:14,textAlign:"center"}},
              h("div",{style:{fontSize:11,color:C.mut,fontWeight:700}},"BOŞ SÜRE"),
              h("div",{style:{fontSize:18,fontWeight:800,marginTop:4}},fmtSureSaat(toplamBos/60000)),
              h("div",{style:{fontWeight:800,color:C.kirmiziB}},"(%"+yuzde(toplamBos)+")"))))) ),

    h("div",{style:{textAlign:"right",fontSize:12,color:C.mut,marginTop:12}},"Güncelleme: "+fmtTarihSaat(now)),

    isModal && h(IsModal,{kayit:isModal,makineler:mlist,onKapat:()=>setIsModal(null)}),
    makineAcik && h(MakineYonetim,{makineler:mlist,onKapat:()=>setMakineAcik(false)})
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
