function MevkiModal({ musteri, bagItems, urunler, hareketler, aktifSeferId, seferIdAl, onKapat }){
  // Kaleye gelip işlem yapılırsa (satış/tahsilat/konsinye çöz/iade…) sanki sefere çıkılmış say:
  //  aktif sefer yoksa ilk işlemde otomatik aç → "Seferi bitir" ile normal sefer gibi kapatılır.
  const seferIdRef=useRef(aktifSeferId||null), seferPromiseRef=useRef(null);
  function sidAl(){
    if(seferIdRef.current) return Promise.resolve(seferIdRef.current);
    if(aktifSeferId){ seferIdRef.current=aktifSeferId; return Promise.resolve(aktifSeferId); }
    if(!seferPromiseRef.current) seferPromiseRef.current=Promise.resolve(seferIdAl?seferIdAl():null).then(id=>{ seferIdRef.current=id; return id; });
    return seferPromiseRef.current;
  }
  const mesgul=useRef(false);   // çift dokunuş kilidi — bir yazma işlemi bitmeden ikincisi başlamaz
  const [s1,setS1]=useState({});      // konsinye çöz adetleri  urunId->adet
  const [lines,setLines]=useState({}); // yeni  urunId->{adet,mod}
  const buradaMi=x=> (musteri.id && x.musteriId===musteri.id) || ((x.yer||"")===(musteri.ad||""));
  // burada açık konsinye (ürün başına topla)
  const buradaMap={}; (hareketler||[]).forEach(x=>{ if(x.tip==="konsinye" && num(x.kalan)>0 && buradaMi(x)){
    const b=buradaMap[x.urunId]||(buradaMap[x.urunId]={urunId:x.urunId,urunAd:x.urunAd,kalan:0,satisFiyat:num(x.satisFiyat),alisFiyat:num(x.alisFiyat)}); b.kalan+=num(x.kalan); }});
  const burada=Object.values(buradaMap);
  async function coz(p,mod){   // mod: "satildi" | "iade"
    if(mesgul.current) return; mesgul.current=true;
    try{
    const istek=s1[p.urunId]!=null?Math.floor(num(s1[p.urunId])):p.kalan; let n=Math.min(istek,p.kalan); if(n<1) return alert("Adet gir.");
    if(mod==="satildi" && !fiyatOnay([{ad:p.urunAd,fiyat:p.satisFiyat}])) return;
    const sid=await sidAl();   // kaleye gelip konsinye çözmek = sefer işlemi (yoksa aç)
    const iso=new Date().toISOString();
    // satıldı: alınan tutar boşsa tam ödeme; eksikse kalan = ALACAK
    let alinanKalan=null;
    if(mod==="satildi"){ const beklenen=n*num(p.satisFiyat); const g=tahsil[p.urunId];
      alinanKalan=(g===""||g==null)?beklenen:Math.max(0,Math.min(beklenen,num(g))); }
    const recs=(hareketler||[]).filter(x=>x.tip==="konsinye"&&num(x.kalan)>0&&x.urunId===p.urunId&&buradaMi(x)).sort((a,b)=>new Date(a.tarih)-new Date(b.tarih));
    for(const r of recs){ if(n<=0)break; const d=Math.min(n,num(r.kalan));
      await save("pazarlama_hareket",{id:r.id,kalan:increment(-d)});   // atomik düş
      if(mod==="satildi"){ const recBek=d*num(r.satisFiyat); const recTah=Math.max(0,Math.min(recBek,alinanKalan)); alinanKalan-=recTah;
        await harKaydet({tip:"satis",urunId:r.urunId,urunAd:r.urunAd,adet:d,alisFiyat:num(r.alisFiyat),satisFiyat:num(r.satisFiyat),tahsil:recTah,yer:r.yer||musteri.ad,bolge:r.bolge||musteri.bolge||"",musteriId:r.musteriId||musteri.id||"",kaynak:"konsinye",seferId:sid,tarih:iso}); }
      else { const u=(urunler||[]).find(x=>x.id===p.urunId); if(u) await bagDelta(u, +d);   // atomik çantaya al
        // konsinyeden geri toplandı → fiziken çantaya girer + kayıt altına alınır (atölyeye iade ayrı adım)
        // seferId yok: bu müşteri olayı; atölyeye dönüş seferi bitirince ayrıca "Dönen" sayılır (çift saymayı önler)
        await harKaydet({tip:"iade",urunId:p.urunId,urunAd:p.urunAd,adet:d,yer:r.yer||musteri.ad,bolge:r.bolge||musteri.bolge||"",musteriId:r.musteriId||musteri.id||"",kaynak:"konsinye",tarih:iso}); }
      n-=d;
    }
    setS1(s=>({...s,[p.urunId]:""})); setTahsil(s=>({...s,[p.urunId]:""}));
    } finally { mesgul.current=false; }
  }
  // alacağı tahsil et — kalanı tahsil edilmiş işaretle (kısmi de girilebilir)
  async function tahsilEt(x, miktar){ if(mesgul.current) return; mesgul.current=true;
    try{
    const bek=num(x.adet)*num(x.satisFiyat); const onceki=x.tahsil==null?bek:num(x.tahsil);
    const yeni = miktar==null ? bek : Math.max(0,Math.min(bek,onceki+num(miktar)));
    const d=yeni-onceki; if(d<=0) return;
    await save("pazarlama_hareket",{id:x.id,tahsil:increment(d)});   // atomik artır (mutlak yazım eşzamanlı tahsilatı eziyordu)
    // fiilen tahsil edilen tutarı da tahsilat hareketi olarak yaz → haftalık "Tahsilat yap" görevi sayabilsin
    await harKaydet({tip:"tahsilat",tutar:d,yer:x.yer||musteri.ad||"",bolge:x.bolge||musteri.bolge||"",musteriId:x.musteriId||musteri.id||"",seferId:await sidAl(),tarih:new Date().toISOString()});
    } finally { mesgul.current=false; } }
  // toplu tahsilat — girilen parayı açık alacaklara (en eskiden) uygula; eksik kalırsa alacak durur, fazlası avans
  async function tahsilUygula(miktarStr){ let kalan=num(miktarStr); if(kalan<=0) return alert("Alınan parayı yaz.");
    if(mesgul.current) return; mesgul.current=true;
    try{
    const iso=new Date().toISOString(); const acik=acikAlacaklar.slice().sort((a,b)=>new Date(a.tarih)-new Date(b.tarih)); let uyg=0;
    for(const x of acik){ if(kalan<=0)break; const borc=harAlacak(x); const d=Math.min(borc,kalan); await save("pazarlama_hareket",{id:x.id,tahsil:increment(d)}); kalan-=d; uyg+=d; }   // atomik — eşzamanlı yazım ezilmez
    const ort={yer:musteri.ad||"",bolge:musteri.bolge||"",musteriId:musteri.id||"",seferId:await sidAl(),tarih:iso};
    if(uyg>0) await harKaydet({tip:"tahsilat",tutar:uyg,...ort});
    if(kalan>0) await harKaydet({tip:"avans",tutar:kalan,...ort});
    alert("🧾 Tahsilat: "+tl(uyg)+(kalan>0?(" · 💳 avans "+tl(kalan)):""));
    } finally { mesgul.current=false; } }
  // bir hareketi GERİ AL — etkilerini (stok/konsinye) tersine çevir, kaydı sil
  async function geriAl(x){ if(mesgul.current) return; mesgul.current=true;
    try{
    const ad=num(x.adet); const u=(urunler||[]).find(p=>p.id===x.urunId);
    const sonKons=()=> (hareketler||[]).filter(h2=>h2.tip==="konsinye"&&h2.urunId===x.urunId&&buradaMi(h2)).sort((a,b)=>new Date(b.tarih)-new Date(a.tarih))[0];
    if(x.tip==="konsinye"){
      if(num(x.kalan)!==ad) return alert("Bu konsinyenin bir kısmı satılmış/iade olmuş.\nÖnce ilgili satış/iadeleri geri al, sonra konsinyeyi geri alabilirsin.");
      if(!confirm("Konsinye geri alınsın mı?\n"+ad+" × "+x.urunAd+" çantana dönecek.")) return;
      if(u) await bagDelta(u, +ad);
      await remove("pazarlama_hareket",x.id); return; }
    if(x.tip==="satis"){
      if(!confirm("Satış geri alınsın mı?\n"+ad+" × "+x.urunAd+(x.kaynak==="konsinye"?" → tekrar açık konsinyeye dönecek.":" → çantana dönecek."))) return;
      if(x.kaynak==="konsinye"){ const k=sonKons();
        if(k) await save("pazarlama_hareket",{id:k.id,kalan:increment(ad)});
        else await harKaydet({tip:"konsinye",urunId:x.urunId,urunAd:x.urunAd,adet:ad,kalan:ad,alisFiyat:num(x.alisFiyat),satisFiyat:num(x.satisFiyat),yer:x.yer||musteri.ad,bolge:x.bolge||musteri.bolge||"",musteriId:x.musteriId||musteri.id||"",tarih:new Date().toISOString()}); }
      else { if(u) await bagDelta(u, +ad); }
      await remove("pazarlama_hareket",x.id); return; }
    if(x.tip==="iade"){
      if(!confirm("İade geri alınsın mı?\n"+ad+" × "+x.urunAd+" tekrar açık konsinyeye dönecek (çantandan düşülür).")) return;
      if(u) await bagDelta(u, -ad);
      const k=sonKons(); if(k) await save("pazarlama_hareket",{id:k.id,kalan:increment(ad)});
      await remove("pazarlama_hareket",x.id); return; }
    if(x.tip==="diplomasi"){ if(!confirm("Bu iletişim kaydı silinsin mi?")) return; await remove("pazarlama_hareket",x.id); return; }
    // stant / tahsilat / avans / al ve diğer tipler — finansal/rapor kaydı; onayla ve sil
    if(!confirm("Bu kayıt silinsin mi?")) return;
    await remove("pazarlama_hareket",x.id);
    } finally { mesgul.current=false; }
  }
  // yeni — çantadan toplu
  const setAdet=(id,v)=>setLines(s=>({...s,[id]:{mod:(s[id]&&s[id].mod)||"konsinye",adet:v}}));
  const setMod=(id,m)=>setLines(s=>({...s,[id]:{adet:(s[id]&&s[id].adet)||"",mod:m}}));
  const secili=(bagItems||[]).map(u=>({u,adet:Math.max(0,Math.floor(num((lines[u.id]||{}).adet))),mod:(lines[u.id]||{}).mod||"konsinye"})).filter(x=>x.adet>0);
  async function yeniOnayla(){
    if(mesgul.current) return; mesgul.current=true;
    try{
    if(!secili.length) return alert("Yeni için ürün adedi gir.");
    for(const x of secili) if(x.adet>bagOf(x.u)) return alert(x.u.ad+": çantanda "+bagOf(x.u)+" var.");
    if(!fiyatOnay(secili.map(x=>({ad:x.u.ad,fiyat:x.u.satisFiyat})))) return;
    const iso=new Date().toISOString();
    const beklenenSat=secili.filter(x=>x.mod==="sat").reduce((s,x)=>s+x.adet*num(x.u.satisFiyat),0);
    let alinanKalan = tamAlindi ? beklenenSat : Math.max(0,Math.min(beklenenSat,num(alinanYeni)));
    const sid=await sidAl();   // yeni satış/konsinye = sefer işlemi
    for(const {u,adet,mod} of secili){ await bagDelta(u, -adet);   // atomik düş
      const base={urunId:u.id,urunAd:u.ad,adet,alisFiyat:num(u.pazFiyat),satisFiyat:num(u.satisFiyat),yer:musteri.ad||"",bolge:musteri.bolge||"",telefon:musteri.telefon||"",musteriId:musteri.id||"",seferId:sid,tarih:iso};
      if(mod==="konsinye") await harKaydet({tip:"konsinye",kalan:adet,musteriNot:musteri.not||"",lat:musteri.lat||"",lng:musteri.lng||"",fotoK:[],...base});
      else { const bek=adet*num(u.satisFiyat); const tah=Math.max(0,Math.min(bek,alinanKalan)); alinanKalan-=tah; await harKaydet({tip:"satis",tahsil:tah,...base}); } }
    setLines({}); setTamAlindi(true); setAlinanYeni("");
    } finally { mesgul.current=false; }
  }
  const tel=(musteri.telefon||"").replace(/\D/g,"");
  const modBtn=(id,m,et,renk,aktif)=>h("button",{type:"button",onClick:()=>setMod(id,m),
    style:{padding:"4px 6px",borderRadius:7,border:"1px solid "+renk,fontSize:12,fontWeight:800,cursor:"pointer",lineHeight:1,background:aktif?renk:"#fff",color:aktif?"#fff":renk}},et);
  // —— sekmeler ——
  const [tab,setTab]=useState("akin");
  const [sec,setSec]=useState({});  // iletişim: seçili ürünler
  const [tahsil,setTahsil]=useState({});  // konsinye satıldı: alınan tutar (urunId->₺)
  const [tahsilGir,setTahsilGir]=useState("");  // Alacak sekmesi: toplu tahsil edilen ₺
  const [duzenHar,setDuzenHar]=useState(null);  // düzenlenen hareket
  const [tamAlindi,setTamAlindi]=useState(true); const [alinanYeni,setAlinanYeni]=useState(""); // yeni satış tahsilatı
  // GEÇMİŞ İŞLEM GİRİŞİ (geçici yetki) — eski satış/konsinyeleri tarihiyle ekle
  const gecmisYetki = !!(AKTIF_KUL && AKTIF_KUL.gecmisEkle);
  const [gec,setGec]=useState({tip:"satis",urunId:"",adet:"",satis:"",alis:"",tarih:"",mod:"hediye",fiyat:"",alinan:""});
  const [akn,setAkn]=useState({tip:"satis",urunId:"",adet:"",satis:"",alis:"",tarih:"",mod:"hediye",fiyat:"",alinan:""});
  function gecUrun(id){ const u=(urunler||[]).find(x=>x.id===id); setGec(s=>({...s,urunId:id,satis:u?(u.satisFiyat||s.satis):s.satis,alis:u?(u.pazFiyat||s.alis):s.alis})); }
  async function gecmisOnayla(){ if(!gec.tarih) return alert("Tarih seç.");
    if(mesgul.current) return; mesgul.current=true;
    try{
    const iso=new Date(gec.tarih+"T12:00:00").toISOString();
    if(gec.tip==="stant"){ const fiyat=gec.mod==="satis"?num(gec.fiyat):0;
      await harKaydet({tip:"stant",mod:gec.mod,fiyat,adet:1,urunAd:"Stant",yer:musteri.ad||"",bolge:musteri.bolge||"",musteriId:musteri.id||"",kaynak:"gecmis",tarih:iso});
      setGec(s=>({...s,fiyat:""})); return alert("📅 Geçmiş stant eklendi · "+gec.tarih); }
    if(gec.tip==="tahsilat"){ let kalan=num(gec.alinan); if(kalan<=0) return alert("Tahsil edilen tutar gir.");
      const acik=acikAlacaklar.slice().sort((a,b)=>new Date(a.tarih)-new Date(b.tarih)); let uyg=0;
      for(const x of acik){ if(kalan<=0)break; const borc=harAlacak(x); const d=Math.min(borc,kalan); await save("pazarlama_hareket",{id:x.id,tahsil:increment(d)}); kalan-=d; uyg+=d; }   // atomik — eşzamanlı yazım ezilmez
      const ort={yer:musteri.ad||"",bolge:musteri.bolge||"",musteriId:musteri.id||"",kaynak:"gecmis",tarih:iso};
      if(uyg>0) await harKaydet({tip:"tahsilat",tutar:uyg,...ort});
      if(kalan>0) await harKaydet({tip:"avans",tutar:kalan,...ort});
      setGec(s=>({...s,alinan:""})); return alert("📅 Geçmiş tahsilat: "+tl(uyg)+(kalan>0?(" · 💳 avans "+tl(kalan)):"")); }
    const u=(urunler||[]).find(x=>x.id===gec.urunId); if(!u) return alert("Ürün seç.");
    const ad=Math.floor(num(gec.adet)); if(ad<1) return alert("Adet gir.");
    const base={urunId:u.id,urunAd:u.ad,adet:ad,alisFiyat:num(gec.alis),satisFiyat:num(gec.satis),yer:musteri.ad||"",bolge:musteri.bolge||"",musteriId:musteri.id||"",kaynak:"gecmis",tarih:iso};
    if(gec.tip==="konsatis"){
      // açık konsinyeyi FIFO düş (varsa), sonra satışı tahsil/borç bilgisiyle yaz
      let kalanAzalt=ad; const recs=(hareketler||[]).filter(x=>x.tip==="konsinye"&&num(x.kalan)>0&&x.urunId===u.id&&buradaMi(x)).sort((a,b)=>new Date(a.tarih)-new Date(b.tarih));

const RANKS=[[0,"Çırak","🌱"],[250,"Kalfa","🔧"],[700,"Usta","⭐"],[1600,"Üstat","🔥"],[3200,"Efsane","👑"]];
function rankOf(xp){ let r=RANKS[0]; for(const x of RANKS) if(xp>=x[0]) r=x; return r; }
function nextRank(xp){ for(const x of RANKS) if(xp<x[0]) return x; return null; }
const TIERS=[[0,"Bronz","🥉","#b45309","#fde9d4"],[1200,"Gümüş","🥈","#64748b","#eef2f7"],[3500,"Altın","🥇","#b8860b","#fef3c7"],[8000,"Platin","💎","#0e7490","#cffafe"]];
function tierOf(p){ let t=TIERS[0]; for(const x of TIERS) if(p>=x[0]) t=x; return t; }
function seriHesap(set){ let c=0,d=gunBasi(Date.now()).getTime(); if(!set.has(d)) d-=86400000; while(set.has(d)){ c++; d-=86400000; } return c; }
// RISK temalı fetih: bölge nüfuzuna (ciro) göre uydurma unvanlar
const FETIH_UNVAN=[[1,"Sefiri","🎖️","#64748b"],[1500,"Reisi","🦅","#0e7490"],[5000,"Baronu","💼","#7c3aed"],[12000,"Paşası","⚔️","#b45309"],[30000,"Fatihi","🏰","#b91c1c"],[60000,"Sultanı","👑","#a16207"]];
function unvanOf(ciro){ let u=null; for(const x of FETIH_UNVAN) if(ciro>=x[0]) u=x; return u; }   // null = fethedilmedi
function unvanNext(ciro){ for(const x of FETIH_UNVAN) if(ciro<x[0]) return x; return null; }
// Türkçe tamlama eki: Üsküdar → Üsküdar'ın · Ümraniye → Ümraniye'nin · Kadıköy → Kadıköy'ün
function genitive(s){ s=(s||"").trim(); if(!s) return s;
  const v="aeıioöuü", low=s.toLocaleLowerCase("tr"); let last="ı";
  for(const ch of low) if(v.includes(ch)) last=ch;
  const vowelEnd=v.includes(low.slice(-1));
  const har=(last==="a"||last==="ı")?"ı":(last==="e"||last==="i")?"i":(last==="o"||last==="u")?"u":"ü";
  return s+"'"+(vowelEnd?"n":"")+har+"n";
}

  const r=rankOf(xp), nx=nextRank(xp); const taban=r[0], tavan=nx?nx[0]:r[0];

// Google Places (New) — searchNearby: kale merkezleri çevresinde mekan + puan + yorum + telefon
async function kesifGoogle(merkezler, katlar, metre, key){
  const includedTypes=Array.from(new Set(katlar.flatMap(c=>c.gt||[])));
  const gor=new Set(), out=[];
  for(const m of merkezler){
    const body={ includedTypes, maxResultCount:20, rankPreference:"POPULARITY",
      locationRestriction:{ circle:{ center:{latitude:+m.lat,longitude:+m.lng}, radius:Math.min(50000,metre) } } };
    const r=await fetch("https://places.googleapis.com/v1/places:searchNearby",{method:"POST",
      headers:{"Content-Type":"application/json","X-Goog-Api-Key":key,
        "X-Goog-FieldMask":"places.id,places.displayName,places.location,places.types,places.rating,places.userRatingCount,places.nationalPhoneNumber,places.currentOpeningHours.weekdayDescriptions"},
      body:JSON.stringify(body)});
    if(!r.ok){ let e=""; try{ e=(await r.json()).error.message; }catch(x){} throw new Error("Google "+r.status+(e?(" — "+e):"")); }
    const j=await r.json();
    (j.places||[]).forEach(p=>{ const ad=p.displayName&&p.displayName.text; if(!ad||!p.location) return;

function convexHull(pts){

  if(P.length<3) return pts.slice();
  const cr=(o,a,b)=>(a[0]-o[0])*(b[1]-o[1])-(a[1]-o[1])*(b[0]-o[0]);
  const lo=[]; for(const p of P){ while(lo.length>=2 && cr(lo[lo.length-2],lo[lo.length-1],p)<=0) lo.pop(); lo.push(p); }

  const [nowTick,setNowTick]=useState(Date.now());

  const now=nowTick, gun0=gunBasi(now).getTime(), haf0=haftaBasi(now).getTime(), ay0=ayBasi(now);
  // ÜRETİM metrikleri

  const bitenSet=new Set(biten.map(p=>gunBasi(new Date(p.baslangic).getTime()+num(p.sureDk)*60000).getTime()));

  const bitenBugun=biten.filter(p=> new Date(p.baslangic).getTime()+num(p.sureDk)*60000>=gun0).length;
  const adetHafta=biten.filter(p=> new Date(p.baslangic).getTime()+num(p.sureDk)*60000>=haf0).reduce((s,p)=>s+num(p.adet||1),0);
  // PAZARLAMA metrikleri

  const ciro=satis.reduce((s,x)=>s+num(x.satisFiyat)*num(x.adet),0)+standCiro;

  const konsAdet=(hareketler||[]).filter(h2=>h2.tip==="konsinye").reduce((s,x)=>s+num(x.adet),0);
  // toplam alacak — satıldı ama parası tam alınmamış
  const avansGenel=(hareketler||[]).filter(x=>x.tip==="avans").reduce((s,x)=>s+num(x.tutar),0);
  const alacakGenel=satis.reduce((s,x)=>{ const bek=num(x.adet)*num(x.satisFiyat); const t=x.tahsil==null?bek:num(x.tahsil); return s+Math.max(0,bek-t); },0)-avansGenel;
  // ŞİRKET EKONOMİSİ (yönetici) — gerçek üretim maliyetine göre uçtan uca kâr

  let uretimMaliyet=0, ciroBilinen=0, sirketKar=0, bilinmeyenAdet=0;

  const pXp=sAdet*8 + Math.floor(kar/5) + konsAdet*3;
  const satisSet=new Set(satis.map(x=>gunBasi(new Date(x.tarih).getTime()).getTime()));
  const pSeri=seriHesap(satisSet);
  const satisBugun=satis.filter(x=>new Date(x.tarih).getTime()>=gun0).length;
  const ciroHafta=satis.filter(x=>new Date(x.tarih).getTime()>=haf0).reduce((s,x)=>s+num(x.satisFiyat)*num(x.adet),0);

  // ligler

    if(x.tip==="satis"){ k.satisAdet+=num(x.adet); k.satisCiro+=num(x.adet)*num(x.satisFiyat); } else k.konsinyeAdet+=num(x.adet);

    if(!k.ad && x.yer) k.ad=x.yer; if(!k.bolge && x.bolge) k.bolge=x.bolge; if(!k.lat && x.lat){ k.lat=x.lat; k.lng=x.lng; }
  });
  const kaleler=Object.values(kaleMap).map(k=>{ const m=k.musteriId&&musById[k.musteriId];

    k.askerTier=katOf(ASKER_TIER,k.satisAdet); k.silahTier=katOf(SILAH_TIER,k.satisCiro);

    k.seviye=kaleSeviye(k.guc);

    k.sahip=kulById[k.sahipId]||null; k.simge=k.sahip?(k.sahip.simge||"🚩"):"";
    k.stant=standlarTum.filter(s=>(s.musteriId&&s.musteriId===k.musteriId)||((s.yer||"")===(k.ad||""))).length;  // 🎪 stant sayısı

  }).filter(k=>!(k.musteriId&&(arsivId.has(k.musteriId)||!mevcutMusId.has(k.musteriId))))   // #10 arşivli VEYA silinmiş (kaydı yok) kaleler gizli
    .sort((a,b)=>b.guc-a.guc);

  kaleler.forEach(k=>{ k.sonAkin=sonAkinMap[k.key]||0; k.ilkAkin=ilkAkinMap[k.key]||0;

  const alertCount=acilUyari.length;

/* ============================================================
   📊 PAZARLAMA TAKİP — admin izleme paneli (pazarlamacı sayfasından bağımsız)
   Pazarlamacıların hareketleri, satış/konsinye, ürün yerleri, müşteriler,
   günlük/haftalık/aylık performans, alacak/verecek — tek yerde.
   ============================================================ */
function PazarlamaTakip({ hareketler, musteriler, kullanicilar, urunler, seferler, plan }){
  // 📦 bu hafta üretilmesi planlanan toplam ürün (güncel) — başlangıcı bu haftaya düşen baskılar
  const [nowPt,setNowPt]=useState(Date.now());
  useEffect(()=>{ const t=setInterval(()=>setNowPt(Date.now()),60000); return ()=>clearInterval(t); },[]);
  const _phb=haftaBasi(nowPt).getTime(), _phe=_phb+7*86400000;
  // ÜRÜN-EŞDEĞERİ: parçalı üründe parçalar tek başına ürün sayılmaz (60 Alt + 60 üst = 60 ürün)
  const buHaftaUretim=(()=>{ const byU={};
    const eff=planEffBas(plan,nowPt);   // StokTab ile AYNI kural: efektif başlangıç, geride kalanlar sayılmaz
    (plan||[]).forEach(p=>{ if(!p.urunId) return; const st=eff[p.id]||{}; if(st.geride) return;
      const s=st.s!=null?st.s:new Date(p.baslangic).getTime(); if(s<_phb||s>=_phe) return; (byU[p.urunId]=byU[p.urunId]||[]).push(p); });
    let tot=0;
    Object.keys(byU).forEach(uid=>{ const u=(urunler||[]).find(x=>x.id===uid)||{}; const parcalar=u.parcalar||[]; const bh=byU[uid];
      if(parcalar.length){ const pa={}; parcalar.forEach(p=>pa[p]=0);
        bh.forEach(p=>{ const kk=plParcaKatki(p,u); for(const pt in kk) pa[pt]+=kk[pt]; });
        tot += parcalar.reduce((s,p)=>s + pa[p]/Math.max(1,Math.round(num((u.parcaAdet||{})[p]||1))), 0)/parcalar.length;
      } else tot += bh.reduce((a,p)=>a+num(p.adet||1),0); });
    return Math.round(tot); })();
  const [alt,setAlt]=useState("ozet");
  const [rapMod,setRapMod]=useState("ay");
  const [rapTarih,setRapTarih]=useState(()=>{ const d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); });   // YEREL gün (UTC olursa gece 00-03 arası düne kayar)
  const [rapBas,setRapBas]=useState("");
  const [rapBit,setRapBit]=useState("");
  const [seciliPaz,setSeciliPaz]=useState("");   // hareket dökümü filtresi
  const [hTip,setHTip]=useState("");

  const H=(hareketler||[]);
  const G=864e5;
  const pazarlamacilar=(kullanicilar||[]).filter(u=>u.rol!=="admin").slice().sort((a,b)=>(a.ad||"").localeCompare(b.ad||"","tr"));
  const kulAd=id=>{ const u=(kullanicilar||[]).find(x=>x.id===id); return u?u.ad:(id?"?":"—"); };
  const harAlacak=x=>{ if(x.tip!=="satis")return 0; const bek=num(x.adet)*num(x.satisFiyat); const t=x.tahsil==null?bek:num(x.tahsil); return Math.max(0,bek-t); };

  // —— dönem aralığı ——
  const bd=rapTarih?new Date(rapTarih+"T00:00:00"):new Date();
  const g0=gunBasi(bd).getTime();
  let rb,re,donemAd;
  if(rapMod==="gun"){ rb=g0; re=g0+G-1; donemAd=fmtTarih(rb)+"."+bd.getFullYear()+" · Günlük"; }
  else if(rapMod==="hafta"){ re=g0+G-1; rb=g0-6*G; donemAd=fmtTarih(rb)+" – "+fmtTarih(re)+" · Son 7 gün"; }
  else if(rapMod==="ay"){ re=g0+G-1; rb=g0-29*G; donemAd=fmtTarih(rb)+" – "+fmtTarih(re)+" · Son 30 gün"; }
  else { rb=rapBas?new Date(rapBas+"T00:00:00").getTime():0; re=rapBit?new Date(rapBit+"T23:59:59").getTime():Date.now(); donemAd=(rapBas||"…")+" – "+(rapBit||"bugün")+" · Özel"; }
  const pHar=H.filter(x=>{ const t=new Date(x.tarih).getTime(); return t>=rb&&t<=re; });

  // —— pazarlamacı bazlı dönem performansı ——
  const pazPerf=pazarlamacilar.map(u=>{ const hs=pHar.filter(x=>x.kullaniciId===u.id);
    const sat=hs.filter(x=>x.tip==="satis"), kons=hs.filter(x=>x.tip==="konsinye");
    const satAdet=sat.reduce((s,x)=>s+num(x.adet),0);
    const satTutar=sat.reduce((s,x)=>s+num(x.adet)*num(x.satisFiyat),0);
    const konsAdet=kons.reduce((s,x)=>s+num(x.adet),0);
    const konsTutar=kons.reduce((s,x)=>s+num(x.adet)*num(x.satisFiyat),0);
    const tah=hs.filter(x=>x.tip==="tahsilat").reduce((s,x)=>s+num(x.tutar),0);
    const avans=hs.filter(x=>x.tip==="avans").reduce((s,x)=>s+num(x.tutar),0);
    const ureticiBorc=sat.reduce((s,x)=>s+num(x.adet)*num(x.alisFiyat),0);
    const marj=satTutar-ureticiBorc;
    const mek=new Set(hs.filter(x=>["satis","konsinye","tahsilat","avans","stant"].includes(x.tip)).map(x=>x.yer||"?")); mek.delete("?");
    const tablalar=hs.filter(x=>x.tip==="tabla"); const tabla=tablalar.length; const tablaKaz=tablalar.reduce((s,x)=>s+num(x.tutar),0);
    return {u,satAdet,satTutar,konsAdet,konsTutar,tah,avans,ureticiBorc,marj,mekan:mek.size,tabla,tablaKaz}; })
    .sort((a,b)=>b.satTutar-a.satTutar);
  const T={satAdet:0,satTutar:0,konsAdet:0,konsTutar:0,tah:0,avans:0,ureticiBorc:0,marj:0,tabla:0,tablaKaz:0};
  pazPerf.forEach(p=>{ T.satAdet+=p.satAdet;T.satTutar+=p.satTutar;T.konsAdet+=p.konsAdet;T.konsTutar+=p.konsTutar;T.tah+=p.tah;T.avans+=p.avans;T.ureticiBorc+=p.ureticiBorc;T.marj+=p.marj;T.tabla+=p.tabla;T.tablaKaz+=p.tablaKaz; });
  const aktifMekan=new Set(pHar.filter(x=>["satis","konsinye","tahsilat","stant"].includes(x.tip)).map(x=>x.yer||"?")); aktifMekan.delete("?");
  const aktifPaz=pazPerf.filter(p=>p.satAdet||p.konsAdet||p.tah||p.mekan).length;

  // —— açık konsinyeler (tüm zaman, kalan>0) — ürünlerin sahadaki yerleri ——
  const acikKons=H.filter(x=>x.tip==="konsinye" && num(x.kalan)>0)
    .map(x=>({yer:x.yer||"?",urun:x.urunAd||"?",kalan:num(x.kalan),fiyat:num(x.satisFiyat),tutar:num(x.kalan)*num(x.satisFiyat),paz:x.kullaniciAd||kulAd(x.kullaniciId),tarih:x.tarih}))
    .sort((a,b)=>new Date(b.tarih)-new Date(a.tarih));
  const acikKonsAdet=acikKons.reduce((s,r)=>s+r.kalan,0), acikKonsTutar=acikKons.reduce((s,r)=>s+r.tutar,0);

  // —— alacaklar: mekan/müşteri bazlı (borç − avans), tüm zaman ——
  const alMap={};
  H.forEach(x=>{ const borc=harAlacak(x); if(borc>0){ const k=x.yer||"?"; const o=alMap[k]||(alMap[k]={yer:k,borc:0,avans:0,paz:x.kullaniciAd||kulAd(x.kullaniciId)}); o.borc+=borc; } });
  H.filter(x=>x.tip==="avans").forEach(x=>{ const k=x.yer||"?"; const o=alMap[k]||(alMap[k]={yer:k,borc:0,avans:0,paz:x.kullaniciAd||kulAd(x.kullaniciId)}); o.avans+=num(x.tutar); });
  const alacaklar=Object.values(alMap).map(o=>({...o,net:o.borc-o.avans})).filter(o=>Math.abs(o.net)>0.5).sort((a,b)=>b.net-a.net);
  const netAlacakTop=alacaklar.reduce((s,o)=>s+o.net,0);
  // —— üretici ödeme onayı (sefer bazlı): kapatılmış seferlerin üretici borcu ödendi mi / bekliyor mu ——
  const seferUreticiBorc=(sid)=>H.filter(x=>x.seferId===sid&&x.tip==="satis").reduce((s,x)=>s+num(x.adet)*num(x.alisFiyat),0);
  const kapananSeferler=(seferler||[]).filter(s=>s.durum==="kapali");
  const ureticiOdeme=pazarlamacilar.map(u=>{ let bekleyen=0,odenen=0,bekSayi=0,odeSayi=0;
    kapananSeferler.filter(s=>s.kullaniciId===u.id).forEach(s=>{ const b=seferUreticiBorc(s.id); if(b<=0) return;
      if(s.ureticiOdendi){ odenen+=num(s.ureticiOdenen)||b; odeSayi++; } else { bekleyen+=b; bekSayi++; } });
    return {u,bekleyen,odenen,bekSayi,odeSayi}; }).filter(o=>o.bekleyen>0||o.odenen>0).sort((a,b)=>b.bekleyen-a.bekleyen);
  // verecek: pazarlamacı → üretici. Toplam borç TÜM satışların alış bedeli (sefersiz/geçmiş dahil);
  //  onaylı ödenen sefer onaylarından düşülür → KALAN iki sistemi uzlaştırır (Ödedim'e girmeyen borç da görünür)
  const verecek=pazarlamacilar.map(u=>{
    const borc=H.filter(x=>x.tip==="satis"&&x.kullaniciId===u.id).reduce((s,x)=>s+num(x.adet)*num(x.alisFiyat),0);
    const uo=ureticiOdeme.find(o=>o.u.id===u.id); const odenen=uo?uo.odenen:0;
    return {u,borc,odenen,kalanNet:borc-odenen};
  }).filter(v=>v.borc>0.5||v.odenen>0.5).sort((a,b)=>b.kalanNet-a.kalanNet);

/* ============================================================
   ⚙️ CEPHANE ÜRETİM BANDI — pazarlamacıya özel animasyonlu üretim hattı
   (Gantt yerine; her makine bir bant, çalışan işler canlı akıyor)
   ============================================================ */
function CephaneBandi({ plan, makineler, now }){
  const mlist=(makineler||[]).slice().sort((a,b)=>(a.ad||"").localeCompare(b.ad||"","tr"));
  const SIM=["🔩","🛠️","⚙️","🔧","🛡️","⛓️","🔨"];
  const isler=mk=>(plan||[]).filter(p=>p.makineId===mk.id);
  const aktifOf=mk=>isler(mk).find(p=>p.basladi && new Date(p.baslangic).getTime()<=now && new Date(p.baslangic).getTime()+num(p.sureDk)*60000>now);
  const aktifSay=mlist.filter(mk=>aktifOf(mk)).length;
  return h("div",null,
    // başlık şeridi
    h("div",{style:{display:"flex",alignItems:"center",gap:12,marginBottom:16,padding:"14px 16px",borderRadius:14,
      background:"linear-gradient(135deg,#0b1220,#1e293b)",color:"#fff",boxShadow:"0 8px 24px rgba(2,6,23,.3)"}},
      h("div",{className:"tk-spin",style:{fontSize:30,lineHeight:1}},"⚙️"),
      h("div",{style:{flex:1,minWidth:0}},
        h("div",{style:{fontSize:19,fontWeight:800,letterSpacing:.5}},"CEPHANE ÜRETİM BANDI"),
        h("div",{style:{fontSize:12,opacity:.8}}, mlist.length+" hat · "+aktifSay+" tanesi üretimde")),
      h("div",{style:{display:"flex",gap:5,alignItems:"center"}},
        [0,1,2].map(i=>h("span",{key:i,className:"tk-spark",style:{fontSize:14,animationDelay:(i*0.22)+"s",color:"#f59e0b"}},"✦")))),
    !mlist.length ? h("div",{style:{...S.card,padding:24,textAlign:"center",color:C.mut}},"Üretim hattı yok.")
    : h("div",{style:{display:"grid",gap:12}},
        mlist.map((mk,mi)=>{ const p=aktifOf(mk); const ikon=SIM[mi%SIM.length];
          const bekle=isler(mk).filter(j=>new Date(j.baslangic).getTime()>now).length;
          let pct=0,kalanDk=0,ad="",adet=0;
          if(p){ const s=new Date(p.baslangic).getTime(), e=s+num(p.sureDk)*60000; pct=Math.max(3,Math.min(100,(now-s)/(e-s)*100)); kalanDk=Math.max(0,Math.ceil((e-now)/60000)); ad=p.ad||"Üretim"; adet=num(p.adet||1); }
          return h("div",{key:mk.id,style:{...S.card,padding:"10px 12px",overflow:"hidden"}},
            // hat başlığı
            h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:8}},
              h("span",{className:p?"tk-spin-fast":"",style:{fontSize:16,opacity:p?1:.35}},"⚙️"),
              h("div",{style:{fontWeight:800,fontSize:14,flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},mk.ad),
              p ? h("span",{style:{fontSize:11,fontWeight:800,color:"#b45309",background:"#fef3c7",borderRadius:6,padding:"2px 8px"}},"● ÜRETİMDE")
                : h("span",{style:{fontSize:11,fontWeight:700,color:C.mut,background:"#f1f5f9",borderRadius:6,padding:"2px 8px"}},"BOŞTA")),
            // bant
            p
              ? h("div",{className:"tk-belt",style:{position:"relative",height:66,borderRadius:10,background:"#0b1220",overflow:"hidden"}},
                  // ilerleme dolgusu (kızgın metal)
                  h("div",{style:{position:"absolute",top:0,bottom:0,left:0,width:pct+"%",background:"linear-gradient(90deg,rgba(245,158,11,.35),rgba(245,158,11,.08))",borderRight:"2px solid #f59e0b",boxShadow:"0 0 16px rgba(245,158,11,.5)"}}),
                  // tarama ışığı
                  h("div",{className:"tk-scan",style:{position:"absolute",top:0,bottom:0,width:"30%",background:"linear-gradient(90deg,transparent,rgba(56,189,248,.20),transparent)"}}),
                  // üst pistonlar
                  h("div",{style:{position:"absolute",top:6,left:0,right:0,display:"flex",justifyContent:"space-around",pointerEvents:"none"}},
                    [0,1,2,3,4,5].map(i=>h("span",{key:i,className:"tk-piston",style:{fontSize:10,opacity:.45,animationDelay:(i*0.1)+"s",color:"#64748b"}},"▮"))),
                  // hareketli ürün + kıvılcım
                  h("div",{className:"tk-bob",style:{position:"absolute",top:"52%",left:pct+"%",display:"flex",flexDirection:"column",alignItems:"center",zIndex:2}},
                    h("span",{className:"tk-spark",style:{fontSize:12,color:"#fde047",marginBottom:-3}},"✦"),
                    h("div",{style:{fontSize:22,filter:"drop-shadow(0 2px 4px rgba(0,0,0,.6))"}},ikon)),
                  // sol alt bilgi
                  h("div",{style:{position:"absolute",left:10,bottom:6}},
                    h("div",{style:{fontSize:12.5,fontWeight:800,color:"#e2e8f0",textShadow:"0 1px 3px #000",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:160}}, adet+"× "+ad)),
                  // sağ alt: yüzde + kalan
                  h("div",{style:{position:"absolute",right:10,bottom:6,textAlign:"right"}},
                    h("div",{style:{fontSize:14,fontWeight:800,color:"#fbbf24",textShadow:"0 1px 3px #000"}}, Math.round(pct)+"%"),
                    h("div",{style:{fontSize:10.5,color:"#94a3b8"}}, "⏳ "+fmtSureSaat(kalanDk))))
              : h("div",{className:"tk-belt",style:{position:"relative",height:66,borderRadius:10,background:"#111827",opacity:.6,display:"flex",alignItems:"center",justifyContent:"center",animationDuration:"1.5s"}},
                  h("div",{style:{fontSize:12,color:"#64748b",fontWeight:700}}, bekle>0?("⏸ Sırada "+bekle+" iş bekliyor"):"⏸ Boşta")),
            bekle>0 && p && h("div",{style:{fontSize:11,color:C.mut,marginTop:6}},"⏭ Sırada "+bekle+" iş var")); })));
}

function App(){
  const [sekme, setSekme] = useState(()=>{ try{ const v=localStorage.getItem("tk_sekme")||"plan"; return v==="oyun"?"pazarlama":v; }catch(e){ return "plan"; } });
  useEffect(()=>{ try{ localStorage.setItem("tk_sekme",sekme); }catch(e){} },[sekme]);
  // oturum önce çözülür → demo hesabıysa oyun koleksiyonları demo_ önekine gider
  const {rows:kullanicilar,loaded:kulYuklendi}=useKullanici();
  const [aktifId,setAktifId]=useState(()=>{ try{ return localStorage.getItem("tk_uid"); }catch(e){ return null; } });
  const aktif=kullanicilar.find(u=>u.id===aktifId)||null;
  AKTIF_KUL=aktif;
  const demo=!!(aktif && aktif.demo); DEMO_MODE=demo;
  const minimal=!!(aktif && aktif.minimal); MINIMAL=minimal;
  const kripto=!!(aktif && aktif.kripto); KRIPTO=kripto;
  const makineler = useColl("makineler",demo);
  const plan = useColl("plan",demo);
  const stokUrun = useColl("stok_urun",demo);
  const filamentler = useColl("filament",demo);
  const pazHareket = useColl("pazarlama_hareket",demo);
  const bolgeler = useColl("bolge",demo);
  const musteriler = useColl("musteri",demo);
  const seferler = useColl("sefer",demo);
  const kesifRed = useColl("kesif_red",demo);
  const kesifCache = useColl("kesif_cache",demo);

      .sort((a,b)=>a.ps-b.ps);
    let cursor = simdi + num(p.sureDk)*60000;   // p'nin yeni bitişi
    for(const j of sonrakiler){
      const s = Math.max(j.ps, cursor);          // ileri boşluk korunur, geç kalan sıkışır
      if(s !== j.ps) await save("plan",{ id:j.id, baslangic:new Date(s).toISOString() });
      cursor = s + j.dk*60000;
    }
  }

          // makine satırları
          mlist.length===0 ? h("div",{style:{padding:20,color:C.mut,textAlign:"center"}},"Makine yok. ⚙ Makineler'den ekle.")

                          border:"1px solid "+C.kirmiziB,borderRadius:7,
                          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                          overflow:"hidden",color:"#7f1d1d",fontSize:10,fontWeight:800,lineHeight:1.2}},
                        width>50 && h(React.Fragment,null, h("div",null,"⚠ KAYIP"), h("div",{style:{fontWeight:600}},fmtSureSaat((pt.e-pt.s)/60000))));
                      return h("div",{key:pt.k,onClick:isAdmin?()=>setIsModal({makineId:mk.id,baslangic:pt.s}):undefined,
                        title:isAdmin?"Boş — tıkla, iş planla":"Boş",
                        style:{position:"absolute",left:left+2,top:8,width:width-4,height:ROW_H-16,
                          background:C.kirmizi,border:"1px solid "+C.kirmiziB,borderRadius:7,cursor:isAdmin?"pointer":"default",
                          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                          overflow:"hidden",color:C.kirmiziT,fontSize:11,fontWeight:700,lineHeight:1.25}},
                        width>54 && h(React.Fragment,null, h("div",null,fmtSaat(pt.s)), h("div",null,fmtSaat(pt.e))));
                    });
                  }),
                  // iş blokları (tıkla → onay/düzenle)
                  tl.js.map((x,i)=>{
                    const left=(Math.max(baslaMs,x.s)-baslaMs)*px, width=(Math.min(bitMs,x.e)-Math.max(baslaMs,x.s))*px;
                    if(width<3) return null;
                    // durum: başladı→çalışıyor/bitti · başlamadı: planlı(açık)/onay bekliyor(amber)/kaçırıldı
                    const basladi = !!x.p.basladi;
                    let dr, durStr;
                    if(basladi){ if(x.e<=now){ dr={bg:C.bitBg,bd:C.bitB,tc:C.bitT}; durStr="bitti"; } else { dr={bg:C.yesil,bd:C.yesilB,tc:C.yesilT}; durStr="çalışıyor"; } }
                    else if(x.s>now){ dr={bg:C.planBg,bd:C.planB,tc:C.planT,dash:true}; durStr="planlandı"; }
                    else if(x.e>now){ dr={bg:C.onayBg,bd:C.onayB,tc:C.onayT,onay:true}; durStr="onay bekliyor"; }
                    else { dr={bg:C.bitBg,bd:C.bitB,tc:C.bitT,dash:true}; durStr="başlamadı"; }
                    return h("div",{key:"j"+i, onClick: isAdmin ? (()=> dr.onay ? baslat(x.p) : setIsModal(x.p)) : undefined,
                      title:x.p.ad+" · "+durStr+" · bitiş "+fmtTarihSaat(x.e),
                      style:{position:"absolute",left:left+2,top:8,width:width-4,height:ROW_H-16,
                        background:dr.bg,border:(dr.dash?"1px dashed ":"1px solid ")+dr.bd,borderRadius:7,cursor:isAdmin?"pointer":"default",
                        display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                        overflow:"hidden",color:dr.tc,fontSize:11,fontWeight:700,lineHeight:1.25,padding:"0 4px",textAlign:"center"}},
                      h("span",{style:{position:"absolute",top:4,right:5,width:8,height:8,borderRadius:8,background:x.p.ams?C.mavi:C.sari}}),
                      width>52 && h(React.Fragment,null,
                        h("div",null,num(x.p.adet)+" x "+x.p.ad),
                        h("div",null, dr.onay ? "▶ Başlasın mı?" : fmtTarihSaat(x.e))));
                  }),
                  // şimdi çizgisi
                  (now>=baslaMs&&now<=bitMs) && h("div",{style:{position:"absolute",left:(now-baslaMs)*px,top:0,bottom:0,width:2,background:C.navyHdr,opacity:.55}})
                ));
            })
          ))),

    // alt paneller (üretim analizleri — yalnız yönetici)
    isAdmin && h("div",{style:{display:"grid",gap:14,gridTemplateColumns:"repeat(auto-fit,minmax(330px,1fr))"}},
      // boş kalacak makineler
      h("div",{style:S.card},
        h("div",{style:S.hdr},"BOŞ KALACAK MAKİNELER"),
        h("div",{style:{padding:"4px 0",maxHeight:300,overflowY:"auto"}},
          !bosListe.length ? h("div",{style:{padding:16,color:C.mut,textAlign:"center"}},"Boşluk yok — plan dolu 🎉")
          : bosListe.slice(0,40).map((b,i)=>h("div",{key:i,onClick:()=>setIsModal({makineId:b.makine.id,baslangic:b.start}),
              style:{display:"grid",gridTemplateColumns:"70px 52px 1fr auto",gap:8,alignItems:"center",
                padding:"8px 14px",borderTop:i?"1px solid "+C.line:"none",cursor:"pointer",fontSize:13}},
              h("span",{style:{color:C.mut}},"📅 "+fmtTarih(b.start)),
              h("b",null,fmtSaat(b.start)),
              h("span",{style:{fontWeight:700}},b.makine.ad),
              h("span",{style:{color:C.kirmiziB,fontWeight:700,fontSize:12}},"Yeni iş yükle →")))) ),
      // makine özeti
      h("div",{style:S.card},
        h("div",{style:S.hdr},"MAKİNE ÖZETİ (HAFTALIK)"),
        h("div",{style:{display:"grid",gridTemplateColumns:"1.1fr .9fr .9fr .9fr 78px",gap:6,
          padding:"7px 14px",borderBottom:"1px solid "+C.line,fontSize:11,fontWeight:700,color:C.mut}},
          h("span",null,"MAKİNE"),h("span",null,"BASKI"),h("span",{style:{color:C.kirmiziB}},"KAYIP"),h("span",{style:{color:"#c2410c"}},"GECİKME"),h("span",null,"DOLULUK")),
        h("div",{style:{padding:"2px 0"}},
          mlist.map((mk,i)=>{
            const tl=timelines[mk.id]||{printMs:0,kayipMs:0,gecikmeMs:0};
            const dol = toplamMs? Math.round(tl.printMs/toplamMs*1000)/10 : 0;
            return h("div",{key:mk.id,style:{display:"grid",gridTemplateColumns:"1.1fr .9fr .9fr .9fr 78px",gap:6,alignItems:"center",
              padding:"8px 14px",borderTop:i?"1px solid "+C.line:"none",fontSize:12.5}},
              h("b",null,mk.ad),
              h("span",{style:{color:C.mut}},fmtSureSaat(tl.printMs/60000)),
              h("span",{style:{color: tl.kayipMs>0?C.kirmiziB:C.mut, fontWeight: tl.kayipMs>0?700:400}},fmtSureSaat(tl.kayipMs/60000)),
              h("span",{style:{color: tl.gecikmeMs>0?"#c2410c":C.mut, fontWeight: tl.gecikmeMs>0?700:400}},fmtSureSaat(tl.gecikmeMs/60000)),
              h("div",{style:{display:"flex",alignItems:"center",gap:6}},
                h("div",{style:{flex:1,height:8,background:"#eef2f7",borderRadius:9,overflow:"hidden"}},
                  h("div",{style:{height:"100%",width:dol+"%",background:dol>=70?C.yesilB:dol>=40?C.sari:C.kirmiziB}})),
                h("span",{style:{fontWeight:700,fontSize:12}},"%"+dol)));
          }))),
      // genel özet
      h("div",{style:S.card},
        h("div",{style:S.hdr},"GENEL ÖZET"),
        h("div",{style:{padding:16,display:"grid",gap:12}},
          h("div",{style:{...S.card,padding:14,textAlign:"center"}},
            h("div",{style:{fontSize:12,color:C.mut,fontWeight:700}},"TOPLAM KAPASİTE"),
            h("div",{style:{fontSize:11,color:C.mut}},mlist.length+" makine × 24 saat × "+gunSayisi+" gün"),
            h("div",{style:{fontSize:24,fontWeight:800,color:C.navyHdr,marginTop:4}},Math.round(kapasiteMs/3600000)+" SAAT")),
          h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(78px,1fr))",gap:10}},
            h("div",{style:{...S.card,padding:"12px 8px",textAlign:"center"}},
              h("div",{style:{fontSize:11,color:C.mut,fontWeight:700}},"BASKI"),
              h("div",{style:{fontSize:15,fontWeight:800,marginTop:4}},fmtSureSaat(toplamPrint/60000)),
              h("div",{style:{fontWeight:800,color:C.yesilB}},"(%"+yuzde(toplamPrint)+")")),
            h("div",{style:{...S.card,padding:"12px 8px",textAlign:"center"}},
              h("div",{style:{fontSize:11,color:C.mut,fontWeight:700}},"BOŞTA"),
              h("div",{style:{fontSize:15,fontWeight:800,marginTop:4}},fmtSureSaat(toplamBosGelecek/60000)),
              h("div",{style:{fontWeight:800,color:C.kirmiziB}},"(%"+yuzde(toplamBosGelecek)+")")),
            h("div",{style:{...S.card,padding:"12px 8px",textAlign:"center",borderColor:C.kirmiziB}},
              h("div",{style:{fontSize:11,color:C.kirmiziB,fontWeight:700}},"⚠ KAYIP"),
              h("div",{style:{fontSize:15,fontWeight:800,marginTop:4}},fmtSureSaat(toplamKayip/60000)),
              h("div",{style:{fontWeight:800,color:C.kirmiziB}},"(%"+yuzde(toplamKayip)+")")),
            h("div",{style:{...S.card,padding:"12px 8px",textAlign:"center",borderColor:"#c2410c"}},
              h("div",{style:{fontSize:11,color:"#c2410c",fontWeight:700}},"⏱ GECİKME"),
              h("div",{style:{fontSize:15,fontWeight:800,marginTop:4}},fmtSureSaat(toplamGecikme/60000)),
              h("div",{style:{fontWeight:800,color:"#c2410c"}},"("+toplamGecikmeSayi+" baskı)"))))) ),

    h("div",{style:{textAlign:"right",fontSize:12,color:C.mut,marginTop:12}},"Güncelleme: "+fmtTarihSaat(now)),

    isModal && h(IsModal,{kayit:isModal,makineler:mlist,plan,urunler:stokUrun,filamentler,haftaBas:baslaMs,haftaBit:bitMs,onSnap:snapAl,onKapat:()=>setIsModal(null)}),
    makineAcik && h(MakineYonetim,{makineler:mlist,onKapat:()=>setMakineAcik(false)}),
    filamentAcik && h(FilamentYonetim,{filamentler,onKapat:()=>setFilamentAcik(false)})
  ),
    // —— ALT BAR: Ayarlar · PC/Mobil · Çıkış ——
    h("div",{style:{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap",margin:"26px auto 10px",paddingTop:16,borderTop:"1px solid "+C.line,maxWidth:480}},
      h("button",{style:altBtnS,onClick:()=> isAdmin?setEkipAcik(true):setAyarAcik(true)},
        minimal?mi("settings",19):h("span",null,"⚙"), h("span",null,"Ayarlar")),
      h("button",{style:altBtnS,onClick:()=>setGorunum(g=>g==="pc"?"mobil":"pc")},
        minimal?mi(gorunum==="pc"?"smartphone":"computer",19):h("span",null,gorunum==="pc"?"📱":"🖥"), h("span",null, gorunum==="pc"?"Mobil görünüm":"PC görünüm")),
      h("button",{style:altBtnS,onClick:cikis},
        minimal?mi("logout",19):h("span",null,"⏻"), h("span",null,"Çıkış"))),
    ayarAcik && h(Modal,{baslik:"Ayarlar", onKapat:()=>setAyarAcik(false), alt:h("button",{style:{...S.btn(),flex:1},onClick:()=>setAyarAcik(false)},"Kapat")},
      h("div",{style:{display:"grid",gap:10}},
        h("button",{style:{...S.btn()},onClick:()=>setGorunum(g=>g==="pc"?"mobil":"pc")}, "Görünüm: "+(gorunum==="pc"?"PC (mobile geç)":"Mobil (PC'ye geç)")),
        h("button",{style:{...S.btn(),borderColor:C.kirmiziB,color:C.kirmiziB},onClick:cikis},"Çıkış yap"),
        h("div",{style:{fontSize:12,color:C.mut,textAlign:"center"}}, "Tikita"+(demo?" · deneme":"")+" · "+aktif.ad)))
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
