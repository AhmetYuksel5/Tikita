const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,8);

async function remove(coll,id){ await deleteDoc(doc(db,coll,id)); }

// #13 PIN'ler düz metin saklanmaz — tuzlu SHA-256 özet
function yeniSalt(){ const a=new Uint8Array(8); crypto.getRandomValues(a); return Array.from(a).map(b=>b.toString(16).padStart(2,"0")).join(""); }
async function pinHashle(pin, salt){ const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode((salt||"")+":"+pin));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join(""); }
async function yeniKullaniciPin(pin){ const salt=yeniSalt(); return { pinSalt:salt, pinHash:await pinHashle(pin,salt) }; }
async function pinDogru(user, pin){ if(user.pinHash) return (await pinHashle(pin,user.pinSalt||""))===user.pinHash; return pin===(user.pin||""); }
// KİŞİYE ÖZEL ÇANTA — her pazarlamacının çantası ürün üzerinde pazStokK[kullaniciId] haritasında tutulur
function bagOf(u){ const uid=AKTIF_KUL?AKTIF_KUL.id:""; const m=(u&&u.pazStokK)||{}; const v=m[uid]; return v==null?0:num(v); }
async function bagYaz(u, yeniAdet, ekstra){ const uid=AKTIF_KUL?AKTIF_KUL.id:"";
  const obj={id:u.id,pazStokK:{[uid]:Math.max(0,Math.round(num(yeniAdet)))}};
  // atölye stoğu ORTAK → yarış durumuna karşı atomik artır/azalt (increment)
  if(ekstra&&ekstra.stoktaDelta!=null) obj.stokta=increment(Math.round(num(ekstra.stoktaDelta)));
  await save("stok_urun",obj); }
// satış/konsinye fiyatı 0 ise uyar — sessiz 0-ciro kaydını önle
function fiyatOnay(kalemler){ const s=kalemler.filter(x=>num(x.fiyat)<=0);
  if(!s.length) return true;
  return confirm("⚠ Satış fiyatı 0 ₺ olan ürün(ler):\n"+s.map(x=>"• "+x.ad).join("\n")+"\n\nBu haliyle 0 ciro yazılır. Yine de devam edeyim mi?\n(Fiyatı Cephane / Stok kısmından düzeltebilirsin.)"); }

  return st;
}
const num = v => { const n=parseFloat(v); return isNaN(n)?0:n; };
const pad = n => String(n).padStart(2,"0");
const fmtSaat = d => { const t=new Date(d); return pad(t.getHours())+":"+pad(t.getMinutes()); };
const fmtTarih = d => { const t=new Date(d); return pad(t.getDate())+"."+pad(t.getMonth()+1); };
const fmtTarihSaat = d => fmtTarih(d)+" "+fmtSaat(d);
const GUNLER = ["PAZAR","PAZARTESİ","SALI","ÇARŞAMBA","PERŞEMBE","CUMA","CUMARTESİ"];
const AYLAR = ["OCAK","ŞUBAT","MART","NİSAN","MAYIS","HAZİRAN","TEMMUZ","AĞUSTOS","EYLÜL","EKİM","KASIM","ARALIK"];
const SAAT_MALIYET = 12;   // makine çalışma maliyeti (₺/saat)
function tl(n){ return num(n).toLocaleString("tr",{minimumFractionDigits:0,maximumFractionDigits:2})+" ₺"; }
// görseli küçült → data URL (Firestore'a sığsın)
function resizeImg(file, max){ max=max||900; return new Promise((res,rej)=>{
  const rd=new FileReader();
  rd.onload=()=>{ const img=new Image();
    img.onload=()=>{ let w=img.width,h=img.height; const sc=Math.min(1,max/Math.max(w,h)); w=Math.round(w*sc); h=Math.round(h*sc);
      const cv=document.createElement("canvas"); cv.width=w; cv.height=h; cv.getContext("2d").drawImage(img,0,0,w,h);
      res(cv.toDataURL("image/jpeg",0.8)); };
    img.onerror=rej; img.src=rd.result; };
  rd.onerror=rej; rd.readAsDataURL(file);
}); }
// ada göre sabit renk (kartları görsel ayırmak için)
function adRenk(s){ let hsh=0; const t=s||"?"; for(let i=0;i<t.length;i++) hsh=(hsh*31+t.charCodeAt(i))>>>0;
  const H=hsh%360; return { H, ana:"hsl("+H+",58%,46%)", acik:"hsl("+H+",62%,60%)", yumusak:"hsl("+H+",64%,96%)" }; }
// ürün bilgisi + görselleri WhatsApp / paylaşım
async function paylasWhats(u, fiyat){
  const sat = fiyat!=null?num(fiyat):num(u.satisFiyat);
  const text=[u.ad, u.aciklama||"", sat>0?("Fiyat: "+tl(sat)):""].filter(Boolean).join("\n");
  const fotos=(u.foto||[]);
  try{
    if(navigator.canShare && fotos.length){
      const files=[];
      for(let i=0;i<Math.min(fotos.length,4);i++){ const b=await (await fetch(fotos[i])).blob(); files.push(new File([b],"urun"+(i+1)+".jpg",{type:b.type||"image/jpeg"})); }
      if(navigator.canShare({files})){ await navigator.share({text,files}); return; }
    }
    if(navigator.share){ await navigator.share({text}); return; }
  }catch(e){ if(e&&e.name==="AbortError") return; }
  window.open("https://wa.me/?text="+encodeURIComponent(text),"_blank");
}
function fmtSureSaat(dk){ dk=Math.max(0,Math.round(num(dk))); return Math.floor(dk/60)+" sa "+pad(dk%60)+" dk"; }
function toInput(d){ const t=new Date(d); return t.getFullYear()+"-"+pad(t.getMonth()+1)+"-"+pad(t.getDate())+"T"+pad(t.getHours())+":"+pad(t.getMinutes()); }
function gunBasi(d){ const t=new Date(d); t.setHours(0,0,0,0); return t; }
function haftaBasi(d){ const t=gunBasi(d); t.setDate(t.getDate()-((t.getDay()-6+7)%7)); return t; }  // o haftanın Cumartesi'si
function ayBasi(d){ const t=new Date(d); return new Date(t.getFullYear(),t.getMonth(),1).getTime(); }
// ürün birim maliyeti (baskılardan) — elle girilmişse o; eksik veri → null
function urunBirimMaliyet(u, prints, filById){
  const birim=p=>{ const fl=filById[p.filamentId];
    if(!(num(p.sureDk)>0 && num(p.gram)>0 && fl && num(fl.kgFiyat)>0)) return null;
    const ad=Math.max(1,num(p.adet||1)); return (num(p.sureDk)/ad/60)*SAAT_MALIYET + (num(p.gram)/ad/1000)*num(fl.kgFiyat); };
  const ort=arr=>{ const cs=arr.map(birim).filter(x=>x!=null); return cs.length?cs.reduce((a,b)=>a+b,0)/cs.length:null; };
  const parts=u.parcalar||[];
  if(parts.length){ let tot=0; for(const part of parts){ const c=ort(prints.filter(p=>p.parcaAd===part)); if(c==null) return ort(prints.filter(p=>!p.parcaAd));
    tot+=c*Math.max(1,Math.round(num((u.parcaAdet||{})[part]||1))); } return tot; }
  return ort(prints);
}
function urunMaliyet(u, prints, filById){ return num(u.maliyet)>0 ? num(u.maliyet) : urunBirimMaliyet(u,prints,filById); }

/* Sağa kaydır → solda Sil çıkan satır (önceki baskılar listesi) */
function OncekiSatir({ label, alt, onSec, onSil }){
  const [dx,setDx]=useState(0);
  const [open,setOpen]=useState(false);
  const st=React.useRef({x:0,base:0,drag:false,moved:false});
  const REVEAL=84;
  const xOf=e=>(e.touches&&e.touches[0]?e.touches[0].clientX:e.clientX);
  function down(e){ st.current={x:xOf(e),base:dx,drag:true,moved:false}; }
  function move(e){ const s=st.current; if(!s.drag)return; const dxRaw=xOf(e)-s.x; if(Math.abs(dxRaw)>4)s.moved=true;
    setDx(Math.max(0,Math.min(REVEAL,s.base+dxRaw))); }
  function up(){ const s=st.current; if(!s.drag)return; s.drag=false; const o=dx>REVEAL/2; setOpen(o); setDx(o?REVEAL:0); }
  function tikla(){ if(st.current.moved)return; if(open){ setOpen(false); setDx(0); return; } onSec&&onSec(); }
  return h("div",{style:{position:"relative",overflow:"hidden",borderRadius:8,marginBottom:6,border:"1px solid "+C.line}},
    h("button",{type:"button",onClick:onSil,style:{position:"absolute",left:0,top:0,bottom:0,width:REVEAL,border:"none",
      background:C.kirmiziB,color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}},"🗑 Sil"),
    h("div",{onMouseDown:down,onMouseMove:move,onMouseUp:up,onMouseLeave:up,
      onTouchStart:down,onTouchMove:move,onTouchEnd:up,onClick:tikla,
      style:{position:"relative",transform:"translateX("+dx+"px)",transition:st.current.drag?"none":"transform .18s",
        background:"#fff",padding:"9px 12px",cursor:"pointer",userSelect:"none",WebkitUserSelect:"none",touchAction:"pan-y"}},
      h("div",{style:{fontWeight:700,fontSize:14}},label),
      alt&&h("div",{style:{fontSize:11.5,color:C.mut,marginTop:2}},alt)));
}

/* ============================================================
   İŞ (plan kaydı) modalı
   ============================================================ */
function IsModal({ kayit, makineler, plan, urunler, filamentler, onSnap, onKapat }){
  const yeni = !kayit.id;
  const [f,setF] = useState(()=>({
    makineId: kayit.makineId || (makineler[0]&&makineler[0].id) || "",
    ad:       kayit.ad       || "",
    urunId:   kayit.urunId   || "",
    parcaAd:  kayit.parcaAd  || "",
    adet:     kayit.adet     || 1,
    baslangic:toInput(kayit.baslangic || Date.now()),
    sureDk:   kayit.sureDk   || "",
    gram:     kayit.gram     || "",
    filamentId: kayit.filamentId || "",
    ams:      kayit.ams != null ? kayit.ams : true,
    not:      kayit.not      || "",
    basladi:  !!kayit.basladi,
  }));
  // ürün seçimi: kayıtlı bir ürüne bağlıysa o ürünü/parçasını seç, yoksa elle giriş ("diger")
  const urunListe = (urunler||[]).slice().sort((a,b)=>(a.ad||"").localeCompare(b.ad||"","tr"));
  const [urunMod,setUrunMod] = useState(()=> (kayit.urunId || !kayit.ad) ? "urun" : "diger");
  // mevcut seçimin select value'su
  const urunVal = f.urunId ? ("u:"+f.urunId+(f.parcaAd?("|"+f.parcaAd):"")) : "";
  const [tekrar,setTekrar] = useState(false);
  const [planReset,setPlanReset] = useState(false);
  const [tik,setTik] = useState(Date.now());
  useEffect(()=>{ const t=setInterval(()=>setTik(Date.now()),1000); return ()=>clearInterval(t); },[]);
  const set=(k,v)=>setF(s=>({...s,[k]:v}));
  // önceki baskılar — tekil (ad+adet+süre+ams). Seçili makinede basılanlar en üstte,
  // o makinenin en son baskısı en başta; sonra diğer makineler. Her grup en yeni önce.
  const oncekiler = useMemo(()=>{
    const seen=new Set(), out=[];
    (plan||[]).filter(p=>p.id!==kayit.id)
      .sort((a,b)=>{
        const am=(a.makineId===f.makineId)?1:0, bm=(b.makineId===f.makineId)?1:0;
        if(am!==bm) return bm-am;                              // seçili makine önce
        return new Date(b.baslangic)-new Date(a.baslangic);    // en yeni önce
      })
      .forEach(p=>{ const sig=(p.ad||"")+"|"+num(p.adet)+"|"+num(p.sureDk)+"|"+(p.ams?1:0);
        if(!seen.has(sig)){ seen.add(sig); out.push(p); } });
    return out.slice(0,30);
  },[plan,kayit.id,f.makineId]);
  function tekrarla(o){
    if(!o) return;
    setF(s=>({ ...s, ad:o.ad, urunId:o.urunId||"", parcaAd:o.parcaAd||"", adet:o.adet, sureDk:o.sureDk, gram:o.gram||"", filamentId:o.filamentId||"", ams:!!o.ams, not:o.not||"" }));
    setUrunMod((o.urunId||!o.ad)?"urun":"diger");
    setTekrar(true);
  }
  // ürün açılır listesinden seçim: value "u:<id>" veya "u:<id>|<parça>"
  function urunSec(val){
    if(!val){ setF(s=>({...s,urunId:"",parcaAd:"",ad:""})); return; }
    const [, rest] = val.split(/^u:/);
    const [id,parca] = (rest||"").split("|");
    const u = urunListe.find(x=>x.id===id);
    if(!u) return;
    setF(s=>({...s, urunId:id, parcaAd:parca||"", ad: parca ? (u.ad+" "+parca) : u.ad }));
  }
  async function kaydet(){
    if(!f.makineId) return alert("Makine seç.");
    if(!f.ad.trim()) return alert("İş/ürün adı gir.");
    if(!f.sureDk)   return alert("Süre gir (dk).");
    onSnap&&onSnap();
    const sMs = new Date(f.baslangic).getTime();
    // Yeni iş geçmiş bir zaman dilimine giriliyorsa → planlanan değil, tamamlanmış (başladı) say
    const basladi = yeni ? (sMs <= Date.now()) : !!f.basladi;
    // planSureDk = ilk plan süresi (gecikme baz çizgisi). İlk kayıtta sabitlenir; "yeni plan kabul et" ile sıfırlanabilir.
    const planSureDk = (planReset || kayit.planSureDk==null) ? num(f.sureDk) : num(kayit.planSureDk);
    const id = await save("plan",{ id:kayit.id, makineId:f.makineId, ad:f.ad.trim(), adet:num(f.adet),
      urunId: (urunMod==="urun" ? f.urunId : "") || "", parcaAd: (urunMod==="urun" ? f.parcaAd : "") || "",
      baslangic:new Date(f.baslangic).toISOString(), sureDk:num(f.sureDk), planSureDk, gram:num(f.gram), filamentId:f.filamentId||"", ams:!!f.ams, not:f.not,
      basladi, gercekBaslangic: basladi ? (kayit.gercekBaslangic || new Date(f.baslangic).toISOString()) : null });
    if(!yeni && kayit.makineId===f.makineId){
      // başlama/süre değişti → sonraki işleri aynı delta (bitiş kayması) kadar otele
      const eskiBas = new Date(kayit.baslangic).getTime();
      const delta = (sMs + num(f.sureDk)*60000) - (eskiBas + num(kayit.sureDk)*60000);

/* ============================================================
   GANTT — zaman çizelgesi hesapları
   ============================================================ */
// Başlama saati değişince: sonraki işleri (eski sıraya göre) aynı delta kadar öteler — boşluklar/ara korunur
async function planOtele(makineId, plan, oldStartMs, deltaMs, editedId){
  if(!deltaMs) return;
  const ds = plan.filter(p=>p.makineId===makineId && p.id!==editedId
    && new Date(p.baslangic).getTime() > oldStartMs);
  for(const p of ds){
    await save("plan",{ id:p.id, baslangic:new Date(new Date(p.baslangic).getTime()+deltaMs).toISOString() });
  }
}
// Plan aksarsa: aynı makinedeki işleri başlangıç sırasına göre çakışmasız diz (yalnız ileri kaydır)
async function planKaydir(makineId, plan, edited){
  const arr = plan.filter(p=>p.makineId===makineId && p.id!==edited.id)
    .map(p=>({ id:p.id, s:new Date(p.baslangic).getTime(), dk:num(p.sureDk) }));
  arr.push({ id:edited.id, s:edited.s, dk:edited.dk });
  arr.sort((a,b)=>a.s-b.s);
  let prevEnd=null;
  for(const j of arr){
    let s=j.s;
    if(prevEnd!=null && s<prevEnd) s=prevEnd;          // çakışıyorsa öncekinin bitişine çek
    if(s!==j.s) await save("plan",{ id:j.id, baslangic:new Date(s).toISOString() });
    prevEnd = s + j.dk*60000;
  }
}
function tickStep(gunW){ // saat aralığı — zoom'a göre detay
  const slots = Math.max(1, Math.floor(gunW/36));
  for(const o of [1,2,3,4,6,8,12,24]){ if(24/o <= slots) return o; }
  return 24;
}
function makineTimeline(makineId, plan, baslaMs, bitMs, now){
  const js = plan.filter(p=>p.makineId===makineId)
    .map(p=>({ p, s:new Date(p.baslangic).getTime(), e:new Date(p.baslangic).getTime()+num(p.sureDk)*60000 }))
    .filter(x=>x.e>baslaMs && x.s<bitMs)
    .sort((a,b)=>a.s-b.s);
  let printMs=0;
  js.forEach(x=>{ printMs += Math.min(bitMs,x.e)-Math.max(baslaMs,x.s); });
  const bos=[]; let cur=baslaMs;
  js.forEach(x=>{ const s=Math.max(baslaMs,x.s); if(s>cur) bos.push({start:cur,end:s}); cur=Math.max(cur,Math.min(bitMs,x.e)); });
  if(cur<bitMs) bos.push({start:cur,end:bitMs});
  // kayıp = geçmişte (now'dan önce) çalışmayan dilimler
  let kayipMs=0;
  bos.forEach(b=>{ const pe=Math.min(b.end, now||0); if(pe>b.start) kayipMs += pe-b.start; });
  // gecikme = bitiş ilk plandan ne kadar ileri alındı (sureDk - planSureDk)
  let gecikmeMs=0, gecikmeSayi=0;
  js.forEach(x=>{ const base=x.p.planSureDk!=null?num(x.p.planSureDk):num(x.p.sureDk);
    const g=(num(x.p.sureDk)-base)*60000; if(g>0){ gecikmeMs+=g; gecikmeSayi++; } });
  const bosMs=(bitMs-baslaMs)-printMs;
  return { js, bos, printMs, bosMs, kayipMs, bosGelecekMs: bosMs-kayipMs, gecikmeMs, gecikmeSayi };
}

function StokTab({ urunler, plan, filamentler, hareketler }){
  const [edit,setEdit]=useState(null);
  const [aks,setAks]=useState(null);   // kutucuk komut penceresi {u,stage}
  const [acik,setAcik]=useState({});   // ürün kartında baskı listesi açık mı
  const liste = urunler.slice().sort((a,b)=>a.ad.localeCompare(b.ad,"tr"));
  const filById = useMemo(()=>{ const m={}; (filamentler||[]).forEach(f=>m[f.id]=f); return m; },[filamentler]);
  // her ürünün TÜM baskıları (urunId'ye göre) — aynı ürünün baskıları tek kartta toplanır
  const baskiMap = useMemo(()=>{
    const m={};
    (plan||[]).forEach(p=>{ if(!p.urunId) return; (m[p.urunId]=m[p.urunId]||[]).push(p); });
    Object.values(m).forEach(arr=>arr.sort((a,b)=>new Date(b.baslangic)-new Date(a.baslangic)));
    return m;
  },[plan]);
  // bir baskının birim (adet başına) detayı — toplam gram/süre adede bölünür; eksik veri → null
  //  örn: 300 gr · 50 adet → 6 gr/adet ; 600 dk · 50 adet → 12 dk/adet
  function birimDetay(p){
    const fl=filById[p.filamentId];
    if(!(num(p.sureDk)>0 && num(p.gram)>0 && fl && num(fl.kgFiyat)>0)) return null;
    const adet=Math.max(1,num(p.adet||1));
    const gram=num(p.gram)/adet, dk=num(p.sureDk)/adet;
    return { gram, dk, maliyet:(dk/60)*SAAT_MALIYET + (gram/1000)*num(fl.kgFiyat) };
  }
  // ürünün adet başına detayı — parçalıda her parçanın ortalaması toplanır (1 takım)
  function urunDetay(u){
    const prints=baskiMap[u.id]||[]; const parts=u.parcalar||[];
    const ort=arr=>{ const cs=arr.map(birimDetay).filter(Boolean); if(!cs.length) return null; const n=cs.length;
      return { gram:cs.reduce((a,b)=>a+b.gram,0)/n, dk:cs.reduce((a,b)=>a+b.dk,0)/n, maliyet:cs.reduce((a,b)=>a+b.maliyet,0)/n }; };
    if(parts.length){
      const tot={gram:0,dk:0,maliyet:0};
      for(const part of parts){ const c=ort(prints.filter(p=>p.parcaAd===part)); if(!c) return ort(prints.filter(p=>!p.parcaAd));
        const g=gereken(u,part); tot.gram+=c.gram*g; tot.dk+=c.dk*g; tot.maliyet+=c.maliyet*g; }
      return tot;
    }
    return ort(prints);
  }
  // gösterilecek maliyet: elle girilmişse o, değilse baskılardan hesaplanan, yoksa null
  const maliyetOf=(u)=> num(u.maliyet)>0 ? {v:num(u.maliyet),elle:true} : (()=>{ const d=urunDetay(u); return d?{v:d.maliyet,elle:false,detay:d}:null; })();
  const baskiDurum=(p)=>{
    const s=new Date(p.baslangic).getTime(), e=s+num(p.sureDk)*60000, now=Date.now();
    if(!p.basladi) return s>now?{t:"planlandı",c:C.mut}:{t:"onay bekliyor",c:"#e0a200"};
    if(e<=now) return {t:"bitti",c:C.bitT};
    return {t:"basımda",c:"#0e7490"};
  };
  // baskılardan otomatik türetim: aynı üründen toplanır (ayrı kayıt açılmaz)
  //  basimMap  = şu an makinede çalışan (başlamış, bitmemiş) adet
  //  basildiMap= basımı bitmiş toplam adet (urunId'ye göre)
  //  basildiParca = parçalı üründe her parçanın basılmış adedi
  const { basimMap, basildiMap, basildiParca } = useMemo(()=>{
    const now=Date.now(), bsm={}, bld={}, bldP={}, prodById={};
    urunler.forEach(u=>prodById[u.id]=u);
    (plan||[]).forEach(p=>{
      if(!p.urunId || !p.basladi) return;
      const s=new Date(p.baslangic).getTime(), e=s+num(p.sureDk)*60000, ad=num(p.adet||1);
      if(s<=now && e>now){ bsm[p.urunId]=num(bsm[p.urunId])+ad; return; }   // çalışıyor
      if(e<=now){                                                          // basımı bitti → stoğa say
        bld[p.urunId]=num(bld[p.urunId])+ad;
        const u=prodById[p.urunId];
        if(u && (u.parcalar||[]).length){
          bldP[p.urunId]=bldP[p.urunId]||{};
          if(p.parcaAd && u.parcalar.includes(p.parcaAd)) bldP[p.urunId][p.parcaAd]=num(bldP[p.urunId][p.parcaAd])+ad;
          else u.parcalar.forEach(pt=>bldP[p.urunId][pt]=num(bldP[p.urunId][pt])+ad);   // "tümü/takım" → her parçaya +1
        }
      }
    });
    return { basimMap:bsm, basildiMap:bld, basildiParca:bldP };
  },[plan,urunler]);

  // montajda = basımı bitmiş ama montajı bitmemiş (montaja hazır havuz) — parçalıda takım sayısı
  //  parça stoğu = basımdan gelen + elle eklenen − montajda kullanılan
  const parcaAvail=(u,p)=> Math.max(0, num((basildiParca[u.id]||{})[p]) + num((u.parcaElle||{})[p]) - num((u.parcaTuket||{})[p]));
  const gereken=(u,p)=> Math.max(1, Math.round(num((u.parcaAdet||{})[p]||1)));   // bir üründe kaç adet gerekli
  const parcaTakim=(u,p)=> Math.floor(parcaAvail(u,p)/gereken(u,p));             // bu parçadan kaç takım çıkar
  // parçanın mevcut (montaja hazır) stoğunu doğrudan hedef sayıya ayarla → elle ofseti hesapla
  async function parcaStokAyarla(u,p,hedef){
    const otomatik = num((basildiParca[u.id]||{})[p]) - num((u.parcaTuket||{})[p]);
    const pe={...(u.parcaElle||{})}; pe[p]=Math.round(num(hedef))-otomatik;
    await save("stok_urun",{id:u.id,parcaElle:pe});
  }
  const montajBaz=(u)=> (u.parcalar||[]).length
    ? Math.min.apply(null, u.parcalar.map(p=>parcaTakim(u,p)))
    : num(basildiMap[u.id]) - num(u.montajBitti) - num(u.zayiat);
  const montajdaOf=(u)=> Math.max(0, montajBaz(u) + num(u.montajElle));   // otomatik baz + elle ofset
  // montaj adedini elle doğrudan belirle → elle ofseti hedefe göre ayarla
  async function montajAyarla(u,hedef){ const t=Math.max(0,Math.round(num(hedef))); await save("stok_urun",{id:u.id,montajElle:Math.round(t-montajBaz(u))}); }
  // stok adedini elle doğrudan belirle
  async function stoktaAyarla(u,hedef){ await save("stok_urun",{id:u.id,stokta:Math.max(0,Math.round(num(hedef)))}); }

  // pazarlamacıların sahada bıraktığı AÇIK konsinye (pazarlama_hareket, kalan>0) — ürün başına yer dağılımı
  const konsSaha = useMemo(()=>{
    const m={};   // urunId -> { toplam, yer:{ yerAdı:{adet, paz:Set} } }
    (hareketler||[]).forEach(x=>{ if(x.tip!=="konsinye"||!x.urunId) return; const k=num(x.kalan); if(k<=0) return;
      const o=m[x.urunId]||(m[x.urunId]={toplam:0,yer:{}});
      o.toplam+=k; const y=x.yer||"?"; const yo=o.yer[y]||(o.yer[y]={adet:0,paz:new Set()});
      yo.adet+=k; if(x.kullaniciAd) yo.paz.add(x.kullaniciAd); });
    return m;
  },[hareketler]);
  const sahaKonsToplam = Object.values(konsSaha).reduce((s,o)=>s+o.toplam,0);

  // pazarlamacıların yaptığı SATIŞLAR (pazarlama_hareket, tip satis) — ürün başına yer dağılımı; konsinyeden satılan ayrıca işaretli
  const satSaha = useMemo(()=>{
    const m={};   // urunId -> { toplam, kons, yer:{ yerAdı:{adet, kons, paz:Set} } }
    (hareketler||[]).forEach(x=>{ if(x.tip!=="satis"||!x.urunId) return; const a=num(x.adet); if(a<=0) return;
      const kons = x.kaynak==="konsinye";
      const o=m[x.urunId]||(m[x.urunId]={toplam:0,kons:0,yer:{}});
      o.toplam+=a; if(kons)o.kons+=a;
      const y=x.yer||"?"; const yo=o.yer[y]||(o.yer[y]={adet:0,kons:0,paz:new Set()});
      yo.adet+=a; if(kons)yo.kons+=a; if(x.kullaniciAd) yo.paz.add(x.kullaniciAd); });
    return m;
  },[hareketler]);
  const sahaSatToplam = Object.values(satSaha).reduce((s,o)=>s+o.toplam,0);

  const T = liste.reduce((a,u)=>{a.basim+=num(basimMap[u.id]);a.montajda+=montajdaOf(u);a.stokta+=num(u.stokta);a.konsinye+=num(u.konsinye);a.satildi+=num(u.satildi);return a;},{basim:0,montajda:0,stokta:0,konsinye:0,satildi:0});

  // montajdaki havuzdan N adet tüket (stoğa ekle veya zayiat) — parçalıda her parçadan N
  async function montajdanTuket(u,n,hedef){   // hedef: "stokta" | "zayiat"
    n=Math.floor(num(n)); if(n<1) return;
    const parcalar=u.parcalar||[];
    if(parcalar.length){
      if(montajdaOf(u)<n) return alert("Montajda yeterli takım yok ("+montajdaOf(u)+" hazır).");
      const elle=Math.max(0,num(u.montajElle)), elleDus=Math.min(elle,n), kalan=n-elleDus;   // önce elle eklenen dış stoktan düş
      const tk={...(u.parcaTuket||{})}; if(kalan>0) parcalar.forEach(p=>tk[p]=num(tk[p])+kalan*gereken(u,p));   // kalanı parçadan gereken×
      const ek = hedef==="stokta" ? {stokta:num(u.stokta)+n} : {zayiat:num(u.zayiat)+n};
      const patch={id:u.id,parcaTuket:tk,...ek}; if(elleDus) patch.montajElle=increment(-elleDus);
      await save("stok_urun",patch);
    } else {
      if(montajdaOf(u)<n) return alert("Montajda yeterli ürün yok ("+montajdaOf(u)+" hazır).");
      const ek = hedef==="stokta" ? {montajBitti:num(u.montajBitti)+n,stokta:num(u.stokta)+n} : {zayiat:num(u.zayiat)+n};
      await save("stok_urun",{id:u.id,...ek});
    }
  }
  async function stoktanCikar(u,n,hedef){     // hedef: "satildi" | "konsinye"
    n=Math.floor(num(n)); if(n<1) return; if(num(u.stokta)<n) return alert("Stokta yeterli ürün yok ("+num(u.stokta)+" var).");
    const ek = hedef==="satildi" ? {satildi:num(u.satildi)+n} : {konsinye:num(u.konsinye)+n};
    await save("stok_urun",{id:u.id,stokta:num(u.stokta)-n,...ek});
  }
  async function konsinyedenCikar(u,n,hedef){ // hedef: "stokta" (iade) | "satildi"
    n=Math.floor(num(n)); if(n<1) return; if(num(u.konsinye)<n) return alert("Konsinyede yeterli ürün yok ("+num(u.konsinye)+" var).");
    const ek = hedef==="stokta" ? {stokta:num(u.stokta)+n} : {satildi:num(u.satildi)+n};
    await save("stok_urun",{id:u.id,konsinye:num(u.konsinye)-n,...ek});
  }
  async function satistanIade(u,n){           // satılan → stoğa iade
    n=Math.floor(num(n)); if(n<1) return; if(num(u.satildi)<n) return alert("Satılan yeterli ürün yok ("+num(u.satildi)+" var).");
    await save("stok_urun",{id:u.id,satildi:num(u.satildi)-n,stokta:num(u.stokta)+n});
  }
  // kutucuğa tıklayınca açılan komut listesi
  function aksiyonCfg(u,stage){
    if(stage==="montajda") return { baslik:"🔧 Montajda — "+u.ad, mevcut:montajdaOf(u), onAyarla:(v)=>montajAyarla(u,v), acts:[
      {label:"📥 Stoğa ekle",renk:"#0369a1",fn:(n)=>montajdanTuket(u,n,"stokta")},
      {label:"⚠ Zayiat",renk:C.kirmiziB,fn:(n)=>montajdanTuket(u,n,"zayiat")} ]};
    if(stage==="stokta") return { baslik:"📥 Stokta — "+u.ad, mevcut:num(u.stokta), onAyarla:(v)=>stoktaAyarla(u,v), acts:[
      {label:"💰 Satış",renk:C.yesilB,fn:(n)=>stoktanCikar(u,n,"satildi")},
      {label:"🏬 Konsinyeye ver",renk:"#7c3aed",fn:(n)=>stoktanCikar(u,n,"konsinye")} ]};
    if(stage==="konsinye") return { baslik:"🏬 Konsinye — "+u.ad, mevcut:num(u.konsinye), acts:[
      {label:"↩ İade (stoğa)",renk:"#0369a1",fn:(n)=>konsinyedenCikar(u,n,"stokta")},
      {label:"💰 Satıldı",renk:C.yesilB,fn:(n)=>konsinyedenCikar(u,n,"satildi")} ]};
    if(stage==="satildi") return { baslik:"💰 Satıldı — "+u.ad, mevcut:num(u.satildi), acts:[
      {label:"↩ Stoğa iade",renk:"#0369a1",fn:(n)=>satistanIade(u,n)} ]};
    return null;
  }

  const ozetKart=(ad,deg,renk)=>h("div",{style:{...S.card,padding:"8px 10px",flex:"1 1 88px",textAlign:"center"}},

// ürün görseli + bilgi düzenleme
function PazUrunModal({ kayit, onKapat }){
  const [foto,setFoto]=useState(kayit.foto||[]);
  const [aciklama,setAciklama]=useState(kayit.aciklama||"");
  const [satisFiyat,setSatisFiyat]=useState(kayit.satisFiyat||"");
  const [yukleniyor,setYukleniyor]=useState(false);
  async function dosyaEkle(e){
    const fs=Array.from(e.target.files||[]); if(!fs.length) return; setYukleniyor(true);
    try{ const yeni=[]; for(const f of fs){ yeni.push(await resizeImg(f,1000)); } setFoto(s=>[...s,...yeni].slice(0,6)); }
    catch(err){ alert("Görsel yüklenemedi."); } finally{ setYukleniyor(false); e.target.value=""; }
  }
  async function kaydet(){ await save("stok_urun",{id:kayit.id,foto,aciklama,satisFiyat:num(satisFiyat)}); onKapat(); }
  return h(Modal,{ baslik:"📷 "+kayit.ad+" — görsel & bilgi", onKapat,
    alt:h(React.Fragment,null,
      h("button",{style:{...S.btn("p"),flex:1},onClick:kaydet},"Kaydet"),
      h("button",{style:S.btn(),onClick:onKapat},"Vazgeç")) },
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(84px,1fr))",gap:8,marginBottom:12}},
      foto.map((src,i)=>h("div",{key:i,style:{position:"relative"}},
        h("img",{src,style:{width:"100%",height:84,objectFit:"cover",borderRadius:8,border:"1px solid "+C.line}}),
        h("button",{onClick:()=>setFoto(s=>s.filter((_,j)=>j!==i)),
          style:{position:"absolute",top:2,right:2,background:"rgba(0,0,0,.6)",color:"#fff",border:"none",borderRadius:6,width:22,height:22,cursor:"pointer",fontWeight:800}},"×"))),
      foto.length<6 && h("label",{style:{height:84,border:"1px dashed "+C.line,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:C.mut,fontSize:12,textAlign:"center"}},
        yukleniyor?"…":"+ Görsel",
        h("input",{type:"file",accept:"image/*",multiple:true,style:{display:"none"},onChange:dosyaEkle}))),
    h(Field,{label:"Ürün açıklaması (müşteriyle paylaşılır)"}, h("textarea",{style:{...S.input,minHeight:80,resize:"vertical"},value:aciklama,onChange:e=>setAciklama(e.target.value),placeholder:"Malzeme, ölçü, renk seçenekleri…"})),
    h(Field,{label:"Satış fiyatı (₺ — öneri)"}, h("input",{type:"number",min:0,step:"0.01",style:S.input,value:satisFiyat,onChange:e=>setSatisFiyat(e.target.value)})));
}

// KONUM SEÇİCİ — mekan adı ara (OpenStreetMap, anahtarsız) + GPS + harita
function KonumSec({ ad, lat, lng, onChange }){
  const [q,setQ]=useState(ad||"");
  const [sonuc,setSonuc]=useState([]); const [ara,setAra]=useState(false);
  const [merkez,setMerkez]=useState(()=> (lat&&lng) ? {lat:+lat,lng:+lng} : {lat:41.0082,lng:28.9784}); // varsayılan: İstanbul
  const [link,setLink]=useState(""); const [cozuluyor,setCozuluyor]=useState(false);
  const touched=useRef(false);
  // açılışta cihaz konumunu (sessizce) al → aramaları yakına göre öncele
  useEffect(()=>{ if(!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(p=>setMerkez({lat:p.coords.latitude,lng:p.coords.longitude}),()=>{},{enableHighAccuracy:true,timeout:8000,maximumAge:300000});
  },[]);
  async function aramaYap(t){ t=(t||"").trim(); if(t.length<2) return; setAra(true);
    const d=0.6, vb=(merkez.lng-d)+","+(merkez.lat+d)+","+(merkez.lng+d)+","+(merkez.lat-d);
    try{ const r=await fetch("https://nominatim.openstreetmap.org/search?format=jsonv2&limit=8&countrycodes=tr&accept-language=tr&viewbox="+vb+"&bounded=1&q="+encodeURIComponent(t));
      let j=await r.json();
      if(!j.length){ const r2=await fetch("https://nominatim.openstreetmap.org/search?format=jsonv2&limit=8&countrycodes=tr&accept-language=tr&q="+encodeURIComponent(t)); j=await r2.json(); }
      j.sort((a,b)=>Math.hypot(+a.lat-merkez.lat,+a.lon-merkez.lng)-Math.hypot(+b.lat-merkez.lat,+b.lon-merkez.lng));
      setSonuc(j);
    }catch(e){ /* sessiz */ } finally{ setAra(false); } }
  // yazarken otomatik ara (debounce)
  useEffect(()=>{ if(!touched.current) return; const t=q.trim();
    if(t.length<2){ setSonuc([]); return; }
    const id=setTimeout(()=>aramaYap(t),450); return ()=>clearTimeout(id);
  },[q,merkez]);
  function sec(r){ const kisa=(r.display_name||"").split(",")[0]||q; onChange({ad:kisa,lat:(+r.lat).toFixed(6),lng:(+r.lon).toFixed(6),tam:r.display_name}); setQ(kisa); setSonuc([]); touched.current=false; }
  function gps(){ if(!navigator.geolocation) return alert("Cihaz konum desteklemiyor.");
    navigator.geolocation.getCurrentPosition(async p=>{ const la=p.coords.latitude.toFixed(6),lo=p.coords.longitude.toFixed(6); setMerkez({lat:+la,lng:+lo}); let nm=q||ad||"";
      try{ const r=await fetch("https://nominatim.openstreetmap.org/reverse?format=jsonv2&accept-language=tr&lat="+la+"&lon="+lo); const j=await r.json(); nm=j.name||(j.display_name||"").split(",")[0]||nm; }catch(e){}
      onChange({ad:nm,lat:la,lng:lo}); setQ(nm); setSonuc([]); }, e=>alert("Konum alınamadı: "+e.message),{enableHighAccuracy:true,timeout:10000,maximumAge:0}); }
  // Google Maps linki / koordinat çöz (kısa link → CORS proxy ile yönlendirmeyi takip et)
  function koordCoz(t){ if(!t) return null;
    const m=t.match(/@(-?\d{1,3}\.\d+),(-?\d{1,3}\.\d+)/) || t.match(/[?&](?:q|ll|daddr|destination|center)=(-?\d{1,3}\.\d+),(-?\d{1,3}\.\d+)/)
          || t.match(/!3d(-?\d{1,3}\.\d+)!4d(-?\d{1,3}\.\d+)/) || t.match(/[\/=](-?\d{1,2}\.\d{4,}),(-?\d{1,3}\.\d{4,})/) || t.match(/(-?\d{1,2}\.\d{3,}),\s*(-?\d{1,3}\.\d{3,})/);
    return m? {lat:(+m[1]).toFixed(6),lng:(+m[2]).toFixed(6)} : null; }
  function adCoz(t){ const m=t.match(/\/place\/([^\/@]+)/); if(m){ try{ return decodeURIComponent(m[1].replace(/\+/g," ")); }catch(e){ return m[1].replace(/\+/g," "); } } return ""; }
  async function linktenKonum(t){ t=(t||"").trim(); if(!t) return;
    let k=koordCoz(t), nm=adCoz(t);
    if(!k && /^https?:\/\//.test(t)){ setCozuluyor(true);
      const proxies=[
        u=>"https://api.allorigins.win/raw?url="+encodeURIComponent(u),
        u=>"https://corsproxy.io/?url="+encodeURIComponent(u),
        u=>"https://r.jina.ai/"+u,
        u=>"https://api.allorigins.win/get?url="+encodeURIComponent(u)
      ];
      for(const mk of proxies){ try{
        const res=await fetch(mk(t)); const txt=await res.text();
        let body=txt; try{ const j=JSON.parse(txt); body=(j.contents||"")+" "+((j.status&&j.status.url)||""); }catch(e){}
        const kk=koordCoz(body); if(!nm) nm=adCoz(body)||nm;
        if(kk){ k=kk; break; }
      }catch(e){} }
      setCozuluyor(false);
    }
    if(!k){ alert("Linkten konum çıkarılamadı 😕\nGoogle Maps'te yeri aç → adres çubuğundaki TAM linki (içinde '@enlem,boylam' olan) kopyala-yapıştır, ya da konumdayken 📍 kullan."); return; }
    nm=nm||q||ad||""; setMerkez({lat:+k.lat,lng:+k.lng}); onChange({ad:nm,lat:k.lat,lng:k.lng}); if(nm) setQ(nm); setLink(""); }
  return h("div",null,
    h("div",{style:{display:"flex",gap:6}},
      h("input",{style:{...S.input,flex:1},value:q,onChange:e=>{ touched.current=true; setQ(e.target.value); },
        onKeyDown:e=>{ if(e.key==="Enter"){ e.preventDefault(); aramaYap(q); } },placeholder:"Mekan adı ara — örn. Migros Üsküdar"}),
      h("button",{type:"button",style:S.btn("p"),onClick:()=>aramaYap(q)},ara?"…":"🔎"),
      h("button",{type:"button",style:S.btn(),onClick:gps,title:"Konumumu al"},"📍")),
    h("div",{style:{fontSize:10.5,color:C.mut,marginTop:6,marginBottom:4}},"Bulamadın mı? Google Maps'ten linki yapıştır — kısa link de olur:"),
    h("div",{style:{display:"flex",gap:6}},
      h("input",{style:{...S.input,flex:1,fontSize:12},value:link,placeholder:"Google Maps linkini yapıştır",
        onChange:e=>setLink(e.target.value),
        onPaste:e=>{ const t=(e.clipboardData||window.clipboardData).getData("text"); if(t){ e.preventDefault(); setLink(t); linktenKonum(t); } },
        onKeyDown:e=>{ if(e.key==="Enter"){ e.preventDefault(); linktenKonum(link); } }}),
      h("button",{type:"button",style:S.btn("p"),onClick:()=>linktenKonum(link)}, cozuluyor?"⏳":"📍 Al")),
    h("a",{href:"https://www.google.com/maps/search/"+encodeURIComponent(q||"")+"/",target:"_blank",
      style:{fontSize:11.5,color:"#0369a1",fontWeight:700,textDecoration:"none",display:"inline-block",marginTop:5}},"🌐 Google Maps'te bul →"),
    sonuc.length>0 && h("div",{style:{...S.card,marginTop:6,maxHeight:200,overflowY:"auto"}},
      sonuc.map((r,i)=>{ const km=Math.round(111*Math.hypot(+r.lat-merkez.lat,(+r.lon-merkez.lng)*Math.cos(merkez.lat*Math.PI/180)));
        return h("div",{key:i,onClick:()=>sec(r),style:{display:"flex",justifyContent:"space-between",gap:8,padding:"8px 10px",borderTop:i?"1px solid "+C.line:"none",cursor:"pointer",fontSize:12.5}},
          h("div",{style:{minWidth:0}}, h("b",null,(r.display_name||"").split(",")[0]),
            h("div",{style:{color:C.mut,fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},r.display_name)),
          h("span",{style:{flexShrink:0,fontSize:11,color:C.mut,fontWeight:700}},"~"+km+" km")); })),
    (lat&&lng) && h(React.Fragment,null,
      h("div",{style:{fontSize:11.5,color:C.mut,marginTop:6}}, "📍 "+lat+", "+lng+"  ",
        h("a",{href:"https://www.google.com/maps/search/?api=1&query="+lat+","+lng,target:"_blank",style:{color:"#0369a1",fontWeight:700,textDecoration:"none"}},"haritada aç")),
      h("iframe",{title:"harita",loading:"lazy",src:"https://maps.google.com/maps?q="+lat+","+lng+"&z=16&output=embed",style:{width:"100%",height:160,border:0,borderRadius:10,marginTop:6}})));
}

// ÇANTAYI DOLDUR — atölye stoğundan toplu ürün al (sefer başlatır/loglar)
function CantaDoldurModal({ urunler, seferIdAl, onKapat }){
  const [mik,setMik]=useState({});
  const liste=urunler.slice().filter(u=>num(u.stokta)>0||bagOf(u)>0).sort((a,b)=>(a.ad||"").localeCompare(b.ad||"","tr"));
  const set=(id,v)=>setMik(s=>({...s,[id]:v}));
  const toplam=liste.reduce((s,u)=>s+Math.max(0,Math.floor(num(mik[u.id]))),0);
  async function ekle(){
    const alinacak=liste.map(u=>({u,q:Math.max(0,Math.floor(num(mik[u.id])))})).filter(x=>x.q>0);
    if(!alinacak.length) return alert("Adet gir.");
    for(const {u,q} of alinacak){ if(q>num(u.stokta)) return alert(u.ad+": atölyede sadece "+num(u.stokta)+" var."); }

// MEVKİ ZİYARETİ — burada bıraktıkların (sat/iade) + yeni bırak/sat (tek sayfa)
function MevkiModal({ musteri, bagItems, urunler, hareketler, aktifSeferId, onKapat }){
  const [s1,setS1]=useState({});      // konsinye çöz adetleri  urunId->adet
  const [lines,setLines]=useState({}); // yeni  urunId->{adet,mod}
  const buradaMi=x=> (musteri.id && x.musteriId===musteri.id) || ((x.yer||"")===(musteri.ad||""));
  // burada açık konsinye (ürün başına topla)
  const buradaMap={}; (hareketler||[]).forEach(x=>{ if(x.tip==="konsinye" && num(x.kalan)>0 && buradaMi(x)){
    const b=buradaMap[x.urunId]||(buradaMap[x.urunId]={urunId:x.urunId,urunAd:x.urunAd,kalan:0,satisFiyat:num(x.satisFiyat),alisFiyat:num(x.alisFiyat)}); b.kalan+=num(x.kalan); }});
  const burada=Object.values(buradaMap);
  async function coz(p,mod){   // mod: "satildi" | "iade"
    const istek=s1[p.urunId]!=null?Math.floor(num(s1[p.urunId])):p.kalan; let n=Math.min(istek,p.kalan); if(n<1) return alert("Adet gir.");
    if(mod==="satildi" && !fiyatOnay([{ad:p.urunAd,fiyat:p.satisFiyat}])) return;
    const iso=new Date().toISOString();
    // satıldı: alınan tutar boşsa tam ödeme; eksikse kalan = ALACAK
    let alinanKalan=null;
    if(mod==="satildi"){ const beklenen=n*num(p.satisFiyat); const g=tahsil[p.urunId];
      alinanKalan=(g===""||g==null)?beklenen:Math.max(0,Math.min(beklenen,num(g))); }
    const recs=(hareketler||[]).filter(x=>x.tip==="konsinye"&&num(x.kalan)>0&&x.urunId===p.urunId&&buradaMi(x)).sort((a,b)=>new Date(a.tarih)-new Date(b.tarih));
    for(const r of recs){ if(n<=0)break; const d=Math.min(n,num(r.kalan));
      await save("pazarlama_hareket",{id:r.id,kalan:num(r.kalan)-d});
      if(mod==="satildi"){ const recBek=d*num(r.satisFiyat); const recTah=Math.max(0,Math.min(recBek,alinanKalan)); alinanKalan-=recTah;
        await harKaydet({tip:"satis",urunId:r.urunId,urunAd:r.urunAd,adet:d,alisFiyat:num(r.alisFiyat),satisFiyat:num(r.satisFiyat),tahsil:recTah,yer:r.yer||musteri.ad,bolge:r.bolge||musteri.bolge||"",musteriId:r.musteriId||musteri.id||"",kaynak:"konsinye",seferId:aktifSeferId||null,tarih:iso}); }
      else { const u=(urunler||[]).find(x=>x.id===p.urunId); if(u) await bagYaz(u, bagOf(u)+d);
        // konsinyeden geri toplandı → fiziken çantaya girer + kayıt altına alınır (atölyeye iade ayrı adım)
        // seferId yok: bu müşteri olayı; atölyeye dönüş seferi bitirince ayrıca "Dönen" sayılır (çift saymayı önler)
        await harKaydet({tip:"iade",urunId:p.urunId,urunAd:p.urunAd,adet:d,yer:r.yer||musteri.ad,bolge:r.bolge||musteri.bolge||"",musteriId:r.musteriId||musteri.id||"",kaynak:"konsinye",tarih:iso}); }
      n-=d;
    }
    setS1(s=>({...s,[p.urunId]:""})); setTahsil(s=>({...s,[p.urunId]:""}));
  }
  // alacağı tahsil et — kalanı tahsil edilmiş işaretle (kısmi de girilebilir)
  async function tahsilEt(x, miktar){ const bek=num(x.adet)*num(x.satisFiyat); const onceki=x.tahsil==null?bek:num(x.tahsil);
    const yeni = miktar==null ? bek : Math.max(0,Math.min(bek,onceki+num(miktar)));
    await save("pazarlama_hareket",{id:x.id,tahsil:yeni}); }
  // bir hareketi GERİ AL — etkilerini (stok/konsinye) tersine çevir, kaydı sil
  async function geriAl(x){ const ad=num(x.adet); const u=(urunler||[]).find(p=>p.id===x.urunId);
    const sonKons=()=> (hareketler||[]).filter(h2=>h2.tip==="konsinye"&&h2.urunId===x.urunId&&buradaMi(h2)).sort((a,b)=>new Date(b.tarih)-new Date(a.tarih))[0];
    if(x.tip==="konsinye"){
      if(num(x.kalan)!==ad) return alert("Bu konsinyenin bir kısmı satılmış/iade olmuş.\nÖnce ilgili satış/iadeleri geri al, sonra konsinyeyi geri alabilirsin.");
      if(!confirm("Konsinye geri alınsın mı?\n"+ad+" × "+x.urunAd+" çantana dönecek.")) return;
      if(u) await bagYaz(u, bagOf(u)+ad);
      await remove("pazarlama_hareket",x.id); return; }
    if(x.tip==="satis"){
      if(!confirm("Satış geri alınsın mı?\n"+ad+" × "+x.urunAd+(x.kaynak==="konsinye"?" → tekrar açık konsinyeye dönecek.":" → çantana dönecek."))) return;
      if(x.kaynak==="konsinye"){ const k=sonKons();
        if(k) await save("pazarlama_hareket",{id:k.id,kalan:num(k.kalan)+ad});
        else await harKaydet({tip:"konsinye",urunId:x.urunId,urunAd:x.urunAd,adet:ad,kalan:ad,alisFiyat:num(x.alisFiyat),satisFiyat:num(x.satisFiyat),yer:x.yer||musteri.ad,bolge:x.bolge||musteri.bolge||"",musteriId:x.musteriId||musteri.id||"",tarih:new Date().toISOString()}); }
      else { if(u) await bagYaz(u, bagOf(u)+ad); }
      await remove("pazarlama_hareket",x.id); return; }
    if(x.tip==="iade"){
      if(!confirm("İade geri alınsın mı?\n"+ad+" × "+x.urunAd+" tekrar açık konsinyeye dönecek (çantandan düşülür).")) return;
      if(u) await bagYaz(u, bagOf(u)-ad);
      const k=sonKons(); if(k) await save("pazarlama_hareket",{id:k.id,kalan:num(k.kalan)+ad});
      await remove("pazarlama_hareket",x.id); return; }
    if(x.tip==="diplomasi"){ if(!confirm("Bu iletişim kaydı silinsin mi?")) return; await remove("pazarlama_hareket",x.id); return; }
  }
  // yeni — çantadan toplu
  const setAdet=(id,v)=>setLines(s=>({...s,[id]:{mod:(s[id]&&s[id].mod)||"konsinye",adet:v}}));
  const setMod=(id,m)=>setLines(s=>({...s,[id]:{adet:(s[id]&&s[id].adet)||"",mod:m}}));
  const secili=(bagItems||[]).map(u=>({u,adet:Math.max(0,Math.floor(num((lines[u.id]||{}).adet))),mod:(lines[u.id]||{}).mod||"konsinye"})).filter(x=>x.adet>0);
  async function yeniOnayla(){

// Türkçe tamlama eki: Üsküdar → Üsküdar'ın · Ümraniye → Ümraniye'nin · Kadıköy → Kadıköy'ün
function genitive(s){ s=(s||"").trim(); if(!s) return s;
  const v="aeıioöuü", low=s.toLocaleLowerCase("tr"); let last="ı";
  for(const ch of low) if(v.includes(ch)) last=ch;
  const vowelEnd=v.includes(low.slice(-1));
  const har=(last==="a"||last==="ı")?"ı":(last==="e"||last==="i")?"i":(last==="o"||last==="u")?"u":"ü";
  return s+"'"+(vowelEnd?"n":"")+har+"n";
}

// convex hull (Andrew monotone chain) — [[lat,lng]] → çevre [[lat,lng]]
function convexHull(pts){
  const P=pts.map(p=>[p[1],p[0]]).sort((a,b)=>a[0]-b[0]||a[1]-b[1]);   // x=lng, y=lat
  if(P.length<3) return pts.slice();
  const cr=(o,a,b)=>(a[0]-o[0])*(b[1]-o[1])-(a[1]-o[1])*(b[0]-o[0]);
  const lo=[]; for(const p of P){ while(lo.length>=2 && cr(lo[lo.length-2],lo[lo.length-1],p)<=0) lo.pop(); lo.push(p); }
  const up=[]; for(let i=P.length-1;i>=0;i--){ const p=P[i]; while(up.length>=2 && cr(up[up.length-2],up[up.length-1],p)<=0) up.pop(); up.push(p); }
  lo.pop(); up.pop();
  return lo.concat(up).map(p=>[p[1],p[0]]);
}

      +"<h2>Satışlar</h2>"+tbl(["Mekan","Ürün","Adet","Fiyat","Tutar"], v.satList.map(r=>tr([r.mekan,r.urun,r.adet,tl(r.fiyat),tl(r.tutar)])), v.satList.length?tr(["<b>Toplam</b>","","<b>"+v.satAdet+"</b>","","<b>"+tl(v.satTutar)+"</b>"]):"")

      +"<div class=sub style='margin-top:18px'>Tikita · rapor</div></body></html>"; };
  const raporPDF=v=>{ const w=window.open("","_blank"); if(!w) return alert("Açılır pencere engellendi — tarayıcı izni ver."); w.document.write(raporHTML(v)); w.document.close(); w.focus(); setTimeout(()=>{ try{ w.print(); }catch(e){} },500); };
  const raporWA=v=>{ const t=raporMetin(v); if(navigator.share){ navigator.share({text:t}).catch(()=>{}); return; } window.open("https://wa.me/?text="+encodeURIComponent(t),"_blank"); };

    h("div",{style:{...S.card,padding:"12px 14px"}},
      h("div",{style:{...S.label,marginBottom:8}},"+ Yeni kişi ekle"),
      h(Field,{label:"İsim"}, h("input",{style:S.input,value:ad,onChange:e=>setAd(e.target.value)})),
      h(Field,{label:"PIN (4+ hane)"}, h("input",{type:"password",inputMode:"numeric",style:S.input,value:pin,onChange:e=>setPin(e.target.value.replace(/\D/g,""))})),
      h(Field,{label:"Sembol"}, h("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
        SIMGELER.map(s=>h("button",{key:s,type:"button",onClick:()=>setSimge(s),
          style:{fontSize:20,padding:"4px 7px",borderRadius:8,border:"2px solid "+(simge===s?"#b45309":C.line),background:simge===s?"#fff7ed":"#fff",cursor:"pointer"}},s)))),
      h(Field,{label:"Rol"}, h("div",{style:{display:"flex",gap:8}},
        [["pazarlamaci","🛒 Pazarlamacı"],["admin","👑 Yönetici"]].map(([rr,et])=>h("button",{key:rr,type:"button",onClick:()=>setRol(rr),
          style:{flex:1,padding:"8px",borderRadius:8,border:"1px solid "+(rol===rr?"#b45309":C.line),background:rol===rr?"#b45309":"#fff",color:rol===rr?"#fff":C.txt,fontWeight:700,cursor:"pointer"}},et)))),
      h("button",{style:{...S.btn("p"),width:"100%",marginTop:10},onClick:ekle},"+ Ekle")));
}

/* ============================================================
   📊 PAZARLAMA TAKİP — admin izleme paneli (pazarlamacı sayfasından bağımsız)
   Pazarlamacıların hareketleri, satış/konsinye, ürün yerleri, müşteriler,
   günlük/haftalık/aylık performans, alacak/verecek — tek yerde.
   ============================================================ */
function PazarlamaTakip({ hareketler, musteriler, kullanicilar, urunler, seferler }){
  const [alt,setAlt]=useState("ozet");
  const [rapMod,setRapMod]=useState("ay");
  const [rapTarih,setRapTarih]=useState(()=>new Date().toISOString().slice(0,10));
  const [rapBas,setRapBas]=useState("");
  const [rapBit,setRapBit]=useState("");
  const [seciliPaz,setSeciliPaz]=useState("");   // hareket dökümü filtresi
  const [hTip,setHTip]=useState("");

  const H=(hareketler||[]);
  const G=864e5;
  const pazarlamacilar=(kullanicilar||[]).filter(u=>u.rol!=="admin").slice().sort((a,b)=>(a.ad||"").localeCompare(b.ad||"","tr"));
  const kulAd=id=>{ const u=(kullanicilar||[]).find(x=>x.id===id); return u?u.ad:(id?"?":"—"); };
  const harAlacak=x=>{ if(x.tip!=="satis")return 0; const bek=num(x.adet)*num(x.satisFiyat); const t=x.tahsil==null?bek:num(x.tahsil); return Math.max(0,bek-t); };

  // —— dönem aralığı ——
  const bd=rapTarih?new Date(rapTarih+"T00:00:00"):new Date();
  const g0=gunBasi(bd).getTime();
  let rb,re,donemAd;
  if(rapMod==="gun"){ rb=g0; re=g0+G-1; donemAd=fmtTarih(rb)+"."+bd.getFullYear()+" · Günlük"; }
  else if(rapMod==="hafta"){ rb=g0; re=g0+7*G-1; donemAd=fmtTarih(rb)+" – "+fmtTarih(re)+" · Haftalık"; }
  else if(rapMod==="ay"){ rb=g0; re=g0+30*G-1; donemAd=fmtTarih(rb)+" – "+fmtTarih(re)+" · Aylık"; }
  else { rb=rapBas?new Date(rapBas+"T00:00:00").getTime():0; re=rapBit?new Date(rapBit+"T23:59:59").getTime():Date.now(); donemAd=(rapBas||"…")+" – "+(rapBit||"bugün")+" · Özel"; }
  const pHar=H.filter(x=>{ const t=new Date(x.tarih).getTime(); return t>=rb&&t<=re; });

  // —— pazarlamacı bazlı dönem performansı ——
  const pazPerf=pazarlamacilar.map(u=>{ const hs=pHar.filter(x=>x.kullaniciId===u.id);
    const sat=hs.filter(x=>x.tip==="satis"), kons=hs.filter(x=>x.tip==="konsinye");
    const satAdet=sat.reduce((s,x)=>s+num(x.adet),0);
    const satTutar=sat.reduce((s,x)=>s+num(x.adet)*num(x.satisFiyat),0);
    const konsAdet=kons.reduce((s,x)=>s+num(x.adet),0);
    const konsTutar=kons.reduce((s,x)=>s+num(x.adet)*num(x.satisFiyat),0);
    const tah=hs.filter(x=>x.tip==="tahsilat").reduce((s,x)=>s+num(x.tutar),0);
    const avans=hs.filter(x=>x.tip==="avans").reduce((s,x)=>s+num(x.tutar),0);
    const ureticiBorc=sat.reduce((s,x)=>s+num(x.adet)*num(x.alisFiyat),0);
    const marj=satTutar-ureticiBorc;
    const mek=new Set(hs.filter(x=>["satis","konsinye","tahsilat","avans","stant"].includes(x.tip)).map(x=>x.yer||"?")); mek.delete("?");
    const tabla=hs.filter(x=>x.tip==="tabla").length;
    return {u,satAdet,satTutar,konsAdet,konsTutar,tah,avans,ureticiBorc,marj,mekan:mek.size,tabla}; })
    .sort((a,b)=>b.satTutar-a.satTutar);
  const T={satAdet:0,satTutar:0,konsAdet:0,konsTutar:0,tah:0,avans:0,ureticiBorc:0,marj:0};
  pazPerf.forEach(p=>{ T.satAdet+=p.satAdet;T.satTutar+=p.satTutar;T.konsAdet+=p.konsAdet;T.konsTutar+=p.konsTutar;T.tah+=p.tah;T.avans+=p.avans;T.ureticiBorc+=p.ureticiBorc;T.marj+=p.marj; });
  const aktifMekan=new Set(pHar.filter(x=>["satis","konsinye","tahsilat","stant"].includes(x.tip)).map(x=>x.yer||"?")); aktifMekan.delete("?");
  const aktifPaz=pazPerf.filter(p=>p.satAdet||p.konsAdet||p.tah||p.mekan).length;

  // —— açık konsinyeler (tüm zaman, kalan>0) — ürünlerin sahadaki yerleri ——
  const acikKons=H.filter(x=>x.tip==="konsinye" && num(x.kalan)>0)
    .map(x=>({yer:x.yer||"?",urun:x.urunAd||"?",kalan:num(x.kalan),fiyat:num(x.satisFiyat),tutar:num(x.kalan)*num(x.satisFiyat),paz:x.kullaniciAd||kulAd(x.kullaniciId),tarih:x.tarih}))
    .sort((a,b)=>new Date(b.tarih)-new Date(a.tarih));
  const acikKonsAdet=acikKons.reduce((s,r)=>s+r.kalan,0), acikKonsTutar=acikKons.reduce((s,r)=>s+r.tutar,0);

  // —— alacaklar: mekan/müşteri bazlı (borç − avans), tüm zaman ——
  const alMap={};
  H.forEach(x=>{ const borc=harAlacak(x); if(borc>0){ const k=x.yer||"?"; const o=alMap[k]||(alMap[k]={yer:k,borc:0,avans:0,paz:x.kullaniciAd||kulAd(x.kullaniciId)}); o.borc+=borc; } });
  H.filter(x=>x.tip==="avans").forEach(x=>{ const k=x.yer||"?"; const o=alMap[k]||(alMap[k]={yer:k,borc:0,avans:0,paz:x.kullaniciAd||kulAd(x.kullaniciId)}); o.avans+=num(x.tutar); });
  const alacaklar=Object.values(alMap).map(o=>({...o,net:o.borc-o.avans})).filter(o=>Math.abs(o.net)>0.5).sort((a,b)=>b.net-a.net);
  const netAlacakTop=alacaklar.reduce((s,o)=>s+o.net,0);
  // verecek: pazarlamacı → üretici (tüm zaman satılan malın alış bedeli)
  const verecek=pazarlamacilar.map(u=>({u,borc:H.filter(x=>x.tip==="satis"&&x.kullaniciId===u.id).reduce((s,x)=>s+num(x.adet)*num(x.alisFiyat),0)})).filter(v=>v.borc>0.5).sort((a,b)=>b.borc-a.borc);

  // —— müşteri bilgileri ——
  const musBilgi=(musteriler||[]).filter(m=>!m.arsiv).map(m=>{ const hs=H.filter(x=>x.musteriId===m.id||x.yer===m.ad);
    const satT=hs.filter(x=>x.tip==="satis").reduce((s,x)=>s+num(x.adet)*num(x.satisFiyat),0);
    const konsA=hs.filter(x=>x.tip==="konsinye").reduce((s,x)=>s+num(x.kalan),0);
    const son=hs.slice().sort((a,b)=>new Date(b.tarih)-new Date(a.tarih))[0];
    const pazSet=new Set(hs.map(x=>x.kullaniciAd||kulAd(x.kullaniciId)).filter(v=>v&&v!=="—"&&v!=="?"));
    return {m,satT,konsA,sonTarih:son?son.tarih:null,paz:Array.from(pazSet).join(", ")}; })
    .sort((a,b)=>b.satT-a.satT);

  // —— UI yardımcıları ——
  const kart=(et,deg,alt2,renk)=>h("div",{style:{...S.card,padding:"12px 14px",borderLeft:"4px solid "+(renk||C.navyHdr)}},
    h("div",{style:{fontSize:11,color:"#64748b",fontWeight:800,textTransform:"uppercase",letterSpacing:.3}},et),
    h("div",{style:{fontSize:19,fontWeight:800,marginTop:3,color:renk||"#0f172a"}},deg),
    alt2 && h("div",{style:{fontSize:11.5,color:"#64748b",marginTop:2}},alt2));
  const Tablo=(cols,rows,bos)=> !rows.length
    ? h("div",{style:{...S.card,padding:18,color:"#64748b",textAlign:"center"}}, bos||"Kayıt yok.")
    : h("div",{style:{...S.card,overflowX:"auto"}},
        h("table",{style:{width:"100%",borderCollapse:"collapse",minWidth:520}},
          h("thead",null,h("tr",{style:{background:"#f8fafc"}}, cols.map((c,i)=>h("th",{key:i,style:{textAlign:(c&&c.r)?"right":"left",padding:"9px 11px",fontSize:11,color:"#475569",fontWeight:800,textTransform:"uppercase",letterSpacing:.3,borderBottom:"2px solid "+C.line,whiteSpace:"nowrap"}}, (c&&c.t)||c)))),
          h("tbody",null, rows.map((r,ri)=>h("tr",{key:ri,style:{background:ri%2?"#fff":"#fcfdfe"}}, r.map((cell,ci)=>{ const c=cols[ci]||{};
            return h("td",{key:ci,style:{padding:"8px 11px",fontSize:13,borderBottom:"1px solid #eef2f7",textAlign:c.r?"right":"left",whiteSpace:c.nowrap?"nowrap":"normal",fontWeight:c.b?700:400}}, cell); }))))));

  const donemBar=h("div",{style:{...S.card,padding:"10px 12px",marginBottom:14}},
    h("div",{style:{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}},
      h("span",{style:{fontSize:12.5,fontWeight:800,color:"#334155"}},"📅 Dönem:"),
      [["gun","Günlük"],["hafta","Haftalık"],["ay","Aylık"],["ozel","Özel"]].map(([k,ad])=>
        h("button",{key:k,onClick:()=>setRapMod(k),style:{...S.btn(rapMod===k?"p":""),padding:"6px 12px",fontWeight:700,fontSize:12.5}},ad)),
      rapMod!=="ozel" && h("input",{type:"date",style:{...S.input,width:150},value:rapTarih,onChange:e=>setRapTarih(e.target.value)}),
      rapMod==="ozel" && h("input",{type:"date",style:{...S.input,width:140},value:rapBas,onChange:e=>setRapBas(e.target.value)}),
      rapMod==="ozel" && h("span",{style:{color:"#64748b"}},"–"),
      rapMod==="ozel" && h("input",{type:"date",style:{...S.input,width:140},value:rapBit,onChange:e=>setRapBit(e.target.value)}),
      h("span",{style:{fontSize:12,color:"#64748b",marginLeft:"auto"}},donemAd)));

  const tipEt={al:"🎒 Çanta al",satis:"💰 Satış",konsinye:"🏬 Konsinye",iade:"↩ İade",tahsilat:"🧾 Tahsilat",avans:"💳 Avans",stant:"🎪 Stant",tabla:"🧹 Tabla",diplomasi:"🤝 Diplomasi"};

  const ozetView=()=>h("div",null,
    h("div",{style:{display:"grid",gap:10,gridTemplateColumns:"repeat(auto-fill,minmax(158px,1fr))",marginBottom:14}},
      kart("Satış",T.satAdet+" ad",tl(T.satTutar),"#047857"),
      kart("Açık konsinye",acikKonsAdet+" ad",tl(acikKonsTutar),"#7c3aed"),
      kart("Tahsilat",tl(T.tah),"dönem içi","#0369a1"),
      kart("Marj (kâr)",tl(T.marj),"satış − alış","#047857"),
      kart("Üreticiye borç",tl(T.ureticiBorc),"dönem satışları","#b45309"),
      kart("Net alacak (güncel)",tl(netAlacakTop),"tüm açık borç","#b91c1c"),
      kart("Aktif pazarlamacı",aktifPaz+" / "+pazarlamacilar.length,"dönemde iş yapan","#0f172a"),
      kart("Uğranılan mekan",aktifMekan.size+"","dönem içi","#0369a1")),
    h("div",{style:{...S.label,margin:"6px 2px 8px",color:"#334155"}},"🏅 Pazarlamacı performansı · "+donemAd),
    Tablo([{t:"Pazarlamacı",b:1},{t:"Satış",r:1},{t:"Ciro",r:1},{t:"Konsinye",r:1},{t:"Tahsilat",r:1},{t:"Marj",r:1},{t:"Mekan",r:1}],
      pazPerf.map(p=>[p.u.ad,p.satAdet+" ad",tl(p.satTutar),p.konsAdet+" ad",tl(p.tah),tl(p.marj),p.mekan+""]),
      "Bu dönemde hareket yok."));

  const pazView=()=>h("div",null,
    Tablo([{t:"Pazarlamacı",b:1},{t:"Satış",r:1},{t:"Ciro",r:1},{t:"Kons. ad",r:1},{t:"Kons. ₺",r:1},{t:"Tahsilat",r:1},{t:"Avans",r:1},{t:"Üretici borç",r:1},{t:"Marj",r:1},{t:"Mekan",r:1},{t:"Tabla",r:1}],
      pazPerf.map(p=>[
        h("button",{onClick:()=>{setSeciliPaz(p.u.id);setHTip("");setAlt("hareket");},style:{background:"none",border:"none",color:"#0369a1",fontWeight:800,cursor:"pointer",padding:0,fontSize:13,textAlign:"left"}},(p.u.simge||"👤")+" "+p.u.ad+" ›"),
        p.satAdet+"",tl(p.satTutar),p.konsAdet+"",tl(p.konsTutar),tl(p.tah),tl(p.avans),tl(p.ureticiBorc),tl(p.marj),p.mekan+"",p.tabla+""]),
      "Bu dönemde hareket yok."),
    h("div",{style:{fontSize:12,color:"#64748b",marginTop:8}},"👆 İsme dokun → o pazarlamacının hareket dökümü açılır."));

  const konsView=()=>h("div",null,
    h("div",{style:{display:"grid",gap:10,gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",marginBottom:12}},
      kart("Açık konsinye",acikKonsAdet+" adet",tl(acikKonsTutar),"#7c3aed"),
      kart("Ürün bulunan mekan",new Set(acikKons.map(r=>r.yer)).size+"","sahada duran","#0369a1")),
    h("div",{style:{...S.label,margin:"4px 2px 8px",color:"#334155"}},"🏬 Şu an sahada duran konsinye ürünler — nerede, hangi ürün, kaç adet"),
    Tablo([{t:"Mekan",b:1},"Ürün",{t:"Kalan",r:1},{t:"Fiyat",r:1},{t:"Tutar",r:1},"Pazarlamacı",{t:"Bırakılış",r:1,nowrap:1}],
      acikKons.map(r=>[r.yer,r.urun,r.kalan+" ad",tl(r.fiyat),tl(r.tutar),r.paz,fmtTarih(r.tarih)]),
      "Açık konsinye yok."));

  const alacakView=()=>h("div",null,
    h("div",{style:{display:"grid",gap:10,gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",marginBottom:12}},
      kart("Net alacak",tl(netAlacakTop),"müşterilerden","#b91c1c"),
      kart("Üreticiye toplam verecek",tl(verecek.reduce((s,v)=>s+v.borc,0)),"pazarlamacılardan","#b45309")),
    h("div",{style:{...S.label,margin:"4px 2px 8px",color:"#334155"}},"💵 Müşteri alacakları (borç − avans)"),
    Tablo([{t:"Mekan / Müşteri",b:1},"Pazarlamacı",{t:"Borç",r:1},{t:"Avans",r:1},{t:"Net",r:1}],
      alacaklar.map(o=>[o.yer,o.paz,tl(o.borc),o.avans?("−"+tl(o.avans)):"—",h("b",{style:{color:o.net>=0?"#b91c1c":"#0369a1"}},(o.net>=0?"":"avans ")+tl(Math.abs(o.net)))]),
      "Açık alacak yok."),
    h("div",{style:{...S.label,margin:"18px 2px 8px",color:"#334155"}},"🏭 Pazarlamacı → üreticiye verecek (satılan malın alış bedeli)"),
    Tablo([{t:"Pazarlamacı",b:1},{t:"Verecek",r:1}],
      verecek.map(v=>[(v.u.simge||"👤")+" "+v.u.ad,tl(v.borc)]),
      "Kayıt yok."));

  const musView=()=>h("div",null,
    h("div",{style:{...S.label,margin:"4px 2px 8px",color:"#334155"}},"🗺️ Müşteriler — "+musBilgi.length+" mekan"),
    Tablo([{t:"Müşteri / Mekan",b:1},"Bölge",{t:"Top. satış",r:1},{t:"Açık kons.",r:1},"Pazarlamacı",{t:"Son işlem",r:1,nowrap:1},{t:"Konum",r:1}],
      musBilgi.map(x=>[x.m.ad,x.m.bolge||"—",tl(x.satT),x.konsA?(x.konsA+" ad"):"—",x.paz||"—",x.sonTarih?fmtTarih(x.sonTarih):"—",
        (x.m.lat&&x.m.lng)? h("a",{href:"https://www.google.com/maps/search/?api=1&query="+x.m.lat+","+x.m.lng,target:"_blank",style:{color:"#0369a1",fontWeight:800,textDecoration:"none"}},"🗺️"):"—"]),
      "Müşteri yok."));

  const hareketView=()=>{ const hLog=pHar.filter(x=>(!seciliPaz||x.kullaniciId===seciliPaz)&&(!hTip||x.tip===hTip)).slice().sort((a,b)=>new Date(b.tarih)-new Date(a.tarih));
    return h("div",null,
      h("div",{style:{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12,alignItems:"center"}},
        h("select",{style:{...S.input,width:200},value:seciliPaz,onChange:e=>setSeciliPaz(e.target.value)},
          h("option",{value:""},"Tüm pazarlamacılar"), pazarlamacilar.map(u=>h("option",{key:u.id,value:u.id},u.ad))),
        h("select",{style:{...S.input,width:170},value:hTip,onChange:e=>setHTip(e.target.value)},
          h("option",{value:""},"Tüm işlemler"), Object.keys(tipEt).map(k=>h("option",{key:k,value:k},tipEt[k]))),
        (seciliPaz||hTip) && h("button",{style:S.ibtn,onClick:()=>{setSeciliPaz("");setHTip("");}},"✕ Temizle"),
        h("span",{style:{fontSize:12,color:"#64748b",marginLeft:"auto"}},hLog.length+" hareket")),
      Tablo([{t:"Tarih",nowrap:1},"Pazarlamacı","İşlem","Ürün",{t:"Adet",r:1},"Mekan",{t:"Tutar",r:1}],
        hLog.map(x=>{ const tutar = x.tip==="satis"||x.tip==="konsinye" ? num(x.adet)*num(x.satisFiyat) : (x.tutar!=null?num(x.tutar):(x.fiyat!=null?num(x.fiyat):0));
          return [fmtTarihSaat(x.tarih),x.kullaniciAd||kulAd(x.kullaniciId),tipEt[x.tip]||x.tip,x.urunAd||"—",num(x.adet)?num(x.adet)+"":"—",x.yer||"—",tutar?tl(tutar):"—"]; }),
        "Bu filtrede hareket yok.")); };

  return h("div",null,
    h("div",{style:{fontSize:20,fontWeight:800,color:C.navyHdr,marginBottom:3}},"📊 Pazarlama Takip"),
    h("div",{style:{fontSize:12.5,color:"#64748b",marginBottom:14}},"Pazarlamacıların hareketleri, satış & konsinye, ürün yerleri, müşteriler, performans ve alacak/verecek — tek panelde."),
    h("div",{style:{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}},
      [["ozet","📊 Özet"],["paz","👥 Pazarlamacılar"],["kons","🏬 Konsinye"],["alacak","💰 Alacak / Verecek"],["mus","🗺️ Müşteriler"],["hareket","📜 Hareketler"]].map(([k,ad])=>
        h("button",{key:k,onClick:()=>setAlt(k),style:{...S.btn(alt===k?"p":""),padding:"9px 15px",fontWeight:700,fontSize:13.5}},ad))),
    ["ozet","paz","hareket"].includes(alt) && donemBar,
    alt==="ozet" && ozetView(),
    alt==="paz" && pazView(),
    alt==="kons" && konsView(),
    alt==="alacak" && alacakView(),
    alt==="mus" && musView(),
    alt==="hareket" && hareketView());
}

/* ============================================================
   APP
   ============================================================ */
function App(){
  const [sekme, setSekme] = useState(()=>{ try{ const v=localStorage.getItem("tk_sekme")||"plan"; return v==="oyun"?"pazarlama":v; }catch(e){ return "plan"; } });
  useEffect(()=>{ try{ localStorage.setItem("tk_sekme",sekme); }catch(e){} },[sekme]);
  const makineler = useColl("makineler");
  const plan = useColl("plan");
  const stokUrun = useColl("stok_urun");
  const filamentler = useColl("filament");
  const pazHareket = useColl("pazarlama_hareket");
  const bolgeler = useColl("bolge");
  const musteriler = useColl("musteri");
  const seferler = useColl("sefer");
  const ayarlar = useColl("ayar");
  const ayar = ayarlar.find(a=>a.id==="genel")||{};
  const tablaUcret = ayar.tablaUcret!=null ? num(ayar.tablaUcret) : 5;
  const {rows:kullanicilar,loaded:kulYuklendi}=useKullanici();
  const [aktifId,setAktifId]=useState(()=>{ try{ return localStorage.getItem("tk_uid"); }catch(e){ return null; } });
  const [ekipAcik,setEkipAcik]=useState(false);
  const aktif=kullanicilar.find(u=>u.id===aktifId)||null;
  AKTIF_KUL=aktif;
  function giris(u){ setAktifId(u.id); try{ localStorage.setItem("tk_uid",u.id); }catch(e){} }
  function cikis(){ setAktifId(null); try{ localStorage.removeItem("tk_uid"); }catch(e){} }
  const [bas, setBas] = useState(()=>haftaBasi(Date.now()).getTime());
  const [gunSayisi, setGunSayisi] = useState(7);
  const [isModal, setIsModal] = useState(null);
  const [makineAcik, setMakineAcik] = useState(false);
  const [filamentAcik, setFilamentAcik] = useState(false);
  const [now, setNow] = useState(Date.now());
  const [zoom, setZoom] = useState(1);
  const [containerW, setContainerW] = useState(1000);
  const scrollRef = useRef(null);
  const undoRef = useRef(null);
  const [undoVar, setUndoVar] = useState(false);
  useEffect(()=>{ const t=setInterval(()=>setNow(Date.now()),60000); return ()=>clearInterval(t); },[]);
  useEffect(()=>{
    if(!scrollRef.current || !window.ResizeObserver) return;
    const ro=new ResizeObserver(es=>{ for(const e of es) setContainerW(e.contentRect.width); });
    ro.observe(scrollRef.current); return ()=>ro.disconnect();
  },[]);

  const LABEL_W = 104, ROW_H = 74;
  const baslaMs = bas;
  const bitMs = bas + gunSayisi*24*3600*1000;
  const toplamMs = bitMs - baslaMs;
  const fitGunW = Math.max(150, (containerW - LABEL_W) / gunSayisi); // zoom 1 → sağda boşluk kalmaz
  const GUN_W = Math.round(fitGunW * zoom);
  const step = tickStep(GUN_W);
  const ticks = []; for(let hr=0; hr<=24; hr+=step) ticks.push(hr);
  const toplamW = gunSayisi*GUN_W;
  const px = toplamW / toplamMs;

  const mlist = makineler.slice().sort((a,b)=>a.ad.localeCompare(b.ad,"tr"));
  const timelines = useMemo(()=>{
    const m={}; mlist.forEach(mk=>{ m[mk.id]=makineTimeline(mk.id, plan, baslaMs, bitMs, now); }); return m;
  },[plan, makineler, baslaMs, bitMs, now]);

  // baskı başlat onayı — zamanı gelen planlı işler otomatik başlamaz, onay ister
  // onaylanınca başlangıç saati = tam o an (gerçek başlama anı); sonraki işler çakışmasız ötelenir
  async function baslat(p){
    if(!confirm((num(p.adet)?num(p.adet)+" x ":"")+p.ad+" baskısı başladı mı?\n(Onaylayınca 'çalışıyor' görünecek; başlangıç şu an olarak güncellenecek.)")) return;
    snapAl();
    const simdi = Date.now(), iso = new Date(simdi).toISOString();
    await save("plan",{ id:p.id, basladi:true, baslangic:iso, gercekBaslangic:iso,
      planSureDk: p.planSureDk!=null?p.planSureDk:num(p.sureDk) });
    await planKaydir(p.makineId, plan, { id:p.id, s:simdi, dk:num(p.sureDk) });
  }

  // geri al — değişiklik öncesi plan anlık görüntüsü
  function snapAl(){ undoRef.current = plan.map(p=>({...p})); setUndoVar(true); }
  async function geriAl(){
    const snap=undoRef.current; if(!snap) return;
    const ids=new Set(snap.map(p=>p.id));
    for(const p of plan){ if(!ids.has(p.id)) await remove("plan",p.id); }   // sonradan eklenenleri sil
    for(const p of snap){ await restoreDoc("plan",p); }                     // eski hâli yükle
    undoRef.current=null; setUndoVar(false);
  }
  // boş kalacak makineler — art arda planlı işlerde SON bitiş saatini baz al (makine başına tek satır)
  const bosListe = [];
  mlist.forEach(mk=>{
    const jobs = plan.filter(p=>p.makineId===mk.id)
      .map(p=>new Date(p.baslangic).getTime()+num(p.sureDk)*60000)
      .filter(e=>e>baslaMs);
    let start;
    if(!jobs.length){ start = Math.max(baslaMs, now); }       // hiç işi yok → şu an boşta
    else { const son = Math.max.apply(null, jobs); if(son>=bitMs) return; start = Math.max(son, now); } // son iş bitti → boştaysa şu andan başlat
    bosListe.push({ makine:mk, start });
  });
  bosListe.sort((a,b)=>a.start-b.start);

  // genel özet
  const kapasiteMs = mlist.length * toplamMs;
  const toplamPrint = mlist.reduce((s,mk)=>s+(timelines[mk.id]?.printMs||0),0);
  const toplamBos = kapasiteMs - toplamPrint;
  const toplamKayip = mlist.reduce((s,mk)=>s+(timelines[mk.id]?.kayipMs||0),0);
  const toplamBosGelecek = Math.max(0, toplamBos - toplamKayip);
  const toplamGecikme = mlist.reduce((s,mk)=>s+(timelines[mk.id]?.gecikmeMs||0),0);
  const toplamGecikmeSayi = mlist.reduce((s,mk)=>s+(timelines[mk.id]?.gecikmeSayi||0),0);
  const yuzde = t => kapasiteMs ? (Math.round(t/kapasiteMs*1000)/10) : 0;

  function haftaKaydir(yon){ setBas(b=>b + yon*gunSayisi*24*3600*1000); }

  // gün başlıkları
  const gunler = Array.from({length:gunSayisi},(_,i)=>new Date(baslaMs + i*24*3600*1000));
  const tarihAralik = fmtTarih(baslaMs)+" – "+fmtTarih(bitMs-1)+" "+new Date(baslaMs).getFullYear();

  // —— OTURUM KONTROLÜ ——
  if(!kulYuklendi) return h("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"#64748b"}},"⏳ Yükleniyor…");
  if(!aktif) return h(GirisEkran,{kullanicilar,onGiris:giris});
  const isAdmin=aktif.rol==="admin";
  // pazarlamacı: üretim planını (Gantt) görür ama stok/maliyeti görmez
  const navListe = isAdmin ? [["plan","📅 Üretim Planı"],["stok","📦 Stok"],["pazarlama","📊 Pazarlama Takip"]] : [["pazarlama","🎒 Pazarlama"],["plan","🏭 Cephane Üretim"]];
  const izin = navListe.map(x=>x[0]);
  const gorSekme = izin.includes(sekme) ? sekme : (isAdmin?"plan":"pazarlama");

  return h("div",{style:S.wrap},
    // kullanıcı çubuğu
    h("div",{style:{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",marginBottom:12,padding:"8px 12px",background:"#0f172a",borderRadius:12,color:"#fff"}},
      h("div",{style:{fontSize:22}},aktif.simge||"🙂"),
      h("div",{style:{flex:1,minWidth:0}},
        h("div",{style:{fontWeight:800,fontSize:14}},aktif.ad),
        h("div",{style:{fontSize:11,opacity:.75}}, isAdmin?"Yönetici — tüm yetkiler":"Pazarlamacı")),
      isAdmin && h("button",{style:{...S.ibtn,background:"#1e293b",color:"#fff",borderColor:"#334155"},onClick:()=>setEkipAcik(true)},"👥 Ekip"),
      h("button",{style:{...S.ibtn,background:"#1e293b",color:"#fff",borderColor:"#334155"},onClick:cikis},"Çıkış")),
    // üst sekme
    h("div",{style:{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}},
      isAdmin
        ? navListe.map(([k,ad])=>
            h("button",{key:k,onClick:()=>setSekme(k),style:{...S.btn(gorSekme===k?"p":""),padding:"10px 18px",fontWeight:700}},ad))
        // pazarlamacı: bu zaten ana sayfası — tek geçiş butonu (Cephane Üretim ↔ Pazarlama)
        : h("button",{onClick:()=>setSekme(gorSekme==="plan"?"pazarlama":"plan"),style:{...S.btn(),padding:"10px 18px",fontWeight:700}},
            gorSekme==="plan"?"← Pazarlama":"🏭 Cephane Üretim")),
    ekipAcik && h(EkipModal,{kullanicilar,aktif,tablaUcret,onKapat:()=>setEkipAcik(false)}),
    gorSekme==="stok" && h(StokTab,{urunler:stokUrun,plan,filamentler,hareketler:pazHareket}),
    gorSekme==="pazarlama" && (isAdmin
      ? h(PazarlamaTakip,{hareketler:pazHareket,musteriler,kullanicilar,urunler:stokUrun,seferler})
      : h(OyunTab,{plan,urunler:stokUrun,hareketler:pazHareket,makineler:mlist,filamentler,bolgeler,musteriler,seferler,kullanicilar,aktif,tablaUcret})),
    gorSekme==="plan" && h("div",null,
    // başlık
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10,marginBottom:14}},
      h("div",null,
        h("div",{style:{fontSize:22,fontWeight:800,color:C.navyHdr}},"🧊 HAFTALIK MAKİNE ÇALIŞMA PLANI"),
        h("div",{style:{fontSize:13,color:C.mut,fontWeight:600}},"Gantt Takvimi")),
      h("div",{style:{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}},
        h("button",{style:S.ibtn,onClick:()=>haftaKaydir(-1)},"‹ Önceki"),
        h("input",{type:"date",style:{...S.input,width:160},value:toInput(baslaMs).slice(0,10),
          onChange:e=>setBas(haftaBasi(new Date(e.target.value)).getTime())}),
        h("button",{style:S.ibtn,onClick:()=>haftaKaydir(1)},"Sonraki ›"),
        h("button",{style:S.ibtn,onClick:()=>setBas(haftaBasi(Date.now()).getTime())},"Bu hafta"),
        h("select",{style:{...S.input,width:90},value:gunSayisi,onChange:e=>setGunSayisi(num(e.target.value))},
          [3,4,7,14].map(g=>h("option",{key:g,value:g},g+" gün"))),
        h("div",{style:{display:"flex",alignItems:"center",gap:4}},
          h("button",{style:S.ibtn,title:"Uzaklaştır",onClick:()=>setZoom(z=>Math.max(1,Math.round((z-0.5)*10)/10))},"🔍−"),
          h("span",{style:{fontSize:12,color:C.mut,minWidth:30,textAlign:"center"}},zoom+"x"),
          h("button",{style:S.ibtn,title:"Yakınlaştır",onClick:()=>setZoom(z=>Math.min(6,Math.round((z+0.5)*10)/10))},"🔍+")),
        isAdmin && undoVar && h("button",{style:{...S.btn(),borderColor:"#c2410c",color:"#c2410c",fontWeight:800},onClick:geriAl,title:"Son değişikliği geri al"},"↶ Geri al"),
        isAdmin && h("button",{style:S.btn(),onClick:()=>setMakineAcik(true)},"⚙ Makineler"),
        isAdmin && h("button",{style:S.btn(),onClick:()=>setFilamentAcik(true)},"🧵 Filament"),
        isAdmin && h("button",{style:S.btn("p"),onClick:()=>setIsModal({})},"+ Baskı Planla"))),

    // gantt kartı
    h("div",{style:{...S.card,overflow:"hidden",marginBottom:16,userSelect:"none",WebkitUserSelect:"none"}},
