<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ============================================================
   FIREBASE CONFIG — tikita-2026
   3 alan placeholder. Firebase Console → tikita-2026 →
   ⚙ Proje Ayarları → Genel → Web uygulaması'ndan doldurulacak.
   (authDomain / projectId / storageBucket zaten doğru.)
   ============================================================ */
const cfg = {
  apiKey:            "TODO_API_KEY",
  authDomain:        "tikita-2026.firebaseapp.com",
  projectId:         "tikita-2026",
  storageBucket:     "tikita-2026.appspot.com",
  messagingSenderId: "TODO_SENDER_ID",
  appId:             "TODO_APP_ID",
};

const CONFIG_OK = !/TODO_/.test(cfg.apiKey + cfg.appId + cfg.messagingSenderId);
let db = null;
if (CONFIG_OK) {
  const app = initializeApp(cfg);
  db = getFirestore(app);
}

/* ============================================================
   React kısayolları
   ============================================================ */
const { useState, useEffect, useMemo } = React;
const h = React.createElement;

/* ============================================================
   Yardımcılar
   ============================================================ */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);

async function save(coll, obj) {
  if (!db) { alert("Firebase config eksik — kayıt yapılamıyor."); return null; }
  const id = obj.id || uid();
  const { id: _drop, ...data } = obj;
  await setDoc(doc(db, coll, id), data, { merge: true });
  return id;
}

async function remove(coll, id) {
  if (!db) return;
  await deleteDoc(doc(db, coll, id));
}

function useColl(name) {
  const [rows, setRows] = useState([]);
  useEffect(() => {
    if (!db) return;
    const unsub = onSnapshot(
      collection(db, name),
      snap => setRows(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
      err => console.error("useColl", name, err)
    );
    return unsub;
  }, [name]);
  return rows;
}

const num = v => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };
const para = n => (Math.round(num(n) * 100) / 100).toLocaleString("tr-TR") + " ₺";

function fmtSure(dk) { // dakika -> "2sa 30dk"
  dk = Math.max(0, Math.round(num(dk)));
  const s = Math.floor(dk / 60), m = dk % 60;
  return (s ? s + "sa " : "") + m + "dk";
}
function fmtGeriSayim(ms) { // ms -> "1:23:45" / "23:45"
  ms = Math.abs(ms);
  let s = Math.floor(ms / 1000);
  const sa = Math.floor(s / 3600); s %= 3600;
  const dk = Math.floor(s / 60); s %= 60;
  const p = n => String(n).padStart(2, "0");
  return (sa ? sa + ":" : "") + p(dk) + ":" + p(s);
}
function fmtSaat(d) {
  const dt = new Date(d);
  const bugun = new Date();
  const ayniGun = dt.toDateString() === bugun.toDateString();
  const saat = dt.toLocaleTimeString("tr-TR", { hour: "2-digit", minute: "2-digit" });
  if (ayniGun) return saat;
  return dt.toLocaleDateString("tr-TR", { day: "2-digit", month: "2-digit" }) + " " + saat;
}
function toInput(d) { // Date/ISO -> "YYYY-MM-DDTHH:MM"
  const dt = new Date(d), p = n => String(n).padStart(2, "0");
  return dt.getFullYear() + "-" + p(dt.getMonth() + 1) + "-" + p(dt.getDate()) +
    "T" + p(dt.getHours()) + ":" + p(dt.getMinutes());
}

/* ============================================================
   Sabitler
   ============================================================ */
const C = {
  bg:"#0b1020", panel:"#151b2e", panel2:"#1c2438", line:"#27304a",
  txt:"#e8edf7", mut:"#94a3b8", acc:"#6366f1", acc2:"#22d3ee",
  ok:"#22c55e", warn:"#f59e0b", bad:"#ef4444", chip:"#243049",
};

const S = {
  wrap:{ maxWidth:1100, margin:"0 auto", padding:"0 14px 60px" },
  top:{ position:"sticky", top:0, zIndex:20, background:"rgba(11,16,32,.92)",
        backdropFilter:"blur(8px)", borderBottom:"1px solid "+C.line,
        padding:"12px 0 0" },
  brand:{ display:"flex", alignItems:"center", gap:10, fontWeight:800,
          fontSize:22, letterSpacing:.3 },
  tabs:{ display:"flex", gap:6, overflowX:"auto", padding:"12px 0 0" },
  tab:a=>({ padding:"9px 16px", borderRadius:"10px 10px 0 0", border:"none",
            background:a?C.panel:"transparent", color:a?C.txt:C.mut,
            fontWeight:700, whiteSpace:"nowrap",
            borderBottom:a?"2px solid "+C.acc:"2px solid transparent" }),
  card:{ background:C.panel, border:"1px solid "+C.line, borderRadius:14,
         padding:14 },
  btn:(v)=>({ padding:"9px 14px", borderRadius:10, border:"1px solid "+C.line,
              fontWeight:700,
              background: v==="primary"?C.acc : v==="bad"?"transparent" : C.panel2,
              color: v==="bad"?C.bad : C.txt,
              borderColor: v==="bad"?C.bad : v==="primary"?C.acc : C.line }),
  ibtn:{ padding:"6px 10px", borderRadius:8, border:"1px solid "+C.line,
         background:C.panel2, color:C.txt, fontWeight:600, fontSize:13 },
  input:{ width:"100%", padding:"10px 12px", borderRadius:10,
          border:"1px solid "+C.line, background:C.bg, color:C.txt },
  label:{ fontSize:12, color:C.mut, fontWeight:700, marginBottom:6,
          display:"block", textTransform:"uppercase", letterSpacing:.5 },
  grid:{ display:"grid", gap:12 },
  badge:(bg,fg)=>({ display:"inline-flex", alignItems:"center", gap:5,
          padding:"3px 9px", borderRadius:999, fontSize:12, fontWeight:700,
          background:bg, color:fg }),
  overlay:{ position:"fixed", inset:0, background:"rgba(0,0,0,.6)", zIndex:50,
            display:"flex", alignItems:"flex-end", justifyContent:"center",
            padding:0 },
  modal:{ width:"100%", maxWidth:560, background:C.panel,
          border:"1px solid "+C.line, borderRadius:"16px 16px 0 0",
          maxHeight:"92vh", overflowY:"auto" },
};

const MODELLER = ["Bambu A1", "Bambu A1 mini", "Bambu P1S", "Bambu P1P", "Bambu X1C", "Diğer"];

const DURUMLAR = {
  bos:     { ad:"Boş",     bg:"#16331f", fg:C.ok },
  arizali: { ad:"Arızalı", bg:"#3a1718", fg:C.bad },
  bakim:   { ad:"Bakımda", bg:"#3a2a12", fg:C.warn },
};
const IS_DURUMLAR = {
  devam: { ad:"Devam ediyor", bg:"#0f2f37", fg:C.acc2 },
  bitti: { ad:"Bitti",        bg:"#16331f", fg:C.ok },
  iptal: { ad:"İptal",        bg:"#262c3d", fg:C.mut },
};

const SEED_MAKINELER = [
  { ad:"Praga",      model:"Bambu A1",  renkli:true,  durum:"bos", not:"" },
  { ad:"Kemalettin", model:"Bambu A1",  renkli:true,  durum:"bos", not:"" },
  { ad:"Kuki",       model:"Bambu A1",  renkli:true,  durum:"bos", not:"" },
  { ad:"Şevki",      model:"Bambu A1",  renkli:false, durum:"bos", not:"Tek renkli (AMS yok)" }, // model varsayım
  { ad:"Ebulvefa",   model:"Bambu P1S", renkli:true,  durum:"bos", not:"" },
  { ad:"Makine 6",   model:"Bambu A1",  renkli:true,  durum:"bos", not:"Gerçek ad güncellenecek" }, // 6. makine adı netleşmedi
];

/* ============================================================
   Ortak kabuklar
   ============================================================ */
function Field({ label, children }) {
  return h("label", { style:{ display:"block", marginBottom:12 } },
    h("span", { style:S.label }, label),
    children
  );
}

function Badge({ d }) { // d = {ad,bg,fg}
  return h("span", { style:S.badge(d.bg, d.fg) }, d.ad);
}

function Modal({ baslik, onKapat, children, alt }) {
  return h("div", { style:S.overlay, onClick:onKapat },
    h("div", { style:S.modal, onClick:e=>e.stopPropagation() },
      h("div", { style:{ display:"flex", alignItems:"center", justifyContent:"space-between",
        padding:"16px 16px 8px", position:"sticky", top:0, background:C.panel } },
        h("h3", { style:{ margin:0, fontSize:18 } }, baslik),
        h("button", { style:S.ibtn, onClick:onKapat }, "✕")
      ),
      h("div", { style:{ padding:"4px 16px 16px" } }, children),
      alt && h("div", { style:{ padding:"12px 16px", borderTop:"1px solid "+C.line,
        display:"flex", gap:8, position:"sticky", bottom:0, background:C.panel } }, alt)
    )
  );
}

/* ============================================================
   İş başlat / düzenle modalı
   ============================================================ */
function IsModal({ kayit, makineler, urunler, onKapat }) {
  const yeni = !kayit.id;
  const [f, setF] = useState(() => ({
    makineId:  kayit.makineId  || "",
    urunId:    kayit.urunId    || "",
    adet:      kayit.adet      || 1,
    baslangic: toInput(kayit.baslangic || Date.now()),
    sureDk:    kayit.sureDk    || "",
    not:       kayit.not       || "",
  }));
  const set = (k, v) => setF(s => ({ ...s, [k]: v }));

  const seciliUrun = urunler.find(u => u.id === f.urunId);
  const onerilenSure = seciliUrun ? Math.round(num(seciliUrun.sureDk) * num(f.adet)) : 0;

  // Ürün/adet değişince süreyi otomatik öner (kullanıcı sonra elle değiştirebilir)
  function urunSec(id) {
    const u = urunler.find(x => x.id === id);
    setF(s => ({ ...s, urunId:id, sureDk: u ? Math.round(num(u.sureDk) * num(s.adet)) : s.sureDk }));
  }
  function adetSec(v) {
    setF(s => {
      const u = urunler.find(x => x.id === s.urunId);
      return { ...s, adet:v, sureDk: u ? Math.round(num(u.sureDk) * num(v)) : s.sureDk };
    });
  }

  async function kaydet() {
    if (!f.makineId) return alert("Makine seç.");
    if (!f.sureDk)   return alert("Süre gir (dk).");
    const mk = makineler.find(m => m.id === f.makineId);
    const ur = urunler.find(u => u.id === f.urunId);
    await save("isler", {
      id: kayit.id,
      makineId:  f.makineId,
      makineAd:  mk ? mk.ad : "",
      urunId:    f.urunId,
      urunAd:    ur ? ur.ad : "(serbest)",
      adet:      num(f.adet),
      baslangic: new Date(f.baslangic).toISOString(),
      sureDk:    num(f.sureDk),
      not:       f.not,
      durum:     kayit.durum || "devam",
      gercekBitis: kayit.gercekBitis || null,
      olusturma: kayit.olusturma || new Date().toISOString(),
    });
    onKapat();
  }

  return h(Modal, {
    baslik: yeni ? "Baskı Başlat" : "İşi Düzenle",
    onKapat,
    alt: h(React.Fragment, null,
      h("button", { style:{ ...S.btn("primary"), flex:1 }, onClick:kaydet }, yeni ? "Başlat" : "Kaydet"),
      h("button", { style:S.btn(), onClick:onKapat }, "Vazgeç")
    )
  },
    h(Field, { label:"Makine" },
      h("select", { style:S.input, value:f.makineId, onChange:e=>set("makineId", e.target.value) },
        h("option", { value:"" }, "— seç —"),
        makineler.map(m => h("option", { key:m.id, value:m.id }, m.ad + " · " + m.model))
      )
    ),
    h(Field, { label:"Ürün" },
      h("select", { style:S.input, value:f.urunId, onChange:e=>urunSec(e.target.value) },
        h("option", { value:"" }, "— serbest / seçme —"),
        urunler.map(u => h("option", { key:u.id, value:u.id }, u.ad + (u.renk ? " · " + u.renk : "")))
      )
    ),
    h("div", { style:{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 } },
      h(Field, { label:"Adet" },
        h("input", { type:"number", min:1, style:S.input, value:f.adet, onChange:e=>adetSec(e.target.value) })
      ),
      h(Field, { label:"Süre (dk)" },
        h("input", { type:"number", min:0, style:S.input, value:f.sureDk, onChange:e=>set("sureDk", e.target.value) })
      )
    ),
    seciliUrun && h("div", { style:{ marginTop:-4, marginBottom:12, fontSize:12, color:C.mut } },
      "Önerilen süre: " + fmtSure(onerilenSure) + " (" + onerilenSure + " dk)"),
    h(Field, { label:"Başlangıç" },
      h("input", { type:"datetime-local", style:S.input, value:f.baslangic, onChange:e=>set("baslangic", e.target.value) })
    ),
    h(Field, { label:"Not" },
      h("textarea", { style:{ ...S.input, minHeight:60, resize:"vertical" }, value:f.not, onChange:e=>set("not", e.target.value) })
    )
  );
}

/* ============================================================
   PANO — canlı makine kartları
   ============================================================ */
function PanoTab({ makineler, urunler, isler, now }) {
  const [baslat, setBaslat] = useState(null); // {makineId} | null

  const aktifIsler = useMemo(
    () => isler.filter(i => i.durum === "devam"),
    [isler]
  );
  const isByMakine = useMemo(() => {
    const m = {};
    aktifIsler.forEach(i => { if (!m[i.makineId]) m[i.makineId] = i; });
    return m;
  }, [aktifIsler]);

  if (!makineler.length) {
    return h("div", { style:{ ...S.card, textAlign:"center", color:C.mut, marginTop:16 } },
      "Henüz makine yok. ", h("b", null, "Makineler"), " sekmesinden ekle veya örnekleri yükle.");
  }

  return h("div", null,
    h("div", { style:{ ...S.grid, gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))", marginTop:16 } },
      makineler.slice().sort((a,b)=>a.ad.localeCompare(b.ad,"tr")).map(m => {
        const is = isByMakine[m.id];
        let govde;
        if (is) {
          const bas = new Date(is.baslangic).getTime();
          const toplam = num(is.sureDk) * 60000;
          const gecen = now - bas;
          const kalan = toplam - gecen;
          const pct = Math.max(0, Math.min(100, toplam ? (gecen / toplam) * 100 : 0));
          const bitti = kalan <= 0;
          const bitisDt = bas + toplam;
          govde = h("div", null,
            h("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:6 } },
              h("div", { style:{ fontWeight:700 } }, is.urunAd, is.adet > 1 ? h("span",{style:{color:C.mut}}, " ×" + is.adet) : null),
              h(Badge, { d: bitti ? { ad:"Süre doldu", bg:"#3a2a12", fg:C.warn } : { ad:"Çalışıyor", bg:"#0f2f37", fg:C.acc2 } })
            ),
            h("div", { style:{ height:8, background:C.bg, borderRadius:99, overflow:"hidden", margin:"8px 0" } },
              h("div", { style:{ height:"100%", width:pct+"%",
                background: bitti ? C.warn : "linear-gradient(90deg,"+C.acc+","+C.acc2+")",
                transition:"width .5s" } })
            ),
            h("div", { style:{ display:"flex", justifyContent:"space-between", fontSize:13, color:C.mut } },
              h("span", null, bitti
                ? h("b", { style:{ color:C.warn } }, fmtGeriSayim(kalan) + " geçti")
                : h(React.Fragment, null, "Kalan ", h("b", { style:{ color:C.txt } }, fmtGeriSayim(kalan)))),
              h("span", null, "Bitiş ~" + fmtSaat(bitisDt))
            ),
            is.not && h("div", { style:{ fontSize:12, color:C.mut, marginTop:8 } }, "📝 " + is.not)
          );
        } else if (m.durum !== "bos") {
          govde = h("div", { style:{ padding:"14px 0", textAlign:"center" } },
            h(Badge, { d: DURUMLAR[m.durum] }),
            m.not && h("div", { style:{ fontSize:12, color:C.mut, marginTop:8 } }, m.not)
          );
        } else {
          govde = h("div", { style:{ padding:"8px 0" } },
            h("div", { style:{ color:C.mut, fontSize:13, marginBottom:10 } }, "Boşta — hazır."),
            h("button", { style:{ ...S.btn("primary"), width:"100%" }, onClick:()=>setBaslat({ makineId:m.id }) }, "▶ Baskı Başlat")
          );
        }
        return h("div", { key:m.id, style:S.card },
          h("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 } },
            h("div", null,
              h("div", { style:{ fontWeight:800, fontSize:17 } }, m.ad),
              h("div", { style:{ fontSize:12, color:C.mut } }, m.model + (m.renkli ? " · Renkli" : " · Tek renk"))
            ),
            !is && m.durum === "bos" && h(Badge, { d: DURUMLAR.bos })
          ),
          govde
        );
      })
    ),
    baslat && h(IsModal, { kayit:baslat, makineler, urunler, onKapat:()=>setBaslat(null) })
  );
}

/* ============================================================
   MAKİNELER — CRUD + örnek seed
   ============================================================ */
function MakinelerTab({ makineler }) {
  const [edit, setEdit] = useState(null); // makine | {} | null
  const bos = { ad:"", model:MODELLER[0], renkli:true, durum:"bos", not:"" };

  async function ornekleriEkle() {
    const mevcut = new Set(makineler.map(m => m.ad.toLowerCase()));
    const eklenecek = SEED_MAKINELER.filter(s => !mevcut.has(s.ad.toLowerCase()));
    if (!eklenecek.length) return alert("Örnek makineler zaten ekli.");
    for (const m of eklenecek) await save("makineler", m);
  }

  return h("div", { style:{ marginTop:16 } },
    h("div", { style:{ display:"flex", gap:8, marginBottom:14, flexWrap:"wrap" } },
      h("button", { style:S.btn("primary"), onClick:()=>setEdit(bos) }, "+ Makine"),
      h("button", { style:S.btn(), onClick:ornekleriEkle }, "⚙ Örnekleri Ekle (6 Bambu)")
    ),
    !makineler.length
      ? h("div", { style:{ ...S.card, color:C.mut, textAlign:"center" } }, "Makine yok.")
      : h("div", { style:{ ...S.grid, gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))" } },
          makineler.slice().sort((a,b)=>a.ad.localeCompare(b.ad,"tr")).map(m =>
            h("div", { key:m.id, style:S.card },
              h("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"center" } },
                h("div", { style:{ fontWeight:800, fontSize:16 } }, m.ad),
                h(Badge, { d: DURUMLAR[m.durum] || DURUMLAR.bos })
              ),
              h("div", { style:{ fontSize:13, color:C.mut, margin:"4px 0 8px" } },
                m.model + (m.renkli ? " · Renkli (AMS)" : " · Tek renk")),
              m.not && h("div", { style:{ fontSize:12, color:C.mut, marginBottom:8 } }, m.not),
              h("div", { style:{ display:"flex", gap:8, marginTop:6 } },
                h("button", { style:S.ibtn, onClick:()=>setEdit(m) }, "Düzenle"),
                h("button", { style:{ ...S.ibtn, color:C.bad, borderColor:C.bad }, onClick:()=>{ if(confirm(m.ad+" silinsin mi?")) remove("makineler", m.id); } }, "Sil")
              )
            )
          )
        ),
    edit && h(MakineModal, { kayit:edit, onKapat:()=>setEdit(null) })
  );
}

function MakineModal({ kayit, onKapat }) {
  const yeni = !kayit.id;
  const [f, setF] = useState({ ...kayit });
  const set = (k,v) => setF(s => ({ ...s, [k]:v }));
  async function kaydet() {
    if (!f.ad.trim()) return alert("Ad gir.");
    await save("makineler", f);
    onKapat();
  }
  return h(Modal, {
    baslik: yeni ? "Yeni Makine" : "Makine Düzenle", onKapat,
    alt: h(React.Fragment, null,
      h("button", { style:{ ...S.btn("primary"), flex:1 }, onClick:kaydet }, "Kaydet"),
      h("button", { style:S.btn(), onClick:onKapat }, "Vazgeç"))
  },
    h(Field, { label:"Ad" },
      h("input", { style:S.input, value:f.ad, onChange:e=>set("ad", e.target.value), placeholder:"Praga" })),
    h("div", { style:{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 } },
      h(Field, { label:"Model" },
        h("select", { style:S.input, value:f.model, onChange:e=>set("model", e.target.value) },
          MODELLER.map(m => h("option", { key:m, value:m }, m)))),
      h(Field, { label:"Durum" },
        h("select", { style:S.input, value:f.durum, onChange:e=>set("durum", e.target.value) },
          Object.keys(DURUMLAR).map(k => h("option", { key:k, value:k }, DURUMLAR[k].ad))))
    ),
    h("label", { style:{ display:"flex", alignItems:"center", gap:8, margin:"4px 0 12px", fontWeight:600 } },
      h("input", { type:"checkbox", checked:!!f.renkli, onChange:e=>set("renkli", e.target.checked) }),
      "Renkli baskı (AMS var)"),
    h(Field, { label:"Not" },
      h("textarea", { style:{ ...S.input, minHeight:60, resize:"vertical" }, value:f.not||"", onChange:e=>set("not", e.target.value) }))
  );
}

/* ============================================================
   ÜRÜNLER — katalog CRUD + kâr
   ============================================================ */
function UrunlerTab({ urunler }) {
  const [edit, setEdit] = useState(null);
  const bos = { ad:"", renk:"", gram:"", sureDk:"", maliyet:"", fiyat:"", not:"" };
  return h("div", { style:{ marginTop:16 } },
    h("button", { style:{ ...S.btn("primary"), marginBottom:14 }, onClick:()=>setEdit(bos) }, "+ Ürün"),
    !urunler.length
      ? h("div", { style:{ ...S.card, color:C.mut, textAlign:"center" } }, "Ürün yok.")
      : h("div", { style:{ ...S.grid, gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))" } },
          urunler.slice().sort((a,b)=>a.ad.localeCompare(b.ad,"tr")).map(u => {
            const kar = num(u.fiyat) - num(u.maliyet);
            const karY = num(u.maliyet) ? Math.round(kar / num(u.maliyet) * 100) : null;
            return h("div", { key:u.id, style:S.card },
              h("div", { style:{ fontWeight:800, fontSize:16 } }, u.ad),
              h("div", { style:{ fontSize:13, color:C.mut, margin:"3px 0 10px" } },
                [u.renk, u.gram ? u.gram + "g" : null, u.sureDk ? fmtSure(u.sureDk) : null].filter(Boolean).join(" · ") || "—"),
              h("div", { style:{ display:"flex", justifyContent:"space-between", fontSize:14, marginBottom:4 } },
                h("span", { style:{ color:C.mut } }, "Maliyet"), h("span", null, para(u.maliyet))),
              h("div", { style:{ display:"flex", justifyContent:"space-between", fontSize:14, marginBottom:4 } },
                h("span", { style:{ color:C.mut } }, "Fiyat"), h("span", null, para(u.fiyat))),
              h("div", { style:{ display:"flex", justifyContent:"space-between", fontSize:14, fontWeight:800,
                color: kar >= 0 ? C.ok : C.bad } },
                h("span", null, "Kâr"), h("span", null, para(kar) + (karY != null ? "  (%" + karY + ")" : ""))),
              h("div", { style:{ display:"flex", gap:8, marginTop:10 } },
                h("button", { style:S.ibtn, onClick:()=>setEdit(u) }, "Düzenle"),
                h("button", { style:{ ...S.ibtn, color:C.bad, borderColor:C.bad }, onClick:()=>{ if(confirm(u.ad+" silinsin mi?")) remove("urunler", u.id); } }, "Sil"))
            );
          })
        ),
    edit && h(UrunModal, { kayit:edit, onKapat:()=>setEdit(null) })
  );
}

function UrunModal({ kayit, onKapat }) {
  const yeni = !kayit.id;
  const [f, setF] = useState({ ...kayit });
  const set = (k,v) => setF(s => ({ ...s, [k]:v }));
  const kar = num(f.fiyat) - num(f.maliyet);
  async function kaydet() {
    if (!f.ad.trim()) return alert("Ad gir.");
    await save("urunler", {
      ...f, gram:num(f.gram), sureDk:num(f.sureDk), maliyet:num(f.maliyet), fiyat:num(f.fiyat)
    });
    onKapat();
  }
  return h(Modal, {
    baslik: yeni ? "Yeni Ürün" : "Ürün Düzenle", onKapat,
    alt: h(React.Fragment, null,
      h("button", { style:{ ...S.btn("primary"), flex:1 }, onClick:kaydet }, "Kaydet"),
      h("button", { style:S.btn(), onClick:onKapat }, "Vazgeç"))
  },
    h(Field, { label:"Ad" },
      h("input", { style:S.input, value:f.ad, onChange:e=>set("ad", e.target.value), placeholder:"Anahtarlık" })),
    h("div", { style:{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 } },
      h(Field, { label:"Renk" }, h("input", { style:S.input, value:f.renk||"", onChange:e=>set("renk", e.target.value) })),
      h(Field, { label:"Gram (g)" }, h("input", { type:"number", style:S.input, value:f.gram, onChange:e=>set("gram", e.target.value) }))
    ),
    h(Field, { label:"Baskı süresi (dk / adet)" },
      h("input", { type:"number", style:S.input, value:f.sureDk, onChange:e=>set("sureDk", e.target.value) })),
    h("div", { style:{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 } },
      h(Field, { label:"Maliyet (₺)" }, h("input", { type:"number", style:S.input, value:f.maliyet, onChange:e=>set("maliyet", e.target.value) })),
      h(Field, { label:"Satış Fiyatı (₺)" }, h("input", { type:"number", style:S.input, value:f.fiyat, onChange:e=>set("fiyat", e.target.value) }))
    ),
    h("div", { style:{ ...S.card, background:C.panel2, padding:"10px 12px", marginBottom:12,
      display:"flex", justifyContent:"space-between", fontWeight:700, color: kar>=0?C.ok:C.bad } },
      h("span", null, "Kâr"), h("span", null, para(kar))),
    h(Field, { label:"Not" },
      h("textarea", { style:{ ...S.input, minHeight:50, resize:"vertical" }, value:f.not||"", onChange:e=>set("not", e.target.value) }))
  );
}

/* ============================================================
   İŞLER — geçmiş, filtre, başlat/düzenle/bitir/iptal
   ============================================================ */
function IslerTab({ makineler, urunler, isler }) {
  const [filtre, setFiltre] = useState("hepsi");
  const [edit, setEdit] = useState(null);

  const liste = useMemo(() => {
    let l = isler.slice().sort((a,b)=>new Date(b.baslangic) - new Date(a.baslangic));
    if (filtre !== "hepsi") l = l.filter(i => i.durum === filtre);
    return l;
  }, [isler, filtre]);

  async function bitir(i) { await save("isler", { id:i.id, durum:"bitti", gercekBitis:new Date().toISOString() }); }
  async function iptal(i) { if(confirm("İş iptal edilsin mi?")) await save("isler", { id:i.id, durum:"iptal", gercekBitis:new Date().toISOString() }); }

  const filtreler = [["hepsi","Hepsi"],["devam","Devam"],["bitti","Bitti"],["iptal","İptal"]];

  return h("div", { style:{ marginTop:16 } },
    h("div", { style:{ display:"flex", gap:8, marginBottom:14, flexWrap:"wrap", alignItems:"center" } },
      h("button", { style:S.btn("primary"), onClick:()=>setEdit({}) }, "+ Yeni İş"),
      h("div", { style:{ flex:1 } }),
      filtreler.map(([k,ad]) =>
        h("button", { key:k, onClick:()=>setFiltre(k),
          style:{ ...S.ibtn, background: filtre===k?C.acc:C.panel2, borderColor: filtre===k?C.acc:C.line } }, ad))
    ),
    !liste.length
      ? h("div", { style:{ ...S.card, color:C.mut, textAlign:"center" } }, "Kayıt yok.")
      : h("div", { style:S.grid },
          liste.map(i => {
            const d = IS_DURUMLAR[i.durum] || IS_DURUMLAR.devam;
            return h("div", { key:i.id, style:S.card },
              h("div", { style:{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8 } },
                h("div", null,
                  h("div", { style:{ fontWeight:800, fontSize:16 } },
                    i.urunAd, i.adet>1 ? h("span",{style:{color:C.mut}}," ×"+i.adet) : null),
                  h("div", { style:{ fontSize:13, color:C.mut, marginTop:2 } },
                    "🖨 " + (i.makineAd||"—") + "  ·  " + fmtSaat(i.baslangic) + "  ·  " + fmtSure(i.sureDk))
                ),
                h(Badge, { d })
              ),
              i.not && h("div", { style:{ fontSize:12, color:C.mut, marginTop:8 } }, "📝 " + i.not),
              h("div", { style:{ display:"flex", gap:8, marginTop:10, flexWrap:"wrap" } },
                i.durum==="devam" && h("button", { style:{ ...S.ibtn, color:C.ok, borderColor:C.ok }, onClick:()=>bitir(i) }, "✓ Bitir"),
                i.durum==="devam" && h("button", { style:S.ibtn, onClick:()=>iptal(i) }, "İptal"),
                h("button", { style:S.ibtn, onClick:()=>setEdit(i) }, "Düzenle"),
                h("button", { style:{ ...S.ibtn, color:C.bad, borderColor:C.bad }, onClick:()=>{ if(confirm("Kayıt silinsin mi?")) remove("isler", i.id); } }, "Sil")
              )
            );
          })
        ),
    edit && h(IsModal, { kayit:edit, makineler, urunler, onKapat:()=>setEdit(null) })
  );
}

/* ============================================================
   APP
   ============================================================ */
function App() {
  const [tab, setTab] = useState("pano");
  const [now, setNow] = useState(Date.now());
  useEffect(() => { const t = setInterval(() => setNow(Date.now()), 1000); return () => clearInterval(t); }, []);

  const makineler = useColl("makineler");
  const urunler   = useColl("urunler");
  const isler     = useColl("isler");

  const aktifSayi = isler.filter(i => i.durum === "devam").length;
  const SEKMELER = [
    ["pano", "Pano", aktifSayi ? "🟢" : "📊"],
    ["makineler", "Makineler", "🖨"],
    ["urunler", "Ürünler", "📦"],
    ["isler", "İşler", "🗂"],
  ];

  return h("div", null,
    h("div", { style:S.top },
      h("div", { style:S.wrap },
        h("div", { style:{ display:"flex", alignItems:"center", justifyContent:"space-between" } },
          h("div", { style:S.brand }, "🧊 Tikita",
            h("span", { style:{ fontSize:12, fontWeight:600, color:C.mut } }, "makine & baskı")),
          aktifSayi > 0 && h(Badge, { d:{ ad: aktifSayi + " aktif baskı", bg:"#0f2f37", fg:C.acc2 } })
        ),
        h("div", { style:S.tabs },
          SEKMELER.map(([k, ad, ic]) =>
            h("button", { key:k, style:S.tab(tab===k), onClick:()=>setTab(k) }, ic + " " + ad))
        )
      )
    ),
    h("div", { style:S.wrap },
      !CONFIG_OK && h("div", { style:{ ...S.card, background:"#3a2a12", borderColor:C.warn,
        color:"#ffe", marginTop:16 } },
        h("b", null, "⚠ Firebase config eksik."),
        " public/index.html içindeki ", h("code", null, "cfg"), " nesnesinde ",
        h("code", null, "apiKey · messagingSenderId · appId"),
        " alanlarını doldur. Şu an veriler kaydedilmez."),
      tab==="pano"      && h(PanoTab,      { makineler, urunler, isler, now }),
      tab==="makineler" && h(MakinelerTab, { makineler }),
      tab==="urunler"   && h(UrunlerTab,   { urunler }),
      tab==="isler"     && h(IslerTab,     { makineler, urunler, isler })
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
