function cn(name){ return (DEMO_MODE && DEMO_COLLS.has(name)) ? ("demo_"+name) : name; }
// MINIMAL — sade/materyal görünüm (minimal deneme hesabı). Materyal ikon yardımcısı:

// KRIPTO — 🪙 Tikita Exchange cildi (kripto deneme hesabı): aynı veri, borsa dili

/* ---------- yardımcılar ---------- */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,8);
async function save(coll, obj){ const id=obj.id||uid(); const {id:_,...d}=obj; await setDoc(doc(db,cn(coll),id),d,{merge:true}); return id; }
async function remove(coll,id){ await deleteDoc(doc(db,cn(coll),id)); }
async function restoreDoc(coll,obj){ const {id,...data}=obj; await setDoc(doc(db,cn(coll),id),data); } // merge yok → tam geri yükle

let AKTIF_KUL=null;
async function harKaydet(obj){ const o=AKTIF_KUL?{kullaniciId:AKTIF_KUL.id,kullaniciAd:AKTIF_KUL.ad,...obj}:obj; return save("pazarlama_hareket",o); }
const SIMGELER=["🦅","🐺","🦁","🐉","🦊","🐯","🦈","🦂","🐻","🦉","🐗","🦏","⚔️","🛡️","👑","🔱"];
// #13 PIN'ler düz metin saklanmaz — tuzlu SHA-256 özet
function yeniSalt(){ const a=new Uint8Array(8); crypto.getRandomValues(a); return Array.from(a).map(b=>b.toString(16).padStart(2,"0")).join(""); }
async function pinHashle(pin, salt){ const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode((salt||"")+":"+pin));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join(""); }
async function yeniKullaniciPin(pin){ const salt=yeniSalt(); return { pinSalt:salt, pinHash:await pinHashle(pin,salt) }; }
async function pinDogru(user, pin){ if(user.pinHash) return (await pinHashle(pin,user.pinSalt||""))===user.pinHash; return pin===(user.pin||""); }
// KİŞİYE ÖZEL ÇANTA — her pazarlamacının çantası ürün üzerinde pazStokK[kullaniciId] haritasında tutulur
function bagOf(u){ const uid=AKTIF_KUL?AKTIF_KUL.id:""; const m=(u&&u.pazStokK)||{}; const v=m[uid]; return v==null?0:num(v); }
// çantayı ATOMİK değiştir (hızlı +/- basımında yarış/eski-okuma hatasını önler); ekstra.stoktaDelta da atomik
async function bagDelta(u, d, ekstra){ const uid=AKTIF_KUL?AKTIF_KUL.id:"";
  const obj={id:u.id,pazStokK:{[uid]:increment(Math.round(num(d)))}};
  if(ekstra&&ekstra.stoktaDelta!=null) obj.stokta=increment(Math.round(num(ekstra.stoktaDelta)));
  await save("stok_urun",obj); }
// satış/konsinye fiyatı 0 ise uyar — sessiz 0-ciro kaydını önle
function fiyatOnay(kalemler){ const s=kalemler.filter(x=>num(x.fiyat)<=0);
  if(!s.length) return true;
  return confirm("⚠ Satış fiyatı 0 ₺ olan ürün(ler):\n"+s.map(x=>"• "+x.ad).join("\n")+"\n\nBu haliyle 0 ciro yazılır. Yine de devam edeyim mi?\n(Fiyatı Cephane / Stok kısmından düzeltebilirsin.)"); }
function useColl(name, demoFlag){
  const [rows,setRows]=useState([]);
  useEffect(()=>onSnapshot(collection(db,cn(name)),s=>setRows(s.docs.map(d=>({id:d.id,...d.data()}))),e=>console.error(name,e)),[name,demoFlag]);
  return rows;
}
// kullanıcılar — yüklendi bilgisiyle (ilk-açılış ekranı için)
function useKullanici(){
  const [st,setSt]=useState({rows:[],loaded:false});
  useEffect(()=>onSnapshot(collection(db,"kullanici"),s=>setSt({rows:s.docs.map(d=>({id:d.id,...d.data()})),loaded:true}),e=>console.error("kullanici",e)),[]);
  return st;
}
const num = v => { const n=parseFloat(v); return isNaN(n)?0:n; };
const pad = n => String(n).padStart(2,"0");
const fmtSaat = d => { const t=new Date(d); return pad(t.getHours())+":"+pad(t.getMinutes()); };
const fmtTarih = d => { const t=new Date(d); return pad(t.getDate())+"."+pad(t.getMonth()+1); };
const fmtTarihSaat = d => fmtTarih(d)+" "+fmtSaat(d);
const GUNLER = ["PAZAR","PAZARTESİ","SALI","ÇARŞAMBA","PERŞEMBE","CUMA","CUMARTESİ"];
const AYLAR = ["OCAK","ŞUBAT","MART","NİSAN","MAYIS","HAZİRAN","TEMMUZ","AĞUSTOS","EYLÜL","EKİM","KASIM","ARALIK"];
const AYLAR_T = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
const GUNLER_T = ["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
// teslim tarihi — "Bugün" / "Yarın" / "4 Temmuz Cumartesi"
function teslimGunu(ts){ const d=new Date(ts); const bugun=gunBasi(Date.now()).getTime(), gun=gunBasi(ts).getTime();
  const fark=Math.round((gun-bugun)/86400000);
  if(fark<=0) return "Bugün"; if(fark===1) return "Yarın";
  return d.getDate()+" "+AYLAR_T[d.getMonth()]+" "+GUNLER_T[d.getDay()]; }
const SAAT_MALIYET = 12;   // makine çalışma maliyeti (₺/saat)
function tl(n){ return num(n).toLocaleString("tr",{minimumFractionDigits:0,maximumFractionDigits:2})+" ₺"; }
// görseli küçült → data URL (Firestore'a sığsın)
function resizeImg(file, max){ max=max||900; return new Promise((res,rej)=>{
  const rd=new FileReader();
  rd.onload=()=>{ const img=new Image();
    img.onload=()=>{ let w=img.width,h=img.height; const sc=Math.min(1,max/Math.max(w,h)); w=Math.round(w*sc); h=Math.round(h*sc);
      const cv=document.createElement("canvas"); cv.width=w; cv.height=h; cv.getContext("2d").drawImage(img,0,0,w,h);
      res(cv.toDataURL("image/jpeg",0.8)); };
    img.onerror=rej; img.src=rd.result; };
  rd.onerror=rej; rd.readAsDataURL(file);
}); }
// ada göre sabit renk (kartları görsel ayırmak için)
function adRenk(s){ let hsh=0; const t=s||"?"; for(let i=0;i<t.length;i++) hsh=(hsh*31+t.charCodeAt(i))>>>0;
  const H=hsh%360; return { H, ana:"hsl("+H+",58%,46%)", acik:"hsl("+H+",62%,60%)", yumusak:"hsl("+H+",64%,96%)" }; }
// ürün bilgisi + görselleri WhatsApp / paylaşım
async function paylasWhats(u, fiyat){
  const sat = fiyat!=null?num(fiyat):num(u.satisFiyat);
  const text=[u.ad, u.aciklama||"", sat>0?("Fiyat: "+tl(sat)):""].filter(Boolean).join("\n");
  const fotos=(u.foto||[]);
  try{
    if(navigator.canShare && fotos.length){
      const files=[];
      for(let i=0;i<Math.min(fotos.length,4);i++){ const b=await (await fetch(fotos[i])).blob(); files.push(new File([b],"urun"+(i+1)+".jpg",{type:b.type||"image/jpeg"})); }
      if(navigator.canShare({files})){ await navigator.share({text,files}); return; }
    }
    if(navigator.share){ await navigator.share({text}); return; }
  }catch(e){ if(e&&e.name==="AbortError") return; }
  window.open("https://wa.me/?text="+encodeURIComponent(text),"_blank");
}
// —— ürün KARTINI tek bir resme (JPEG) çiz: solda ürün fotoğrafı, sağda bilgileri ——
function _resimYukle(src){ return new Promise((res,rej)=>{ const img=new Image(); img.crossOrigin="anonymous"; img.onload=()=>res(img); img.onerror=rej; img.src=src; }); }
function _kapla(ctx,img,dx,dy,dw,dh){ const ir=img.width/img.height, dr=dw/dh; let sx,sy,sw,sh;
  if(ir>dr){ sh=img.height; sw=sh*dr; sx=(img.width-sw)/2; sy=0; } else { sw=img.width; sh=sw/dr; sx=0; sy=(img.height-sh)/2; }
  ctx.drawImage(img,sx,sy,sw,sh,dx,dy,dw,dh); }
function _sar(ctx,metin,x,y,maxW,satirY){ const kelime=String(metin).split(/\s+/); let satir="";
  for(const w of kelime){ const t=satir?satir+" "+w:w; if(ctx.measureText(t).width>maxW && satir){ ctx.fillText(satir,x,y); y+=satirY; satir=w; } else satir=t; }
  if(satir){ ctx.fillText(satir,x,y); y+=satirY; } return y; }
async function urunKartiResmi(u){
  try{
    const W=1080, H=720, FG="system-ui,-apple-system,Segoe UI,Roboto,Arial";
    const cv=document.createElement("canvas"); cv.width=W; cv.height=H; const ctx=cv.getContext("2d");
    ctx.fillStyle="#ffffff"; ctx.fillRect(0,0,W,H);
    const imgW=Math.round(W*0.46); const foto=(u.foto||[])[0]; let cizildi=false;
    if(foto){ try{ const img=await _resimYukle(foto); _kapla(ctx,img,0,0,imgW,H); cizildi=true; }catch(e){} }
    if(!cizildi){ ctx.fillStyle="#0b1220"; ctx.fillRect(0,0,imgW,H);
      ctx.fillStyle="rgba(255,255,255,.92)"; ctx.font="bold 240px "+FG; ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText((u.ad||"?").charAt(0).toLocaleUpperCase("tr"), imgW/2, H/2); }
    // sağ blok — üst renk şeridi + bilgiler
    ctx.fillStyle="#b45309"; ctx.fillRect(imgW,0,W-imgW,10);
    const pad=52; let x=imgW+pad, y=pad+56;
    ctx.textAlign="left"; ctx.textBaseline="alphabetic";
    ctx.fillStyle="#0f172a"; ctx.font="bold 54px "+FG; y=_sar(ctx,u.ad||"",x,y,W-x-pad,64);
    if(u.aciklama){ ctx.fillStyle="#475569"; ctx.font="30px "+FG; y+=22; y=_sar(ctx,u.aciklama,x,y,W-x-pad,42); }
    const sat=num(u.satisFiyat);
    if(sat>0){ y+=54; ctx.fillStyle="#ecfdf5"; const pw=W-x-pad; ctx.fillRect(x-14,y-56,Math.min(pw+28,360),82);
      ctx.fillStyle="#047857"; ctx.font="bold 64px "+FG; ctx.fillText(tl(sat), x, y); }
    ctx.fillStyle="#94a3b8"; ctx.font="bold 30px "+FG; ctx.textAlign="right"; ctx.fillText("Tikita", W-pad, H-pad);
    return await new Promise(res=>cv.toBlob(res,"image/jpeg",0.92));
  }catch(e){ return null; }
}
function fmtSureSaat(dk){ dk=Math.max(0,Math.round(num(dk))); return Math.floor(dk/60)+" sa "+pad(dk%60)+" dk"; }
function toInput(d){ const t=new Date(d); return t.getFullYear()+"-"+pad(t.getMonth()+1)+"-"+pad(t.getDate())+"T"+pad(t.getHours())+":"+pad(t.getMinutes()); }
function gunBasi(d){ const t=new Date(d); t.setHours(0,0,0,0); return t; }
function haftaBasi(d){ const t=gunBasi(d); t.setDate(t.getDate()-((t.getDay()-6+7)%7)); return t; }  // o haftanın Cumartesi'si
function ayBasi(d){ const t=new Date(d); return new Date(t.getFullYear(),t.getMonth(),1).getTime(); }
// bir baskının kapsadığı parçalar: çoklu (parcaAdlar) > tekli (parcaAd) > takım (tüm parçalar)
function plParcalari(p, parcalar){
  parcalar=parcalar||[];
  if(p.parcaAdlar && p.parcaAdlar.length){ const s=p.parcaAdlar.filter(x=>parcalar.includes(x)); if(s.length) return s; }
  if(p.parcaAd && parcalar.includes(p.parcaAd)) return [p.parcaAd];
  return parcalar.slice();   // takım / tümü
}
// bir baskının her parçaya kattığı ÜRETİM adedi (PARÇA adedi).
//  adet HER ZAMAN set/takım sayısıdır → kapsanan her parçaya adet × gereken(parça).
//  (tek parça da çoklu da aynı kural — birim tutarlı: 14 set = ÜST×28, ARA×56, YAN×140)
function plParcaKatki(p, u){
  const parcalar=(u&&u.parcalar)||[]; const cov=plParcalari(p,parcalar); const ad=Math.max(0,num(p.adet||1));
  const m={}; cov.forEach(pt=>{ m[pt]=ad*Math.max(1,Math.round(num((u.parcaAdet||{})[pt]||1))); });
  return m;
}
// planların EFEKTİF başlangıcı (id -> {s,geride}) — Gantt/StokTab/PazarlamaTakip ORTAK kural:
//  geciken başlamamış iş "şimdi"ye kayar; üzerinden başka iş başlatılmışsa (geride) sayılmaz
function planEffBas(plan, now){
  const m={}, byMak={};
  (plan||[]).forEach(p=>{ (byMak[p.makineId||"?"]=byMak[p.makineId||"?"]||[]).push(p); });
  Object.values(byMak).forEach(arr=>{
    arr.sort((a,b)=>new Date(a.baslangic)-new Date(b.baslangic));
    let sonBas=-Infinity;
    arr.forEach(p=>{ if(p.basladi){ const gs=new Date(p.gercekBaslangic||p.baslangic).getTime(); if(gs>sonBas) sonBas=gs; } });
    let cursor=-Infinity;
    arr.forEach(p=>{ const ps=new Date(p.baslangic).getTime(), dur=num(p.sureDk)*60000;
      const geride=!p.basladi && ps<sonBas;
      let s;
      if(p.basladi || geride) s=ps;
      else { s=Math.max(ps,cursor); if(ps<now) s=Math.max(now,cursor); }
      if(!geride) cursor=Math.max(cursor,s+dur);
      if(p.id) m[p.id]={s,geride};
    });
  });
  return m;
}
// ürün birim maliyeti (baskılardan) — elle girilmişse o; eksik veri → null
function urunBirimMaliyet(u, prints, filById){
  const birim=p=>{ const fl=filById[p.filamentId];
    if(!(num(p.sureDk)>0 && num(p.gram)>0 && fl && num(fl.kgFiyat)>0)) return null;
    const ad=Math.max(1,num(p.adet||1)); return (num(p.sureDk)/ad/60)*SAAT_MALIYET + (num(p.gram)/ad/1000)*num(fl.kgFiyat); };
  const parts=u.parcalar||[];
  if(parts.length){ const ger=q=>Math.max(1,Math.round(num((u.parcaAdet||{})[q]||1))); let tot=0;
    for(const part of parts){
      // parça-başı maliyet: birim maliyet Σgereken(kapsanan) parçaya bölünür (set → parça)
      let tM=0,tW=0; prints.forEach(p=>{ const cov=plParcalari(p,parts); if(!cov.includes(part)) return;
        const b=birim(p); if(b==null) return;
        const pay=cov.reduce((s,q)=>s+ger(q),0); const pieces=Math.max(1,num(p.adet||1))*ger(part);
        tM+=(b/pay)*pieces; tW+=pieces; });
      if(tW===0) return null;
      tot += (tM/tW)*ger(part);
    }
    return tot;
  }
  // ADET-AĞIRLIKLI ortalama (tekli ürün): toplam maliyet ÷ toplam adet
  let tM=0,tA=0; prints.forEach(p=>{ const b=birim(p); if(b==null) return; const a=Math.max(1,num(p.adet||1)); tM+=b*a; tA+=a; });
  return tA>0?tM/tA:null;
}
function urunMaliyet(u, prints, filById){ return num(u.maliyet)>0 ? num(u.maliyet) : urunBirimMaliyet(u,prints,filById); }

/* Sağa kaydır → solda Sil çıkan satır (önceki baskılar listesi) */
function OncekiSatir({ label, alt, onSec, onSil }){
  const [dx,setDx]=useState(0);
  const [open,setOpen]=useState(false);
  const st=React.useRef({x:0,base:0,drag:false,moved:false});
  const REVEAL=84;
  const xOf=e=>(e.touches&&e.touches[0]?e.touches[0].clientX:e.clientX);
  function down(e){ st.current={x:xOf(e),base:dx,drag:true,moved:false}; }
  function move(e){ const s=st.current; if(!s.drag)return; const dxRaw=xOf(e)-s.x; if(Math.abs(dxRaw)>4)s.moved=true;
    setDx(Math.max(0,Math.min(REVEAL,s.base+dxRaw))); }
  function up(){ const s=st.current; if(!s.drag)return; s.drag=false; const o=dx>REVEAL/2; setOpen(o); setDx(o?REVEAL:0); }
  function tikla(){ if(st.current.moved)return; if(open){ setOpen(false); setDx(0); return; } onSec&&onSec(); }
  return h("div",{style:{position:"relative",overflow:"hidden",borderRadius:8,marginBottom:6,border:"1px solid "+C.line}},
    h("button",{type:"button",onClick:onSil,style:{position:"absolute",left:0,top:0,bottom:0,width:REVEAL,border:"none",
      background:C.kirmiziB,color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}},"🗑 Sil"),
    h("div",{onMouseDown:down,onMouseMove:move,onMouseUp:up,onMouseLeave:up,
      onTouchStart:down,onTouchMove:move,onTouchEnd:up,onClick:tikla,
      style:{position:"relative",transform:"translateX("+dx+"px)",transition:st.current.drag?"none":"transform .18s",
        background:"#fff",padding:"9px 12px",cursor:"pointer",userSelect:"none",WebkitUserSelect:"none",touchAction:"pan-y"}},
      h("div",{style:{fontWeight:700,fontSize:14}},label),
      alt&&h("div",{style:{fontSize:11.5,color:C.mut,marginTop:2}},alt)));
}

/* ============================================================
   İŞ (plan kaydı) modalı
   ============================================================ */
function IsModal({ kayit, makineler, plan, urunler, filamentler, haftaBas, haftaBit, onSnap, onKapat }){
  const yeni = !kayit.id;
  const [f,setF] = useState(()=>({
    makineId: kayit.makineId || (makineler[0]&&makineler[0].id) || "",
    ad:       kayit.ad       || "",
    urunId:   kayit.urunId   || "",
    parcaAd:  kayit.parcaAd  || "",
    parcaAdlar: kayit.parcaAdlar || (kayit.parcaAd?[kayit.parcaAd]:[]),   // aynı tabladaki parçalar (çoklu)
    adet:     kayit.adet     || 1,
    baslangic:toInput(kayit.baslangic || Date.now()),
    sureDk:   kayit.sureDk   || "",
    gram:     kayit.gram     || "",
    filamentId: kayit.filamentId || "",
    ams:      kayit.ams != null ? kayit.ams : true,
    not:      kayit.not      || "",
    basladi:  !!kayit.basladi,
  }));
  // ürün seçimi: kayıtlı bir ürüne bağlıysa o ürünü/parçasını seç, yoksa elle giriş ("diger")
  const urunListe = (urunler||[]).slice().sort((a,b)=>(a.ad||"").localeCompare(b.ad||"","tr"));
  const [urunMod,setUrunMod] = useState(()=> (kayit.urunId || !kayit.ad) ? "urun" : "diger");
  // mevcut seçimin select value'su (artık ürün düzeyi; parçalar aşağıda çoklu seçilir)
  const urunVal = f.urunId ? ("u:"+f.urunId) : "";
  const seciliUrun = urunListe.find(x=>x.id===f.urunId);
  const seciliParcalar = (seciliUrun && seciliUrun.parcalar) || [];
  // parça çipini aç/kapa → ad'ı güncelle (hepsi/hiç = takım)
  function parcaToggle(pt){ setF(s=>{ const cur=new Set(s.parcaAdlar||[]); cur.has(pt)?cur.delete(pt):cur.add(pt);
    const arr=seciliParcalar.filter(x=>cur.has(x)); const hepsi=arr.length===0||arr.length===seciliParcalar.length;
    return {...s, parcaAdlar:arr, ad: seciliUrun ? (hepsi? seciliUrun.ad : seciliUrun.ad+" "+arr.join("+")) : s.ad}; }); }
  const [tekrar,setTekrar] = useState(false);
  const [planReset,setPlanReset] = useState(false);
  const [tik,setTik] = useState(Date.now());
  useEffect(()=>{ const t=setInterval(()=>setTik(Date.now()),1000); return ()=>clearInterval(t); },[]);
  const set=(k,v)=>setF(s=>({...s,[k]:v}));
  // önceki baskılar — tekil (ad+adet+süre+ams). Seçili makinede basılanlar en üstte,
  // o makinenin en son baskısı en başta; sonra diğer makineler. Her grup en yeni önce.
  const oncekiler = useMemo(()=>{
    const seen=new Set(), out=[];
    (plan||[]).filter(p=>p.id!==kayit.id)
      .sort((a,b)=>{
        const am=(a.makineId===f.makineId)?1:0, bm=(b.makineId===f.makineId)?1:0;
        if(am!==bm) return bm-am;                              // seçili makine önce
        return new Date(b.baslangic)-new Date(a.baslangic);    // en yeni önce
      })
      .forEach(p=>{ const sig=(p.ad||"")+"|"+num(p.adet)+"|"+num(p.sureDk)+"|"+(p.ams?1:0);
        if(!seen.has(sig)){ seen.add(sig); out.push(p); } });
    return out.slice(0,30);
  },[plan,kayit.id,f.makineId]);
  function tekrarla(o){
    if(!o) return;
    setF(s=>({ ...s, ad:o.ad, urunId:o.urunId||"", parcaAd:o.parcaAd||"", parcaAdlar:o.parcaAdlar||(o.parcaAd?[o.parcaAd]:[]), adet:o.adet, sureDk:o.sureDk, gram:o.gram||"", filamentId:o.filamentId||"", ams:!!o.ams, not:o.not||"" }));
    setUrunMod((o.urunId||!o.ad)?"urun":"diger");
    setTekrar(true);
  }
  // ürün açılır listesinden seçim: value "u:<id>" (varsayılan takım; parçalar aşağıda seçilir)
  function urunSec(val){
    if(!val){ setF(s=>({...s,urunId:"",parcaAd:"",parcaAdlar:[],ad:""})); return; }
    const id=(val.split(/^u:/)[1]||"").split("|")[0];
    const u = urunListe.find(x=>x.id===id); if(!u) return;
    setF(s=>({...s, urunId:id, parcaAd:"", parcaAdlar:[], ad:u.ad }));   // varsayılan: tüm parçalar (takım)
  }
  async function kaydet(){
    if(!f.makineId) return alert("Makine seç.");
    if(!f.ad.trim()) return alert("İş/ürün adı gir.");
    if(!f.sureDk)   return alert("Süre gir (dk).");
    onSnap&&onSnap();
    const sMs = new Date(f.baslangic).getTime();
    // İçkin kural: yalnız TAMAMEN geçmişte kalmış (başlangıç+süre ≤ şimdi) baskı = zaten basılmış → üretime sayılır.
    // Aksi (gelecek/şu an) = yalnız PLAN; makine çalışmadan (Gantt'ta 'Başlasın mı?' onayı olmadan) stoğa girmez.
    const basladi = yeni ? (sMs + num(f.sureDk)*60000 <= Date.now()) : !!kayit.basladi;
    // planSureDk = ilk plan süresi (gecikme baz çizgisi). İlk kayıtta sabitlenir; "yeni plan kabul et" ile sıfırlanabilir.
    const planSureDk = (planReset || kayit.planSureDk==null) ? num(f.sureDk) : num(kayit.planSureDk);
    // parça kaydı: alt küme seçiliyse çoklu; hepsi/hiç ise takım (boş)
    let pAdlar=[], pAd="";
    if(urunMod==="urun" && seciliParcalar.length){ const arr=(f.parcaAdlar||[]).filter(x=>seciliParcalar.includes(x));
      if(arr.length && arr.length<seciliParcalar.length){ pAdlar=arr; pAd=arr.length===1?arr[0]:""; } }
    const id = await save("plan",{ id:kayit.id, makineId:f.makineId, ad:f.ad.trim(), adet:num(f.adet),
      urunId: (urunMod==="urun" ? f.urunId : "") || "", parcaAd: pAd, parcaAdlar: pAdlar,
      baslangic:new Date(f.baslangic).toISOString(), sureDk:num(f.sureDk), planSureDk, gram:num(f.gram), filamentId:f.filamentId||"", ams:!!f.ams, not:f.not,
      basladi, gercekBaslangic: basladi ? (kayit.gercekBaslangic || new Date(f.baslangic).toISOString()) : null });
    if(!yeni && kayit.makineId===f.makineId){
      // başlama/süre değişti → sonraki işleri aynı delta (bitiş kayması) kadar otele
      const eskiBas = new Date(kayit.baslangic).getTime();
      const delta = (sMs + num(f.sureDk)*60000) - (eskiBas + num(kayit.sureDk)*60000);
      await planOtele(f.makineId, plan, eskiBas, delta, id);
    } else {
      // yeni iş / makine değişti → çakışmasız diz
      await planKaydir(f.makineId, plan, { id, s:sMs, dk:num(f.sureDk) });
    }
    onKapat();
  }
  // 🗓 seçili baskıyla haftanın boş zamanlarını arka arkaya doldur (bu makine ya da tüm makineler)
  async function haftayiDoldur(hepsi){
    if(!f.ad.trim()) return alert("Önce iş/ürün adı seç ya da gir.");
    const dur=num(f.sureDk)*60000; if(dur<=0) return alert("Süre (dk) gir.");
    const makIds = hepsi ? makineler.map(m=>m.id) : [f.makineId];
    if(!makIds.length || !makIds[0]) return alert("Makine seç.");
    const now=Date.now();
    // gelecek zamanı doldur: hafta başı / seçilen başlangıç / şu an — en büyüğünden başla
    const basla=Math.max(new Date(f.baslangic).getTime(), num(haftaBas)||0, now);
    const eklenecek=[];
    makIds.forEach(mid=>{
      const busy=(plan||[]).filter(p=>p.makineId===mid).map(p=>{ const s=new Date(p.baslangic).getTime(); return [s,s+num(p.sureDk)*60000]; }).sort((a,b)=>a[0]-b[0]);
      let cursor=basla, guard=0;
      while(cursor+dur<=haftaBit && guard++<2000){
        let carpti=true; while(carpti){ carpti=false; for(const iv of busy){ if(cursor<iv[1] && cursor+dur>iv[0]){ cursor=iv[1]; carpti=true; break; } } }
        if(cursor+dur>haftaBit) break;
        eklenecek.push({makineId:mid, s:cursor}); busy.push([cursor,cursor+dur]); busy.sort((a,b)=>a[0]-b[0]); cursor+=dur;
      }
    });
    if(!eklenecek.length) return alert("Bu hafta için boş zaman bulunamadı.");
    if(!confirm(eklenecek.length+" baskı eklenecek — "+f.ad.trim()+" · her biri "+fmtSureSaat(f.sureDk)+(hepsi?" · tüm makineler":" · bu makine")+".\nHaftayı doldurmak istiyor musun?")) return;
    onSnap&&onSnap();
    for(const it of eklenecek){ const iso=new Date(it.s).toISOString();
      await save("plan",{ makineId:it.makineId, ad:f.ad.trim(), adet:num(f.adet),
        urunId:(urunMod==="urun"?f.urunId:"")||"", parcaAd:(urunMod==="urun"?f.parcaAd:"")||"",
        baslangic:iso, sureDk:num(f.sureDk), planSureDk:num(f.sureDk), gram:num(f.gram), filamentId:f.filamentId||"", ams:!!f.ams, not:f.not,
        basladi:false, gercekBaslangic:null }); }
    onKapat();
  }
  const bitis = new Date(f.baslangic).getTime() + num(f.sureDk)*60000;
  // ilerleme (% tamamlandı) — canlı
  const st0=new Date(f.baslangic).getTime(), dur0=num(f.sureDk)*60000, en0=st0+dur0;
  const pct = dur0<=0 ? 0 : Math.max(0,Math.min(100,Math.round((tik-st0)/dur0*100)));
  const devam = tik>=st0 && tik<en0;
  return h(Modal,{ baslik: h("div",{style:{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",flex:1}},
      h("span",{style:{fontWeight:800}}, yeni?(tekrar?"Tekrarla":"Baskı Planla"):"İşi Düzenle"),
      h("select",{style:{padding:"6px 8px",border:"1px solid "+C.line,borderRadius:8,fontSize:14,fontWeight:700,background:"#fff",maxWidth:170},
        value:f.makineId,onChange:e=>set("makineId",e.target.value)},
        makineler.map(m=>h("option",{key:m.id,value:m.id},m.ad))),
      h("label",{style:{display:"flex",alignItems:"center",gap:5,fontSize:13,fontWeight:700,cursor:"pointer"}},
        h("input",{type:"checkbox",checked:!!f.ams,onChange:e=>set("ams",e.target.checked)}),"AMS")), onKapat,
    alt: h(React.Fragment,null,
      h("button",{style:{...S.btn("p"),flex:1},onClick:kaydet}, yeni?"Planla":"Kaydet"),
      !yeni && h("button",{style:{...S.btn(),color:C.kirmiziB,borderColor:C.kirmiziB},onClick:()=>{ if(confirm("Bu iş silinsin mi?")){ onSnap&&onSnap(); remove("plan",kayit.id); onKapat(); } }},"Sil"),
      h("button",{style:S.btn(),onClick:onKapat},"Vazgeç")) },
    !yeni && !tekrar && h("div",{style:{marginBottom:16}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}},
        h("span",{style:S.label},"İlerleme"),
        h("span",{style:{display:"flex",alignItems:"baseline",gap:8}},
          pct>=100 && h("span",{style:{fontSize:14,fontWeight:800,color:C.yesilB}},"✓ Tamamlandı"),
          h("span",{style:{fontWeight:800,fontSize:26,lineHeight:1,
            color: pct>=100?C.yesilB:(devam?"#0e9bb8":C.mut)}}, pct+"%"))),
      h("div",{style:{height:18,background:"#e8eef6",borderRadius:99,overflow:"hidden",border:"1px solid "+C.line}},
        h("div",{className:"tk-prog"+(devam?" tk-stripe tk-live":""),
          style:{height:"100%",width:pct+"%",borderRadius:99,
            background: pct>=100?"linear-gradient(90deg,#22c55e,#16a34a)":"linear-gradient(90deg,#22c55e,#22d3ee)"}})),
      h("div",{style:{fontSize:12.5,color:C.mut,marginTop:7,fontWeight:600}},
        pct>=100 ? ("Bitiş "+fmtTarihSaat(en0))
        : tik<st0 ? ("⏳ Başlamasına "+fmtSureSaat((st0-tik)/60000)+" var")
        : ("🔥 Kalan "+fmtSureSaat((en0-tik)/60000)+" · bitiş ~"+fmtTarihSaat(en0)))),
    yeni && !tekrar && oncekiler.length>0 && h(Field,{label:"↻ Önceki baskıdan seç (dokun → doldur · sağa kaydır → sil)"},
      h("div",{style:{maxHeight:230,overflowY:"auto",paddingRight:2}},
        oncekiler.map((o,i)=>{
          const baskaMak = o.makineId!==f.makineId;
          const makAd = baskaMak ? ((makineler.find(m=>m.id===o.makineId)||{}).ad||"") : "";
          return h(OncekiSatir,{ key:o.id||i,
            label: num(o.adet)+" x "+o.ad,

            onSil: ()=>{ if(o.id && confirm(o.ad+" baskısı listeden silinsin mi?\n(Bu baskı kaydı tamamen silinir.)")){ onSnap&&onSnap(); remove("plan",o.id); } } });
        }))),
    tekrar
      ? h(React.Fragment,null,
          h("div",{style:{...S.card,padding:"10px 12px",marginBottom:12,background:"#f3f6fb"}},
            h("div",{style:{fontWeight:700}}, num(f.adet)+" x "+f.ad),
            h("div",{style:{fontSize:12,color:C.mut,marginTop:2}}, fmtSureSaat(f.sureDk)+(f.ams?" · AMS'li":"")),
            h("button",{style:{...S.ibtn,marginTop:8},type:"button",onClick:()=>setTekrar(false)},"✎ Detayları düzenle")),
          h(Field,{label:"Başlangıç saati"}, h("input",{type:"datetime-local",style:S.input,value:f.baslangic,onChange:e=>set("baslangic",e.target.value)})),
          h("div",{style:{fontSize:12,color:C.mut,marginTop:-4}}, f.sureDk?("Bitiş: "+fmtTarihSaat(bitis)):""))
      : h(React.Fragment,null,
          h("div",{style:{display:"grid",gridTemplateColumns:"2fr 1fr",gap:12}},
            h(Field,{label:"Ürün"},
              urunMod==="diger"
                ? h("div",{style:{display:"flex",gap:6}},
                    h("input",{style:{...S.input,flex:1},value:f.ad,onChange:e=>set("ad",e.target.value),placeholder:"İş / ürün adı (elle gir)",autoFocus:true}),

                    h("option",{value:""},"— ürün seç —"),
                    urunListe.map(u=>h("option",{key:u.id,value:"u:"+u.id}, u.ad+((u.parcalar||[]).length?" · "+u.parcalar.length+" parça":""))),
                    h("option",{value:"diger"},"✎ Diğer (elle gir)…"))),
            h(Field,{label:"Adet"}, h("input",{type:"number",min:1,style:S.input,value:f.adet,onChange:e=>set("adet",e.target.value)}))),
          // 🧩 çoklu parça seçimi — aynı tablada basılacak parçalar (hepsi seçili = takım)
          urunMod==="urun" && seciliParcalar.length>0 && (()=>{ const sec=new Set((f.parcaAdlar||[]).filter(x=>seciliParcalar.includes(x)));
            const takim=sec.size===0||sec.size===seciliParcalar.length;

/* ============================================================
   GANTT — zaman çizelgesi hesapları
   ============================================================ */
// Başlama saati değişince: sonraki işleri (eski sıraya göre) aynı delta kadar öteler — boşluklar/ara korunur
async function planOtele(makineId, plan, oldStartMs, deltaMs, editedId){
  if(!deltaMs) return;
  const ds = plan.filter(p=>p.makineId===makineId && p.id!==editedId
    && new Date(p.baslangic).getTime() > oldStartMs);
  for(const p of ds){
    await save("plan",{ id:p.id, baslangic:new Date(new Date(p.baslangic).getTime()+deltaMs).toISOString() });
  }
}
// Plan aksarsa: aynı makinedeki işleri başlangıç sırasına göre çakışmasız diz (yalnız ileri kaydır)
async function planKaydir(makineId, plan, edited){
  const arr = plan.filter(p=>p.makineId===makineId && p.id!==edited.id)
    .map(p=>({ id:p.id, s:new Date(p.baslangic).getTime(), dk:num(p.sureDk) }));
  arr.push({ id:edited.id, s:edited.s, dk:edited.dk });
  arr.sort((a,b)=>a.s-b.s);
  let prevEnd=null;
  for(const j of arr){
    let s=j.s;
    if(prevEnd!=null && s<prevEnd) s=prevEnd;          // çakışıyorsa öncekinin bitişine çek
    if(s!==j.s) await save("plan",{ id:j.id, baslangic:new Date(s).toISOString() });
    prevEnd = s + j.dk*60000;
  }
}
function tickStep(gunW){ // saat aralığı — zoom'a göre detay
  const slots = Math.max(1, Math.floor(gunW/36));
  for(const o of [1,2,3,4,6,8,12,24]){ if(24/o <= slots) return o; }
  return 24;
}
function makineTimeline(makineId, plan, baslaMs, bitMs, now){
  now = now || Date.now();
  // makinenin tüm işleri, PLANLANAN başlangıca göre sırala
  const all = plan.filter(p=>p.makineId===makineId)
    .map(p=>({ p, ps:new Date(p.baslangic).getTime(), dk:num(p.sureDk) }))
    .sort((a,b)=>a.ps-b.ps);
  // fiilen başlatılmış en son işin başlama anı — bundan ÖNCE planlı ama başlamamış işler "geride kaldı"
  let sonBaslamaMs = -Infinity;
  all.forEach(({p,ps})=>{ if(p.basladi){ const gs=p.gercekBaslangic?new Date(p.gercekBaslangic).getTime():ps; if(gs>sonBaslamaMs) sonBaslamaMs=gs; } });
  // EFEKTİF zaman:
  //  • Başlamış (çalışan/bitmiş) → gerçek saatinde kalır.
  //  • Başlamamış ama üzerine daha sonra başka iş BAŞLATILMIŞ → geride kaldı, planlı (geçmiş) yerinde durur, öne çekilmez.
  //  • Başlamamış ve İLERİYE dönük (henüz atlanmamış) → en erken "şimdi"ye çekilir; sonrakiler zincirleme öne kayar.
  let cursor = -Infinity;
  const eff = all.map(({p,ps,dk})=>{
    const geride = !p.basladi && ps < sonBaslamaMs;           // daha sonra başka iş başlatılmış → atlanmış iş
    let s;
    if(p.basladi){ s = ps; }
    else if(geride){ s = ps; }                                // geride kalan → planlı yerinde bırak (öne çekme)
    else { s = Math.max(ps, cursor); if(ps < now) s = Math.max(now, cursor); }
    const e = s + dk*60000;
    if(!geride) cursor = Math.max(cursor, e);                 // yalnız aktif zincir cursor'ı ilerletir
    return { p, s, e, kaymis: s!==ps, geride };
  });
  const js = eff.filter(x=>x.e>baslaMs && x.s<bitMs).sort((a,b)=>a.s-b.s);
  let printMs=0;
  js.forEach(x=>{ printMs += Math.min(bitMs,x.e)-Math.max(baslaMs,x.s); });
  const bos=[]; let cur=baslaMs;
  js.forEach(x=>{ const s=Math.max(baslaMs,x.s); if(s>cur) bos.push({start:cur,end:s}); cur=Math.max(cur,Math.min(bitMs,x.e)); });
  if(cur<bitMs) bos.push({start:cur,end:bitMs});
  // kayıp = geçmişte (now'dan önce) çalışmayan dilimler
  let kayipMs=0;
  bos.forEach(b=>{ const pe=Math.min(b.end, now||0); if(pe>b.start) kayipMs += pe-b.start; });
  // gecikme = bitiş ilk plandan ne kadar ileri alındı (sureDk - planSureDk)
  let gecikmeMs=0, gecikmeSayi=0;
  js.forEach(x=>{ const base=x.p.planSureDk!=null?num(x.p.planSureDk):num(x.p.sureDk);
    const g=(num(x.p.sureDk)-base)*60000; if(g>0){ gecikmeMs+=g; gecikmeSayi++; } });
  const bosMs=(bitMs-baslaMs)-printMs;
  return { js, eff, bos, printMs, bosMs, kayipMs, bosGelecekMs: bosMs-kayipMs, gecikmeMs, gecikmeSayi };
}

function StokTab({ urunler, plan, filamentler, hareketler }){
  const [edit,setEdit]=useState(null);
  const [aks,setAks]=useState(null);   // kutucuk komut penceresi {u,stage}
  const [acik,setAcik]=useState({});   // ürün kartında baskı listesi açık mı
  const [projAcik,setProjAcik]=useState({});   // teslim planı ayrıntısı açık mı
  const liste = urunler.slice().sort((a,b)=>a.ad.localeCompare(b.ad,"tr"));
  // dakikada bir tazele → plan değişikliği + zaman geçişi haftalık değer/adetlere anında yansır
  const [nowS,setNowS]=useState(Date.now());
  useEffect(()=>{ const t=setInterval(()=>setNowS(Date.now()),60000); return ()=>clearInterval(t); },[]);
  const hafBas0 = haftaBasi(nowS).getTime(), hafBit0 = hafBas0 + 7*86400000;   // bu haftanın penceresi
  // EFEKTİF başlangıçlar — Gantt ile aynı mantık (ortak planEffBas yardımcı fonksiyonu)
  const effBas = useMemo(()=>planEffBas(plan,nowS),[plan,nowS]);
  // bu haftaya düşen (efektif) baskı mı?
  const haftaIci=p=>{ const st=effBas[p.id]||{}; if(st.geride) return false;
    const s=st.s!=null?st.s:new Date(p.baslangic).getTime(); return s>=hafBas0 && s<hafBit0; };
  const filById = useMemo(()=>{ const m={}; (filamentler||[]).forEach(f=>m[f.id]=f); return m; },[filamentler]);
  // her ürünün TÜM baskıları (urunId'ye göre) — aynı ürünün baskıları tek kartta toplanır
  const baskiMap = useMemo(()=>{
    const m={};
    (plan||[]).forEach(p=>{ if(!p.urunId) return; (m[p.urunId]=m[p.urunId]||[]).push(p); });
    Object.values(m).forEach(arr=>arr.sort((a,b)=>new Date(b.baslangic)-new Date(a.baslangic)));
    return m;
  },[plan]);
  // bir baskının birim (adet başına) detayı — toplam gram/süre adede bölünür; eksik veri → null
  //  örn: 300 gr · 50 adet → 6 gr/adet ; 600 dk · 50 adet → 12 dk/adet
  function birimDetay(p){
    const fl=filById[p.filamentId];
    if(!(num(p.sureDk)>0 && num(p.gram)>0 && fl && num(fl.kgFiyat)>0)) return null;
    const adet=Math.max(1,num(p.adet||1));
    const gram=num(p.gram)/adet, dk=num(p.sureDk)/adet;
    return { gram, dk, maliyet:(dk/60)*SAAT_MALIYET + (gram/1000)*num(fl.kgFiyat) };
  }
  // ürünün adet başına detayı — parçalıda her parçanın maliyeti ayrı bulunur, gereken adetle toplanır (1 takım)
  //  ORTALAMA ADET-AĞIRLIKLI: çok basılan baskı fiyatı daha çok belirler (toplam maliyet ÷ toplam adet)
  function urunDetay(u){
    const prints=baskiMap[u.id]||[]; const parts=u.parcalar||[];
    const ort=arr=>{ let tG=0,tD=0,tM=0,tA=0;
      arr.forEach(p=>{ const d=birimDetay(p); if(!d) return; const a=Math.max(1,num(p.adet||1));
        tG+=d.gram*a; tD+=d.dk*a; tM+=d.maliyet*a; tA+=a; });
      return tA>0 ? { gram:tG/tA, dk:tD/tA, maliyet:tM/tA } : null; };
    if(parts.length){
      const tot={gram:0,dk:0,maliyet:0};
      for(const part of parts){
        // parça-başı (piece) maliyet: birim değer Σgereken(kapsanan) parçaya bölünür (set → parça; çift saymayı önler)
        let tG=0,tD=0,tM=0,tW=0; prints.forEach(p=>{ const cov=plParcalari(p,parts); if(!cov.includes(part)) return;
          const d=birimDetay(p); if(!d) return;
          const pay=cov.reduce((s,q)=>s+gereken(u,q),0); const pieces=Math.max(1,num(p.adet||1))*gereken(u,part);
          tG+=(d.gram/pay)*pieces; tD+=(d.dk/pay)*pieces; tM+=(d.maliyet/pay)*pieces; tW+=pieces; });
        if(tW===0) return null;
        const g=gereken(u,part); tot.gram+=(tG/tW)*g; tot.dk+=(tD/tW)*g; tot.maliyet+=(tM/tW)*g; }
      return tot;
    }
    return ort(prints);
  }
  // gösterilecek maliyet: elle girilmişse o, değilse baskılardan hesaplanan, yoksa null
  const maliyetOf=(u)=> num(u.maliyet)>0 ? {v:num(u.maliyet),elle:true} : (()=>{ const d=urunDetay(u); return d?{v:d.maliyet,elle:false,detay:d}:null; })();
  const baskiDurum=(p)=>{
    const s=new Date(p.baslangic).getTime(), e=s+num(p.sureDk)*60000, now=Date.now();
    if(!p.basladi) return s>now?{t:"planlandı",c:C.mut}:{t:"onay bekliyor",c:"#e0a200"};
    if(e<=now) return {t:"bitti",c:C.bitT};
    return {t:"basımda",c:"#0e7490"};
  };
  // baskılardan otomatik türetim: aynı üründen toplanır (ayrı kayıt açılmaz)
  //  basimMap  = şu an makinede çalışan (başlamış, bitmemiş) adet
  //  basildiMap= basımı bitmiş toplam adet (urunId'ye göre)
  //  basildiParca = parçalı üründe her parçanın basılmış adedi
  const { basimMap, basildiMap, basildiParca } = useMemo(()=>{
    const now=nowS, bsm={}, bsmP={}, bld={}, bldP={}, prodById={};   // dakika tikiyle tazelenir → biten baskı kendiliğinden stoğa geçer
    urunler.forEach(u=>prodById[u.id]=u);
    (plan||[]).forEach(p=>{
      if(!p.urunId || !p.basladi) return;
      const s=new Date(p.baslangic).getTime(), e=s+num(p.sureDk)*60000, ad=num(p.adet||1);
      const u=prodById[p.urunId];
      if(s<=now && e>now){                                                 // çalışıyor
        if(u && (u.parcalar||[]).length){
          bsmP[p.urunId]=bsmP[p.urunId]||{};
          const kk=plParcaKatki(p,u); for(const pt in kk) bsmP[p.urunId][pt]=num(bsmP[p.urunId][pt])+kk[pt];   // parça bazında topla
        } else bsm[p.urunId]=num(bsm[p.urunId])+ad;
        return;
      }
      if(e<=now){                                                          // basımı bitti → stoğa say
        bld[p.urunId]=num(bld[p.urunId])+ad;
        if(u && (u.parcalar||[]).length){
          bldP[p.urunId]=bldP[p.urunId]||{};
          const kk=plParcaKatki(p,u); for(const pt in kk) bldP[p.urunId][pt]=num(bldP[p.urunId][pt])+kk[pt];   // çoklu=set → ×gereken
        }
      }
    });
    // parçalı ürünlerde "basımda" = parça adetlerini ÜRÜN karşılığına çevir (tabla/set değil, o an basılan ürün)
    urunler.forEach(u=>{ const parts=u.parcalar||[]; if(parts.length && bsmP[u.id]){
      const pe=parts.reduce((sm,pt)=>sm+num(bsmP[u.id][pt])/Math.max(1,Math.round(num((u.parcaAdet||{})[pt]||1))),0)/parts.length;
      bsm[u.id]=Math.round(pe); } });
    return { basimMap:bsm, basildiMap:bld, basildiParca:bldP };
  },[plan,urunler,nowS]);

  // montajda = basımı bitmiş ama montajı bitmemiş (montaja hazır havuz) — parçalıda takım sayısı
  //  parça stoğu = basımdan gelen + elle eklenen − montajda kullanılan
  const parcaAvail=(u,p)=> Math.max(0, num((basildiParca[u.id]||{})[p]) + num((u.parcaElle||{})[p]) - num((u.parcaTuket||{})[p]));
  const gereken=(u,p)=> Math.max(1, Math.round(num((u.parcaAdet||{})[p]||1)));   // bir üründe kaç adet gerekli
  const parcaTakim=(u,p)=> Math.floor(parcaAvail(u,p)/gereken(u,p));             // bu parçadan kaç takım çıkar
  // parçanın mevcut (montaja hazır) stoğunu doğrudan hedef sayıya ayarla → elle ofseti hesapla
  async function parcaStokAyarla(u,p,hedef){
    const otomatik = num((basildiParca[u.id]||{})[p]) - num((u.parcaTuket||{})[p]);
    const pe={...(u.parcaElle||{})}; pe[p]=Math.round(num(hedef))-otomatik;
    await save("stok_urun",{id:u.id,parcaElle:pe});
  }
  const montajBaz=(u)=> (u.parcalar||[]).length
    ? Math.min.apply(null, u.parcalar.map(p=>parcaTakim(u,p)))
    : num(basildiMap[u.id]) - num(u.montajBitti) - num(u.zayiat);
  // parçalıda NEGATİF elle ofset uygulanmaz: elle azaltma artık kalıcı ofset değil TÜKETİM olarak
  // işlenir (aşağıda); eski negatif ofsetler yeni basılan parçaları yutmasın diye yok sayılır.
  const montajdaOf=(u)=> (u.parcalar||[]).length
    ? Math.max(0, montajBaz(u) + Math.max(0,num(u.montajElle)))
    : Math.max(0, montajBaz(u) + num(u.montajElle));
  // montaj adedini elle doğrudan belirle — AZALTMA o anki adetlerin tüketimidir (yeni baskıları etkilemez), ARTIRMA pozitif ofsettir
  async function montajAyarla(u,hedef){
    const t=Math.max(0,Math.round(num(hedef))); const su=montajdaOf(u); const delta=t-su; if(!delta) return;
    const parcalar=u.parcalar||[];
    if(delta>0){ await save("stok_urun",{id:u.id,montajElle:Math.max(0,num(u.montajElle))+delta}); return; }
    if(parcalar.length){
      // önce pozitif elle ofseti düş, kalan azaltmayı parça tüketimine yaz
      const elle=Math.max(0,num(u.montajElle)); const elleDus=Math.min(elle,-delta); const kalan=(-delta)-elleDus;
      const tk={...(u.parcaTuket||{})}; if(kalan>0) parcalar.forEach(p=>tk[p]=num(tk[p])+kalan*gereken(u,p));
      await save("stok_urun",{id:u.id,parcaTuket:tk,montajElle:elle-elleDus});
    } else {
      const elle=num(u.montajElle); const elleDus=Math.min(Math.max(0,elle),-delta); const kalan=(-delta)-elleDus;
      await save("stok_urun",{id:u.id,montajElle:elle-elleDus,montajBitti:num(u.montajBitti)+kalan});
    }
  }
  // stok adedini elle doğrudan belirle
  async function stoktaAyarla(u,hedef){ await save("stok_urun",{id:u.id,stokta:Math.max(0,Math.round(num(hedef)))}); }

  // —— 📦 TESLİM PROJEKSİYONU ——
  // Bekleyen (basımda + ileri tarihli planlı) baskılar sırayla bitip montajlanınca, HER bitiş tarihinde
  // elde EN FAZLA kaç adet hazır olabileceğini kronolojik olarak verir.
  function teslimProjeksiyon(u){
    const now=Date.now();
    // henüz bitmemiş baskılar = basımda (başlamış, bitişi ileride) veya planlı/onay bekleyen (başlamamış)
    const bekleyen=(baskiMap[u.id]||[]).filter(p=>{ const s=new Date(p.baslangic).getTime(), e=s+num(p.sureDk)*60000; return !(p.basladi && e<=now); });
    if(!bekleyen.length) return null;
    const parcalar=u.parcalar||[];
    const simdiki=num(u.stokta)+montajdaOf(u);   // şu an teslim edilebilecek (stok + montajlanabilir havuz)
    // her baskının tahmini bitişi (planlıysa kendi başlangıcı+süresi; başlamamış ama tarihi geçmişse en erken şimdi)
    const uclar=bekleyen.map(p=>{ const s=new Date(p.baslangic).getTime(); const bas=p.basladi?s:Math.max(s,now); return {p, e:bas+num(p.sureDk)*60000}; })
      .sort((a,b)=>a.e-b.e);
    // kronolojik yürüt: her (gün bazlı) bitiş noktasında kümülatif hazır adet
    const avail={}; if(parcalar.length) parcalar.forEach(pt=>avail[pt]=parcaAvail(u,pt));
    let tekliRun=0; const noktalar=[]; let i=0;
    while(i<uclar.length){ const gun=gunBasi(uclar[i].e).getTime(); let j=i;
      while(j<uclar.length && gunBasi(uclar[j].e).getTime()===gun){ const p=uclar[j].p, ad=num(p.adet||1);
        if(parcalar.length){ const kk=plParcaKatki(p,u); for(const pt in kk) avail[pt]+=kk[pt]; }
        else tekliRun+=ad; j++; }
      const adet = parcalar.length
        ? num(u.stokta)+Math.max(0, Math.min.apply(null, parcalar.map(pt=>Math.floor(avail[pt]/gereken(u,pt)))))
        : num(u.stokta)+montajdaOf(u)+tekliRun;
      noktalar.push({tarih:uclar[j-1].e, adet}); i=j; }
    // yalnız adedin ARTTIĞI kilometre taşlarını tut (aynı adede daha geç ulaşmak bilgi katmaz)
    const kilometreler=[]; noktalar.forEach(m=>{ const o=kilometreler[kilometreler.length-1]; if(!o || m.adet>o.adet) kilometreler.push(m); });
    const son=kilometreler[kilometreler.length-1];

// KONUM SEÇİCİ — mekan adı ara (OpenStreetMap, anahtarsız) + GPS + harita
// Nominatim adres nesnesinden ilçe/bölge çıkar (İstanbul için)
function ilceOf(a){ if(!a) return ""; return a.county||a.town||a.city_district||a.district||a.suburb||a.municipality||""; }
const IST_VB="28.0,41.65,29.95,40.80";   // İstanbul sınır kutusu (viewbox)
// —— Google Haritalar (Places) — anahtar/billing açıksa kullanılır; yoksa Nominatim'e düşer ——
function gmapsHazir(){ return !!(window.google && window.google.maps && window.google.maps.places); }
// Places API (New) METİN ARAMASI — ayarlardaki anahtar (keşifle aynı) ile REST/CORS; anahtar yoksa null → Nominatim'e düşülür
//  Mekan ADIYLA arama Nominatim'de çoğu zaman sonuç vermiyordu; Google searchText bunu çözer (konum+ilçe de gelir, ek Details çağrısı gerekmez)
async function placesText(t, merkez){ const key=GPLACES_KEY; if(!key) return null;
  try{
    const r=await fetch("https://places.googleapis.com/v1/places:searchText",{method:"POST",
      headers:{"Content-Type":"application/json","X-Goog-Api-Key":key,
        "X-Goog-FieldMask":"places.displayName,places.location,places.formattedAddress,places.addressComponents"},
      body:JSON.stringify({textQuery:t,languageCode:"tr",regionCode:"TR",pageSize:10,
        locationBias:{circle:{center:{latitude:(merkez&&merkez.lat)||41.0082,longitude:(merkez&&merkez.lng)||28.9784},radius:30000}}})});
    if(!r.ok) return null;
    const j=await r.json();
    return (j.places||[]).map(p=>{ const comp=p.addressComponents||[]; const f=t2=>{ const c=comp.find(x=>(x.types||[]).includes(t2)); return c?(c.longText||c.shortText||""):""; };
      return { g2:true, ad:(p.displayName&&p.displayName.text)||"", lat:p.location&&p.location.latitude, lng:p.location&&p.location.longitude,
        tam:p.formattedAddress||"", bolge:f("administrative_area_level_2")||f("sublocality_level_1")||f("sublocality")||"" }; })
      .filter(x=>x.ad && x.lat!=null);
  }catch(e){ return null; }
}
// Overpass/OSM İSİMLE mekan arama (anahtarsız) — Nominatim POI adlarında zayıf; OSM name~regex araması dükkanları bulur
async function overpassAdAra(t, merkez){
  try{
    const esc=t.replace(/[.*+?^${}()|[\]\\"]/g,"\\$&");
    const lat=(merkez&&merkez.lat)||41.0082, lng=(merkez&&merkez.lng)||28.9784;
    const q='[out:json][timeout:15];nwr["name"~"'+esc+'",i](around:25000,'+lat+','+lng+');out center 15;';
    const r=await fetch("https://overpass-api.de/api/interpreter",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:"data="+encodeURIComponent(q)});
    if(!r.ok) return null;
    const j=await r.json(); const gor=new Set(), out=[];
    (j.elements||[]).forEach(el=>{ const tg=el.tags||{}; const ad=tg.name; if(!ad) return;
      const la=el.lat!=null?el.lat:(el.center&&el.center.lat), lo=el.lon!=null?el.lon:(el.center&&el.center.lon);
      if(la==null||lo==null) return;
      const key=el.type+"/"+el.id; if(gor.has(key)) return; gor.add(key);
      const adres=[tg["addr:street"],tg["addr:housenumber"],tg["addr:suburb"]||tg["addr:district"],tg["addr:city"]].filter(Boolean).join(" ");
      out.push({g2:true, ad, lat:la, lng:lo, tam:adres||("OSM · "+(tg.shop||tg.amenity||"")), bolge:tg["addr:district"]||tg["addr:suburb"]||""}); });
    return out;
  }catch(e){ return null; }
}
function ilceFromComp(comps){ if(!comps) return ""; const f=t=>{ const c=comps.find(x=>(x.types||[]).includes(t)); return c?c.long_name:""; };
  return f("administrative_area_level_2")||f("administrative_area_level_1")||f("sublocality_level_1")||f("sublocality")||""; }
function googleAra(t){ return new Promise(res=>{ if(!gmapsHazir()) return res(null);
  const g=window.google; try{ const svc=new g.maps.places.AutocompleteService();
    const bounds=new g.maps.LatLngBounds(new g.maps.LatLng(40.80,28.0), new g.maps.LatLng(41.70,29.95));
    svc.getPlacePredictions({input:t,componentRestrictions:{country:"tr"},bounds,language:"tr"}, (preds,status)=>
      res((status===g.maps.places.PlacesServiceStatus.OK && preds)? preds : [])); }catch(e){ res(null); } }); }
function googleDetay(placeId){ return new Promise(res=>{ if(!gmapsHazir()) return res(null);
  const g=window.google; try{ const svc=new g.maps.places.PlacesService(document.createElement("div"));
    svc.getDetails({placeId,fields:["name","geometry","address_components","formatted_address"],language:"tr"}, (p,status)=>
      res(status===g.maps.places.PlacesServiceStatus.OK? p : null)); }catch(e){ res(null); } }); }
function googleReverse(lat,lng){ return new Promise(res=>{ if(!gmapsHazir()) return res(null);
  const g=window.google; try{ new g.maps.Geocoder().geocode({location:{lat:+lat,lng:+lng},language:"tr"}, (r,status)=>
    res((status==="OK"&&r&&r[0])? r[0] : null)); }catch(e){ res(null); } }); }
function KonumSec({ ad, lat, lng, onChange, sade }){
  const [q,setQ]=useState(ad||"");
  const [sonuc,setSonuc]=useState([]); const [ara,setAra]=useState(false);
  const [merkez,setMerkez]=useState(()=> (lat&&lng) ? {lat:+lat,lng:+lng} : {lat:41.0082,lng:28.9784}); // varsayılan: İstanbul
  const [link,setLink]=useState(""); const [cozuluyor,setCozuluyor]=useState(false);
  const touched=useRef(false);
  const mapDiv=useRef(null), mapObj=useRef(null), markerRef=useRef(null);
  // koordinatı seç: ters-geocode ile ad+ilçe doldur (Google → yoksa Nominatim); GPS ortak
  async function konumSec2(la, lo){ la=(+la).toFixed(6); lo=(+lo).toFixed(6); let nm=q||ad||"", bolge="";
    const gr=await googleReverse(la,lo);
    if(gr){ nm=(gr.address_components&&gr.address_components[0]&&gr.address_components[0].long_name)||(gr.formatted_address||"").split(",")[0]||nm; bolge=ilceFromComp(gr.address_components); }
    else { try{ const r=await fetch("https://nominatim.openstreetmap.org/reverse?format=jsonv2&addressdetails=1&accept-language=tr&lat="+la+"&lon="+lo); const j=await r.json(); nm=j.name||(j.display_name||"").split(",")[0]||nm; bolge=ilceOf(j.address); }catch(e){} }
    onChange({ad:nm,lat:la,lng:lo,bolge}); setQ(nm); setSonuc([]); }
  // açılışta cihaz konumunu (sessizce) al → aramaları yakına göre öncele
  useEffect(()=>{ if(!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(p=>setMerkez({lat:p.coords.latitude,lng:p.coords.longitude}),()=>{},{enableHighAccuracy:true,timeout:8000,maximumAge:300000});
  },[]);
  const [bos,setBos]=useState(false);   // arama yapıldı ama sonuç çıkmadı → kullanıcıya söyle (sessiz kalma)
  async function aramaYap(t){ t=(t||"").trim(); if(t.length<2) return; setAra(true); setBos(false);
    try{ let j;
      // 1) Google Places (New) metin araması — ayarlarda anahtar varsa (mekan adıyla en isabetli yol)
      const gj=await placesText(t,merkez);
      if(gj && gj.length){ gj.sort((a,b)=>Math.hypot(+a.lat-merkez.lat,+a.lng-merkez.lng)-Math.hypot(+b.lat-merkez.lat,+b.lng-merkez.lng)); setSonuc(gj); setAra(false); return; }
      // 2) Maps JS Autocomplete (sayfa anahtarı yüklüyse)
      if(sade){
        const preds=await googleAra(t);
        if(preds && preds.length){ setSonuc(preds.map(p=>({google:true,place_id:p.place_id,main:(p.structured_formatting&&p.structured_formatting.main_text)||p.description,desc:p.description}))); setAra(false); return; }
        // 3) Nominatim (İstanbul)
        const base="https://nominatim.openstreetmap.org/search?format=jsonv2&addressdetails=1&limit=12&countrycodes=tr&accept-language=tr";
        const r=await fetch(base+"&viewbox="+IST_VB+"&bounded=1&q="+encodeURIComponent(t));
        j=await r.json();
        if(!j.length){ const r2=await fetch(base+"&viewbox="+IST_VB+"&q="+encodeURIComponent(t)); const j2=await r2.json();
          j=j2.filter(x=>+x.lat>=40.80 && +x.lat<=41.70 && +x.lon>=28.0 && +x.lon<=29.95); }
      } else {
        const d=0.6, vb=(merkez.lng-d)+","+(merkez.lat+d)+","+(merkez.lng+d)+","+(merkez.lat-d);
        const r=await fetch("https://nominatim.openstreetmap.org/search?format=jsonv2&addressdetails=1&limit=8&countrycodes=tr&accept-language=tr&viewbox="+vb+"&bounded=1&q="+encodeURIComponent(t));
        j=await r.json();
        if(!j.length){ const r2=await fetch("https://nominatim.openstreetmap.org/search?format=jsonv2&addressdetails=1&limit=8&countrycodes=tr&accept-language=tr&q="+encodeURIComponent(t)); j=await r2.json(); }
      }
      if(!j.length){ // 4) Overpass/OSM isimle arama — Nominatim mekan adını bulamadıysa (anahtarsız çözüm)
        const oj=await overpassAdAra(t,merkez);
        if(oj && oj.length){ oj.sort((a,b)=>Math.hypot(+a.lat-merkez.lat,+a.lng-merkez.lng)-Math.hypot(+b.lat-merkez.lat,+b.lng-merkez.lng)); setSonuc(oj); setAra(false); return; }
      }
      j.sort((a,b)=>Math.hypot(+a.lat-merkez.lat,+a.lon-merkez.lng)-Math.hypot(+b.lat-merkez.lat,+b.lon-merkez.lng));
      setSonuc(j); if(!j.length) setBos(true);
    }catch(e){ setBos(true); } finally{ setAra(false); } }
  // yazarken otomatik ara (debounce)
  useEffect(()=>{ if(!touched.current) return; const t=q.trim();
    if(t.length<2){ setSonuc([]); return; }
    const id=setTimeout(()=>aramaYap(t),450); return ()=>clearTimeout(id);
  },[q,merkez]);
  // sade modda pinleme haritası (Leaflet) — dokun/sürükle ile iğnele; başka yerden eklerken de haritadan seç
  useEffect(()=>{ if(!sade || !window.L || !mapDiv.current || mapObj.current) return;
    const L=window.L, c=(lat&&lng)?[+lat,+lng]:[merkez.lat,merkez.lng];
    const map=L.map(mapDiv.current,{attributionControl:false}).setView(c,(lat&&lng)?16:12);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",{maxZoom:19,subdomains:"abcd"}).addTo(map);
    const pin=L.divIcon({className:"",iconSize:[30,30],iconAnchor:[15,28],html:"<div style='color:#dc2626'><svg width='30' height='30' viewBox='0 0 24 24' fill='currentColor'><path d='M12 2C8.1 2 5 5.1 5 9c0 5.2 7 13 7 13s7-7.8 7-13c0-3.9-3.1-7-7-7zm0 9.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z'/></svg></div>"});
    const mk=L.marker(c,{draggable:true,icon:pin}).addTo(map);
    markerRef.current=mk; mapObj.current=map;
    map.on("click",e=>{ mk.setLatLng(e.latlng); konumSec2(e.latlng.lat,e.latlng.lng); });
    mk.on("dragend",()=>{ const p=mk.getLatLng(); konumSec2(p.lat,p.lng); });
    setTimeout(()=>{ try{ map.invalidateSize(); }catch(e){} },250);
  },[sade]);
  // dış lat/lng ya da merkez değişince (arama/GPS/link) marker & görünümü güncelle
  useEffect(()=>{ if(!sade||!mapObj.current||!markerRef.current) return;
    if(lat&&lng){ const ll=[+lat,+lng]; markerRef.current.setLatLng(ll); mapObj.current.setView(ll,16); }
    else { mapObj.current.setView([merkez.lat,merkez.lng], mapObj.current.getZoom()); }
  },[lat,lng,merkez,sade]);
  async function sec(r){
    if(r.g2){ onChange({ad:r.ad,lat:(+r.lat).toFixed(6),lng:(+r.lng).toFixed(6),tam:r.tam,bolge:r.bolge}); setQ(r.ad); setSonuc([]); touched.current=false; return; }
    if(r.google){ const d=await googleDetay(r.place_id);
      if(d && d.geometry && d.geometry.location){ const la=d.geometry.location.lat(), lo=d.geometry.location.lng(); const nm=d.name||r.main||q;
        onChange({ad:nm,lat:(+la).toFixed(6),lng:(+lo).toFixed(6),tam:d.formatted_address,bolge:ilceFromComp(d.address_components)}); setQ(nm); setSonuc([]); touched.current=false; return; }
      return alert("Bu yer alınamadı, tekrar dene."); }
    const kisa=(r.display_name||"").split(",")[0]||q; onChange({ad:kisa,lat:(+r.lat).toFixed(6),lng:(+r.lon).toFixed(6),tam:r.display_name,bolge:ilceOf(r.address)}); setQ(kisa); setSonuc([]); touched.current=false; }
  function gps(){ if(!navigator.geolocation) return alert("Cihaz konum desteklemiyor.");
    navigator.geolocation.getCurrentPosition(p=>{ const la=p.coords.latitude.toFixed(6),lo=p.coords.longitude.toFixed(6); setMerkez({lat:+la,lng:+lo}); konumSec2(la,lo); },
      e=>alert("Konum alınamadı: "+e.message),{enableHighAccuracy:true,timeout:10000,maximumAge:0}); }
  // Google Maps linki / koordinat çöz (kısa link → CORS proxy ile yönlendirmeyi takip et)
  function koordCoz(t){ if(!t) return null;
    const m=t.match(/@(-?\d{1,3}\.\d+),(-?\d{1,3}\.\d+)/) || t.match(/[?&](?:q|ll|daddr|destination|center)=(-?\d{1,3}\.\d+),(-?\d{1,3}\.\d+)/)
          || t.match(/!3d(-?\d{1,3}\.\d+)!4d(-?\d{1,3}\.\d+)/) || t.match(/[\/=](-?\d{1,2}\.\d{4,}),(-?\d{1,3}\.\d{4,})/) || t.match(/(-?\d{1,2}\.\d{3,}),\s*(-?\d{1,3}\.\d{3,})/);
    return m? {lat:(+m[1]).toFixed(6),lng:(+m[2]).toFixed(6)} : null; }
  function adCoz(t){ const m=t.match(/\/place\/([^\/@]+)/); if(m){ try{ return decodeURIComponent(m[1].replace(/\+/g," ")); }catch(e){ return m[1].replace(/\+/g," "); } } return ""; }
  async function linktenKonum(t){ t=(t||"").trim(); if(!t) return;
    let k=koordCoz(t), nm=adCoz(t);
    if(!k && /^https?:\/\//.test(t)){ setCozuluyor(true);
      const proxies=[
        u=>"https://api.allorigins.win/raw?url="+encodeURIComponent(u),
        u=>"https://corsproxy.io/?url="+encodeURIComponent(u),
        u=>"https://r.jina.ai/"+u,
        u=>"https://api.allorigins.win/get?url="+encodeURIComponent(u)
      ];
      for(const mk of proxies){ try{
        const res=await fetch(mk(t)); const txt=await res.text();
        let body=txt; try{ const j=JSON.parse(txt); body=(j.contents||"")+" "+((j.status&&j.status.url)||""); }catch(e){}
        const kk=koordCoz(body); if(!nm) nm=adCoz(body)||nm;
        if(kk){ k=kk; break; }
      }catch(e){} }
      setCozuluyor(false);
    }
    if(!k){ alert("Linkten konum çıkarılamadı 😕\nGoogle Maps'te yeri aç → adres çubuğundaki TAM linki (içinde '@enlem,boylam' olan) kopyala-yapıştır, ya da konumdayken 📍 kullan."); return; }
    nm=nm||q||ad||""; setMerkez({lat:+k.lat,lng:+k.lng}); onChange({ad:nm,lat:k.lat,lng:k.lng}); if(nm) setQ(nm); setLink(""); }
  const sonucKutu = sonuc.length>0
    ? h("div",{style:{...S.card,marginTop:6,maxHeight:220,overflowY:"auto"}},
        sonuc.map((r,i)=>{ const g=r.google, g2=r.g2;
          const main=g?r.main:(g2?r.ad:((r.display_name||"").split(",")[0]));
          const alt2=g?r.desc:(g2?r.tam:r.display_name);
          const LON=g2?r.lng:r.lon;
          const km=(!g && r.lat!=null && LON!=null)?Math.round(111*Math.hypot(+r.lat-merkez.lat,(+LON-merkez.lng)*Math.cos(merkez.lat*Math.PI/180))):null;
          return h("div",{key:i,onClick:()=>sec(r),style:{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,padding:"9px 10px",borderTop:i?"1px solid "+C.line:"none",cursor:"pointer",fontSize:12.5}},
            h("div",{style:{minWidth:0}}, h("b",null,main),

// ÇANTAYI DOLDUR — atölye stoğundan toplu ürün al (sefer başlatır/loglar)
function CantaDoldurModal({ urunler, seferIdAl, onKapat }){
  const [mik,setMik]=useState({});
  const yukRef=useRef(false); const [yuk,setYuk]=useState(false);   // çift dokunuş kilidi (12 çıkış/6 satış hatasının kökü)
  const liste=urunler.slice().filter(u=>num(u.stokta)>0||bagOf(u)>0).sort((a,b)=>(a.ad||"").localeCompare(b.ad||"","tr"));
  const set=(id,v)=>setMik(s=>({...s,[id]:v}));
  const toplam=liste.reduce((s,u)=>s+Math.max(0,Math.floor(num(mik[u.id]))),0);
  async function ekle(){
    if(yukRef.current) return; yukRef.current=true; setYuk(true);
    try{
      const alinacak=liste.map(u=>({u,q:Math.max(0,Math.floor(num(mik[u.id])))})).filter(x=>x.q>0);
      if(!alinacak.length) return alert("Adet gir.");
      for(const {u,q} of alinacak){ if(q>num(u.stokta)) return alert(u.ad+": atölyede sadece "+num(u.stokta)+" var."); }
      const sid=await seferIdAl(); const iso=new Date().toISOString();
      for(const {u,q} of alinacak){ await bagDelta(u, +q, {stoktaDelta:-q});   // atomik — eski bagOf okuması yok
        if(sid) await harKaydet({tip:"al",urunId:u.id,urunAd:u.ad,adet:q,seferId:sid,tarih:iso}); }
      onKapat();
    } finally { yukRef.current=false; setYuk(false); }
  }
  return h(Modal,{ baslik:"🎒 Çantaya ürün ekle (atölyeden)", onKapat,
    alt:h(React.Fragment,null,
      h("button",{style:{...S.btn("p"),flex:1,opacity:yuk?.6:1},disabled:yuk,onClick:ekle}, yuk?"⏳ Ekleniyor…":("Çantaya ekle"+(toplam?(" · "+toplam+" adet"):""))),
      h("button",{style:S.btn(),onClick:onKapat},"Vazgeç")) },
    h("div",{style:{fontSize:12,color:C.mut,marginBottom:8}},"Atölye stoğundan çantana alacağın adetleri gir."),
    !liste.length ? h("div",{style:{...S.card,padding:18,textAlign:"center",color:C.mut}},"Atölye stoğunda ürün yok.")
    : h("div",{style:{display:"grid",gap:8,gridTemplateColumns:"repeat(auto-fill,minmax(148px,1fr))"}},
        liste.map(u=>{ const r=adRenk(u.ad); const foto=(u.foto||[])[0];
          return h("div",{key:u.id,style:{border:"1px solid "+C.line,borderTop:"3px solid "+r.ana,borderRadius:10,padding:"8px 9px"}},
            h("div",{style:{display:"flex",alignItems:"center",gap:6,marginBottom:3}},
              foto? h("img",{src:foto,style:{width:26,height:26,borderRadius:6,objectFit:"cover",flexShrink:0}})
                  : h("div",{style:{width:26,height:26,borderRadius:6,flexShrink:0,background:r.ana,color:"#fff",fontWeight:800,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}},(u.ad||"?").charAt(0).toLocaleUpperCase("tr")),
              h("div",{style:{fontWeight:700,fontSize:12.5,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",minWidth:0}},u.ad)),
            h("div",{style:{fontSize:10.5,color:C.mut,marginBottom:6}},"atölye "+num(u.stokta)+" · çanta "+bagOf(u)),
            h("input",{type:"number",min:0,max:num(u.stokta),style:{width:"100%",...S.input,padding:"6px",textAlign:"center",fontWeight:700},
              value:mik[u.id]||"",onChange:e=>set(u.id,e.target.value),placeholder:"0"})); })));
}

// SEFER RAPORU — çanta boşaltılınca / geçmiş sefer özeti (üreticiye verilecek + sana kalan; PDF & WhatsApp)
function SeferRaporModal({ sefer, hareketler, onKapat }){
  const har=(hareketler||[]).filter(x=>x.seferId===sefer.id);
  const grp=t=>har.filter(x=>x.tip===t);
  const sum=(a,f)=>a.reduce((s,x)=>s+f(x),0);
  const al=grp("al"),sat=grp("satis"),kon=grp("konsinye"),iade=grp("iade");
  const alA=sum(al,x=>num(x.adet)),satA=sum(sat,x=>num(x.adet)),konA=sum(kon,x=>num(x.adet)),iadeA=sum(iade,x=>num(x.adet));
  const ciro=sum(sat,x=>num(x.adet)*num(x.satisFiyat)),kar=sum(sat,x=>num(x.adet)*(num(x.satisFiyat)-num(x.alisFiyat)));
  const ureticiBorc=sum(sat,x=>num(x.adet)*num(x.alisFiyat));   // sattığı malın alış bedeli → üreticiye verilecek
  const tahsil=sum(sat,x=> x.tahsil==null? num(x.adet)*num(x.satisFiyat) : num(x.tahsil));
  const alacak=Math.max(0, ciro-tahsil);
  // —— üreticiye ödeme onayı (o an ödenmezse sonradan da onaylanabilir) ——
  const [odemeYuk,setOdemeYuk]=useState(false);
  const uOdendi=!!sefer.ureticiOdendi;
  async function ureticiOde(){ if(!confirm("🏭 Üreticiye "+tl(ureticiBorc)+" ödendi olarak onaylansın mı?")) return;
    setOdemeYuk(true); try{ await save("sefer",{id:sefer.id,ureticiOdendi:true,ureticiOdenen:ureticiBorc,ureticiOdemeTarih:new Date().toISOString()}); }finally{ setOdemeYuk(false); } }
  async function ureticiGeriAl(){ if(!confirm("Üretici ödeme onayı geri alınsın mı?")) return;
    setOdemeYuk(true); try{ await save("sefer",{id:sefer.id,ureticiOdendi:false,ureticiOdenen:0,ureticiOdemeTarih:""}); }finally{ setOdemeYuk(false); } }
  const pazAd=(AKTIF_KUL&&AKTIF_KUL.ad)||sefer.kullaniciAd||"";
  const bas=new Date(sefer.baslangic).getTime(), bit=sefer.bitis?new Date(sefer.bitis).getTime():Date.now();
  const donem=fmtTarihSaat(bas)+(sefer.bitis?(" — "+fmtSaat(bit)):" — (açık)")+" · "+fmtSureSaat((bit-bas)/60000);
  const liste=(baslik,arr,renk,sag)=> arr.length? h("div",{style:{marginTop:10}},
    h("div",{style:{...S.label,marginBottom:4}},baslik),
    arr.slice().sort((a,b)=>new Date(b.tarih)-new Date(a.tarih)).map((x,i)=>h("div",{key:x.id||i,style:{display:"flex",justifyContent:"space-between",gap:8,padding:"5px 0",borderTop:i?"1px solid "+C.line:"none",fontSize:12.5}},
      h("span",{style:{minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}, num(x.adet)+" × "+x.urunAd+(x.yer?(" → "+x.yer):"")+(x.kaynak==="konsinye"?" (konsinyeden)":"")),
      h("span",{style:{flexShrink:0,fontWeight:700,color:renk}}, sag(x))))) : null;

  // —— çıktı / WhatsApp ——
  const esc=s=>String(s==null?"":s).replace(/[<>&]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]));
  const seferMetin=()=>{ const L=[];
    L.push("🧭 SEFER RAPORU"+(pazAd?" — "+pazAd:"")); L.push(donem); L.push("");
    L.push("🎒 Çıkış "+alA+" · 💰 Satış "+satA+" · 🏬 Konsinye "+konA+" · ↩ Dönen "+iadeA); L.push("");
    L.push("💵 HESAP");
    L.push("• Toplam satış (ciro): "+tl(ciro));
    L.push("• 🏭 Üreticiye verilecek: "+tl(ureticiBorc));
    L.push("• 🫰 Sana kalan (kâr): "+tl(kar));
    if(tahsil<ciro){ L.push("• Tahsil edilen: "+tl(tahsil)); L.push("• Kalan alacak: "+tl(alacak)); }
    if(sat.length){ L.push(""); L.push("💰 SATIŞLAR"); sat.forEach(x=>L.push("• "+num(x.adet)+"× "+x.urunAd+(x.yer?(" → "+x.yer):"")+" = "+tl(num(x.adet)*num(x.satisFiyat))+(x.kaynak==="konsinye"?" (konsinyeden)":""))); }
    if(kon.length){ L.push(""); L.push("🏬 KONSİNYE BIRAKILAN"); kon.forEach(x=>L.push("• "+num(x.adet)+"× "+x.urunAd+(x.yer?(" → "+x.yer):""))); }
    return L.join("\n"); };
  const seferHTML=()=>{ const rows=arr=>arr.map(x=>"<tr><td>"+num(x.adet)+"× "+esc(x.urunAd)+(x.yer?(" → "+esc(x.yer)):"")+(x.kaynak==="konsinye"?" <i>(konsinyeden)</i>":"")+"</td><td style='text-align:right'>"+tl(num(x.adet)*num(x.satisFiyat))+"</td></tr>").join("");
    return "<!doctype html><html lang='tr'><head><meta charset='utf-8'><title>Sefer Raporu</title>"

      +"@media print{button{display:none}}</style></head><body>"

      +"<table><tr><td>🎒 Çıkış</td><td style='text-align:right'>"+alA+"</td></tr>"
      +"<tr><td>💰 Satış</td><td style='text-align:right'>"+satA+"</td></tr>"
      +"<tr><td>🏬 Konsinye</td><td style='text-align:right'>"+konA+"</td></tr>"
      +"<tr><td>↩ Dönen</td><td style='text-align:right'>"+iadeA+"</td></tr>"
      +"<tr><td>Toplam satış (ciro)</td><td style='text-align:right'>"+tl(ciro)+"</td></tr>"
      +(tahsil<ciro?("<tr><td>Tahsil edilen</td><td style='text-align:right'>"+tl(tahsil)+"</td></tr><tr><td>Kalan alacak</td><td style='text-align:right'>"+tl(alacak)+"</td></tr>"):"")
      +"</table>"
      +"<div class='big'><div class='box b1'><div class='t' style='color:#9a3412'>🏭 Üreticiye verilecek</div><div class='v' style='color:#b45309'>"+tl(ureticiBorc)+"</div></div>"
      +"<div class='box b2'><div class='t' style='color:#065f46'>🫰 Sana kalan (kâr)</div><div class='v' style='color:#047857'>"+tl(kar)+"</div></div></div>"
      +(sat.length?("<h2>💰 Satışlar</h2><table>"+rows(sat)+"</table>"):"")
      +(kon.length?("<h2>🏬 Konsinye bırakılan</h2><table>"+kon.map(x=>"<tr><td>"+num(x.adet)+"× "+esc(x.urunAd)+(x.yer?(" → "+esc(x.yer)):"")+"</td><td style='text-align:right'>"+esc(x.bolge||"")+"</td></tr>").join("")+"</table>"):"")
      +"</body></html>"; };
  const seferPDF=()=>{ const w=window.open("","_blank"); if(!w) return alert("Açılır pencere engellendi — tarayıcı izni ver."); w.document.write(seferHTML()); w.document.close(); w.focus(); setTimeout(()=>{ try{ w.print(); }catch(e){} },400); };
  const seferWA=()=>{ const t=seferMetin(); if(navigator.share){ navigator.share({text:t}).catch(()=>{}); return; } window.open("https://wa.me/?text="+encodeURIComponent(t),"_blank"); };

  // —— SADE GÖRÜNÜM: iki büyük rakam + ödeme onayı; gerisi "Detay" altında ——
  const [detay,setDetay]=useState(false);
  const ozetParcalar=[["🎒",alA,"çıkış"],["💰",satA,"satış"],["🏬",konA,"konsinye"],["↩",iadeA,"dönen"]].filter(p=>p[1]>0);
  return h(Modal,{ baslik:"🧭 Sefer Raporu", onKapat, alt:h(React.Fragment,null,
      h("button",{style:{...S.btn("p"),flex:1},onClick:seferPDF},"📄 Çıktı"),
      h("button",{style:{...S.btn(),flex:1,borderColor:"#16a34a",color:"#16a34a",fontWeight:800},onClick:seferWA},"📲 WhatsApp"),
      h("button",{style:S.btn(),onClick:onKapat},"Kapat")) },
    // 1) İKİ BÜYÜK RAKAM — tek bakışta hesap
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},

// MÜŞTERİ ekle / düzenle
function MusteriModal({ kayit, bolgeler, musteriler, onKapat }){
  const yeni=!kayit.id;
  const [f,setF]=useState(()=>({ ad:kayit.ad||"",telefon:kayit.telefon||"",bolge:kayit.bolge||"",adres:kayit.adres||"",
    lat:kayit.lat||"",lng:kayit.lng||"",not:kayit.not||"" }));
  const konumRef=useRef(false);
  const set=(k,v)=>setF(s=>({...s,[k]:v}));
  async function kaydet(){ if(!f.ad.trim()) return alert("Müşteri adı gir.");
    if(yeni){ const adn=f.ad.trim().toLocaleLowerCase("tr");
      const benzer=(musteriler||[]).find(m=>m.id!==kayit.id && (m.ad||"").trim().toLocaleLowerCase("tr")===adn);
      if(benzer && !confirm("\""+f.ad.trim()+"\" zaten var. Yine de ekle?")) return; }
    const ekstra={}; if(yeni&&AKTIF_KUL) ekstra.kullaniciId=AKTIF_KUL.id;
    if(konumRef.current) ekstra.konumYaklasik=false;
    if(kayit.kesif) ekstra.kesif=true;   // 🧭 keşiften eklendi → keşif görevi/fetih bonusu sayar
    await save("musteri",{id:kayit.id,...f,ad:f.ad.trim(),...ekstra}); onKapat(); }
  async function arsivle(geriAc){ await save("musteri",{id:kayit.id,arsiv:!geriAc}); onKapat(); }
  const inp={...S.input,marginBottom:10};
  return h(Modal,{ baslik:yeni?"Yeni Müşteri":"Müşteri", onKapat,
    alt:h(React.Fragment,null,
      h("button",{style:S.btn(),onClick:onKapat},"Vazgeç"),
      !yeni&&(kayit.arsiv
        ? h("button",{style:{...S.btn(),color:"#047857",borderColor:"#047857"},onClick:()=>arsivle(true)},"Geri aç")
        : h("button",{style:{...S.btn(),color:"#b45309",borderColor:"#b45309"},onClick:()=>{if(confirm(f.ad+" arşivlensin mi?"))arsivle(false);}},"Arşivle")),
      !yeni&&h("button",{style:{...S.btn(),color:C.kirmiziB,borderColor:C.kirmiziB},onClick:()=>{if(confirm(f.ad+" silinsin mi?")){remove("musteri",kayit.id);onKapat();}}},"Sil"),

    tarih: x.tarih? (()=>{ const d=new Date(x.tarih); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); })():"" }));   // YEREL gün — UTC slice gece 00-03'te düne kayar

  async function kaydet(){ const u={id:x.id};

  const tipAd={satis:"Satış",konsinye:"Konsinye",iade:"İade",tahsilat:"Tahsilat",avans:"Avans",stant:"Stant",diplomasi:"İletişim",al:"Çantaya al"}[x.tip]||x.tip;

      h("button",{style:{...S.btn(),color:C.kirmiziB,borderColor:C.kirmiziB},onClick:()=>{ onKapat(); onSil(x); }},"Sil"),

      x.tip==="konsinye" && h(Field,{label:"Kalan"}, h("input",{type:"number",min:0,style:S.input,value:f.kalan,onChange:e=>set("kalan",e.target.value)}))),
    (x.tip==="satis"||x.tip==="konsinye") && h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
      h(Field,{label:"Satış ₺"}, h("input",{type:"number",min:0,style:S.input,value:f.satisFiyat,onChange:e=>set("satisFiyat",e.target.value)})),
      h(Field,{label:"Alış ₺"}, h("input",{type:"number",min:0,style:S.input,value:f.alisFiyat,onChange:e=>set("alisFiyat",e.target.value)}))),
    x.tip==="satis" && h(Field,{label:"Alınan ₺ (tahsilat)"}, h("input",{type:"number",min:0,style:S.input,value:f.tahsil,onChange:e=>set("tahsil",e.target.value)})),
    (x.tip==="tahsilat"||x.tip==="avans") && h(Field,{label:"Tutar ₺"}, h("input",{type:"number",min:0,style:S.input,value:f.tutar,onChange:e=>set("tutar",e.target.value)})),
    x.tip==="stant" && h(React.Fragment,null,
      h("div",{style:{display:"flex",gap:6,marginBottom:10}},
