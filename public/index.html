/* ---------- yardımcılar ---------- */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,8);
async function save(coll, obj){ const id=obj.id||uid(); const {id:_,...d}=obj; await setDoc(doc(db,coll,id),d,{merge:true}); return id; }
async function remove(coll,id){ await deleteDoc(doc(db,coll,id)); }
async function restoreDoc(coll,obj){ const {id,...data}=obj; await setDoc(doc(db,coll,id),data); } // merge yok → tam geri yükle
function useColl(name){
  const [rows,setRows]=useState([]);
  useEffect(()=>onSnapshot(collection(db,name),s=>setRows(s.docs.map(d=>({id:d.id,...d.data()}))),e=>console.error(name,e)),[name]);
  return rows;
}
const num = v => { const n=parseFloat(v); return isNaN(n)?0:n; };
const pad = n => String(n).padStart(2,"0");
const fmtSaat = d => { const t=new Date(d); return pad(t.getHours())+":"+pad(t.getMinutes()); };
const fmtTarih = d => { const t=new Date(d); return pad(t.getDate())+"."+pad(t.getMonth()+1); };
const fmtTarihSaat = d => fmtTarih(d)+" "+fmtSaat(d);
const GUNLER = ["PAZAR","PAZARTESİ","SALI","ÇARŞAMBA","PERŞEMBE","CUMA","CUMARTESİ"];
const AYLAR = ["OCAK","ŞUBAT","MART","NİSAN","MAYIS","HAZİRAN","TEMMUZ","AĞUSTOS","EYLÜL","EKİM","KASIM","ARALIK"];
const SAAT_MALIYET = 12;   // makine çalışma maliyeti (₺/saat)
function tl(n){ return num(n).toLocaleString("tr",{minimumFractionDigits:0,maximumFractionDigits:2})+" ₺"; }
// görseli küçült → data URL (Firestore'a sığsın)
function resizeImg(file, max){ max=max||900; return new Promise((res,rej)=>{
  const rd=new FileReader();
  rd.onload=()=>{ const img=new Image();
    img.onload=()=>{ let w=img.width,h=img.height; const sc=Math.min(1,max/Math.max(w,h)); w=Math.round(w*sc); h=Math.round(h*sc);
      const cv=document.createElement("canvas"); cv.width=w; cv.height=h; cv.getContext("2d").drawImage(img,0,0,w,h);
      res(cv.toDataURL("image/jpeg",0.8)); };
    img.onerror=rej; img.src=rd.result; };
  rd.onerror=rej; rd.readAsDataURL(file);
}); }
// ada göre sabit renk (kartları görsel ayırmak için)
function adRenk(s){ let hsh=0; const t=s||"?"; for(let i=0;i<t.length;i++) hsh=(hsh*31+t.charCodeAt(i))>>>0;
  const H=hsh%360; return { H, ana:"hsl("+H+",58%,46%)", acik:"hsl("+H+",62%,60%)", yumusak:"hsl("+H+",64%,96%)" }; }
// ürün bilgisi + görselleri WhatsApp / paylaşım
async function paylasWhats(u, fiyat){
  const sat = fiyat!=null?num(fiyat):num(u.satisFiyat);
  const text=[u.ad, u.aciklama||"", sat>0?("Fiyat: "+tl(sat)):""].filter(Boolean).join("\n");
  const fotos=(u.foto||[]);
  try{
    if(navigator.canShare && fotos.length){
      const files=[];
      for(let i=0;i<Math.min(fotos.length,4);i++){ const b=await (await fetch(fotos[i])).blob(); files.push(new File([b],"urun"+(i+1)+".jpg",{type:b.type||"image/jpeg"})); }
      if(navigator.canShare({files})){ await navigator.share({text,files}); return; }
    }
    if(navigator.share){ await navigator.share({text}); return; }
  }catch(e){ if(e&&e.name==="AbortError") return; }
  window.open("https://wa.me/?text="+encodeURIComponent(text),"_blank");
}
function fmtSureSaat(dk){ dk=Math.max(0,Math.round(num(dk))); return Math.floor(dk/60)+" sa "+pad(dk%60)+" dk"; }
function toInput(d){ const t=new Date(d); return t.getFullYear()+"-"+pad(t.getMonth()+1)+"-"+pad(t.getDate())+"T"+pad(t.getHours())+":"+pad(t.getMinutes()); }
function gunBasi(d){ const t=new Date(d); t.setHours(0,0,0,0); return t; }
function haftaBasi(d){ const t=gunBasi(d); t.setDate(t.getDate()-((t.getDay()-6+7)%7)); return t; }  // o haftanın Cumartesi'si
function ayBasi(d){ const t=new Date(d); return new Date(t.getFullYear(),t.getMonth(),1).getTime(); }
// ürün birim maliyeti (baskılardan) — elle girilmişse o; eksik veri → null
function urunBirimMaliyet(u, prints, filById){
  const birim=p=>{ const fl=filById[p.filamentId];
    if(!(num(p.sureDk)>0 && num(p.gram)>0 && fl && num(fl.kgFiyat)>0)) return null;
    const ad=Math.max(1,num(p.adet||1)); return (num(p.sureDk)/ad/60)*SAAT_MALIYET + (num(p.gram)/ad/1000)*num(fl.kgFiyat); };
  const ort=arr=>{ const cs=arr.map(birim).filter(x=>x!=null); return cs.length?cs.reduce((a,b)=>a+b,0)/cs.length:null; };
  const parts=u.parcalar||[];
  if(parts.length){ let tot=0; for(const part of parts){ const c=ort(prints.filter(p=>p.parcaAd===part)); if(c==null) return ort(prints.filter(p=>!p.parcaAd));
    tot+=c*Math.max(1,Math.round(num((u.parcaAdet||{})[part]||1))); } return tot; }
  return ort(prints);
}
function urunMaliyet(u, prints, filById){ return num(u.maliyet)>0 ? num(u.maliyet) : urunBirimMaliyet(u,prints,filById); }

/* ---------- ortak kabuklar ---------- */
function Field({ label, children }){ return h("label",{style:{display:"block",marginBottom:12}}, h("span",{style:S.label},label), children); }
function Modal({ baslik, onKapat, children, alt }){
  return h("div",{style:S.overlay,onClick:onKapat},

      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px",borderBottom:"1px solid "+C.line}},

      alt && h("div",{style:{padding:"12px 16px",borderTop:"1px solid "+C.line,display:"flex",gap:8}},alt)));
}
function Lejant({ renk, ad }){
  return h("div",{style:{display:"flex",alignItems:"center",gap:6,fontSize:13,color:"#fff"}},
    h("span",{style:{width:16,height:16,borderRadius:4,background:renk,display:"inline-block"}}), ad);
}

/* Sağa kaydır → solda Sil çıkan satır (önceki baskılar listesi) */
function OncekiSatir({ label, alt, onSec, onSil }){
  const [dx,setDx]=useState(0);
  const [open,setOpen]=useState(false);
  const st=React.useRef({x:0,base:0,drag:false,moved:false});
  const REVEAL=84;
  const xOf=e=>(e.touches&&e.touches[0]?e.touches[0].clientX:e.clientX);
  function down(e){ st.current={x:xOf(e),base:dx,drag:true,moved:false}; }
  function move(e){ const s=st.current; if(!s.drag)return; const dxRaw=xOf(e)-s.x; if(Math.abs(dxRaw)>4)s.moved=true;
    setDx(Math.max(0,Math.min(REVEAL,s.base+dxRaw))); }
  function up(){ const s=st.current; if(!s.drag)return; s.drag=false; const o=dx>REVEAL/2; setOpen(o); setDx(o?REVEAL:0); }
  function tikla(){ if(st.current.moved)return; if(open){ setOpen(false); setDx(0); return; } onSec&&onSec(); }
  return h("div",{style:{position:"relative",overflow:"hidden",borderRadius:8,marginBottom:6,border:"1px solid "+C.line}},
    h("button",{type:"button",onClick:onSil,style:{position:"absolute",left:0,top:0,bottom:0,width:REVEAL,border:"none",
      background:C.kirmiziB,color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}},"🗑 Sil"),
    h("div",{onMouseDown:down,onMouseMove:move,onMouseUp:up,onMouseLeave:up,
      onTouchStart:down,onTouchMove:move,onTouchEnd:up,onClick:tikla,
      style:{position:"relative",transform:"translateX("+dx+"px)",transition:st.current.drag?"none":"transform .18s",
        background:"#fff",padding:"9px 12px",cursor:"pointer",userSelect:"none",WebkitUserSelect:"none",touchAction:"pan-y"}},
      h("div",{style:{fontWeight:700,fontSize:14}},label),
      alt&&h("div",{style:{fontSize:11.5,color:C.mut,marginTop:2}},alt)));
}

/* ============================================================
   İŞ (plan kaydı) modalı
   ============================================================ */
function IsModal({ kayit, makineler, plan, urunler, filamentler, onSnap, onKapat }){
  const yeni = !kayit.id;
  const [f,setF] = useState(()=>({
    makineId: kayit.makineId || (makineler[0]&&makineler[0].id) || "",
    ad:       kayit.ad       || "",
    urunId:   kayit.urunId   || "",
    parcaAd:  kayit.parcaAd  || "",
    adet:     kayit.adet     || 1,
    baslangic:toInput(kayit.baslangic || Date.now()),
    sureDk:   kayit.sureDk   || "",
    gram:     kayit.gram     || "",
    filamentId: kayit.filamentId || "",
    ams:      kayit.ams != null ? kayit.ams : true,
    not:      kayit.not      || "",
    basladi:  !!kayit.basladi,
  }));
  // ürün seçimi: kayıtlı bir ürüne bağlıysa o ürünü/parçasını seç, yoksa elle giriş ("diger")
  const urunListe = (urunler||[]).slice().sort((a,b)=>(a.ad||"").localeCompare(b.ad||"","tr"));
  const [urunMod,setUrunMod] = useState(()=> (kayit.urunId || !kayit.ad) ? "urun" : "diger");
  // mevcut seçimin select value'su
  const urunVal = f.urunId ? ("u:"+f.urunId+(f.parcaAd?("|"+f.parcaAd):"")) : "";
  const [tekrar,setTekrar] = useState(false);
  const [planReset,setPlanReset] = useState(false);
  const [tik,setTik] = useState(Date.now());
  useEffect(()=>{ const t=setInterval(()=>setTik(Date.now()),1000); return ()=>clearInterval(t); },[]);
  const set=(k,v)=>setF(s=>({...s,[k]:v}));
  // önceki baskılar — tekil (ad+adet+süre+ams). Seçili makinede basılanlar en üstte,
  // o makinenin en son baskısı en başta; sonra diğer makineler. Her grup en yeni önce.
  const oncekiler = useMemo(()=>{
    const seen=new Set(), out=[];
    (plan||[]).filter(p=>p.id!==kayit.id)
      .sort((a,b)=>{
        const am=(a.makineId===f.makineId)?1:0, bm=(b.makineId===f.makineId)?1:0;
        if(am!==bm) return bm-am;                              // seçili makine önce
        return new Date(b.baslangic)-new Date(a.baslangic);    // en yeni önce
      })
      .forEach(p=>{ const sig=(p.ad||"")+"|"+num(p.adet)+"|"+num(p.sureDk)+"|"+(p.ams?1:0);
        if(!seen.has(sig)){ seen.add(sig); out.push(p); } });
    return out.slice(0,30);
  },[plan,kayit.id,f.makineId]);
  function tekrarla(o){
    if(!o) return;
    setF(s=>({ ...s, ad:o.ad, urunId:o.urunId||"", parcaAd:o.parcaAd||"", adet:o.adet, sureDk:o.sureDk, gram:o.gram||"", filamentId:o.filamentId||"", ams:!!o.ams, not:o.not||"" }));
    setUrunMod((o.urunId||!o.ad)?"urun":"diger");
    setTekrar(true);
  }
  // ürün açılır listesinden seçim: value "u:<id>" veya "u:<id>|<parça>"
  function urunSec(val){
    if(!val){ setF(s=>({...s,urunId:"",parcaAd:"",ad:""})); return; }
    const [, rest] = val.split(/^u:/);
    const [id,parca] = (rest||"").split("|");
    const u = urunListe.find(x=>x.id===id);
    if(!u) return;
    setF(s=>({...s, urunId:id, parcaAd:parca||"", ad: parca ? (u.ad+" "+parca) : u.ad }));
  }
  async function kaydet(){
    if(!f.makineId) return alert("Makine seç.");
    if(!f.ad.trim()) return alert("İş/ürün adı gir.");
    if(!f.sureDk)   return alert("Süre gir (dk).");
    onSnap&&onSnap();
    const sMs = new Date(f.baslangic).getTime();
    // Yeni iş geçmiş bir zaman dilimine giriliyorsa → planlanan değil, tamamlanmış (başladı) say
    const basladi = yeni ? (sMs <= Date.now()) : !!f.basladi;
    // planSureDk = ilk plan süresi (gecikme baz çizgisi). İlk kayıtta sabitlenir; "yeni plan kabul et" ile sıfırlanabilir.
    const planSureDk = (planReset || kayit.planSureDk==null) ? num(f.sureDk) : num(kayit.planSureDk);
    const id = await save("plan",{ id:kayit.id, makineId:f.makineId, ad:f.ad.trim(), adet:num(f.adet),
      urunId: (urunMod==="urun" ? f.urunId : "") || "", parcaAd: (urunMod==="urun" ? f.parcaAd : "") || "",
      baslangic:new Date(f.baslangic).toISOString(), sureDk:num(f.sureDk), planSureDk, gram:num(f.gram), filamentId:f.filamentId||"", ams:!!f.ams, not:f.not,
      basladi, gercekBaslangic: basladi ? (kayit.gercekBaslangic || new Date(f.baslangic).toISOString()) : null });
    if(!yeni && kayit.makineId===f.makineId){
      // başlama/süre değişti → sonraki işleri aynı delta (bitiş kayması) kadar otele
      const eskiBas = new Date(kayit.baslangic).getTime();
      const delta = (sMs + num(f.sureDk)*60000) - (eskiBas + num(kayit.sureDk)*60000);
      await planOtele(f.makineId, plan, eskiBas, delta, id);
    } else {
      // yeni iş / makine değişti → çakışmasız diz
      await planKaydir(f.makineId, plan, { id, s:sMs, dk:num(f.sureDk) });
    }
    onKapat();
  }
  const bitis = new Date(f.baslangic).getTime() + num(f.sureDk)*60000;
  // ilerleme (% tamamlandı) — canlı
  const st0=new Date(f.baslangic).getTime(), dur0=num(f.sureDk)*60000, en0=st0+dur0;
  const pct = dur0<=0 ? 0 : Math.max(0,Math.min(100,Math.round((tik-st0)/dur0*100)));
  const devam = tik>=st0 && tik<en0;
  return h(Modal,{ baslik: h("div",{style:{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",flex:1}},
      h("span",{style:{fontWeight:800}}, yeni?(tekrar?"Tekrarla":"Baskı Planla"):"İşi Düzenle"),
      h("select",{style:{padding:"6px 8px",border:"1px solid "+C.line,borderRadius:8,fontSize:14,fontWeight:700,background:"#fff",maxWidth:170},
        value:f.makineId,onChange:e=>set("makineId",e.target.value)},
        makineler.map(m=>h("option",{key:m.id,value:m.id},m.ad))),
      h("label",{style:{display:"flex",alignItems:"center",gap:5,fontSize:13,fontWeight:700,cursor:"pointer"}},
        h("input",{type:"checkbox",checked:!!f.ams,onChange:e=>set("ams",e.target.checked)}),"AMS")), onKapat,
    alt: h(React.Fragment,null,
      h("button",{style:{...S.btn("p"),flex:1},onClick:kaydet}, yeni?"Planla":"Kaydet"),
      !yeni && h("button",{style:{...S.btn(),color:C.kirmiziB,borderColor:C.kirmiziB},onClick:()=>{ if(confirm("Bu iş silinsin mi?")){ onSnap&&onSnap(); remove("plan",kayit.id); onKapat(); } }},"Sil"),
      h("button",{style:S.btn(),onClick:onKapat},"Vazgeç")) },
    !yeni && !tekrar && h("div",{style:{marginBottom:16}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}},
        h("span",{style:S.label},"İlerleme"),
        h("span",{style:{display:"flex",alignItems:"baseline",gap:8}},
          pct>=100 && h("span",{style:{fontSize:14,fontWeight:800,color:C.yesilB}},"✓ Tamamlandı"),
          h("span",{style:{fontWeight:800,fontSize:26,lineHeight:1,
            color: pct>=100?C.yesilB:(devam?"#0e9bb8":C.mut)}}, pct+"%"))),
      h("div",{style:{height:18,background:"#e8eef6",borderRadius:99,overflow:"hidden",border:"1px solid "+C.line}},
        h("div",{className:"tk-prog"+(devam?" tk-stripe tk-live":""),
          style:{height:"100%",width:pct+"%",borderRadius:99,
            background: pct>=100?"linear-gradient(90deg,#22c55e,#16a34a)":"linear-gradient(90deg,#22c55e,#22d3ee)"}})),
      h("div",{style:{fontSize:12.5,color:C.mut,marginTop:7,fontWeight:600}},
        pct>=100 ? ("Bitiş "+fmtTarihSaat(en0))
        : tik<st0 ? ("⏳ Başlamasına "+fmtSureSaat((st0-tik)/60000)+" var")
        : ("🔥 Kalan "+fmtSureSaat((en0-tik)/60000)+" · bitiş ~"+fmtTarihSaat(en0)))),
    yeni && !tekrar && oncekiler.length>0 && h(Field,{label:"↻ Önceki baskıdan seç (dokun → doldur · sağa kaydır → sil)"},
      h("div",{style:{maxHeight:230,overflowY:"auto",paddingRight:2}},
        oncekiler.map((o,i)=>{
          const baskaMak = o.makineId!==f.makineId;
          const makAd = baskaMak ? ((makineler.find(m=>m.id===o.makineId)||{}).ad||"") : "";
          return h(OncekiSatir,{ key:o.id||i,

/* ============================================================
   GANTT — zaman çizelgesi hesapları
   ============================================================ */
// Başlama saati değişince: sonraki işleri (eski sıraya göre) aynı delta kadar öteler — boşluklar/ara korunur
async function planOtele(makineId, plan, oldStartMs, deltaMs, editedId){
  if(!deltaMs) return;
  const ds = plan.filter(p=>p.makineId===makineId && p.id!==editedId
    && new Date(p.baslangic).getTime() > oldStartMs);
  for(const p of ds){
    await save("plan",{ id:p.id, baslangic:new Date(new Date(p.baslangic).getTime()+deltaMs).toISOString() });
  }
}
// Plan aksarsa: aynı makinedeki işleri başlangıç sırasına göre çakışmasız diz (yalnız ileri kaydır)
async function planKaydir(makineId, plan, edited){
  const arr = plan.filter(p=>p.makineId===makineId && p.id!==edited.id)
    .map(p=>({ id:p.id, s:new Date(p.baslangic).getTime(), dk:num(p.sureDk) }));
  arr.push({ id:edited.id, s:edited.s, dk:edited.dk });
  arr.sort((a,b)=>a.s-b.s);
  let prevEnd=null;
  for(const j of arr){
    let s=j.s;
    if(prevEnd!=null && s<prevEnd) s=prevEnd;          // çakışıyorsa öncekinin bitişine çek
    if(s!==j.s) await save("plan",{ id:j.id, baslangic:new Date(s).toISOString() });
    prevEnd = s + j.dk*60000;
  }
}
function tickStep(gunW){ // saat aralığı — zoom'a göre detay
  const slots = Math.max(1, Math.floor(gunW/36));
  for(const o of [1,2,3,4,6,8,12,24]){ if(24/o <= slots) return o; }
  return 24;
}
function makineTimeline(makineId, plan, baslaMs, bitMs, now){
  const js = plan.filter(p=>p.makineId===makineId)
    .map(p=>({ p, s:new Date(p.baslangic).getTime(), e:new Date(p.baslangic).getTime()+num(p.sureDk)*60000 }))
    .filter(x=>x.e>baslaMs && x.s<bitMs)
    .sort((a,b)=>a.s-b.s);
  let printMs=0;
  js.forEach(x=>{ printMs += Math.min(bitMs,x.e)-Math.max(baslaMs,x.s); });
  const bos=[]; let cur=baslaMs;
  js.forEach(x=>{ const s=Math.max(baslaMs,x.s); if(s>cur) bos.push({start:cur,end:s}); cur=Math.max(cur,Math.min(bitMs,x.e)); });
  if(cur<bitMs) bos.push({start:cur,end:bitMs});
  // kayıp = geçmişte (now'dan önce) çalışmayan dilimler
  let kayipMs=0;
  bos.forEach(b=>{ const pe=Math.min(b.end, now||0); if(pe>b.start) kayipMs += pe-b.start; });
  // gecikme = bitiş ilk plandan ne kadar ileri alındı (sureDk - planSureDk)
  let gecikmeMs=0, gecikmeSayi=0;
  js.forEach(x=>{ const base=x.p.planSureDk!=null?num(x.p.planSureDk):num(x.p.sureDk);
    const g=(num(x.p.sureDk)-base)*60000; if(g>0){ gecikmeMs+=g; gecikmeSayi++; } });
  const bosMs=(bitMs-baslaMs)-printMs;
  return { js, bos, printMs, bosMs, kayipMs, bosGelecekMs: bosMs-kayipMs, gecikmeMs, gecikmeSayi };
}

function StokTab({ urunler, plan, filamentler }){
  const [edit,setEdit]=useState(null);
  const [aks,setAks]=useState(null);   // kutucuk komut penceresi {u,stage}
  const [acik,setAcik]=useState({});   // ürün kartında baskı listesi açık mı
  const liste = urunler.slice().sort((a,b)=>a.ad.localeCompare(b.ad,"tr"));
  const filById = useMemo(()=>{ const m={}; (filamentler||[]).forEach(f=>m[f.id]=f); return m; },[filamentler]);
  // her ürünün TÜM baskıları (urunId'ye göre) — aynı ürünün baskıları tek kartta toplanır
  const baskiMap = useMemo(()=>{
    const m={};
    (plan||[]).forEach(p=>{ if(!p.urunId) return; (m[p.urunId]=m[p.urunId]||[]).push(p); });
    Object.values(m).forEach(arr=>arr.sort((a,b)=>new Date(b.baslangic)-new Date(a.baslangic)));
    return m;
  },[plan]);
  // bir baskının birim (adet başına) detayı — toplam gram/süre adede bölünür; eksik veri → null
  //  örn: 300 gr · 50 adet → 6 gr/adet ; 600 dk · 50 adet → 12 dk/adet
  function birimDetay(p){
    const fl=filById[p.filamentId];
    if(!(num(p.sureDk)>0 && num(p.gram)>0 && fl && num(fl.kgFiyat)>0)) return null;
    const adet=Math.max(1,num(p.adet||1));
    const gram=num(p.gram)/adet, dk=num(p.sureDk)/adet;
    return { gram, dk, maliyet:(dk/60)*SAAT_MALIYET + (gram/1000)*num(fl.kgFiyat) };
  }
  // ürünün adet başına detayı — parçalıda her parçanın ortalaması toplanır (1 takım)
  function urunDetay(u){
    const prints=baskiMap[u.id]||[]; const parts=u.parcalar||[];
    const ort=arr=>{ const cs=arr.map(birimDetay).filter(Boolean); if(!cs.length) return null; const n=cs.length;
      return { gram:cs.reduce((a,b)=>a+b.gram,0)/n, dk:cs.reduce((a,b)=>a+b.dk,0)/n, maliyet:cs.reduce((a,b)=>a+b.maliyet,0)/n }; };
    if(parts.length){
      const tot={gram:0,dk:0,maliyet:0};
      for(const part of parts){ const c=ort(prints.filter(p=>p.parcaAd===part)); if(!c) return ort(prints.filter(p=>!p.parcaAd));
        const g=gereken(u,part); tot.gram+=c.gram*g; tot.dk+=c.dk*g; tot.maliyet+=c.maliyet*g; }
      return tot;
    }
    return ort(prints);
  }
  // gösterilecek maliyet: elle girilmişse o, değilse baskılardan hesaplanan, yoksa null
  const maliyetOf=(u)=> num(u.maliyet)>0 ? {v:num(u.maliyet),elle:true} : (()=>{ const d=urunDetay(u); return d?{v:d.maliyet,elle:false,detay:d}:null; })();
  const baskiDurum=(p)=>{
    const s=new Date(p.baslangic).getTime(), e=s+num(p.sureDk)*60000, now=Date.now();
    if(!p.basladi) return s>now?{t:"planlandı",c:C.mut}:{t:"onay bekliyor",c:"#e0a200"};
    if(e<=now) return {t:"bitti",c:C.bitT};
    return {t:"basımda",c:"#0e7490"};
  };
  // baskılardan otomatik türetim: aynı üründen toplanır (ayrı kayıt açılmaz)
  //  basimMap  = şu an makinede çalışan (başlamış, bitmemiş) adet
  //  basildiMap= basımı bitmiş toplam adet (urunId'ye göre)
  //  basildiParca = parçalı üründe her parçanın basılmış adedi
  const { basimMap, basildiMap, basildiParca } = useMemo(()=>{
    const now=Date.now(), bsm={}, bld={}, bldP={}, prodById={};
    urunler.forEach(u=>prodById[u.id]=u);
    (plan||[]).forEach(p=>{
      if(!p.urunId || !p.basladi) return;
      const s=new Date(p.baslangic).getTime(), e=s+num(p.sureDk)*60000, ad=num(p.adet||1);
      if(s<=now && e>now){ bsm[p.urunId]=num(bsm[p.urunId])+ad; return; }   // çalışıyor
      if(e<=now){                                                          // basımı bitti → stoğa say
        bld[p.urunId]=num(bld[p.urunId])+ad;
        const u=prodById[p.urunId];
        if(u && (u.parcalar||[]).length){
          bldP[p.urunId]=bldP[p.urunId]||{};
          if(p.parcaAd && u.parcalar.includes(p.parcaAd)) bldP[p.urunId][p.parcaAd]=num(bldP[p.urunId][p.parcaAd])+ad;
          else u.parcalar.forEach(pt=>bldP[p.urunId][pt]=num(bldP[p.urunId][pt])+ad);   // "tümü/takım" → her parçaya +1
        }
      }
    });
    return { basimMap:bsm, basildiMap:bld, basildiParca:bldP };
  },[plan,urunler]);

  // montajda = basımı bitmiş ama montajı bitmemiş (montaja hazır havuz) — parçalıda takım sayısı
  //  parça stoğu = basımdan gelen + elle eklenen − montajda kullanılan
  const parcaAvail=(u,p)=> Math.max(0, num((basildiParca[u.id]||{})[p]) + num((u.parcaElle||{})[p]) - num((u.parcaTuket||{})[p]));
  const gereken=(u,p)=> Math.max(1, Math.round(num((u.parcaAdet||{})[p]||1)));   // bir üründe kaç adet gerekli
  const parcaTakim=(u,p)=> Math.floor(parcaAvail(u,p)/gereken(u,p));             // bu parçadan kaç takım çıkar
  // parçanın mevcut (montaja hazır) stoğunu doğrudan hedef sayıya ayarla → elle ofseti hesapla
  async function parcaStokAyarla(u,p,hedef){
    const otomatik = num((basildiParca[u.id]||{})[p]) - num((u.parcaTuket||{})[p]);
    const pe={...(u.parcaElle||{})}; pe[p]=Math.round(num(hedef))-otomatik;
    await save("stok_urun",{id:u.id,parcaElle:pe});
  }
  const montajdaOf=(u)=> (u.parcalar||[]).length
    ? Math.min.apply(null, u.parcalar.map(p=>parcaTakim(u,p)))
    : Math.max(0, num(basildiMap[u.id]) - num(u.montajBitti) - num(u.zayiat));

  const T = liste.reduce((a,u)=>{a.basim+=num(basimMap[u.id]);a.montajda+=montajdaOf(u);a.stokta+=num(u.stokta);a.konsinye+=num(u.konsinye);a.satildi+=num(u.satildi);return a;},{basim:0,montajda:0,stokta:0,konsinye:0,satildi:0});

  // montajdaki havuzdan N adet tüket (stoğa ekle veya zayiat) — parçalıda her parçadan N
  async function montajdanTuket(u,n,hedef){   // hedef: "stokta" | "zayiat"
    n=Math.floor(num(n)); if(n<1) return;
    const parcalar=u.parcalar||[];
    if(parcalar.length){
      if(montajdaOf(u)<n) return alert("Montajda yeterli takım yok ("+montajdaOf(u)+" hazır).");
      const tk={...(u.parcaTuket||{})}; parcalar.forEach(p=>tk[p]=num(tk[p])+n*gereken(u,p));   // her parçadan gereken×n
      const ek = hedef==="stokta" ? {stokta:num(u.stokta)+n} : {zayiat:num(u.zayiat)+n};
      await save("stok_urun",{id:u.id,parcaTuket:tk,...ek});
    } else {
      if(montajdaOf(u)<n) return alert("Montajda yeterli ürün yok ("+montajdaOf(u)+" hazır).");
      const ek = hedef==="stokta" ? {montajBitti:num(u.montajBitti)+n,stokta:num(u.stokta)+n} : {zayiat:num(u.zayiat)+n};
      await save("stok_urun",{id:u.id,...ek});
    }
  }
  async function stoktanCikar(u,n,hedef){     // hedef: "satildi" | "konsinye"
    n=Math.floor(num(n)); if(n<1) return; if(num(u.stokta)<n) return alert("Stokta yeterli ürün yok ("+num(u.stokta)+" var).");
    const ek = hedef==="satildi" ? {satildi:num(u.satildi)+n} : {konsinye:num(u.konsinye)+n};
    await save("stok_urun",{id:u.id,stokta:num(u.stokta)-n,...ek});
  }
  async function konsinyedenCikar(u,n,hedef){ // hedef: "stokta" (iade) | "satildi"
    n=Math.floor(num(n)); if(n<1) return; if(num(u.konsinye)<n) return alert("Konsinyede yeterli ürün yok ("+num(u.konsinye)+" var).");
    const ek = hedef==="stokta" ? {stokta:num(u.stokta)+n} : {satildi:num(u.satildi)+n};
    await save("stok_urun",{id:u.id,konsinye:num(u.konsinye)-n,...ek});
  }
  async function satistanIade(u,n){           // satılan → stoğa iade
    n=Math.floor(num(n)); if(n<1) return; if(num(u.satildi)<n) return alert("Satılan yeterli ürün yok ("+num(u.satildi)+" var).");
    await save("stok_urun",{id:u.id,satildi:num(u.satildi)-n,stokta:num(u.stokta)+n});
  }
  // kutucuğa tıklayınca açılan komut listesi
  function aksiyonCfg(u,stage){
    if(stage==="montajda") return { baslik:"🔧 Montajda — "+u.ad, mevcut:montajdaOf(u), acts:[
      {label:"📥 Stoğa ekle",renk:"#0369a1",fn:(n)=>montajdanTuket(u,n,"stokta")},
      {label:"⚠ Zayiat",renk:C.kirmiziB,fn:(n)=>montajdanTuket(u,n,"zayiat")} ]};
    if(stage==="stokta") return { baslik:"📥 Stokta — "+u.ad, mevcut:num(u.stokta), acts:[
      {label:"💰 Satış",renk:C.yesilB,fn:(n)=>stoktanCikar(u,n,"satildi")},
      {label:"🏬 Konsinyeye ver",renk:"#7c3aed",fn:(n)=>stoktanCikar(u,n,"konsinye")} ]};
    if(stage==="konsinye") return { baslik:"🏬 Konsinye — "+u.ad, mevcut:num(u.konsinye), acts:[
      {label:"↩ İade (stoğa)",renk:"#0369a1",fn:(n)=>konsinyedenCikar(u,n,"stokta")},
      {label:"💰 Satıldı",renk:C.yesilB,fn:(n)=>konsinyedenCikar(u,n,"satildi")} ]};
    if(stage==="satildi") return { baslik:"💰 Satıldı — "+u.ad, mevcut:num(u.satildi), acts:[
      {label:"↩ Stoğa iade",renk:"#0369a1",fn:(n)=>satistanIade(u,n)} ]};
    return null;
  }

  const ozetKart=(ad,deg,renk)=>h("div",{style:{...S.card,padding:"12px 16px",flex:"1 1 120px"}},
    h("div",{style:{fontSize:12,color:C.mut,fontWeight:700}},ad), h("div",{style:{fontSize:26,fontWeight:800,color:renk}},deg));
  const asamaKutu=(ad,deg,renk,onClick)=>h("div",{onClick,title:onClick?"Tıkla → komutlar":null,
    style:{background:"#f3f6fb",borderRadius:10,padding:"8px 4px",cursor:onClick?"pointer":"default",
      border:onClick?"1px solid "+C.line:"1px solid transparent",position:"relative"}},
    h("div",{style:{fontSize:11,color:C.mut,fontWeight:700}},ad),
    h("div",{style:{fontSize:22,fontWeight:800,color:renk}},num(deg)),
    onClick && h("span",{style:{position:"absolute",top:3,right:5,fontSize:9,color:C.mut}},"▾"));

  return h("div",null,
    h("div",{style:{userSelect:"none",WebkitUserSelect:"none"}},
    h("div",{style:{display:"flex",gap:12,flexWrap:"wrap",marginBottom:14}},
      ozetKart("🖨 Basımda toplam",T.basim,"#0e7490"),
      ozetKart("🔧 Montajda toplam",T.montajda,"#c2410c"),
      ozetKart("📥 Stokta toplam",T.stokta,"#0369a1"),
      ozetKart("🏬 Konsinyede toplam",T.konsinye,"#7c3aed"),
      ozetKart("💰 Satılmış toplam",T.satildi,C.yesilB)),
    h("div",{style:{fontSize:12,color:C.mut,marginBottom:10}},"ℹ️ Basımı biten baskılar otomatik 🔧 Montajda'ya düşer. Aşama kutucuğuna dokun → komutlar (adet girerek): Montajda → Stoğa ekle / Zayiat · Stokta → Satış / Konsinyeye ver · Konsinye → İade / Satıldı."),
    h("button",{style:{...S.btn("p"),marginBottom:14},onClick:()=>setEdit({ad:"",parcalar:[],stokta:0,konsinye:0,not:""})},"+ Ürün"),
    !liste.length ? h("div",{style:{...S.card,padding:22,color:C.mut,textAlign:"center"}},"Ürün yok. + Ürün ile ekle.")
    : h("div",{style:{display:"grid",gap:16,gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))"}},
        liste.map(u=>{
          const parcali=(u.parcalar||[]).length>0;
          const takim = parcali ? montajdaOf(u) : null;
          const r=adRenk(u.ad), foto=(u.foto||[])[0];
          return h("div",{key:u.id,className:"tk-pcard",style:{...S.card,borderTop:"5px solid "+r.ana,boxShadow:"0 4px 14px rgba(15,23,42,.09)"}},
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}},
              h("div",{style:{display:"flex",alignItems:"center",gap:10,minWidth:0}},
                foto ? h("img",{src:foto,style:{width:40,height:40,borderRadius:10,objectFit:"cover",flexShrink:0,boxShadow:"0 0 0 2px "+r.yumusak}})
                     : h("div",{style:{width:40,height:40,borderRadius:10,flexShrink:0,background:"linear-gradient(135deg,"+r.ana+","+r.acik+")",
                         color:"#fff",fontWeight:800,fontSize:20,display:"flex",alignItems:"center",justifyContent:"center"}}, (u.ad||"?").trim().charAt(0).toLocaleUpperCase("tr")),
                h("div",{style:{minWidth:0}},
                  h("div",{style:{fontWeight:800,fontSize:16,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}, u.ad),
                  parcali?h("span",{style:{fontSize:11,fontWeight:700,color:"#7c3aed",background:"#efe7fe",borderRadius:6,padding:"1px 6px"}},"parçalı"):null)),
              h("div",{style:{display:"flex",gap:6,flexShrink:0}},
                h("button",{style:S.ibtn,onClick:()=>setEdit(u)},"✎"),
                h("button",{style:{...S.ibtn,color:C.kirmiziB,borderColor:C.kirmiziB},onClick:()=>{if(confirm(u.ad+" silinsin mi?"))remove("stok_urun",u.id);}},"🗑"))),
            u.not && h("div",{style:{fontSize:12,color:C.mut,marginTop:4}},u.not),
            (()=>{ const m=maliyetOf(u);
              return h("div",{style:{marginTop:8,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,
                background:m?"#ecfdf5":"#f3f6fb",border:"1px solid "+(m?"#a7f3d0":C.line),borderRadius:8,padding:"7px 10px"}},
                h("div",{style:{fontSize:13,minWidth:0}},
                  h("span",{style:{color:C.mut,fontWeight:700}},"₺ Maliyet: "),
                  m ? h("b",{style:{fontSize:15,color:"#047857"}}, m.v.toFixed(2)+" ₺/adet")
                    : h("span",{style:{color:C.mut}},"— (süre+gram+filament gir)"),
                  m && m.elle ? h("span",{style:{marginLeft:6,fontSize:10,fontWeight:700,color:"#92400e",background:"#fde68a",borderRadius:5,padding:"1px 5px"}},"elle"):null,
                  m && !m.elle && m.detay ? h("div",{style:{fontSize:11,color:C.mut,marginTop:2}},
                    "adet başına "+m.detay.gram.toFixed(1)+" gr · "+m.detay.dk.toFixed(0)+" dk (baskıdan otomatik)"):null),
                h("button",{style:{...S.ibtn,fontSize:12,padding:"3px 8px",flexShrink:0},onClick:()=>setEdit(u)}, m&&m.elle?"✎ maliyet":"✎ elle gir")); })(),
            parcali && h("div",{style:{margin:"10px 0",borderTop:"1px solid "+C.line,paddingTop:8}},
              h("div",{style:{...S.label,marginBottom:6}},"Parça stoğu · "+takim+" takım montaja hazır"),
              (()=>{ const avails=u.parcalar.map(p=>parcaAvail(u,p));
                const hedefTakim=Math.max.apply(null,u.parcalar.map(p=>parcaTakim(u,p)));   // en çok takım çıkan parça
                return u.parcalar.map((p,idx)=>{ const ger=gereken(u,p); const eksik = Math.max(0, hedefTakim*ger - avails[idx]);
                  return h("div",{key:p,style:{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,padding:"4px 0",fontSize:14,
                    color: eksik>0?C.kirmiziB:C.txt}},
                    h("span",{style:{minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},p,
                      ger>1?h("span",{style:{marginLeft:5,fontSize:11,fontWeight:700,color:"#7c3aed"}},"×"+ger):null,
                      eksik>0?h("span",{style:{marginLeft:6,fontSize:11,fontWeight:700}},"⚠ "+eksik+" eksik"):null),
                    h("div",{style:{display:"flex",alignItems:"center",gap:8,flexShrink:0}},
                      h("span",{style:{fontSize:11,color:C.mut}}, num((basildiParca[u.id]||{})[p])+" basıldı"+(num((u.parcaElle||{})[p])?" "+(num((u.parcaElle||{})[p])>0?"+":"")+num((u.parcaElle||{})[p])+" elle":"")),
                      h("input",{type:"number",min:0,key:"pin"+avails[idx],defaultValue:avails[idx],title:"montaja hazır adet — doğrudan yaz",
                        onClick:e=>e.stopPropagation(),
                        onFocus:e=>e.target.select(),
                        onKeyDown:e=>{ if(e.key==="Enter") e.target.blur(); },
                        onBlur:e=>{ if(e.target.value!=="") parcaStokAyarla(u,p,e.target.value); },
                        style:{width:58,padding:"3px 6px",border:"1px solid "+C.line,borderRadius:7,textAlign:"center",
                          fontWeight:800,fontSize:14,color: eksik>0?C.kirmiziB:"#0369a1"}})));
                }); })(),
              (()=>{ const avails=u.parcalar.map(p=>parcaAvail(u,p));
                const hedefTakim=Math.max.apply(null,u.parcalar.map(p=>parcaTakim(u,p)));
                const eksikler=u.parcalar.map((p,idx)=>({p,n:Math.max(0,hedefTakim*gereken(u,p)-avails[idx])})).filter(x=>x.n>0);
                if(!eksikler.length) return null;
                return h("div",{style:{marginTop:8,fontSize:12.5,fontWeight:700,color:"#7a1d12",background:"#fdecea",
                  border:"1px solid "+C.kirmiziB,borderRadius:8,padding:"7px 10px"}},
                  "⚠ Eksik parça — montaj için bas: "+eksikler.map(x=>x.p+" ×"+x.n).join(", ")); })()),
            h("div",{style:{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6,margin:"10px 0 6px",textAlign:"center"}},
              asamaKutu("🖨 Basımda",basimMap[u.id],"#0e7490"),
              asamaKutu("🔧 Montajda",montajdaOf(u),"#c2410c",()=>setAks({u,stage:"montajda"})),
              asamaKutu("📥 Stokta",u.stokta,"#0369a1",()=>setAks({u,stage:"stokta"})),
              asamaKutu("🏬 Konsinye",u.konsinye,"#7c3aed",()=>setAks({u,stage:"konsinye"})),
              asamaKutu("💰 Satıldı",u.satildi,C.yesilB,()=>setAks({u,stage:"satildi"}))),
            h("div",{style:{fontSize:11,color:C.mut,marginBottom:6}},
              "Komutlar için kutucuğa dokun"+(num(u.zayiat)?"  ·  ⚠ Zayiat: "+num(u.zayiat):"")),
            // bu ürünün tüm baskıları (basım bilgileri buraya düşer)
            (()=>{ const bl=baskiMap[u.id]||[]; if(!bl.length) return null;
              const toplamAdet=bl.reduce((s,p)=>s+num(p.adet||1),0);
              const toplamGram=bl.reduce((s,p)=>s+num(p.gram),0);
              const ac=!!acik[u.id];
              return h("div",{style:{marginTop:12,borderTop:"1px solid "+C.line,paddingTop:8}},
                h("button",{type:"button",style:{...S.ibtn,width:"100%",textAlign:"left",fontWeight:700,display:"flex",justifyContent:"space-between",alignItems:"center"},
                  onClick:()=>setAcik(s=>({...s,[u.id]:!s[u.id]}))},
                  h("span",null,(ac?"▾":"▸")+" Baskılar ("+bl.length+")"),
                  h("span",{style:{fontSize:11,color:C.mut,fontWeight:600}}, toplamAdet+" adet"+(toplamGram?" · "+toplamGram+" gr":""))),
                ac && h("div",{style:{marginTop:8,maxHeight:230,overflowY:"auto"}},
                  bl.map((p,i)=>{ const d=baskiDurum(p), st=new Date(p.baslangic).getTime();
                    return h("div",{key:p.id||i,style:{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,
                      padding:"6px 8px",borderTop:i?"1px solid "+C.line:"none",fontSize:12.5}},
                      h("div",{style:{minWidth:0}},
                        h("div",{style:{fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}, num(p.adet||1)+" x "+p.ad),
                        h("div",{style:{fontSize:11,color:C.mut}}, fmtTarihSaat(st)+(num(p.gram)?" · "+num(p.gram)+" gr":"")+(p.ams?" · AMS":""))),
                      h("span",{style:{flexShrink:0,fontSize:11,fontWeight:800,color:d.c,background:"#f3f6fb",borderRadius:6,padding:"2px 7px"}},d.t));
                  }))); })());
        }))),
    edit && h(StokModal,{kayit:edit,onKapat:()=>setEdit(null)}),
    aks && (()=>{ const cfg=aksiyonCfg(aks.u,aks.stage); if(!cfg) return null;
      return h(StokAksiyonModal,{baslik:cfg.baslik,mevcut:cfg.mevcut,acts:cfg.acts,onKapat:()=>setAks(null)}); })());
}

// ürün görseli + bilgi düzenleme
function PazUrunModal({ kayit, onKapat }){
  const [foto,setFoto]=useState(kayit.foto||[]);
  const [aciklama,setAciklama]=useState(kayit.aciklama||"");
  const [satisFiyat,setSatisFiyat]=useState(kayit.satisFiyat||"");
  const [yukleniyor,setYukleniyor]=useState(false);
  async function dosyaEkle(e){
    const fs=Array.from(e.target.files||[]); if(!fs.length) return; setYukleniyor(true);
    try{ const yeni=[]; for(const f of fs){ yeni.push(await resizeImg(f,1000)); } setFoto(s=>[...s,...yeni].slice(0,6)); }
    catch(err){ alert("Görsel yüklenemedi."); } finally{ setYukleniyor(false); e.target.value=""; }
  }
  async function kaydet(){ await save("stok_urun",{id:kayit.id,foto,aciklama,satisFiyat:num(satisFiyat)}); onKapat(); }
  return h(Modal,{ baslik:"📷 "+kayit.ad+" — görsel & bilgi", onKapat,
    alt:h(React.Fragment,null,
      h("button",{style:{...S.btn("p"),flex:1},onClick:kaydet},"Kaydet"),
      h("button",{style:S.btn(),onClick:onKapat},"Vazgeç")) },
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(84px,1fr))",gap:8,marginBottom:12}},
      foto.map((src,i)=>h("div",{key:i,style:{position:"relative"}},
        h("img",{src,style:{width:"100%",height:84,objectFit:"cover",borderRadius:8,border:"1px solid "+C.line}}),
        h("button",{onClick:()=>setFoto(s=>s.filter((_,j)=>j!==i)),
          style:{position:"absolute",top:2,right:2,background:"rgba(0,0,0,.6)",color:"#fff",border:"none",borderRadius:6,width:22,height:22,cursor:"pointer",fontWeight:800}},"×"))),
      foto.length<6 && h("label",{style:{height:84,border:"1px dashed "+C.line,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:C.mut,fontSize:12,textAlign:"center"}},
        yukleniyor?"…":"+ Görsel",
        h("input",{type:"file",accept:"image/*",multiple:true,style:{display:"none"},onChange:dosyaEkle}))),
    h(Field,{label:"Ürün açıklaması (müşteriyle paylaşılır)"}, h("textarea",{style:{...S.input,minHeight:80,resize:"vertical"},value:aciklama,onChange:e=>setAciklama(e.target.value),placeholder:"Malzeme, ölçü, renk seçenekleri…"})),
    h(Field,{label:"Satış fiyatı (₺ — öneri)"}, h("input",{type:"number",min:0,step:"0.01",style:S.input,value:satisFiyat,onChange:e=>setSatisFiyat(e.target.value)})));
}

// stoktan al / iade / satış / konsinye işlemleri
function PazIslemModal({ u, mod, maliyet, bolgeler, onKapat }){
  const cfg={ al:{baslik:"📥 Stoktan al",max:num(u.stokta),renk:"#0369a1"},
    iade:{baslik:"↩ Stoğa iade",max:num(u.pazStok),renk:"#0369a1"},
    sat:{baslik:"💰 Satış",max:num(u.pazStok),renk:C.yesilB},
    konsinye:{baslik:"🏬 Konsinye bırak",max:num(u.pazStok),renk:"#7c3aed"} }[mod];
  const [n,setN]=useState(1);
  const [alis,setAlis]=useState(maliyet!=null?maliyet.toFixed(2):"");
  const [satis,setSatis]=useState(u.satisFiyat||"");
  const [yer,setYer]=useState("");
  const [bolge,setBolge]=useState("");
  async function uygula(){
    const ad=Math.floor(num(n)); if(ad<1) return alert("Adet gir.");
    if(ad>cfg.max) return alert("En fazla "+cfg.max+" adet.");
    const iso=new Date().toISOString();
    if(mod==="al"){ await save("stok_urun",{id:u.id,stokta:num(u.stokta)-ad,pazStok:num(u.pazStok)+ad}); }
    else if(mod==="iade"){ await save("stok_urun",{id:u.id,pazStok:num(u.pazStok)-ad,stokta:num(u.stokta)+ad}); }
    else if(mod==="sat"){ if(!yer.trim()) return alert("Nereye sattığını yaz.");
      await save("stok_urun",{id:u.id,pazStok:num(u.pazStok)-ad});
      await save("pazarlama_hareket",{tip:"satis",urunId:u.id,urunAd:u.ad,adet:ad,alisFiyat:num(alis),satisFiyat:num(satis),yer:yer.trim(),bolge:bolge.trim(),tarih:iso}); }
    else if(mod==="konsinye"){ if(!yer.trim()) return alert("Nereye bıraktığını yaz.");
      await save("stok_urun",{id:u.id,pazStok:num(u.pazStok)-ad});
      await save("pazarlama_hareket",{tip:"konsinye",urunId:u.id,urunAd:u.ad,adet:ad,kalan:ad,alisFiyat:num(alis),satisFiyat:num(satis),yer:yer.trim(),bolge:bolge.trim(),tarih:iso}); }
    onKapat();

  return h(Modal,{ baslik:cfg.baslik+" — "+u.ad, onKapat,
    alt:h(React.Fragment,null,
      h("button",{style:{...S.btn("p"),flex:1},onClick:uygula},"Onayla"),
      h("button",{style:S.btn(),onClick:onKapat},"Vazgeç")) },
    h("div",{style:{fontSize:13,color:C.mut,marginBottom:10}}, mod==="al"?"Ana stokta ":"Bende ", h("b",{style:{color:C.txt}},cfg.max+" adet")),
    h(Field,{label:"Adet"}, h("input",{type:"number",min:1,max:cfg.max,style:{...S.input,fontWeight:700,fontSize:17},value:n,autoFocus:true,onFocus:e=>e.target.select(),onChange:e=>setN(e.target.value)})),

/* ============================================================
   OYUNLAŞTIRMA — teşvik / gamification (5 tasarım konsepti)
   ============================================================ */
const RANKS=[[0,"Çırak","🌱"],[250,"Kalfa","🔧"],[700,"Usta","⭐"],[1600,"Üstat","🔥"],[3200,"Efsane","👑"]];
function rankOf(xp){ let r=RANKS[0]; for(const x of RANKS) if(xp>=x[0]) r=x; return r; }
function nextRank(xp){ for(const x of RANKS) if(xp<x[0]) return x; return null; }
const TIERS=[[0,"Bronz","🥉","#b45309","#fde9d4"],[1200,"Gümüş","🥈","#64748b","#eef2f7"],[3500,"Altın","🥇","#b8860b","#fef3c7"],[8000,"Platin","💎","#0e7490","#cffafe"]];
function tierOf(p){ let t=TIERS[0]; for(const x of TIERS) if(p>=x[0]) t=x; return t; }
function seriHesap(set){ let c=0,d=gunBasi(Date.now()).getTime(); if(!set.has(d)) d-=86400000; while(set.has(d)){ c++; d-=86400000; } return c; }
// RISK temalı fetih: bölge nüfuzuna (ciro) göre uydurma unvanlar
const FETIH_UNVAN=[[1,"Sefiri","🎖️","#64748b"],[1500,"Reisi","🦅","#0e7490"],[5000,"Baronu","💼","#7c3aed"],[12000,"Paşası","⚔️","#b45309"],[30000,"Fatihi","🏰","#b91c1c"],[60000,"Sultanı","👑","#a16207"]];
function unvanOf(ciro){ let u=null; for(const x of FETIH_UNVAN) if(ciro>=x[0]) u=x; return u; }   // null = fethedilmedi
function unvanNext(ciro){ for(const x of FETIH_UNVAN) if(ciro<x[0]) return x; return null; }
// Türkçe tamlama eki: Üsküdar → Üsküdar'ın · Ümraniye → Ümraniye'nin · Kadıköy → Kadıköy'ün
function genitive(s){ s=(s||"").trim(); if(!s) return s;
  const v="aeıioöuü", low=s.toLocaleLowerCase("tr"); let last="ı";
  for(const ch of low) if(v.includes(ch)) last=ch;
  const vowelEnd=v.includes(low.slice(-1));
  const har=(last==="a"||last==="ı")?"ı":(last==="e"||last==="i")?"i":(last==="o"||last==="u")?"u":"ü";
  return s+"'"+(vowelEnd?"n":"")+har+"n";
}

function XpBar({ xp, renk }){
  const r=rankOf(xp), nx=nextRank(xp); const taban=r[0], tavan=nx?nx[0]:r[0];
  const p= nx? Math.max(3,Math.round((xp-taban)/(tavan-taban)*100)) : 100;
  return h("div",null,
    h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4,color:"#fff"}},
      h("span",{style:{fontWeight:800}}, xp+" XP"),
      nx? h("span",{style:{opacity:.85}}, (tavan-xp)+" XP → "+nx[2]+" "+nx[1]) : h("span",null,"MAX")),
    h("div",{style:{height:13,background:"rgba(255,255,255,.25)",borderRadius:99,overflow:"hidden"}},
      h("div",{className:"tk-stripe",style:{height:"100%",width:p+"%",background:renk,borderRadius:99}})));
}
function Ring({ pct, size, renk, ust, alt2 }){
  const p=Math.max(0,Math.min(100,Math.round(pct)));

}
function Rozet({ ikon, ad, ac }){
  return h("div",{className:ac?"tk-pop":"",style:{textAlign:"center",width:74,opacity:ac?1:.4}},

function Gorev({ ad, deg, hedef, renk, birim }){
  const p=hedef?Math.min(100,Math.round(deg/hedef*100)):0, tam=deg>=hedef;
  return h("div",{style:{...S.card,padding:"10px 12px",borderColor:tam?C.yesilB:C.line}},

    h("div",{style:{height:9,background:"#eef2f7",borderRadius:99,overflow:"hidden"}},
      h("div",{className:tam?"":"tk-stripe",style:{height:"100%",width:p+"%",background:tam?C.yesilB:renk,borderRadius:99}})));
}
function Madalya({ sira, ad, deg, renk, max }){
  const m=["🥇","🥈","🥉"][sira]||(sira+1+"."); const p=max?Math.round(deg/max*100):0;
  return h("div",{style:{display:"flex",alignItems:"center",gap:10,padding:"8px 4px"}},
    h("div",{style:{fontSize:sira<3?22:14,width:30,textAlign:"center",fontWeight:800,color:C.mut}},m),
    h("div",{style:{flex:1,minWidth:0}},
      h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:13,fontWeight:700}}, h("span",{style:{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},ad), h("span",null,deg)),

  const [containerW, setContainerW] = useState(1000);
  const scrollRef = useRef(null);
  const undoRef = useRef(null);
  const [undoVar, setUndoVar] = useState(false);
  useEffect(()=>{ const t=setInterval(()=>setNow(Date.now()),60000); return ()=>clearInterval(t); },[]);
  useEffect(()=>{
    if(!scrollRef.current || !window.ResizeObserver) return;
    const ro=new ResizeObserver(es=>{ for(const e of es) setContainerW(e.contentRect.width); });
    ro.observe(scrollRef.current); return ()=>ro.disconnect();
  },[]);

  const LABEL_W = 104, ROW_H = 74;
  const baslaMs = bas;
  const bitMs = bas + gunSayisi*24*3600*1000;
  const toplamMs = bitMs - baslaMs;
  const fitGunW = Math.max(150, (containerW - LABEL_W) / gunSayisi); // zoom 1 → sağda boşluk kalmaz
  const GUN_W = Math.round(fitGunW * zoom);
  const step = tickStep(GUN_W);
  const ticks = []; for(let hr=0; hr<=24; hr+=step) ticks.push(hr);
  const toplamW = gunSayisi*GUN_W;
  const px = toplamW / toplamMs;

  const mlist = makineler.slice().sort((a,b)=>a.ad.localeCompare(b.ad,"tr"));
  const timelines = useMemo(()=>{
    const m={}; mlist.forEach(mk=>{ m[mk.id]=makineTimeline(mk.id, plan, baslaMs, bitMs, now); }); return m;
  },[plan, makineler, baslaMs, bitMs, now]);

  // baskı başlat onayı — zamanı gelen planlı işler otomatik başlamaz, onay ister
  // onaylanınca başlangıç saati = tam o an (gerçek başlama anı); sonraki işler çakışmasız ötelenir
  async function baslat(p){
    if(!confirm((num(p.adet)?num(p.adet)+" x ":"")+p.ad+" baskısı başladı mı?\n(Onaylayınca 'çalışıyor' görünecek; başlangıç şu an olarak güncellenecek.)")) return;
    snapAl();
    const simdi = Date.now(), iso = new Date(simdi).toISOString();
    await save("plan",{ id:p.id, basladi:true, baslangic:iso, gercekBaslangic:iso,
      planSureDk: p.planSureDk!=null?p.planSureDk:num(p.sureDk) });
    await planKaydir(p.makineId, plan, { id:p.id, s:simdi, dk:num(p.sureDk) });
  }

  // geri al — değişiklik öncesi plan anlık görüntüsü
  function snapAl(){ undoRef.current = plan.map(p=>({...p})); setUndoVar(true); }
  async function geriAl(){
    const snap=undoRef.current; if(!snap) return;
    const ids=new Set(snap.map(p=>p.id));
    for(const p of plan){ if(!ids.has(p.id)) await remove("plan",p.id); }   // sonradan eklenenleri sil
    for(const p of snap){ await restoreDoc("plan",p); }                     // eski hâli yükle
    undoRef.current=null; setUndoVar(false);
  }
  // boş kalacak makineler — art arda planlı işlerde SON bitiş saatini baz al (makine başına tek satır)
  const bosListe = [];
  mlist.forEach(mk=>{
    const jobs = plan.filter(p=>p.makineId===mk.id)
      .map(p=>new Date(p.baslangic).getTime()+num(p.sureDk)*60000)
      .filter(e=>e>baslaMs);
    let start;
    if(!jobs.length){ start = Math.max(baslaMs, now); }       // hiç işi yok → şu an boşta
    else { const son = Math.max.apply(null, jobs); if(son>=bitMs) return; start = Math.max(son, now); } // son iş bitti → boştaysa şu andan başlat
    bosListe.push({ makine:mk, start });
  });
  bosListe.sort((a,b)=>a.start-b.start);

  // genel özet
  const kapasiteMs = mlist.length * toplamMs;
  const toplamPrint = mlist.reduce((s,mk)=>s+(timelines[mk.id]?.printMs||0),0);
  const toplamBos = kapasiteMs - toplamPrint;
  const toplamKayip = mlist.reduce((s,mk)=>s+(timelines[mk.id]?.kayipMs||0),0);
  const toplamBosGelecek = Math.max(0, toplamBos - toplamKayip);
  const toplamGecikme = mlist.reduce((s,mk)=>s+(timelines[mk.id]?.gecikmeMs||0),0);
  const toplamGecikmeSayi = mlist.reduce((s,mk)=>s+(timelines[mk.id]?.gecikmeSayi||0),0);
  const yuzde = t => kapasiteMs ? (Math.round(t/kapasiteMs*1000)/10) : 0;

  function haftaKaydir(yon){ setBas(b=>b + yon*gunSayisi*24*3600*1000); }

  // gün başlıkları
  const gunler = Array.from({length:gunSayisi},(_,i)=>new Date(baslaMs + i*24*3600*1000));
  const tarihAralik = fmtTarih(baslaMs)+" – "+fmtTarih(bitMs-1)+" "+new Date(baslaMs).getFullYear();

  return h("div",{style:S.wrap},
    // üst sekme
    h("div",{style:{display:"flex",gap:8,marginBottom:14}},
      [["plan","📅 Üretim Planı"],["stok","📦 Stok"],["pazarlama","🛒 Pazarlama"],["oyun","🎮 Oyunlaştırma"]].map(([k,ad])=>
        h("button",{key:k,onClick:()=>setSekme(k),style:{...S.btn(sekme===k?"p":""),padding:"10px 18px",fontWeight:700}},ad))),
    sekme==="stok" && h(StokTab,{urunler:stokUrun,plan,filamentler}),
    sekme==="pazarlama" && h(PazarlamaTab,{urunler:stokUrun,plan,filamentler,hareketler:pazHareket,bolgeler}),
    sekme==="oyun" && h(OyunTab,{plan,urunler:stokUrun,hareketler:pazHareket,makineler:mlist,bolgeler}),
    sekme==="plan" && h("div",null,
    // başlık
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10,marginBottom:14}},
      h("div",null,
        h("div",{style:{fontSize:22,fontWeight:800,color:C.navyHdr}},"🧊 HAFTALIK MAKİNE ÇALIŞMA PLANI"),
        h("div",{style:{fontSize:13,color:C.mut,fontWeight:600}},"Gantt Takvimi")),
      h("div",{style:{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}},
        h("button",{style:S.ibtn,onClick:()=>haftaKaydir(-1)},"‹ Önceki"),
        h("input",{type:"date",style:{...S.input,width:160},value:toInput(baslaMs).slice(0,10),
          onChange:e=>setBas(haftaBasi(new Date(e.target.value)).getTime())}),
        h("button",{style:S.ibtn,onClick:()=>haftaKaydir(1)},"Sonraki ›"),
        h("button",{style:S.ibtn,onClick:()=>setBas(haftaBasi(Date.now()).getTime())},"Bu hafta"),
        h("select",{style:{...S.input,width:90},value:gunSayisi,onChange:e=>setGunSayisi(num(e.target.value))},
          [3,4,7,14].map(g=>h("option",{key:g,value:g},g+" gün"))),
        h("div",{style:{display:"flex",alignItems:"center",gap:4}},
          h("button",{style:S.ibtn,title:"Uzaklaştır",onClick:()=>setZoom(z=>Math.max(1,Math.round((z-0.5)*10)/10))},"🔍−"),
          h("span",{style:{fontSize:12,color:C.mut,minWidth:30,textAlign:"center"}},zoom+"x"),
          h("button",{style:S.ibtn,title:"Yakınlaştır",onClick:()=>setZoom(z=>Math.min(6,Math.round((z+0.5)*10)/10))},"🔍+")),
        undoVar && h("button",{style:{...S.btn(),borderColor:"#c2410c",color:"#c2410c",fontWeight:800},onClick:geriAl,title:"Son değişikliği geri al"},"↶ Geri al"),
        h("button",{style:S.btn(),onClick:()=>setMakineAcik(true)},"⚙ Makineler"),
        h("button",{style:S.btn(),onClick:()=>setFilamentAcik(true)},"🧵 Filament"),
        h("button",{style:S.btn("p"),onClick:()=>setIsModal({})},"+ Baskı Planla"))),

    // gantt kartı
    h("div",{style:{...S.card,overflow:"hidden",marginBottom:16,userSelect:"none",WebkitUserSelect:"none"}},
      h("div",{style:{...S.hdr,borderRadius:0,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}},
        h("span",null,"📅 "+tarihAralik),
        h("div",{style:{display:"flex",gap:16,flexWrap:"wrap"}},
          h(Lejant,{renk:C.yesil,ad:"Çalışıyor"}),
          h(Lejant,{renk:C.planBg,ad:"Planlandı"}),
          h(Lejant,{renk:C.onayBg,ad:"Onay bekliyor"}),
          h(Lejant,{renk:C.kirmizi,ad:"Boşta (gelecek)"}),
          h(Lejant,{renk:"#e3aba4",ad:"⚠ Kayıp zaman"}),
          h(Lejant,{renk:C.mavi,ad:"AMS'li iş"}),
          h(Lejant,{renk:C.sari,ad:"AMS gerektirmeyen"}))),
      // kaydırmalı alan
      h("div",{ref:scrollRef,style:{overflowX:"auto"}},
        h("div",{style:{minWidth:LABEL_W+toplamW}},
          // gün başlık satırı
          h("div",{style:{display:"flex",borderBottom:"1px solid "+C.line,background:"#f3f6fb"}},
            h("div",{style:{width:LABEL_W,flexShrink:0,padding:"8px 10px",fontWeight:800,fontSize:13,position:"sticky",left:0,background:"#f3f6fb",zIndex:3,borderRight:"1px solid "+C.line}},"MAKİNE"),
            gunler.map((g,i)=>h("div",{key:i,style:{width:GUN_W,flexShrink:0,borderLeft:i?"1px solid "+C.line:"none",padding:"6px 4px",textAlign:"center"}},
              h("div",{style:{fontWeight:800,fontSize:13}},pad(g.getDate())+" "+AYLAR[g.getMonth()]),
              h("div",{style:{fontSize:11,color:C.mut,fontWeight:700}},GUNLER[g.getDay()]),
              h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:10,color:C.mut,marginTop:3,padding:"0 2px"}},
                ticks.map(hr=>h("span",{key:hr}, step>=2 ? pad(hr)+":00" : pad(hr))))))),
          // makine satırları
          mlist.length===0 ? h("div",{style:{padding:20,color:C.mut,textAlign:"center"}},"Makine yok. ⚙ Makineler'den ekle.")
          : mlist.map(mk=>{
              const tl = timelines[mk.id] || { js:[], bos:[] };
              // tabla uyarısı: bir baskı bitmiş ama makinede çalışan/başlamış sonraki iş yok → tablayı topla
              const mjobs = plan.filter(p=>p.makineId===mk.id);
              const calisan = mjobs.some(p=>p.basladi && new Date(p.baslangic).getTime()<=now && new Date(p.baslangic).getTime()+num(p.sureDk)*60000>now);
              const tablaIs = calisan ? null : mjobs
                .filter(p=>p.basladi && !p.tablaAlindi && new Date(p.baslangic).getTime()+num(p.sureDk)*60000<=now)
                .sort((a,b)=>(new Date(b.baslangic).getTime()+num(b.sureDk)*60000)-(new Date(a.baslangic).getTime()+num(a.sureDk)*60000))[0] || null;
              return h("div",{key:mk.id,style:{display:"flex",borderBottom:"1px solid "+C.line,minHeight:ROW_H}},
                h("div",{style:{width:LABEL_W,flexShrink:0,padding:"8px 10px",position:"sticky",left:0,background:"#fff",zIndex:2,borderRight:"1px solid "+C.line,display:"flex",flexDirection:"column",justifyContent:"center"}},
                  h("div",{style:{fontWeight:800,fontSize:14}},mk.ad),
                  mk.tur && h("div",{style:{fontSize:11,color:C.mut}},mk.tur),
                  tablaIs && h("div",{ title:"Önceki baskı bitti — tablayı topla. Tıkla: alındı.",
                    onClick:()=>{ if(confirm(mk.ad+": tabla alındı mı?")) save("plan",{id:tablaIs.id,tablaAlindi:true}); },
                    style:{marginTop:5,fontSize:10,fontWeight:800,color:"#7a3e00",background:"#ffe2b8",
                      border:"1px solid #fb8c00",borderRadius:6,padding:"2px 5px",cursor:"pointer",lineHeight:1.2,alignSelf:"flex-start"}},
                    "🧹 Tabla topla")),
                h("div",{style:{position:"relative",width:toplamW,flexShrink:0,
                  backgroundImage:"repeating-linear-gradient(90deg,#c8d3e0 0 1px,transparent 1px "+GUN_W+"px),"+
                    "repeating-linear-gradient(90deg,#eef2f7 0 1px,transparent 1px "+(GUN_W*step/24)+"px)"}},
                  // boş bloklar → geçmiş=KAYIP (taralı), gelecek=BOŞTA (tıklanır)
                  tl.bos.flatMap((b,i)=>{
                    const parts=[];
                    const pe=Math.min(b.end, now);
                    if(pe>b.start) parts.push({k:"k"+i,s:b.start,e:pe,kayip:true});
                    const fs=Math.max(b.start, now);
                    if(b.end>fs) parts.push({k:"f"+i,s:fs,e:b.end,kayip:false});
                    return parts.map(pt=>{
                      const left=(pt.s-baslaMs)*px, width=(pt.e-pt.s)*px;
                      if(width<3) return null;
                      if(pt.kayip) return h("div",{key:pt.k,
                        title:"⚠ Kayıp zaman: "+fmtTarihSaat(pt.s)+" – "+fmtSaat(pt.e)+" ("+fmtSureSaat((pt.e-pt.s)/60000)+")",
                        style:{position:"absolute",left:left+2,top:8,width:width-4,height:ROW_H-16,
                          background:"repeating-linear-gradient(45deg,#efc3bd 0 6px,#e3aba4 6px 12px)",
                          border:"1px solid "+C.kirmiziB,borderRadius:7,
                          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                          overflow:"hidden",color:"#7f1d1d",fontSize:10,fontWeight:800,lineHeight:1.2}},
                        width>50 && h(React.Fragment,null, h("div",null,"⚠ KAYIP"), h("div",{style:{fontWeight:600}},fmtSureSaat((pt.e-pt.s)/60000))));
                      return h("div",{key:pt.k,onClick:()=>setIsModal({makineId:mk.id,baslangic:pt.s}),
                        title:"Boş — tıkla, iş planla",
                        style:{position:"absolute",left:left+2,top:8,width:width-4,height:ROW_H-16,
                          background:C.kirmizi,border:"1px solid "+C.kirmiziB,borderRadius:7,cursor:"pointer",
                          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                          overflow:"hidden",color:C.kirmiziT,fontSize:11,fontWeight:700,lineHeight:1.25}},
                        width>54 && h(React.Fragment,null, h("div",null,fmtSaat(pt.s)), h("div",null,fmtSaat(pt.e))));
                    });
                  }),
                  // iş blokları (tıkla → onay/düzenle)
                  tl.js.map((x,i)=>{
                    const left=(Math.max(baslaMs,x.s)-baslaMs)*px, width=(Math.min(bitMs,x.e)-Math.max(baslaMs,x.s))*px;
                    if(width<3) return null;
                    // durum: başladı→çalışıyor/bitti · başlamadı: planlı(açık)/onay bekliyor(amber)/kaçırıldı
                    const basladi = !!x.p.basladi;
                    let dr, durStr;
                    if(basladi){ if(x.e<=now){ dr={bg:C.bitBg,bd:C.bitB,tc:C.bitT}; durStr="bitti"; } else { dr={bg:C.yesil,bd:C.yesilB,tc:C.yesilT}; durStr="çalışıyor"; } }
                    else if(x.s>now){ dr={bg:C.planBg,bd:C.planB,tc:C.planT,dash:true}; durStr="planlandı"; }
                    else if(x.e>now){ dr={bg:C.onayBg,bd:C.onayB,tc:C.onayT,onay:true}; durStr="onay bekliyor"; }
                    else { dr={bg:C.bitBg,bd:C.bitB,tc:C.bitT,dash:true}; durStr="başlamadı"; }
                    return h("div",{key:"j"+i, onClick:()=> dr.onay ? baslat(x.p) : setIsModal(x.p),
                      title:x.p.ad+" · "+durStr+" · bitiş "+fmtTarihSaat(x.e),
                      style:{position:"absolute",left:left+2,top:8,width:width-4,height:ROW_H-16,
                        background:dr.bg,border:(dr.dash?"1px dashed ":"1px solid ")+dr.bd,borderRadius:7,cursor:"pointer",
                        display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                        overflow:"hidden",color:dr.tc,fontSize:11,fontWeight:700,lineHeight:1.25,padding:"0 4px",textAlign:"center"}},
                      h("span",{style:{position:"absolute",top:4,right:5,width:8,height:8,borderRadius:8,background:x.p.ams?C.mavi:C.sari}}),
                      width>52 && h(React.Fragment,null,
                        h("div",null,num(x.p.adet)+" x "+x.p.ad),
                        h("div",null, dr.onay ? "▶ Başlasın mı?" : fmtTarihSaat(x.e))));
                  }),
                  // şimdi çizgisi
                  (now>=baslaMs&&now<=bitMs) && h("div",{style:{position:"absolute",left:(now-baslaMs)*px,top:0,bottom:0,width:2,background:C.navyHdr,opacity:.55}})
                ));
            })
          ))),

    // alt paneller
    h("div",{style:{display:"grid",gap:14,gridTemplateColumns:"repeat(auto-fit,minmax(330px,1fr))"}},
      // boş kalacak makineler
      h("div",{style:S.card},
        h("div",{style:S.hdr},"BOŞ KALACAK MAKİNELER"),
        h("div",{style:{padding:"4px 0",maxHeight:300,overflowY:"auto"}},
          !bosListe.length ? h("div",{style:{padding:16,color:C.mut,textAlign:"center"}},"Boşluk yok — plan dolu 🎉")
          : bosListe.slice(0,40).map((b,i)=>h("div",{key:i,onClick:()=>setIsModal({makineId:b.makine.id,baslangic:b.start}),
              style:{display:"grid",gridTemplateColumns:"70px 52px 1fr auto",gap:8,alignItems:"center",
                padding:"8px 14px",borderTop:i?"1px solid "+C.line:"none",cursor:"pointer",fontSize:13}},
              h("span",{style:{color:C.mut}},"📅 "+fmtTarih(b.start)),
              h("b",null,fmtSaat(b.start)),
              h("span",{style:{fontWeight:700}},b.makine.ad),
              h("span",{style:{color:C.kirmiziB,fontWeight:700,fontSize:12}},"Yeni iş yükle →")))) ),
      // makine özeti
      h("div",{style:S.card},
        h("div",{style:S.hdr},"MAKİNE ÖZETİ (HAFTALIK)"),
        h("div",{style:{display:"grid",gridTemplateColumns:"1.1fr .9fr .9fr .9fr 78px",gap:6,
          padding:"7px 14px",borderBottom:"1px solid "+C.line,fontSize:11,fontWeight:700,color:C.mut}},
          h("span",null,"MAKİNE"),h("span",null,"BASKI"),h("span",{style:{color:C.kirmiziB}},"KAYIP"),h("span",{style:{color:"#c2410c"}},"GECİKME"),h("span",null,"DOLULUK")),
        h("div",{style:{padding:"2px 0"}},
          mlist.map((mk,i)=>{
            const tl=timelines[mk.id]||{printMs:0,kayipMs:0,gecikmeMs:0};
            const dol = toplamMs? Math.round(tl.printMs/toplamMs*1000)/10 : 0;
            return h("div",{key:mk.id,style:{display:"grid",gridTemplateColumns:"1.1fr .9fr .9fr .9fr 78px",gap:6,alignItems:"center",
              padding:"8px 14px",borderTop:i?"1px solid "+C.line:"none",fontSize:12.5}},
              h("b",null,mk.ad),
              h("span",{style:{color:C.mut}},fmtSureSaat(tl.printMs/60000)),
              h("span",{style:{color: tl.kayipMs>0?C.kirmiziB:C.mut, fontWeight: tl.kayipMs>0?700:400}},fmtSureSaat(tl.kayipMs/60000)),
              h("span",{style:{color: tl.gecikmeMs>0?"#c2410c":C.mut, fontWeight: tl.gecikmeMs>0?700:400}},fmtSureSaat(tl.gecikmeMs/60000)),
              h("div",{style:{display:"flex",alignItems:"center",gap:6}},
                h("div",{style:{flex:1,height:8,background:"#eef2f7",borderRadius:9,overflow:"hidden"}},
                  h("div",{style:{height:"100%",width:dol+"%",background:dol>=70?C.yesilB:dol>=40?C.sari:C.kirmiziB}})),
                h("span",{style:{fontWeight:700,fontSize:12}},"%"+dol)));
          }))),
      // genel özet
      h("div",{style:S.card},
        h("div",{style:S.hdr},"GENEL ÖZET"),
        h("div",{style:{padding:16,display:"grid",gap:12}},
          h("div",{style:{...S.card,padding:14,textAlign:"center"}},
            h("div",{style:{fontSize:12,color:C.mut,fontWeight:700}},"TOPLAM KAPASİTE"),
            h("div",{style:{fontSize:11,color:C.mut}},mlist.length+" makine × 24 saat × "+gunSayisi+" gün"),
            h("div",{style:{fontSize:24,fontWeight:800,color:C.navyHdr,marginTop:4}},Math.round(kapasiteMs/3600000)+" SAAT")),
          h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(78px,1fr))",gap:10}},
            h("div",{style:{...S.card,padding:"12px 8px",textAlign:"center"}},
              h("div",{style:{fontSize:11,color:C.mut,fontWeight:700}},"BASKI"),
              h("div",{style:{fontSize:15,fontWeight:800,marginTop:4}},fmtSureSaat(toplamPrint/60000)),
              h("div",{style:{fontWeight:800,color:C.yesilB}},"(%"+yuzde(toplamPrint)+")")),
            h("div",{style:{...S.card,padding:"12px 8px",textAlign:"center"}},
              h("div",{style:{fontSize:11,color:C.mut,fontWeight:700}},"BOŞTA"),
              h("div",{style:{fontSize:15,fontWeight:800,marginTop:4}},fmtSureSaat(toplamBosGelecek/60000)),
              h("div",{style:{fontWeight:800,color:C.kirmiziB}},"(%"+yuzde(toplamBosGelecek)+")")),
            h("div",{style:{...S.card,padding:"12px 8px",textAlign:"center",borderColor:C.kirmiziB}},
              h("div",{style:{fontSize:11,color:C.kirmiziB,fontWeight:700}},"⚠ KAYIP"),
              h("div",{style:{fontSize:15,fontWeight:800,marginTop:4}},fmtSureSaat(toplamKayip/60000)),
              h("div",{style:{fontWeight:800,color:C.kirmiziB}},"(%"+yuzde(toplamKayip)+")")),
            h("div",{style:{...S.card,padding:"12px 8px",textAlign:"center",borderColor:"#c2410c"}},
              h("div",{style:{fontSize:11,color:"#c2410c",fontWeight:700}},"⏱ GECİKME"),
              h("div",{style:{fontSize:15,fontWeight:800,marginTop:4}},fmtSureSaat(toplamGecikme/60000)),
              h("div",{style:{fontWeight:800,color:"#c2410c"}},"("+toplamGecikmeSayi+" baskı)"))))) ),

    h("div",{style:{textAlign:"right",fontSize:12,color:C.mut,marginTop:12}},"Güncelleme: "+fmtTarihSaat(now)),

    isModal && h(IsModal,{kayit:isModal,makineler:mlist,plan,urunler:stokUrun,filamentler,onSnap:snapAl,onKapat:()=>setIsModal(null)}),
    makineAcik && h(MakineYonetim,{makineler:mlist,onKapat:()=>setMakineAcik(false)}),
    filamentAcik && h(FilamentYonetim,{filamentler,onKapat:()=>setFilamentAcik(false)})
  ));
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
